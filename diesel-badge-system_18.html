<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柴油車自主管理標章系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg0:#0f1419;--bg1:#1a2332;--bg2:#1e2a3a;--bg3:#253347;--bd:#2d3f54;--bdf:#f59e0b;--t1:#e8edf3;--t2:#8899aa;--t3:#5a6e82;--acc:#f59e0b;--acc2:#d97706;--accd:rgba(245,158,11,.1);--ok:#10b981;--okd:rgba(16,185,129,.1);--no:#ef4444;--nod:rgba(239,68,68,.1);--info:#3b82f6;--infod:rgba(59,130,246,.1);--gold:#fbbf24;--silver:#94a3b8;--bronze:#d97706;--r:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a2332,#0f1419);border-bottom:2px solid var(--acc);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px}
.hdr .sub{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;font-weight:400}
.hdr-r{display:flex;align-items:center;gap:10px}
.rc{background:var(--accd);color:var(--acc);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.tabs{display:flex;background:var(--bg1);border-bottom:1px solid var(--bd);padding:0 12px;overflow-x:auto}
.tab{background:none;border:none;color:var(--t3);padding:13px 18px;font-size:13px;font-weight:500;cursor:pointer;position:relative;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:color .2s}
.tab:hover{color:var(--t2)}.tab.on{color:var(--acc)}
.tab.on::after{content:'';position:absolute;bottom:0;left:6px;right:6px;height:2px;background:var(--acc);border-radius:2px 2px 0 0}
.wrap{padding:16px;max-width:1400px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ctit{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--acc);letter-spacing:1px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.fi .req::after{content:' *';color:var(--no)}
input,select,textarea{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;color:var(--t1);font-size:13px;font-family:'Noto Sans TC',sans-serif;transition:border-color .2s;width:100%}
input:focus,select:focus{outline:none;border-color:var(--bdf)}
select{cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;transition:all .2s;white-space:nowrap}
.bp{background:var(--acc);color:#000}.bp:hover{background:var(--acc2)}
.bs{background:var(--bg3);color:var(--t1);border:1px solid var(--bd)}.bs:hover{border-color:var(--t3)}
.bd{background:var(--nod);color:var(--no);border:1px solid transparent}.bd:hover{border-color:var(--no)}
.binfo{background:var(--infod);color:var(--info);border:1px solid transparent}.binfo:hover{border-color:var(--info)}
.bsm{padding:5px 10px;font-size:11px}
.upa{border:2px dashed var(--bd);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.upa:hover{border-color:var(--acc)}
.upa .ui{font-size:28px;opacity:.5}.upa .ut{font-size:11px;color:var(--t3)}
.ppc{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.pp{width:110px;height:80px;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--bd)}
.pp img{width:100%;height:100%;object-fit:cover}
.pp .rp{position:absolute;top:3px;right:3px;background:rgba(239,68,68,.9);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.tc{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg1)}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:rgba(245,158,11,.03)}
.bt{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg{background:rgba(251,191,36,.15);color:var(--gold)}
.bsi{background:rgba(148,163,184,.15);color:var(--silver)}
.bbr{background:rgba(217,119,6,.15);color:var(--bronze)}
.bok{background:var(--okd);color:var(--ok)}
.bno{background:var(--nod);color:var(--no)}
.bin{background:var(--infod);color:var(--info)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.sc .sn{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1}
.sc .sl{font-size:10px;color:var(--t3);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.dash-cat{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:16px}
.dash-cat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.dash-cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dash-cat-card.cat-eq::before{background:linear-gradient(90deg,var(--gold),var(--acc2))}
.dash-cat-card.cat-tr::before{background:linear-gradient(90deg,var(--ok),var(--info))}
.dash-cat-card .dcc-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dash-cat-card.cat-eq .dcc-title{color:var(--gold)}
.dash-cat-card.cat-tr .dcc-title{color:var(--ok)}
.dcc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center}
.dcc-stat .dcc-num{font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1}
.dcc-stat .dcc-lbl{font-size:10px;color:var(--t3);margin-top:4px;text-transform:uppercase}
.dcc-bar{margin-top:14px}
.dcc-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.dcc-bar-label span:first-child{color:var(--t2)}
.dcc-bar-label span:last-child{font-family:'JetBrains Mono',monospace;font-weight:700}
.dt{width:100%;border-collapse:collapse;margin-top:10px}
.dt th{background:var(--bg1);padding:9px 12px;font-size:11px;text-align:center;color:var(--t3);border-bottom:2px solid var(--bd)}
.dt td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--bd);font-size:12px}
.dt tr:last-child{font-weight:700;background:var(--accd)}
.pb{width:100%;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s}
.tb{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{flex:1;min-width:160px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center;padding:20px}
.mo.on{display:flex}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:22px;max-width:460px;width:100%}
.md h3{margin-bottom:10px;font-size:15px}.md p{font-size:13px;color:var(--t2);margin-bottom:18px}
.ma{display:flex;gap:8px;justify-content:flex-end}
.pp2{background:#fff;color:#000;padding:24px 28px;margin-bottom:16px;border-radius:var(--r);page-break-after:always;font-size:13px}
.pp2 h2{font-size:18px;text-align:center;margin-bottom:3px;border-bottom:2.5px solid #000;padding-bottom:7px}
.pp2 .ps{text-align:center;font-size:11px;color:#666;margin-bottom:14px}
.pig{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-bottom:16px}
.pii{display:flex;gap:6px;font-size:13px;padding:4px 0;border-bottom:1px dotted #ccc}
.pii .pl{font-weight:700;min-width:110px;color:#333}
.ppg{display:grid;gap:12px}.ppg.cols2{grid-template-columns:1fr 1fr}.ppg.cols1{grid-template-columns:1fr}
.ppb{border:1px solid #bbb;border-radius:6px;overflow:hidden;text-align:center;display:flex;flex-direction:column}
.ppb .ppb-img-wrap{flex:1;height:260px;display:flex;align-items:center;justify-content:center;background:#f8f8f8}
.ppb .ppb-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.ppb .pbl{font-size:11px;padding:5px;background:#eee;font-weight:600;border-top:1px solid #ccc;flex-shrink:0}
.tl{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tg{display:inline-flex;align-items:center;gap:3px;background:var(--accd);color:var(--acc);padding:3px 9px;border-radius:10px;font-size:11px}
.tg .rt{background:none;border:none;color:var(--acc);cursor:pointer;font-size:13px;padding:0 2px}
.rg{display:flex;gap:10px;flex-wrap:wrap}
.ro{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px}
.ro input[type="radio"]{accent-color:var(--acc);width:15px;height:15px;cursor:pointer}
.swo{display:flex;gap:6px}.swo select{flex:1}.swo input{flex:1;display:none}.swo input.sh{display:block}
.es{text-align:center;padding:50px 16px;color:var(--t3)}
.es .ei{font-size:40px;margin-bottom:10px;opacity:.4}.es p{font-size:13px}
.toast{position:fixed;top:20px;right:20px;background:var(--ok);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:300;transform:translateX(120%);transition:transform .3s;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{transform:translateX(0)}.toast.err{background:var(--no)}
.query-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.query-hint{font-size:11px;color:var(--t3);margin-top:6px;line-height:1.5}
.query-hint a{color:var(--info);text-decoration:none}.query-hint a:hover{text-decoration:underline}
.exp-filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:16px}
.exp-filter-group{display:flex;flex-direction:column;gap:6px}
.exp-filter-group label.flbl{font-size:12px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.5px}
.chk-grid{display:flex;flex-wrap:wrap;gap:6px}
.chk-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--bd);transition:all .2s;user-select:none}
.chk-item:hover{border-color:var(--acc)}
.chk-item input[type="checkbox"]{accent-color:var(--acc);width:14px;height:14px;cursor:pointer}
.chk-item.checked{background:var(--accd);border-color:var(--acc)}
.exp-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.exp-count{font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.json-size{font-size:11px;color:var(--t3);margin-top:4px;font-family:'JetBrains Mono',monospace}
@media(max-width:768px){.fg{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}.wrap{padding:10px}.hdr h1{font-size:15px}.tab{padding:11px 12px;font-size:12px}}
@media print{body{background:#fff!important}.hdr,.tabs,.np{display:none!important}.wrap{padding:0;max-width:100%}.pp2{box-shadow:none;border:none;margin:0;padding:20px;page-break-inside:avoid}.ppb .ppb-img-wrap{height:220px}.card{display:none!important}.exp-preview-area{display:block!important}.exp-preview-area .pp2{display:block!important}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi-anim{animation:fi .3s ease}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🚛 <div>柴油車自主管理標章系統<div class="sub">Diesel Vehicle Self-Management Badge System</div></div></h1>
  <div class="hdr-r">
    <button class="btn bsm bp" onclick="App.saveToDrive()" title="儲存到 Google Drive">☁️ 儲存到 Drive</button>
    <button class="btn bsm binfo" onclick="App.showFileModal()" title="從 Drive 載入">📂 從 Drive 載入</button>
    <button class="btn bsm bs" onclick="App.expJSON()" title="匯出本地 JSON">📥 匯出</button>
    <label class="btn bsm bs" style="cursor:pointer" title="匯入本地 JSON">📤 匯入<input type="file" accept=".json" style="display:none" onchange="App.impJSON(event)"></label>
    <span class="rc" id="rc">0 筆</span>
  </div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="wrap" id="appRoot"></div>
<div class="toast" id="toast"></div>

<div class="mo" id="dupModal">
  <div class="md"><h3>⚠️ 發現重複車號</h3><p id="dupMsg"></p>
    <div class="ma"><button class="btn bs" onclick="App.closeDup()">取消</button><button class="btn bp" onclick="App.loadDup()">叫出該筆資料</button></div>
  </div>
</div>
<div class="mo" id="delModal">
  <div class="md"><h3>⚠️ 確認刪除</h3><p>確定要刪除這筆資料嗎？此操作無法復原。</p>
    <div class="ma"><button class="btn bs" onclick="App.closeDel()">取消</button><button class="btn bd" onclick="App.execDel()">確認刪除</button></div>
  </div>
</div>

<script>
const MOENV_URL = 'https://mobile.moenv.gov.tw/dce/Detect_Search.aspx';
// ★★★ Apps Script 部署網址 ★★★
const API_URL = 'https://script.google.com/macros/s/AKfycbwKTKaXyvy-tN5PfF3eS7nGVjLmx_1XuQt16cj1MwHcHpRc0A7ydGVXespF5xRIzFyT/exec';

const App = (() => {
  const SK = 'dbs_records_v4';
  const CK = 'dbs_contractors_v4';
  let records = [];
  let contractors = [];
  let dupId = null, delId = null, currentTab = 'list', editingId = '';
  let photoData = { v1:'', v2:'', web:'' };

  // ---- Drive JSON API ----
  function drivePost(body) {
    if (!API_URL) return Promise.resolve(null);
    return fetch(API_URL, {method:'POST', body:JSON.stringify(body)}).then(r=>r.json()).catch(()=>null);
  }
  function driveGet(params) {
    if (!API_URL) return Promise.resolve(null);
    var qs = Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    return fetch(API_URL+'?'+qs).then(r=>r.json()).catch(()=>null);
  }
  async function saveToDrive() {
    if (!API_URL) { toast('⚠️ 未設定 API_URL，請編輯 HTML', true); return; }
    var now = new Date();
    var ts = now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2)+('0'+now.getDate()).slice(-2)+'_'+('0'+now.getHours()).slice(-2)+('0'+now.getMinutes()).slice(-2)+('0'+now.getSeconds()).slice(-2);
    var filename = '自主管理標章_' + ts + '.json';
    var jsonData = { records:records, contractors:contractors, savedAt:now.toISOString(), version:'v4' };
    toast('☁️ 儲存到 Google Drive...');
    var result = await drivePost({ action:'saveFile', filename:filename, jsonData:jsonData });
    if (result && result.success) {
      toast('☁️ 已儲存！' + result.filename + ' (' + Math.round(result.size/1024) + 'KB)');
    } else {
      toast('❌ Drive 儲存失敗：' + (result?.error||'未知錯誤'), true);
    }
  }
  async function loadFileList() {
    if (!API_URL) return [];
    var result = await driveGet({action:'listFiles'});
    return (result && result.files) ? result.files : [];
  }
  async function loadFromDrive(fileId) {
    if (!API_URL) return;
    toast('☁️ 讀取中...');
    var result = await driveGet({action:'readFile', fileId:fileId});
    if (result && result.success && result.data) {
      if (result.data.records) { records = result.data.records; }
      if (result.data.contractors && result.data.contractors.length) { contractors = result.data.contractors; }
      save();
      toast('☁️ 已載入 ' + result.filename + '（' + records.length + ' 筆）');
      renderPanel();
      closeFileModal();
    } else {
      toast('❌ 讀取失敗', true);
    }
  }
  function closeFileModal() { document.getElementById('fileModal').classList.remove('on'); }
  async function showFileModal() {
    if (!API_URL) { toast('⚠️ 未設定 API_URL', true); return; }
    var modal = document.getElementById('fileModal');
    var list = document.getElementById('fileList');
    list.innerHTML = '<p style="text-align:center;color:var(--t3);padding:20px">載入中...</p>';
    modal.classList.add('on');
    var files = await loadFileList();
    if (!files.length) {
      list.innerHTML = '<p style="text-align:center;color:var(--t3);padding:20px">Drive 資料夾內沒有 JSON 檔案</p>';
      return;
    }
    list.innerHTML = files.map(function(f) {
      var d = new Date(f.updated);
      var ds = d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW');
      var kb = Math.round(f.size/1024);
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .2s" onmouseover="this.style.background=\'var(--accd)\'" onmouseout="this.style.background=\'\'" onclick="App.loadFromDrive(\''+f.id+'\')"><div><div style="font-weight:600;font-size:13px">'+f.name+'</div><div style="font-size:11px;color:var(--t3)">'+ds+' • '+kb+'KB</div></div><button class="btn bsm bp">載入</button></div>';
    }).join('');
  }

  // ---- Cloud API (跟灑水紀錄相同) ----
  function apiPost(body) {
    if (!API_URL) return Promise.resolve(null);
    return fetch(API_URL, {method:'POST', body:JSON.stringify(body)}).then(r=>r.json()).catch(()=>null);
  }
  function apiGet(action) {
    if (!API_URL) return Promise.resolve(null);
    return fetch(API_URL+'?action='+action).then(r=>r.json()).catch(()=>null);
  }
  async function uploadToDrive(base64Full, filename) {
    var m = base64Full.match(/^data:(.*?);base64,(.*)$/);
    if (!m) return null;
    return apiPost({action:'uploadPhoto', base64:m[2], filename:filename, mimeType:m[1]});
  }

  // ---- Storage ----
  function load() {
    try { records = JSON.parse(localStorage.getItem(SK)) || []; } catch { records = []; }
    try { contractors = JSON.parse(localStorage.getItem(CK)) || ['樺棋營造','華電聯工','亞翔工程','台朔環保']; } catch { contractors = ['樺棋營造','華電聯工','亞翔工程','台朔環保']; }
  }
  function save() {
    try { localStorage.setItem(SK, JSON.stringify(records)); }
    catch {
      // localStorage full — try without photos
      try {
        const lite = records.map(r => ({...r, photo1:'', photo2:'', photoWeb:''}));
        localStorage.setItem(SK, JSON.stringify(lite));
        toast('⚠️ 儲存空間不足，照片未存入本地（請匯出 JSON 備份）', true);
      } catch { toast('❌ 本地儲存失敗，請匯出 JSON 備份', true); }
    }
    try { localStorage.setItem(CK, JSON.stringify(contractors)); } catch {}
    updCount();
  }
  function updCount() { document.getElementById('rc').textContent = records.length + ' 筆'; }

  // ---- Toast ----
  function toast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (isErr ? ' err' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  // ---- Image Compression ----
  function compressImage(file, maxW = 800, quality = 0.5) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve('');
        img.src = e.target.result;
      };
      reader.onerror = () => resolve('');
      reader.readAsDataURL(file);
    });
  }

  function queryMoenv(plate) {
    if (!plate) { toast('請先輸入車號', true); return; }
    navigator.clipboard.writeText(plate).then(() => {
      toast('✅ 車號已複製！正在開啟查詢網站...');
      setTimeout(() => window.open(MOENV_URL, '_blank'), 300);
    }).catch(() => {
      const ta = document.createElement('textarea'); ta.value = plate; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      toast('✅ 車號已複製！');
      setTimeout(() => window.open(MOENV_URL, '_blank'), 300);
    });
  }

  // ---- JSON Import/Export ----
  function expJSON() {
    const data = { records, contractors, exportDate: new Date().toISOString(), version: 'v4' };
    const str = JSON.stringify(data);
    const blob = new Blob([str], { type:'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `柴油車標章系統_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    toast(`📥 已匯出（${Math.round(str.length/1024)}KB，含 ${records.length} 筆資料）`);
  }
  function impJSON(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.records) {
          let added = 0, updated = 0;
          data.records.forEach(r => {
            const existing = records.find(m => m.id === r.id);
            if (existing) {
              // Update existing
              Object.assign(existing, r);
              updated++;
            } else {
              records.push(r);
              added++;
            }
          });
          if (data.contractors) data.contractors.forEach(c => { if (!contractors.includes(c)) contractors.push(c); });
          save();
          toast(`📤 匯入完成！新增 ${added} 筆，更新 ${updated} 筆`);
          renderPanel();
        }
      } catch { toast('❌ JSON 格式錯誤', true); }
    };
    reader.readAsText(file); event.target.value = '';
  }

  async function saveForm() {
    const d = readForm();
    if (!d.category){toast('請選擇施工機具或運輸車輛',true);return;}
    if (!d.plateNumber){toast('請輸入車號',true);return;}
    if (!d.location){toast('請選擇或填寫地點',true);return;}
    if (!d.contractor){toast('請選擇承攬商',true);return;}
    if (!d.vehicleType){toast('請選擇或填寫車輛機具',true);return;}
    if (!d.hasBadge){toast('請選擇是否取得標章',true);return;}

    if (!editingId) {
      const dup = records.find(r=>r.plateNumber===d.plateNumber);
      if (dup){showDup(dup.id,d.plateNumber);return;}
    }

    const rec = {
      ...d,
      id: editingId || Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      photo1: photoData.v1, photo2: photoData.v2, photoWeb: photoData.web,
      photo1Url:'', photo2Url:'', photoWebUrl:'',
      updatedAt: new Date().toISOString()
    };

    // 保留編輯時的既有 URL
    if (editingId) {
      const old = records.find(r=>r.id===editingId);
      if (old) { rec.photo1Url=old.photo1Url||''; rec.photo2Url=old.photo2Url||''; rec.photoWebUrl=old.photoWebUrl||''; }
    }

    // Step 1: 上傳照片到 Drive (跟灑水紀錄一樣：先傳照片拿URL)
    if (API_URL) {
      const jobs = [{k:'v1',u:'photo1Url',l:'車輛照片1'},{k:'v2',u:'photo2Url',l:'車輛照片2'},{k:'web',u:'photoWebUrl',l:'網站查詢'}];
      for (const j of jobs) {
        if (photoData[j.k] && photoData[j.k].startsWith('data:')) {
          toast('☁️ 上傳 '+j.l+'...');
          const res = await uploadToDrive(photoData[j.k], rec.plateNumber+'_'+j.l+'_'+Date.now()+'.jpg');
          if (res && res.url) { rec[j.u] = res.url; rec[j.k==='v1'?'photo1':j.k==='v2'?'photo2':'photoWeb'] = ''; }
        }
      }
    }

    // Step 2: 存本地
    if (editingId) { const i=records.findIndex(r=>r.id===editingId); if(i!==-1) records[i]=rec; else records.push(rec); }
    else records.push(rec);
    save();

    // Step 3: 存 Google Sheet
    if (API_URL) {
      const res = await apiPost({action:'save', data:rec});
      if (res?.success) toast('☁️ 已同步到 Sheet + Drive！');
      else toast('✅ 已存本地'+(res?.error?'（雲端:'+res.error+')':''), true);
    } else toast('✅ 儲存成功！');

    editingId=''; photoData={v1:'',v2:'',web:''};
    switchTab('list');
  }

      <div class="dash-cat">
        <div class="dash-cat-card cat-eq"><div class="dcc-title">🏗️ 施工機具</div><div class="dcc-stats"><div class="dcc-stat"><div class="dcc-num" style="color:var(--ok)">${eqP}</div><div class="dcc-lbl">取得標章</div></div><div class="dcc-stat"><div class="dcc-num" style="color:var(--no)">${eq.length-eqP}</div><div class="dcc-lbl">未取得標章</div></div><div class="dcc-stat"><div class="dcc-num" style="color:${eqC}">${eqPct}%</div><div class="dcc-lbl">通過率</div></div></div><div class="dcc-bar"><div class="dcc-bar-label"><span>查驗 ${eq.length} 台</span><span style="color:${eqC}">${eqP}/${eq.length} 通過</span></div><div class="pb"><div class="pf" style="width:${eqPct}%;background:${eqC}"></div></div></div></div>
        <div class="dash-cat-card cat-tr"><div class="dcc-title">🚚 運輸車輛</div><div class="dcc-stats"><div class="dcc-stat"><div class="dcc-num" style="color:var(--ok)">${trP}</div><div class="dcc-lbl">取得標章</div></div><div class="dcc-stat"><div class="dcc-num" style="color:var(--no)">${tr.length-trP}</div><div class="dcc-lbl">未取得標章</div></div><div class="dcc-stat"><div class="dcc-num" style="color:${trC}">${trPct}%</div><div class="dcc-lbl">通過率</div></div></div><div class="dcc-bar"><div class="dcc-bar-label"><span>查驗 ${tr.length} 台</span><span style="color:${trC}">${trP}/${tr.length} 通過</span></div><div class="pb"><div class="pf" style="width:${trPct}%;background:${trC}"></div></div></div></div>
      </div>
      <div class="card"><div class="ctit">🏗️ 施工機具 — 依車輛機具型式</div>${dTable(eq)}</div>
      <div class="card" style="margin-top:12px"><div class="ctit">🚚 運輸車輛 — 依車輛機具型式</div>${dTable(tr)}</div>`;
  }
  function dTable(recs){const ty={};recs.forEach(r=>{if(!ty[r.vehicleType])ty[r.vehicleType]={t:0,p:0};ty[r.vehicleType].t++;if(r.hasBadge==='是')ty[r.vehicleType].p++;});const en=Object.entries(ty).sort((a,b)=>b[1].t-a[1].t);if(!en.length)return'<div class="es" style="padding:24px"><p>尚無資料</p></div>';let tA=0,pA=0;let rows=en.map(([k,d])=>{tA+=d.t;pA+=d.p;const p=d.t>0?Math.round(d.p/d.t*100):0;const c=p>=80?'var(--ok)':p>=50?'var(--acc)':'var(--no)';return`<tr><td style="text-align:left;font-weight:500">${esc(k)}</td><td>${d.t}</td><td>${d.p}</td><td>${d.t-d.p}</td><td><div style="display:flex;align-items:center;gap:6px;justify-content:center"><div class="pb" style="width:70px"><div class="pf" style="width:${p}%;background:${c}"></div></div><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${c}">${p}%</span></div></td></tr>`;}).join('');const tp=tA>0?Math.round(pA/tA*100):0;rows+=`<tr><td style="text-align:left">合計</td><td>${tA}</td><td>${pA}</td><td>${tA-pA}</td><td><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--acc)">${tp}%</span></td></tr>`;return`<table class="dt"><thead><tr><th style="text-align:left">車輛機具型式</th><th>查驗量</th><th>通過量</th><th>未通過</th><th>通過率</th></tr></thead><tbody>${rows}</tbody></table>`;}

  // ==================== EXPORT ====================
  function renderExport(root) {
    if (!records.length){root.innerHTML='<div class="es"><p>尚無資料可輸出</p></div>';return;}
    const allContr=[...new Set(records.map(r=>r.contractor))].sort();
    const allLoc=[...new Set(records.map(r=>r.location))].sort();
    const dates=records.map(r=>r.updatedAt?.slice(0,10)).filter(Boolean).sort();
    const minD=dates[0]||new Date().toISOString().slice(0,10),maxD=dates[dates.length-1]||minD;
    root.innerHTML = `<div class="card np fi-anim"><div class="ctit">🔎 輸出篩選條件</div>
      <div class="exp-filters">
        <div class="exp-filter-group"><label class="flbl">輸出範圍</label><div class="rg"><label class="ro"><input type="radio" name="expR" value="all" checked onchange="App.togDR()"> 全部</label><label class="ro"><input type="radio" name="expR" value="date" onchange="App.togDR()"> 日期區間</label></div><div id="drBox" style="display:none;margin-top:6px"><div style="display:flex;gap:6px;align-items:center"><input type="date" id="expDF" value="${minD}" style="width:auto"><span style="color:var(--t3);font-size:12px">～</span><input type="date" id="expDT" value="${maxD}" style="width:auto"></div></div></div>
        <div class="exp-filter-group"><label class="flbl">機具種類</label><div class="chk-grid"><label class="chk-item checked"><input type="checkbox" value="施工機具" checked onchange="App.togChk(this)"> 施工機具</label><label class="chk-item checked"><input type="checkbox" value="運輸車輛" checked onchange="App.togChk(this)"> 運輸車輛</label></div></div>
        <div class="exp-filter-group"><label class="flbl">地點</label><div class="chk-grid" id="expLoc">${allLoc.map(l=>`<label class="chk-item checked"><input type="checkbox" value="${esc(l)}" checked onchange="App.togChk(this)"> ${esc(l)}</label>`).join('')}</div></div>
        <div class="exp-filter-group"><label class="flbl">承攬商</label><div class="chk-grid" id="expCon">${allContr.map(c=>`<label class="chk-item checked"><input type="checkbox" value="${esc(c)}" checked onchange="App.togChk(this)"> ${esc(c)}</label>`).join('')}</div></div>
      </div>
      <div class="exp-actions">
        <button class="btn bp" onclick="App.genPreview()">👁️ 預覽 / 列印</button>
        <button class="btn bs" onclick="App.expJSON()">📥 匯出 JSON（含照片）</button>
        <label class="btn bs" style="cursor:pointer">📤 匯入 JSON<input type="file" accept=".json" style="display:none" onchange="App.impJSON(event)"></label>
        <span class="exp-count" id="expCnt"></span>
      </div>
    </div><div id="expArea" class="exp-preview-area"></div>`;
    updExpCnt();
  }
  function togDR(){document.getElementById('drBox').style.display=document.querySelector('input[name="expR"][value="date"]')?.checked?'block':'none';}
  function togChk(el){el.closest('.chk-item').classList.toggle('checked',el.checked);updExpCnt();}
  function getExpFiltered(){
    const isAll=document.querySelector('input[name="expR"][value="all"]')?.checked;
    const df=document.getElementById('expDF')?.value||'',dt=document.getElementById('expDT')?.value||'';
    const cats=[...document.querySelectorAll('.exp-filter-group:nth-child(2) input:checked')].map(c=>c.value);
    const locs=[...document.querySelectorAll('#expLoc input:checked')].map(c=>c.value);
    const cons=[...document.querySelectorAll('#expCon input:checked')].map(c=>c.value);
    return records.filter(r=>{
      if(!isAll&&df&&dt&&r.updatedAt){const d=r.updatedAt.slice(0,10);if(d<df||d>dt)return false;}
      if(cats.length&&!cats.includes(r.category))return false;
      if(locs.length&&!locs.includes(r.location))return false;
      if(cons.length&&!cons.includes(r.contractor))return false;
      return true;
    });
  }
  function updExpCnt(){const f=getExpFiltered();const el=document.getElementById('expCnt');if(el)el.textContent=`符合：${f.length}/${records.length} 筆`;}
  function genPreview(){
    const f=getExpFiltered();const area=document.getElementById('expArea');if(!area)return;
    if(!f.length){area.innerHTML='<div class="es" style="padding:30px"><p>沒有符合條件的資料</p></div>';return;}
    let h=`<div class="np" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--t2)">預覽 ${f.length} 筆</span><button class="btn bp" onclick="window.print()">🖨️ 列印 / PDF</button></div>`;
    h += f.map(r=>{
      const bt=r.hasBadge==='是'?`${r.badgeLevel}（${r.badgeNumber||'—'}）`:'未取得';
      let ph='';
      if(r.photo1||r.photo1Url||r.photo2||r.photo2Url||r.photoWeb||r.photoWebUrl){
        if(r.photo1||r.photo2){ph+='<div class="ppg cols2">';
          ph+=(r.photo1||r.photo1Url)?`<div class="ppb"><div class="ppb-img-wrap"><img src="${r.photo1||r.photo1Url}"></div><div class="pbl">車輛照片 1</div></div>`:'<div class="ppb"><div class="ppb-img-wrap" style="color:#aaa;font-size:12px">無照片</div><div class="pbl">車輛照片 1</div></div>';
          ph+=(r.photo2||r.photo2Url)?`<div class="ppb"><div class="ppb-img-wrap"><img src="${r.photo2||r.photo2Url}"></div><div class="pbl">車輛照片 2</div></div>`:'<div class="ppb"><div class="ppb-img-wrap" style="color:#aaa;font-size:12px">無照片</div><div class="pbl">車輛照片 2</div></div>';
          ph+='</div>';}
        if(r.photoWeb||r.photoWebUrl){ph+=`<div class="ppg cols1" style="margin-top:12px"><div class="ppb"><div class="ppb-img-wrap"><img src="${r.photoWeb||r.photoWebUrl}"></div><div class="pbl">網站查詢結果</div></div></div>`;}
      } else { ph='<p style="color:#999;font-size:11px;text-align:center">無照片</p>'; }
      return`<div class="pp2"><h2>柴油車自主管理標章</h2><div class="ps">NMDC Energy — Tongxiao Power Plant Phase II</div><div class="pig"><div class="pii"><span class="pl">類型</span><span>${r.category}</span></div><div class="pii"><span class="pl">車號</span><span style="font-weight:700">${esc(r.plateNumber)}</span></div><div class="pii"><span class="pl">地點</span><span>${esc(r.location)}</span></div><div class="pii"><span class="pl">承攬商</span><span>${esc(r.contractor)}</span></div><div class="pii"><span class="pl">車輛機具</span><span>${esc(r.vehicleType)}</span></div><div class="pii"><span class="pl">燃油類型</span><span>${r.fuelType}</span></div><div class="pii"><span class="pl">取得標章</span><span style="color:${r.hasBadge==='是'?'green':'red'};font-weight:700">${r.hasBadge}</span></div><div class="pii"><span class="pl">標章等級/編號</span><span>${bt}</span></div></div>${ph}</div>`;
    }).join('');
    area.innerHTML=h;area.scrollIntoView({behavior:'smooth',block:'start'});
  }

  // ==================== SETTINGS ====================
  function renderSettings(root) {
    const jsonSize = JSON.stringify(records).length;
    root.innerHTML = `
      <div class="card fi-anim"><div class="ctit">☁️ Google Drive 設定</div>
        <p style="font-size:12px;color:var(--t2);margin-bottom:8px">儲存/載入 JSON 檔案到 Google Drive 資料夾</p>
        <p style="font-size:11px;margin-bottom:4px">${API_URL ? '<span style="color:var(--ok)">✅ 已連線</span>' : '<span style="color:var(--no)">⏸ 未設定 — 請編輯 HTML 填入 API_URL</span>'}</p>
        ${API_URL ? '<p style="font-size:10px;color:var(--t3);word-break:break-all;font-family:monospace">'+API_URL.slice(0,80)+'...</p>' : ''}
      </div>
      <div class="card fi-anim" style="margin-top:12px"><div class="ctit">🏢 承攬商管理</div>
        <div style="display:flex;gap:6px;margin-bottom:10px"><input type="text" id="newC" placeholder="輸入承攬商名稱" style="flex:1" onkeydown="if(event.key==='Enter')App.addC()"><button class="btn bp" onclick="App.addC()">➕ 新增</button></div>
        <div class="tl">${contractors.map((c,i)=>`<span class="tg">${esc(c)} <button class="rt" onclick="App.rmC(${i})">&times;</button></span>`).join('')}</div>
      </div>
      <div class="card" style="margin-top:12px"><div class="ctit">💾 資料備份</div>
        <p style="font-size:12px;color:var(--t2);margin-bottom:10px">JSON 匯出會包含所有資料及照片（base64），可在任何裝置匯入還原。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn bp" onclick="App.expJSON()">📥 匯出 JSON（${Math.round(jsonSize/1024)}KB）</button>
          <label class="btn bs" style="cursor:pointer">📤 匯入 JSON<input type="file" accept=".json" style="display:none" onchange="App.impJSON(event)"></label>
        </div>
        <div class="json-size">本地儲存：${records.length} 筆資料，約 ${Math.round(jsonSize/1024)}KB</div>
      </div>
      <div class="card" style="margin-top:12px"><div class="ctit">🗑️ 資料管理</div>
        <button class="btn bd" onclick="App.clearAll()">清除所有資料</button>
      </div>`;
  }
  function addC(){const i=document.getElementById('newC');const n=(i?.value||'').trim();if(!n)return;if(contractors.includes(n)){toast('已存在',true);return;}contractors.push(n);save();toast('✅ 已新增');renderSettings(document.getElementById('appRoot'));}
  function rmC(idx){contractors.splice(idx,1);save();renderSettings(document.getElementById('appRoot'));}
  function clearAll(){if(!confirm('確定要清除所有資料嗎？'))return;records=[];save();toast('🗑️ 已清除');renderPanel();}

  // ==================== HELPERS ====================
  function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function badgeCls(r){if(r.hasBadge!=='是')return'bno';if(r.badgeLevel==='金級')return'bg';if(['銀級','優級','新購六期車'].includes(r.badgeLevel))return'bsi';if(['普級','合格','新購五期車'].includes(r.badgeLevel))return'bbr';return'bin';}

  // ---- INIT ----
  load(); renderTabs(); renderPanel(); updCount();
  if(API_URL){apiGet('list').then(r=>{if(r&&r.records){records=r.records;save();renderPanel();toast('☁️ 雲端資料已載入');}});apiGet('contractors').then(r=>{if(r&&r.contractors&&r.contractors.length){contractors=r.contractors;save();}});}

  return {
    switchTab,fl,newRec,editRec,saveForm,cancelForm,
    catCh,badgeCh,togOth,upPhoto,rmPhoto,chkDup,
    showDup,closeDup,loadDup,queryMoenv,
    confirmDel,closeDel,execDel,
    expJSON,impJSON,
    addC,rmC,clearAll,
    togDR,togChk,genPreview
  };
})();
</script>

<!-- Drive File Picker Modal -->
<div class="mo" id="fileModal">
  <div class="md" style="max-width:560px">
    <h3 style="display:flex;justify-content:space-between;align-items:center">📂 從 Google Drive 載入 <button class="btn bsm bs" onclick="App.closeFileModal()">&times;</button></h3>
    <p>選擇要載入的 JSON 檔案（最新的在最上面）</p>
    <div id="fileList" style="max-height:400px;overflow-y:auto;border:1px solid var(--bd);border-radius:6px"></div>
  </div>
</div>
</body>
</html>
