          r.phone || "",
          r.email || "",
          r.blood || "",
          r.diet || "",
          fmtTransport(r.transport),
          r.emName || "",
          r.emPhone || "",
          1 + (r.companionCount || 0),
          r.companionCount || 0,
          fmtCompanions(r.companions),
          fmtLang(r.lang),
          r.emailStatus || ""
        ]);

        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

        // === Column widths (tuned per content type) ===
        ws["!cols"] = [
          { wch: 12 },  // 序號
          { wch: 18 },  // 時間
          { wch: 10 },  // 單位
          { wch: 14 },  // 姓名
          { wch: 18 },  // 公司
          { wch: 18 },  // 職稱
          { wch: 14 },  // 手機
          { wch: 28 },  // Email
          { wch: 6 },   // 血型
          { wch: 14 },  // 飲食
          { wch: 18 },  // 交通方式
          { wch: 14 },  // 緊急聯絡人
          { wch: 14 },  // 緊急電話
          { wch: 8 },   // 席次
          { wch: 8 },   // 攜眷數
          { wch: 38 },  // 攜眷明細
          { wch: 12 },  // 語言
          { wch: 14 }   // 信件狀態
        ];

        // Freeze header row + autofilter
        ws["!freeze"]     = { xSplit: 0, ySplit: 1 };
        ws["!autofilter"] = { ref: ws["!ref"] };

        // Header row height (taller to fit centred text)
        ws["!rows"] = [{ hpx: 32 }];

        // === Header row style: bold white text on wave-blue, with deep borders ===
        const headerStyle = {
          font:      { name: "Calibri", sz: 12, bold: true, color: { rgb: "FFFFFF" } },
          fill:      { patternType: "solid", fgColor: { rgb: "1E6FAB" } },
          alignment: { horizontal: "center", vertical: "center", wrapText: true },
          border: {
            top:    { style: "thin", color: { rgb: "163654" } },
            bottom: { style: "medium", color: { rgb: "163654" } },
            left:   { style: "thin", color: { rgb: "163654" } },
            right:  { style: "thin", color: { rgb: "163654" } }
          }
        };
        for(let c = 0; c < headers.length; c++){
          const addr = XLSX.utils.encode_cell({ r: 0, c });
          if(!ws[addr]) ws[addr] = { t:"s", v: headers[c] };
          ws[addr].s = headerStyle;
        }

        // === Data row styles: alternating cream/white, ink text, soft borders ===
        // Cells in number columns (serial, seats, companions) get centred alignment.
        const CENTRED_COLS = new Set([0, 2, 8, 13, 14, 16]);   // serial, unit, blood, seats, comp count, lang
        for(let r = 1; r <= rows.length; r++){
          const isAlt  = r % 2 === 0;
          const bgFill = isAlt ? "F8F2E5" : "FFFFFF";    // cream-warm | white
          for(let c = 0; c < headers.length; c++){
            const addr = XLSX.utils.encode_cell({ r, c });
            if(!ws[addr]) ws[addr] = { t:"s", v: "" };
            ws[addr].s = {
              font:      { name: "Calibri", sz: 11, color: { rgb: "163654" } },
              fill:      { patternType: "solid", fgColor: { rgb: bgFill } },
              alignment: {
                horizontal: CENTRED_COLS.has(c) ? "center" : "left",
                vertical:   "center",
                wrapText:   true
              },
              border: {
                top:    { style: "thin", color: { rgb: "E5DDC9" } },
                bottom: { style: "thin", color: { rgb: "E5DDC9" } },
                left:   { style: "thin", color: { rgb: "E5DDC9" } },
                right:  { style: "thin", color: { rgb: "E5DDC9" } }
              }
            };
          }
        }

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "報名名單");

        // Workbook properties (shows up in Excel's File > Info pane)
        wb.Props = {
          Title:    "NMDC 淨灘活動報名名單",
          Subject:  "2026 NMDC 團隊淨灘 · 報名資料",
          Author:   "NMDC EHS",
          Company:  "NMDC Energy",
          CreatedDate: new Date()
        };

        const today    = new Date().toISOString().slice(0, 10);
        const filename = `NMDC淨灘報名名單_${today}.xlsx`;
        XLSX.writeFile(wb, filename);
      }
      const filtered = useMemo(() => {
        if(!list) return [];
        let arr = list;
        if(langFilter !== "all"){
          arr = arr.filter(r => r.lang === langFilter);
        }
        if(unitFilter !== "all"){
          arr = arr.filter(r => (r.unit || "Other") === unitFilter);
        }
        if(filter.trim()){
          const q = filter.trim().toLowerCase();
          arr = arr.filter(r => {
            const compNames = (r.companions || []).map(c => c.name || "").join(" ");
            return [r.name, r.company, r.title, r.email, r.phone, r.serial, r.emName, r.emPhone, compNames].some(v => String(v || "").toLowerCase().includes(q));
          });
        }
        return arr;
      }, [list, filter, langFilter, unitFilter]);

      // Counts per language for the filter buttons
      const langCounts = useMemo(() => {
        if(!list) return { zh:0, en:0 };
        return list.reduce((acc, r) => {
          if(r.lang === "en") acc.en++; else acc.zh++;
          return acc;
        }, { zh:0, en:0 });
      }, [list]);

      // Counts per unit for the filter buttons
      const unitCounts = useMemo(() => {
        const c = { NMDC:0, TPC:0, POE:0, BST:0, Other:0 };
        if(!list) return c;
        list.forEach(r => {
          const u = r.unit || "Other";
          if(c[u] !== undefined) c[u]++; else c.Other++;
        });
        return c;
      }, [list]);

      // Total seats taken (main + companions)
      const totalSeats = useMemo(() => {
        if(!list) return 0;
        return list.reduce((s, r) => s + 1 + (r.companionCount || 0), 0);
      }, [list]);

      // Diet breakdown — counts every attendee (main + every companion), keyed by their diet string.
      // Returns sorted [{ key, label, icon, count }] descending by count.
      const dietCounts = useMemo(() => {
        if(!list) return [];
        const counts = {};
        function tally(d){
          if(!d) return;
          const s = String(d).trim();
          if(!s) return;
          // Group all "其他: xxx" custom diets under one bucket "其他" so the line stays short.
          // Detail is still visible in the per-row table below if admin wants to see specifics.
          const key = /^其他[:：]/.test(s) ? "其他" : s;
          counts[key] = (counts[key] || 0) + 1;
        }
        list.forEach(r => {
          tally(r.diet);
          (r.companions || []).forEach(c => tally(c.diet));
        });
        // Icon per diet (extend as needed)
        const ICONS = { "葷食":"🍖", "素食":"🥗", "蛋奶素":"🥚", "全素":"🌱", "海鮮素":"🐟", "其他":"🌶️" };
        return Object.keys(counts)
          .map(k => ({ key:k, label:k, icon: ICONS[k] || "🍴", count: counts[k] }))
          .sort((a, b) => b.count - a.count);
      }, [list]);

      // Transport breakdown — NMDC employees only (transport field is NMDC-only).
      // Returns both totals AND the full registration records per category so we can
      // render a detailed name table (useful for telling the shuttle driver who's on board).
      const transportCounts = useMemo(() => {
        if(!list) return null;
        const selfList = [], shuttleList = [], unsetList = [];
        let self = 0, shuttle = 0, unset = 0;
        list.forEach(r => {
          if(r.unit !== "NMDC") return;
          // Each registration = main person + companions, all travel together
          const seats = 1 + (r.companionCount || 0);
          if(r.transport === "self")         { self    += seats; selfList.push(r);    }
          else if(r.transport === "shuttle") { shuttle += seats; shuttleList.push(r); }
          else                               { unset   += seats; unsetList.push(r);   }
        });
        const totalNmdc = self + shuttle + unset;
        if(totalNmdc === 0) return null;   // no NMDC registrations → don't render
        return { self, shuttle, unset, totalNmdc, selfList, shuttleList, unsetList };
      }, [list]);

      return (
        <div className="edit-drawer-body">
          <div className="flex items-center justify-between mb-3 gap-2">
            <div>
              <div className="font-display text-xl">👥 {list ? list.length : "—"} 筆 / 共 {totalSeats} 席</div>
              <div className="text-xs text-[color:var(--ink-soft)]">Registrations · Total seats incl. companions</div>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={load} disabled={loading} className="btn-outline px-3 py-1 text-xs">{loading ? "…" : "🔄 更新"}</button>
              <button onClick={() => setShowRecipients(true)} disabled={!list || list.length === 0} className="btn-outline px-3 py-1 text-xs" title="彙整全部收件者 email，複製後可貼到郵件 BCC">📧 收件者</button>
              <button onClick={exportXlsx} disabled={!list || list.length === 0} className="btn-outline px-3 py-1 text-xs" title="匯出格式化 Excel 名單">📊 Excel</button>
              <button onClick={exportCsv} disabled={!list || list.length === 0} className="btn-outline px-3 py-1 text-xs" title="匯出原始 CSV (含展開的攜眷列)">📥 CSV</button>
            </div>
          </div>

          {/* Diet breakdown — counts every attendee (main + companions) */}
          {dietCounts.length > 0 && (
            <div className="mb-3 p-2.5 rounded-lg bg-[color:var(--cream-warm)] border border-[color:var(--line)]">
              <div className="text-[10px] font-bold tracking-widest text-[color:var(--ink-soft)] uppercase mb-1.5">🍴 飲食統計 Diet breakdown</div>
              <div className="flex flex-wrap gap-1.5">
                {dietCounts.map(d => (
                  <span key={d.key} className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-white border border-[color:var(--line)] text-xs font-bold text-[color:var(--ink)]">
                    <span>{d.icon}</span>
                    <span>{d.label}</span>
                    <span className="font-num text-[color:var(--wave-deep)] ml-0.5">{d.count}</span>
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* Transport breakdown — NMDC only — detailed name table */}
          {transportCounts && (
            <div className="mb-3 p-3 rounded-lg bg-white border-2 border-[color:var(--wave)]" style={{boxShadow:"3px 3px 0 var(--wave-deep)"}}>
              <div className="font-display text-base mb-2 flex items-center flex-wrap gap-x-2 gap-y-1">
                🚐 <span>NMDC 交通名單</span>
                <span className="text-[10px] font-bold tracking-widest text-[color:var(--ink-soft)] uppercase">NMDC TRANSPORT</span>
                <span className="ml-auto text-xs font-bold text-[color:var(--ink-soft)]">共 {transportCounts.totalNmdc} 人</span>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {/* Shuttle list (left — most operationally important) */}
                <div>
                  <div className="text-sm font-bold text-[color:var(--wave-deep)] mb-1.5 pb-1.5 border-b-2 border-[color:var(--wave)] flex items-center gap-1.5">
                    🚌 <span>接駁車</span>
                    <span className="ml-auto text-xs font-num">
                      {transportCounts.shuttleList.length} 組 · <span className="text-[color:var(--wave-deep)]">{transportCounts.shuttle}</span> 人
                    </span>
                  </div>
                  {transportCounts.shuttleList.length === 0 ? (
                    <div className="text-xs text-[color:var(--ink-soft)] italic py-1">— 暫無 —</div>
                  ) : (
                    <table className="w-full text-xs">
                      <tbody>
                        {transportCounts.shuttleList.map((r, i) => (
                          <tr key={r.serial} className="border-b border-[color:var(--cream-warm)] last:border-b-0">
                            <td className="py-1 pr-1 font-num text-[10px] text-[color:var(--ink-soft)] w-5 text-right">{i+1}.</td>
                            <td className="py-1 pr-2 font-num text-[10px] text-[color:var(--ink-soft)] whitespace-nowrap">{r.serial}</td>
                            <td className="py-1 pr-2 font-bold break-all">{r.name}</td>
                            <td className="py-1 text-right font-num text-[color:var(--wave-deep)] font-bold whitespace-nowrap">
                              {1 + (r.companionCount || 0)} 席
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>

                {/* Self-drive list (right) */}
                <div>
                  <div className="text-sm font-bold text-[color:var(--ink)] mb-1.5 pb-1.5 border-b-2 border-[color:var(--sun)] flex items-center gap-1.5">
                    🚗 <span>自行開車</span>
                    <span className="ml-auto text-xs font-num">
                      {transportCounts.selfList.length} 組 · <span className="text-[color:var(--wave-deep)]">{transportCounts.self}</span> 人
                    </span>
                  </div>
                  {transportCounts.selfList.length === 0 ? (
                    <div className="text-xs text-[color:var(--ink-soft)] italic py-1">— 暫無 —</div>
                  ) : (
                    <table className="w-full text-xs">
                      <tbody>
                        {transportCounts.selfList.map((r, i) => (
                          <tr key={r.serial} className="border-b border-[color:var(--cream-warm)] last:border-b-0">
                            <td className="py-1 pr-1 font-num text-[10px] text-[color:var(--ink-soft)] w-5 text-right">{i+1}.</td>
                            <td className="py-1 pr-2 font-num text-[10px] text-[color:var(--ink-soft)] whitespace-nowrap">{r.serial}</td>
                            <td className="py-1 pr-2 font-bold break-all">{r.name}</td>
                            <td className="py-1 text-right font-num text-[color:var(--wave-deep)] font-bold whitespace-nowrap">
                              {1 + (r.companionCount || 0)} 席
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>

              {/* Unset warning — legacy registrations from before transport field was added */}
              {transportCounts.unsetList.length > 0 && (
                <div className="mt-2 pt-2 border-t border-dashed border-[color:var(--ink-soft)] text-[11px] text-[color:var(--ink-soft)]">
                  ❓ <strong className="text-[color:var(--coral)]">未設定交通方式</strong> · {transportCounts.unsetList.length} 組 · {transportCounts.unset} 人：
                  <span className="ml-1">
                    {transportCounts.unsetList.map(r => r.name + (r.companionCount > 0 ? `(+${r.companionCount})` : "")).join("、")}
                  </span>
                  <div className="mt-0.5 text-[10px] opacity-75">這些是在「交通方式」欄位推出前報名的，建議直接聯絡確認</div>
                </div>
              )}
            </div>
          )}

          {/* Language filter pills */}
          {list && list.length > 0 && (
            <div className="flex gap-2 mb-3 flex-wrap">
              <button onClick={() => setLangFilter("all")} className={"lang-pill " + (langFilter === "all" ? "active" : "")}>
                👥 全部 ({list.length})
              </button>
              <button onClick={() => setLangFilter("zh")} className={"lang-pill " + (langFilter === "zh" ? "active" : "")}>
                🇹🇼 中文 ({langCounts.zh})
              </button>
              <button onClick={() => setLangFilter("en")} className={"lang-pill " + (langFilter === "en" ? "active" : "")}>
                🇬🇧 English ({langCounts.en})
              </button>
            </div>
          )}

          {/* Unit filter pills */}
          {list && list.length > 0 && (
            <div className="flex gap-2 mb-3 flex-wrap">
              <button onClick={() => setUnitFilter("all")} className={"lang-pill " + (unitFilter === "all" ? "active" : "")}>
                🌐 所有單位 ({list.length})
              </button>
              <button onClick={() => setUnitFilter("NMDC")} className={"lang-pill " + (unitFilter === "NMDC" ? "active" : "")}>
                NMDC ({unitCounts.NMDC})
              </button>
              <button onClick={() => setUnitFilter("TPC")} className={"lang-pill " + (unitFilter === "TPC" ? "active" : "")}>
                TPC ({unitCounts.TPC})
              </button>
              <button onClick={() => setUnitFilter("POE")} className={"lang-pill " + (unitFilter === "POE" ? "active" : "")}>
                POE ({unitCounts.POE})
              </button>
              <button onClick={() => setUnitFilter("BST")} className={"lang-pill " + (unitFilter === "BST" ? "active" : "")}>
                🌊 白沙屯 ({unitCounts.BST})
              </button>
              <button onClick={() => setUnitFilter("Other")} className={"lang-pill " + (unitFilter === "Other" ? "active" : "")}>
                ✨ 其他 ({unitCounts.Other})
              </button>
            </div>
          )}

          <input type="text" placeholder="🔍 搜尋姓名 / 公司 / 信箱 / 攜眷…" value={filter} onChange={e => setFilter(e.target.value)} className="edit-input mb-3"/>

          {err && (<div className="p-3 rounded-xl bg-[color:var(--coral)] text-white font-bold text-sm border-2 border-[color:var(--ink)] mb-3">❗ {err}</div>)}
          {loading && <div className="text-center py-10 text-[color:var(--ink-soft)] font-bold">載入中…</div>}
          {!loading && list && list.length === 0 && (<div className="text-center py-10"><div className="text-5xl mb-2">🏖️</div><div className="font-bold text-[color:var(--ink-soft)]">還沒有人報名</div></div>)}
          {!loading && list && list.length > 0 && filtered.length === 0 && (<div className="text-center py-6 text-[color:var(--ink-soft)] text-sm font-medium">沒有符合條件的人</div>)}

          {!loading && filtered.length > 0 && (
            <div className="overflow-x-auto">
              <table className="reg-table">
                <thead><tr><th>#</th><th>姓名 / 血型 / 飲食</th><th>公司 / 職稱 / 介面</th><th>聯絡</th><th>🚨 緊急聯絡</th><th>👨‍👩‍👧 攜眷</th><th></th></tr></thead>
                <tbody>
                  {filtered.map(r => (
                    <tr key={r.serial}>
                      <td className="reg-serial">{pad(r.serial)}</td>
                      <td>
                        <div className="font-bold">{r.name}</div>
                        <div className="reg-small">{formatTs(r.timestamp)}</div>
                        {r.blood && <div className="reg-small" style={{color:"var(--coral-deep)", fontWeight:700, marginTop:2}}>🩸 {r.blood}</div>}
                        {r.diet && <div className="reg-small" style={{color:"var(--nmdc-green-dark)", fontWeight:700, marginTop:2}}>🍽️ {r.diet}</div>}
                      </td>
                      <td>
                        <div className="flex items-center gap-1.5 flex-wrap">
                          {r.unit && (
                            <span style={{
                              fontSize:9, fontWeight:800, padding:"2px 6px", borderRadius:4,
                              background: r.unit === "NMDC" ? "#D7F0E0" : r.unit === "TPC" ? "#FFE9CC" : r.unit === "POE" ? "#E1ECFF" : r.unit === "BST" ? "#C6E5FA" : "#EEE",
                              color: r.unit === "NMDC" ? "#1B6B3B" : r.unit === "TPC" ? "#A05A00" : r.unit === "POE" ? "#1E40A6" : r.unit === "BST" ? "#155989" : "#555",
                              letterSpacing:".05em"
                            }}>{r.unit === "BST" ? "白沙屯" : r.unit}</span>
                          )}
                          <span>{r.company}</span>
                        </div>
                        <div className="reg-small">{r.title}</div>
                        <div style={{marginTop:4}} className="flex flex-wrap items-center gap-1">
                          <span className={"reg-lang-badge " + r.lang}>{r.lang === "en" ? "🇬🇧 EN" : "🇹🇼 中"}</span>
                          {r.transport === "self" && (
                            <span style={{fontSize:9, fontWeight:800, padding:"2px 6px", borderRadius:4, background:"#FFF4D6", color:"#85650A", letterSpacing:".05em"}}>🚗 自行開車</span>
                          )}
                          {r.transport === "shuttle" && (
                            <span style={{fontSize:9, fontWeight:800, padding:"2px 6px", borderRadius:4, background:"#E1ECFF", color:"#1E40A6", letterSpacing:".05em"}}>🚌 接駁車</span>
                          )}
                        </div>
                      </td>
                      <td>
                        <div className="reg-small">{r.phone}</div>
                        <div><a href={`mailto:${r.email}`} className="text-[color:var(--nmdc-green-dark)] underline text-xs">{r.email}</a></div>
                      </td>
                      <td style={{background:"#FFF0EC"}}>
                        <div className="font-bold text-[color:var(--coral-deep)]" style={{fontSize:12}}>{r.emName || "—"}</div>
                        <div className="reg-small">{r.emPhone ? <a href={`tel:${r.emPhone.replace(/\D/g,"")}`} className="text-[color:var(--coral-deep)]">{r.emPhone}</a> : "—"}</div>
                      </td>
                      <td style={{background:r.companionCount > 0 ? "#FFF7E6" : ""}}>
                        {r.companionCount > 0 ? (
                          <>
                            <div className="font-bold text-[color:var(--sun-deep)]" style={{fontSize:12}}>+{r.companionCount} 位</div>
                            {(r.companions || []).map((c, i) => (
                              <div key={i} className="reg-small" style={{marginTop:2}}>
                                {i+1}. {c.name}{c.blood ? ` 🩸${c.blood}` : ""}{c.diet ? ` 🍽️${c.diet}` : ""}
                              </div>
                            ))}
                          </>
                        ) : <div className="reg-small">—</div>}
                      </td>
                      <td><button onClick={() => del(r.serial, r.name)} className="btn-danger text-[11px] px-2 py-1">🗑</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* ========== Danger Zone — Reset all registrations ========== */}
          {!loading && (
            <div className="mt-8 pt-6 border-t-2 border-dashed border-[color:#E5685A]/40">
              <div className="rounded-xl bg-[color:#FDF3F1] border-2 border-[color:#E5685A] p-4">
                <div className="font-bold text-[color:#D04A3C] text-sm mb-1">⚠️ 危險區 Danger Zone</div>
                <div className="text-xs text-[color:var(--ink-soft)] mb-3 leading-relaxed">
                  「重置」會 <strong>永久刪除全部 {list ? list.length : 0} 筆報名資料</strong>，序號計數歸零。<br/>
                  典型使用：測試期間結束 → 正式接收報名前清空。
                </div>
                <button onClick={resetAll} disabled={resetting || !list || list.length === 0}
                        className="btn-danger px-4 py-2 text-sm font-bold">
                  {resetting ? "處理中…" : "🗑 重置全部報名資料"}
                </button>
              </div>
            </div>
          )}

          {/* === Recipients modal === */}
          {showRecipients && (
            <RecipientsModal
              filtered={filtered}
              totalCount={list ? list.length : 0}
              onClose={() => setShowRecipients(false)}
            />
          )}
        </div>
      );
    }

    // ---- Tab 4: Blast ----
    // ============================================================
    // Email Preview Modal (shared between BlastTab + EmailTab)
    // ============================================================
    // Expand tokens client-side so admin can preview without sending.
    // mode: "body" (default) — full expansion + auto-append qrImage
    //       "subject" — strip {{qrImage}} (it's HTML, doesn't belong in subject), no auto-append, clean HTML
    function expandEmailTokens(text, lang, serverContent, edits, sample, mode){
      const isSubject = (mode === "subject");
      let out = String(text || "");
      const s = sample || {};

      // ---- QR image token: same logic as GAS buildQrImageHtml_ ----
      function buildQrImageHtml(){
        const imageData = (edits && edits["success.image.data"] !== undefined)
                            ? edits["success.image.data"]
                            : ((serverContent && serverContent["success.image.data"]) || "");
        if(!imageData || String(imageData).indexOf("data:image") !== 0) return "";
        const rawUrl = (edits && edits["success.image.url"] !== undefined)
                         ? edits["success.image.url"]
                         : ((serverContent && serverContent["success.image.url"]) || "");
        let safeUrl = "";
        if(rawUrl){
          if(/^(https?:\/\/|line:\/\/|tel:|mailto:)/i.test(rawUrl)) safeUrl = rawUrl;
          else if(/^[\w-]+(\.[\w-]+)+/.test(rawUrl)) safeUrl = "https://" + rawUrl;
        }
        function look(key){
          const langKey = lang + "." + key;
          if(edits && edits[langKey] !== undefined) return edits[langKey];
          if(serverContent && serverContent[langKey] !== undefined) return serverContent[langKey];
          if(DEFAULTS[lang] && DEFAULTS[lang][key] !== undefined) return DEFAULTS[lang][key];
          return "";
        }
        const title       = look("ok.image.title");
        const caption     = look("ok.image.caption");
        const tapHint     = lang === "en" ? "👆 Tap to open" : "👆 點圖直接前往";
        const imgTag      = '<img src="' + imageData + '" alt="QR Code" width="220" height="220" style="display:block; width:220px; height:220px; max-width:100%; border:1px solid #eee; border-radius:8px;" />';

        // QR block: image (optionally wrapped in <a>) + hint text in separate row
        let qrBlock;
        if(safeUrl){
          qrBlock = ''
            + '<table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">'
            +   '<tr><td style="padding:0;">'
            +     '<a href="' + safeUrl + '" target="_blank" rel="noopener noreferrer" style="display:block; text-decoration:none;">'
            +       imgTag
            +     '</a>'
            +   '</td></tr>'
            +   '<tr><td align="center" style="padding-top:8px; text-align:center;">'
            +     '<span style="font-size:11px; font-weight:700; color:#155989; letter-spacing:0.05em; font-family:Arial,sans-serif;">' + tapHint + '</span>'
            +   '</td></tr>'
            + '</table>';
        } else {
          qrBlock = '<table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">'
                  +   '<tr><td style="padding:0;">' + imgTag + '</td></tr>'
                  + '</table>';
        }

        return ''
          + '<div style="margin-top:28px; padding-top:18px; border-top:1px solid #ddd; font-family:Arial,sans-serif;">'
          +   '<div style="font-size:17px; font-weight:bold; color:#163654; margin-bottom:6px;">' + title + '</div>'
          +   '<div style="font-size:14px; color:#555; margin-bottom:14px; line-height:1.5;">' + caption + '</div>'
          +   qrBlock
          + '</div>';
      }
      const qrImageHtml = buildQrImageHtml();

      // 1) User-data tokens (use sample data)
      const userTokens = {
        "{{name}}":               s.name || "童保舜",
        "{{company}}":            s.company || "NMDC Energy",
        "{{title}}":              s.title || "EHS Specialist",
        "{{email}}":              s.email || "preview@example.com",
        "{{phone}}":              s.phone || "0900-000-000",
        "{{blood}}":              s.blood || "O",
        "{{diet}}":               s.diet || "葷食",
        "{{emName}}":             s.emName || "緊急聯絡人",
        "{{emPhone}}":            s.emPhone || "0900-111-222",
        "{{companionCount}}":     String(s.companionCount != null ? s.companionCount : 2),
        "{{totalSeats}}":         String(s.totalSeats != null ? s.totalSeats : 3),
        "{{confirmationNumber}}": s.confirmationNumber || "BC-2026-0001",
        "{{team}}":               s.team || "NMDC",
        "{{companionNames}}":     s.companionNames || "張小華、李大明",
        "{{companionList}}":      s.companionList || "<ul><li>1. 張小華（血型 A、飲食 葷）</li><li>2. 李大明（血型 O、飲食 素）</li></ul>",
        // For subject mode, swap qrImage token to empty string (it's HTML, doesn't belong in a subject)
        "{{qrImage}}":            isSubject ? "" : qrImageHtml
      };
      // Track if body has the QR token before expanding (for auto-append preview behavior)
      const bodyHasQrToken = out.indexOf("{{qrImage}}") >= 0;

      Object.keys(userTokens).forEach(k => { out = out.split(k).join(userTokens[k]); });

      // 2) Site tokens (auto from Content sheet for current language)
      function siteVal(shortKey){
        const langKey = lang + "." + shortKey;
        if(edits && edits[langKey] !== undefined) return edits[langKey];
        if(serverContent && serverContent[langKey] !== undefined) return serverContent[langKey];
        if(DEFAULTS[lang] && DEFAULTS[lang][shortKey] !== undefined) return DEFAULTS[lang][shortKey];
        return "";
      }
      // Cheap regex: replace any remaining {{xxx.yyy}} by looking up siteVal(xxx.yyy)
      out = out.replace(/\{\{([a-zA-Z][\w.]*?)\}\}/g, (m, key) => {
        const v = siteVal(key);
        return v !== "" ? String(v) : m;   // keep placeholder if unknown
      });

      // 3) Event meta tokens (very rough)
      out = out.split("{{eventName}}").join("2026 NMDC 團隊淨灘");
      out = out.split("{{deadline}}").join("2026 年 06 月 30 日 23:59");

      // 4) Auto-append QR at end of BODY if template doesn't reference the token (matches GAS behavior)
      //    DO NOT auto-append for subject — subjects are plain text, not HTML
      if(!isSubject && !bodyHasQrToken && qrImageHtml){
        out = out + qrImageHtml;
      }

      // 5) For subject: final HTML strip as safety net (matches GAS cleanSubject_)
      if(isSubject){
        out = out.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
      }
      return out;
    }

    function BlastTab({ editPassword, registered, serverContent, edits }){
      const [subject, setSubject] = useState("");
      const [body, setBody] = useState("<p>嗨 {{name}}，</p><p></p><p>— NMDC Energy</p>");
      const [sending, setSending] = useState(false);
      const [result, setResult] = useState(null);
      const [mode, setMode] = useState("all");  // "all" | "range"
      const [fromSerial, setFromSerial] = useState(1);
      const [toSerial, setToSerial] = useState(Math.min(100, registered || 100));
      const [previewOpen, setPreviewOpen] = useState(false);
      const [previewLang, setPreviewLang] = useState("zh");

      // When registered count changes and user hasn't touched the "to" field, auto-fit
      useEffect(() => {
        if(registered && toSerial > registered) setToSerial(registered);
      }, [registered]);

      const total = registered || 0;
      const from = Math.max(1, parseInt(fromSerial, 10) || 1);
      const to = Math.max(from, Math.min(total, parseInt(toSerial, 10) || total));
      const willSend = mode === "all" ? total : Math.max(0, to - from + 1);

      async function send(){
        if(!subject.trim()){ window.alert("請填主旨"); return; }
        if(!body.trim() || body === "<p></p>" || body === "<br>"){ window.alert("請填內文"); return; }
        if(willSend === 0){ window.alert("沒有人符合這個範圍"); return; }

        const rangeMsg = mode === "all"
          ? `全部 ${total} 位報名者`
          : `報名序號 #${from} – #${to}（共 ${willSend} 位）`;

        if(!window.confirm(`確定要寄給 ${rangeMsg}？\n這動作無法復原，且會消耗 Gmail 每日配額（個人 100/天、Workspace 1500/天）。`)) return;
        if(!window.confirm("再確認一次 — 真的要寄出嗎？")) return;

        setSending(true); setResult(null);
        try{
          const payload = { action:"sendBlast", password:editPassword, subject, body };
          if(mode === "range"){
            payload.fromSerial = from;
            payload.toSerial = to;
          }
          const res = await xhrPost(GAS_URL, payload, 180000);
          if(res.success){
            setResult({ ok:true, msg:`寄出 ${res.sent} 封${res.failed ? `、失敗 ${res.failed} 封` : ""}${res.skipped ? `、略過 ${res.skipped} 筆（沒有 email）` : ""}` });
          } else {
            setResult({ ok:false, msg:"寄信失敗：" + (res.error || "未知") });
          }
        } catch(e){
          setResult({ ok:false, msg:"連線失敗或逾時（量大的時候正常）" });
        } finally { setSending(false); }
      }

      return (
        <div className="edit-drawer-body">
          <div className="p-3 rounded-xl bg-[color:var(--cream-warm)] border-2 border-[color:var(--ink)] text-sm font-medium mb-4">
            📢 <strong>群發</strong>（目前報名 {total} 人）。可用 <code className="bg-white px-1 rounded">{'{{name}}'}</code> 等標籤自動填入每個人的資料。
          </div>

          {/* Mode toggle */}
          <div className="mb-3">
            <div className="edit-key mb-2">📬 寄給誰</div>
            <div className="flex gap-2 flex-wrap mb-3">
              <button type="button" onClick={() => setMode("all")} className={"lang-pill " + (mode === "all" ? "active" : "")}>
                👥 全部 {total > 0 && `(${total})`}
              </button>
              <button type="button" onClick={() => setMode("range")} className={"lang-pill " + (mode === "range" ? "active" : "")}>
                🎯 指定範圍
              </button>
            </div>

            {mode === "range" && (
              <div className="p-3 rounded-xl bg-white border-2 border-[color:var(--ink)]">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-sm font-bold">從 #</span>
                  <input type="number" min="1" max={total || 999} value={fromSerial} onChange={e => setFromSerial(e.target.value)} className="edit-input" style={{width:"80px"}}/>
                  <span className="text-sm font-bold">到 #</span>
                  <input type="number" min="1" max={total || 999} value={toSerial} onChange={e => setToSerial(e.target.value)} className="edit-input" style={{width:"80px"}}/>
                </div>
                <div className="mt-2 text-xs text-[color:var(--ink-soft)] font-medium">
                  👉 會寄給報名序號 <strong>#{from}</strong> 到 <strong>#{to}</strong>，共 <strong className="text-[color:var(--nmdc-green-dark)]">{willSend}</strong> 位
                </div>
                <div className="mt-2 flex gap-2 flex-wrap">
                  <button type="button" onClick={() => { setFromSerial(1); setToSerial(Math.min(100, total)); }} className="btn-outline text-[11px] px-2 py-1">前 100 位</button>
                  <button type="button" onClick={() => { setFromSerial(101); setToSerial(Math.min(200, total)); }} className="btn-outline text-[11px] px-2 py-1">101–200</button>
                  <button type="button" onClick={() => { setFromSerial(1); setToSerial(Math.min(50, total)); }} className="btn-outline text-[11px] px-2 py-1">前 50 位</button>
                </div>
                <div className="mt-2 text-[11px] text-[color:var(--ink-soft)]">
                  💡 個人 Gmail 每天只能寄 100 封。200 人要群發的話可以分兩天：<br/>
                  · Day 1 選 <strong>#1–#100</strong>｜Day 2 選 <strong>#101–#200</strong>
                </div>
              </div>
            )}
          </div>

          <div className="mb-3">
            <div className="edit-key mb-1">主旨 Subject</div>
            <input type="text" value={subject} onChange={e => setSubject(e.target.value)} placeholder="例：2026 NMDC 淨灘｜行前通知" className="edit-input"/>
          </div>
          <div className="mb-4">
            <div className="edit-key mb-1">內文 Body</div>
            <RichEditor value={body} onChange={setBody} dirty={false}/>
          </div>
          {result && (<div className={"p-3 rounded-xl font-bold text-sm border-2 border-[color:var(--ink)] mb-3 " + (result.ok ? "bg-[color:var(--nmdc-green)] text-white" : "bg-[color:var(--coral)] text-white")}>{result.ok ? "✅" : "❗"} {result.msg}</div>)}

          <div className="flex gap-2 flex-wrap mb-3">
            <button type="button" onClick={() => setPreviewOpen(true)} disabled={!subject.trim() && !body.trim()} className="btn-outline px-4 py-2 text-sm flex-1">
              👁️ 預覽信件
            </button>
          </div>

          <button onClick={send} disabled={sending || !total || willSend === 0} className="btn-chunk w-full px-5 py-4 text-base">
            {sending ? "寄送中，請稍候…" : (mode === "all" ? `📤 寄給全部 ${total} 人` : `📤 寄給 #${from}–#${to}（${willSend} 人）`)}
          </button>

          <EmailPreviewModal open={previewOpen} onClose={() => setPreviewOpen(false)}
            subject={subject} body={body} lang={previewLang}
            serverContent={serverContent} edits={edits}/>
        </div>
      );
    }

    function AnnouncementBanner({ t }){
      if(!IS_BAISHATUN) return null;
      const head = t("announce.head");
      const title = t("announce.title");
      const body = t("announce.body");
      // Render body with line breaks + simple **bold** support
      function renderBody(text){
        const parts = String(text || "").split(/\n/);
        return parts.map((line, i) => {
          // Convert **bold** to <strong>
          const segs = [];
          let last = 0;
          const re = /\*\*([^*]+)\*\*/g;
          let m;
          while((m = re.exec(line)) !== null){
            if(m.index > last) segs.push(line.slice(last, m.index));
            segs.push(<strong key={"b"+i+"-"+m.index} className="text-[color:var(--coral-deep)]">{m[1]}</strong>);
            last = m.index + m[0].length;
          }
          if(last < line.length) segs.push(line.slice(last));
          return (
            <p key={i} className={line.trim() === "" ? "h-2" : "leading-relaxed"}>
              {segs.length ? segs : (line || "\u00A0")}
            </p>
          );
        });
      }
      return (
        <section className="bg-[color:var(--wave-soft)] border-y border-[color:var(--wave)]/30 relative">
          <div className="max-w-5xl mx-auto px-5 md:px-8 py-6 md:py-8 relative">

          </div>
        </section>
      );

    function Countdown({ deadline, t }){
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);
      if(!deadline) return null;
      const diff = new Date(deadline).getTime() - now;
      if(diff <= 0) return <div className="font-display text-4xl text-[color:var(--coral)]">{t("status.expired")}</div>;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const sec = Math.floor((diff % 60000) / 1000);
      const Cell = ({ v, label, pulse=false }) => (
        <div className="flex-1 text-center">
          <div className={`font-num text-5xl md:text-7xl leading-none text-[color:var(--ink)] ${pulse ? "count-bounce" : ""}`}>{pad(v)}</div>
          <div className="text-[11px] md:text-sm font-extrabold tracking-[0.2em] mt-2 text-[color:var(--ink-soft)]">{label}</div>
        </div>
      );
      return (
        <div className="bg-white border-[3px] border-[color:var(--ink)] rounded-3xl p-5 md:p-7 flex items-start gap-2" style={{boxShadow:"6px 6px 0 var(--ink)"}}>
          <Cell v={d} label={t("status.days")}/>
          <div className="font-num text-4xl md:text-6xl text-[color:var(--sand-deep)]">:</div>
          <Cell v={h} label={t("status.hrs")}/>
          <div className="font-num text-4xl md:text-6xl text-[color:var(--sand-deep)]">:</div>
          <Cell v={m} label={t("status.min")}/>
          <div className="font-num text-4xl md:text-6xl text-[color:var(--sand-deep)]">:</div>
          <Cell v={sec} label={t("status.sec")} pulse/>
        </div>
      );
    }

    function SlotsBar({ registered, total, t }){

      const remaining = Math.max(0, total - registered);
      const isFull = remaining === 0;
      return (
        <div className="bg-white border-[3px] border-[color:var(--ink)] rounded-3xl p-5 md:p-7" style={{boxShadow:"6px 6px 0 var(--ink)"}}>
          <div className="flex items-baseline justify-between mb-3">

            <div className="font-num text-xl text-[color:var(--ink)] tabular-nums">
              {registered} <span className="text-[color:var(--ink-soft)] text-sm font-sans font-bold">/ {total}</span>

          <div className="relative h-10 bg-[color:var(--sand)] border-2 border-[color:var(--ink)] rounded-full overflow-hidden">
            <div className="h-full transition-all duration-700 ease-out"
              style={{ width: pct + "%",
                background: isFull ? "linear-gradient(90deg, var(--coral), var(--coral-deep))" : "linear-gradient(90deg, var(--nmdc-green-light), var(--nmdc-green))" }}/>
            <div className="absolute top-1/2 -translate-y-1/2 text-2xl transition-all duration-700 ease-out" style={{ left: `calc(${pct}% - 14px)` }}>
              {isFull ? "🎉" : "🏃"}
            </div>

          <div className="mt-4 flex items-baseline gap-2">

    function StatusSection({ config, t, lang, edits, serverContent }){
      // Read manual unit counts + labels for unit stats row.
      // Counts are universal (DISPLAY_DEFAULTS), labels are per-language (DEFAULTS[lang]).
      function getLabel(idx){
        const key = `${lang}.stats.unit${idx}.label`;
        if(edits && edits[key] !== undefined) return edits[key];
        if(serverContent && serverContent[key] !== undefined) return serverContent[key];
        return (DEFAULTS[lang] && DEFAULTS[lang][`stats.unit${idx}.label`]) || "";
      }
      function getManualCount(idx){
        const key = `stats.unit${idx}.count`;
        const v = (edits && edits[key] !== undefined)
                    ? edits[key]
                    : (serverContent && serverContent[key] !== undefined ? serverContent[key] : DISPLAY_DEFAULTS[key]);
        const n = parseInt(v, 10);
        return Number.isFinite(n) ? n : 0;
      }
      // Mode: "auto" → use server-computed config.unitStats; "manual" → use manual counts
      const mode = (edits && edits["stats.mode"]) || (serverContent && serverContent["stats.mode"]) || DISPLAY_DEFAULTS["stats.mode"] || "auto";
      const autoStats = (config && config.unitStats) || { unit1:0, unit2:0, unit3:0, unit4:0 };
      function countFor(idx){
        if(mode === "manual") return getManualCount(idx);
        return Number(autoStats[`unit${idx}`] || 0);
      }
      const units = [1,2,3,4,5].map(i => ({
        idx: i,
        label: getLabel(i),
        count: countFor(i)
      }));
      const totalUnits = units.reduce((a, u) => a + u.count, 0);

      return (
        <section className="relative py-16 md:py-20 bg-[color:var(--sun)] border-y-[3px] border-[color:var(--ink)] overflow-hidden">
          <div className="absolute inset-0 bg-dots opacity-50"/>
          <div className="max-w-6xl mx-auto px-4 md:px-8 relative">
            <div className="text-center mb-10">
              <div className="inline-block tag bg-white mb-3">{t("status.tag")}</div>
              <h2 className="font-display text-4xl md:text-6xl mb-2">{t("status.head")}</h2>
              {config && <div className="text-base font-bold text-[color:var(--ink-soft)]">{t("status.sub")} · {formatDeadline(config.deadline, lang)}</div>}
            </div>
            {config ? (
              <div className="grid md:grid-cols-2 gap-6">
                <Countdown deadline={config.deadline} t={t}/>
                <SlotsBar
                  registered={IS_BAISHATUN ? (config.baishatunRegistered ?? 0) : config.registered}
                  total={IS_BAISHATUN ? (config.maxSlotsBaishatun ?? 60) : (config.maxSlots ?? config.total)}
                  t={t}/>
              </div>
            ) : (
              <div className="grid md:grid-cols-2 gap-6">
                <div className="h-48 bg-white/50 rounded-3xl border-[3px] border-[color:var(--ink)]"/>
                <div className="h-48 bg-white/50 rounded-3xl border-[3px] border-[color:var(--ink)]"/>
              </div>
            )}

            {/* === Per-unit registration stats === */}
            <div className="mt-8 md:mt-10">
              <div className="text-center mb-4">
                <div className="text-xs md:text-sm font-extrabold tracking-[0.2em] uppercase text-[color:var(--ink-soft)]">{t("stats.head")}</div>
                <div className="text-xs text-[color:var(--ink-soft)] mt-1">
                  {lang === "en"
                    ? `Total: ${totalUnits} · ${mode === "auto" ? "auto" : "manual"}`
                    : `合計 ${totalUnits} 人 · ${mode === "auto" ? "自動統計" : "手動填寫"}`}
                </div>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4 [&>*:last-child]:col-span-2 md:[&>*:last-child]:col-span-1">
                {units.map(u => (
                  <div key={u.idx} className="bg-white rounded-2xl border border-[color:var(--line)] py-4 md:py-5 px-4 text-center" style={{boxShadow:"0 2px 6px rgba(22,54,84,0.06)"}}>
                    <div className="text-xs md:text-sm font-bold text-[color:var(--ink-soft)] uppercase tracking-wider mb-1 truncate" title={u.label}>{u.label || "—"}</div>
                    <div className="font-num text-3xl md:text-4xl text-[color:var(--wave-deep)] tabular-nums leading-none">{u.count}</div>
                    <div className="text-[10px] md:text-xs text-[color:var(--ink-soft)] mt-1 font-medium">{lang === "en" ? (u.count === 1 ? "person" : "people") : "人"}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Field({ id, label, sub, value, onChange, onBlur, error, type="text", placeholder, autoComplete, inputMode, options }){
      const isSelect = type === "select" && Array.isArray(options);
      return (
        <div>
          <label htmlFor={id} className="block mb-2">
            <span className="font-display text-xl md:text-2xl text-[color:var(--ink)]">{label}</span>
            <span className="ml-2 text-sm font-bold tracking-wider text-[color:var(--ink-soft)] uppercase">{sub}</span>
          </label>
          {isSelect ? (
            <select id={id} value={value} onChange={onChange} onBlur={onBlur} className={`field w-full px-4 py-3.5 text-lg ${error ? "err" : ""}`} style={{appearance:"none", backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230A2340'><path d='M7 10l5 5 5-5z'/></svg>\")", backgroundRepeat:"no-repeat", backgroundPosition:"right 12px center", paddingRight:"40px"}}>
              <option value="">{placeholder}</option>
              {options.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          ) : (
            <input id={id} type={type} value={value} onChange={onChange} onBlur={onBlur} placeholder={placeholder} autoComplete={autoComplete} inputMode={inputMode} className={`field w-full px-4 py-3.5 text-lg ${error ? "err" : ""}`}/>
          )}
          {error && <div className="field-error-msg"><span>❗</span>{error}</div>}
