    const BLOOD_TYPES = ["A", "B", "AB", "O", "RH-", "不確定 / Unknown"];

    function RegistrationForm({ t, lang, onSuccess, configRemaining }){
      const blank = {
        name:"", company: IS_BAISHATUN ? "白沙屯淨灘團" : "", title:"", phone:"", email:"", blood:"",
        emName:"", emPhone:"",
        diet:"", dietOther:"",
        bringCompanions:"",  // "" | "yes" | "no"
        companionCount:1,
        sameDiet:true,
        companions:[],   // array of { name, blood, diet, dietOther }
        transport:""     // NMDC-only: "" | "self" | "shuttle"
      };
      const [form, setForm] = useState(blank);
      const [errors, setErrors] = useState({});
      const [agreed, setAgreed] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState("");

      // ===== Company dropdown state =====
      // Fixed 4 options; 5th = "其他" → reveals custom text input.
      // Values intentionally contain the stats keywords (NMDC / TPC / POE / 白沙屯)
      // so auto-categorisation in computeUnitStats_ keeps working without changes.
      const COMPANY_OPTIONS_FIXED = ["NMDC", "TPC", "POE", "白沙屯淨灘團"];
      const initCompanyMode = (() => {
        if(!form.company) return "";
        if(COMPANY_OPTIONS_FIXED.includes(form.company)) return form.company;
        return "__OTHER__";
      })();
      const [companyMode, setCompanyMode] = useState(initCompanyMode);
      const [companyOther, setCompanyOther] = useState(
        initCompanyMode === "__OTHER__" ? form.company : ""
      );
      function changeCompanyMode(mode){
        setCompanyMode(mode);
        if(mode === "__OTHER__"){
          setForm(f => ({ ...f, company: companyOther || "", transport:"" }));
        } else {
          // Auto-clear transport when changing away from NMDC (transport is NMDC-only)
          setForm(f => ({ ...f, company: mode, transport: mode === "NMDC" ? f.transport : "" }));
        }
        if(errors.company) setErrors(er => ({ ...er, company: "" }));
        if(errors.transport) setErrors(er => ({ ...er, transport: "" }));
      }
      function changeCompanyOther(text){
        setCompanyOther(text);
        setForm(f => ({ ...f, company: text }));
        if(errors.company) setErrors(er => ({ ...er, company: "" }));
      }
      // Re-sync internal state when form is reset externally (e.g. "Register another" button)
      useEffect(() => {
        const derived = companyMode === "__OTHER__" ? companyOther : companyMode;
        if(form.company !== derived){
          if(!form.company){
            setCompanyMode(""); setCompanyOther("");
          } else if(COMPANY_OPTIONS_FIXED.includes(form.company)){
            setCompanyMode(form.company); setCompanyOther("");
          } else {
            setCompanyMode("__OTHER__"); setCompanyOther(form.company);
          }
        }
      // eslint-disable-next-line
      }, [form.company]);

      const set = k => e => {
        let v = e.target.value;
        // Phone fields: allow only digits (auto-strip dashes / spaces / symbols on type or paste)
        if(k === "phone" || k === "emPhone"){
          v = v.replace(/\D/g, "");
        }
        // Email: lower-case + strip whitespace as user types
        if(k === "email"){
          v = v.replace(/\s/g, "");
        }
        setForm(f => ({...f, [k]: v}));
        if(errors[k]) setErrors(er => ({...er, [k]:""}));
        if(submitError) setSubmitError("");
      };
      const setCompanion = (idx, k, v) => {
        setForm(f => {
          const next = [...f.companions];
          while(next.length <= idx) next.push({ name:"", blood:"", diet:"", dietOther:"" });
          next[idx] = { ...next[idx], [k]: v };
          return { ...f, companions: next };
        });
        if(submitError) setSubmitError("");
      };

      // When "yes" is chosen, ensure companions array length matches count
      useEffect(() => {
        if(form.bringCompanions !== "yes") return;
        setForm(f => {
          const target = Math.max(1, Math.min(5, parseInt(f.companionCount, 10) || 1));
          const next = [...f.companions];
          while(next.length < target) next.push({ name:"", blood:"", diet:"", dietOther:"" });
          while(next.length > target) next.pop();
          return { ...f, companions: next };
        });
      }, [form.companionCount, form.bringCompanions]);

      // The "main field" set we always validate
      const mainFields = ["name","company","title","phone","email","blood","emName","emPhone"];

      const validateField = (k) => {
        const v = String(form[k] || "").trim();
        if(!v) return t("err.required");
        if(k === "email" && !emailRegex.test(v)) return t("err.email");
        if((k === "phone" || k === "emPhone") && !phoneRegex.test(v)) return t("err.phone");
        return "";
      };

      const validate = (k) => validateField(k);

      // Total seats this submission will occupy
      const totalSeats = 1 + (form.bringCompanions === "yes" ? form.companions.length : 0);

      async function handleSubmit(e){
        e && e.preventDefault();
        setSubmitError("");

        // Gather all errors in one pass so user sees all problems at once
        const allErr = {};
        mainFields.forEach(k => { const er = validateField(k); if(er) allErr[k] = er; });
        if(!form.diet) allErr.diet = t("err.required");
        if(form.diet === "other" && !form.dietOther.trim()) allErr.dietOther = t("err.required");
        // Transport is required ONLY when company is NMDC (employee shuttle option)
        if(companyMode === "NMDC" && !form.transport) allErr.transport = t("err.required");
        if(!form.bringCompanions) allErr.bringCompanions = t("err.required");
        if(form.bringCompanions === "yes"){
          form.companions.forEach((c, i) => {
            if(!c.name.trim())      allErr[`c${i}_name`] = t("err.required");
            if(!c.blood)            allErr[`c${i}_blood`] = t("err.required");
            if(!form.sameDiet){
              if(!c.diet)                                     allErr[`c${i}_diet`] = t("err.required");
              if(c.diet === "other" && !c.dietOther.trim())   allErr[`c${i}_dietOther`] = t("err.required");
            }
          });
        }
        const agreeOk = agreed;
        setErrors({ ...allErr, _agree: agreeOk ? "" : "1" });

        const missingCount = Object.keys(allErr).length;

        if(missingCount > 0 || !agreeOk){
          // Compose a single summary at the top
          if(missingCount > 0 && !agreeOk){
            setSubmitError(t("err.fixN").replace("{{n}}", String(missingCount)) + " " + t("err.agree"));
          } else if(missingCount > 0){
            setSubmitError(t("err.fixN").replace("{{n}}", String(missingCount)));
          } else {
            setSubmitError(t("err.agree"));
          }
          setTimeout(() => {
            const firstErrEl = document.querySelector(".field.err, .yn-group.err, .diet-grid.err, .final-agree-check.err, .form-err-hint");
            if(firstErrEl){
              firstErrEl.scrollIntoView({ behavior:"smooth", block:"center" });
              // Flash + shake the first error to grab attention
              firstErrEl.classList.remove("flash-error");
              // Force reflow so animation can replay if user submits multiple times
              void firstErrEl.offsetWidth;
              firstErrEl.classList.add("flash-error");
              setTimeout(() => firstErrEl.classList.remove("flash-error"), 2500);
              // Focus the input itself (if it's a field) so they can start typing
              if(firstErrEl.matches(".field")){
                try{ firstErrEl.focus({ preventScroll:true }); } catch(_){}
              } else {
                const inner = firstErrEl.querySelector(".field");
                if(inner) try{ inner.focus({ preventScroll:true }); } catch(_){}
              }
            }
            // Tab-title nudge — useful if user switched tabs while filling
            const totalIssues = missingCount + (agreeOk ? 0 : 1);
            if(totalIssues > 0 && !document.hidden){
              const original = document.title;
              const flashTitle = lang === "en" ? `(${totalIssues}) Form incomplete!` : `(${totalIssues}) 表格未完成！`;
              document.title = flashTitle;
              setTimeout(() => { document.title = original; }, 5000);
            }
          }, 50);
          return;
        }

        // Pre-flight check that there's enough room for everyone
        if(typeof configRemaining === "number" && totalSeats > configRemaining){
          setSubmitError(t("err.notEnough").replace("{{r}}", String(configRemaining)).replace("{{n}}", String(totalSeats)));
          return;
        }

        setSubmitting(true);
        try{
          // Resolve diet to a clean string
          const dietFinal = form.diet === "other" ? `其他: ${form.dietOther.trim()}` : form.diet;

          // Build companions payload
          const companions = form.bringCompanions === "yes" ? form.companions.map(c => ({
            name: c.name.trim(),
            blood: c.blood,
            diet: form.sameDiet
              ? dietFinal
              : (c.diet === "other" ? `其他: ${c.dietOther.trim()}` : c.diet)
          })) : [];

          const payload = {
            name: form.name.trim(),
            company: form.company.trim(),
            title: form.title.trim(),
            phone: form.phone.trim(),
            email: form.email.trim().toLowerCase(),
            blood: form.blood.trim(),
            emName: form.emName.trim(),
            emPhone: form.emPhone.trim(),
            diet: dietFinal,
            transport: companyMode === "NMDC" ? form.transport : "",   // only sent for NMDC
            companions: companions,
            companionCount: companions.length,
            lang
          };
          const res = await xhrPost(GAS_URL, payload);
          if(res.success){
            // Merge form data into the success response so SuccessCard can display
            // name + total seats (GAS doesn't echo these back by default)
            onSuccess({
              ...res,
              name: payload.name,
              company: payload.company,
              totalSeats: res.totalSeats ?? (1 + companions.length),
              companionCount: companions.length
            });
          }
          else {
            const map = { FULL:t("err.full"), DEADLINE_PASSED:t("err.deadline"), DUPLICATE_EMAIL:t("err.duplicate"), INVALID_EMAIL:t("err.email"), MISSING_FIELD:t("err.required"), SERVER_ERROR:t("err.server") };
            setSubmitError(map[res.error] || t("err.generic"));
          }
        } catch(err){ setSubmitError(t("err.network")); }
        finally { setSubmitting(false); }
      }

      const dietOpts = [
        { val:"meat",  label: t("diet.option.meat") },
        { val:"veg",   label: t("diet.option.veg") },
        { val:"halal", label: t("diet.option.halal") },
        { val:"other", label: t("diet.option.other") }
      ];

      return (
        <form onSubmit={handleSubmit} noValidate className="space-y-6">

          {/* === SECTION 1: Basic Info === */}
          <div className="form-section basic">
            <div className="form-section-head"><span className="form-section-tag">📋 {t("form.section.tag.basic")}</span></div>
            <div className="form-section-title">{t("section.basic.head")}</div>
            <div className="form-section-sub">{t("section.basic.sub")}</div>

            <div className="grid md:grid-cols-2 gap-5">
              <Field id="f-name"    label={t("field.name.label")}    sub={t("field.name.sub")}    value={form.name}    onChange={set("name")}    onBlur={()=>setErrors(e=>({...e,name:validateField("name")}))}       error={errors.name}    placeholder={t("field.name.ph")}    autoComplete="name"/>

              {/* === Company: dropdown with 4 fixed options + custom "Other" === */}
              <div>
                <label htmlFor="f-company" className="block mb-2">
                  <span className="font-display text-xl md:text-2xl text-[color:var(--ink)]">{t("field.company.label")}</span>
                  <span className="ml-2 text-sm font-bold tracking-wider text-[color:var(--ink-soft)] uppercase">{t("field.company.sub")}</span>
                </label>
                {IS_BAISHATUN ? (
                  /* Baishatun route: locked to 白沙屯淨灘團 — no dropdown */
                  <div className="field w-full px-4 py-3.5 text-lg flex items-center gap-2" style={{background:"var(--wave-soft)", cursor:"not-allowed", color:"var(--ink)"}}>
                    <span>🌊</span>
                    <span className="font-medium">白沙屯淨灘團</span>
                    <span className="ml-auto text-xs text-[color:var(--ink-soft)] font-bold">{lang === "en" ? "(auto)" : "(自動帶入)"}</span>
                  </div>
                ) : (
                  <>
                    <select
                      id="f-company"
                      value={companyMode}
                      onChange={e => changeCompanyMode(e.target.value)}
                      onBlur={() => setErrors(e => ({...e, company: validateField("company")}))}
                      className={`field w-full px-4 py-3.5 text-lg ${errors.company && companyMode !== "__OTHER__" ? "err" : ""}`}
                      style={{appearance:"none", backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230A2340'><path d='M7 10l5 5 5-5z'/></svg>\")", backgroundRepeat:"no-repeat", backgroundPosition:"right 12px center", paddingRight:"40px"}}
                    >
                      <option value="">{lang === "en" ? "Select…" : "請選擇…"}</option>
                      <option value="NMDC">NMDC</option>
                      <option value="TPC">TPC</option>
                      <option value="POE">POE</option>
                      <option value="白沙屯淨灘團">{lang === "en" ? "Baishatun Cleanup Team / 白沙屯淨灘團" : "白沙屯淨灘團"}</option>
                      <option value="__OTHER__">{lang === "en" ? "Other (specify below)" : "其他（請於下方輸入）"}</option>
                    </select>
                    {companyMode === "__OTHER__" && (
                      <input
                        type="text"
                        value={companyOther}
                        onChange={e => changeCompanyOther(e.target.value)}
                        onBlur={() => setErrors(e => ({...e, company: validateField("company")}))}
                        placeholder={lang === "en" ? "Enter your company / team name…" : "請輸入公司或團體名稱…"}
                        autoComplete="organization"
                        className={`field w-full px-4 py-3.5 text-lg mt-3 ${errors.company ? "err" : ""}`}
                      />
                    )}
                  </>
                )}
                {errors.company && <div className="field-error-msg"><span>❗</span>{errors.company}</div>}
              </div>

              {/* === Transport — only shows when NMDC is selected (employee shuttle option) === */}
              {companyMode === "NMDC" && (
                <div>
                  <label className="block mb-2">
                    <span className="font-display text-xl md:text-2xl text-[color:var(--ink)]">
                      {lang === "en" ? "🚗 Transport" : "🚗 交通方式"}
                    </span>
                    <span className="ml-2 text-sm font-bold tracking-wider text-[color:var(--ink-soft)] uppercase">
                      {lang === "en" ? "NMDC only" : "NMDC 員工"}
                    </span>
                  </label>
                  <div className="flex flex-col gap-2">
                    <button type="button"
                      className={"opt-pick " + (form.transport === "self" ? "active" : "")}
                      onClick={() => { setForm(f => ({...f, transport:"self"})); if(errors.transport) setErrors(er => ({...er, transport:""})); }}>
                      🚗 {lang === "en" ? "Self-drive" : "自行開車"}
                    </button>
                    <button type="button"
                      className={"opt-pick " + (form.transport === "shuttle" ? "active" : "")}
                      onClick={() => { setForm(f => ({...f, transport:"shuttle"})); if(errors.transport) setErrors(er => ({...er, transport:""})); }}>
                      🚌 {lang === "en" ? "Company shuttle" : "搭公司接駁車"}
                      <div className="opt-pick-sub">
                        {lang === "en" ? "Departs from Taipei & Wuqi offices" : "從台北辦公室及梧棲辦公室出發"}
                      </div>
                    </button>
                  </div>
                  {errors.transport && <div className="field-error-msg"><span>❗</span>{errors.transport}</div>}
                </div>
              )}

              <Field id="f-title"   label={t("field.title.label")}   sub={t("field.title.sub")}   value={form.title}   onChange={set("title")}   onBlur={()=>setErrors(e=>({...e,title:validateField("title")}))}     error={errors.title}   placeholder={t("field.title.ph")}   autoComplete="organization-title"/>
              <Field id="f-phone"   label={t("field.phone.label")}   sub={t("field.phone.sub")}   value={form.phone}   onChange={set("phone")}   onBlur={()=>setErrors(e=>({...e,phone:validateField("phone")}))}     error={errors.phone}   placeholder={t("field.phone.ph")}   autoComplete="tel" inputMode="numeric" type="tel"/>
              <Field id="f-email"   label={t("field.email.label")}   sub={t("field.email.sub")}   value={form.email}   onChange={set("email")}   onBlur={()=>setErrors(e=>({...e,email:validateField("email")}))}     error={errors.email}   placeholder={t("field.email.ph")}   autoComplete="email" inputMode="email" type="email"/>
              <Field id="f-blood"   label={t("field.blood.label")}   sub={t("field.blood.sub")}   value={form.blood}   onChange={set("blood")}   onBlur={()=>setErrors(e=>({...e,blood:validateField("blood")}))}     error={errors.blood}   placeholder={t("field.blood.ph")}   type="select" options={BLOOD_TYPES}/>
            </div>

            {/* Companion toggle */}
            <div className="mt-6 pt-5 border-t-2 border-dashed border-[color:var(--ink)] border-opacity-25">
              <label className="block mb-3">
                <span className="font-display text-xl md:text-2xl text-[color:var(--ink)]">👨‍👩‍👧 {t("companion.toggle.label")}</span>
                <span className="ml-2 text-sm font-bold tracking-wider text-[color:var(--ink-soft)] uppercase">{t("companion.toggle.sub")}</span>
              </label>
              <div className={"yn-group " + (errors.bringCompanions ? "err" : "")}>
                <button type="button" className={"yn-btn yes " + (form.bringCompanions === "yes" ? "active" : "")} onClick={() => { setForm(f => ({...f, bringCompanions:"yes"})); if(errors.bringCompanions) setErrors(er => ({...er, bringCompanions:""})); }}>
                  ✅ {t("companion.yes")}
                </button>
                <button type="button" className={"yn-btn no " + (form.bringCompanions === "no" ? "active" : "")} onClick={() => { setForm(f => ({...f, bringCompanions:"no", companions:[]})); if(errors.bringCompanions) setErrors(er => ({...er, bringCompanions:""})); }}>
                  ❌ {t("companion.no")}
                </button>
              </div>
              {errors.bringCompanions && <div className="field-error-msg"><span>❗</span>{errors.bringCompanions}</div>}

              {form.bringCompanions === "yes" && (
                <div className="mt-5">
                  <Field id="f-cc" label={t("companion.count.label")} sub={t("companion.count.sub")}
                    value={form.companionCount}
                    onChange={(e) => setForm(f => ({...f, companionCount: parseInt(e.target.value, 10) || 1}))}
                    type="select" options={["1","2","3","4","5"]}
                    placeholder=""/>

                  {form.companions.map((c, i) => (
                    <div key={i} className="companion-card">
                      <div className="companion-card-head">
                        <span className="companion-card-num">{i+1}</span>
                        <span>{t("companion.heading").replace("{{n}}", String(i+1))}</span>
                      </div>
                      <div className="companion-grid">
                        <Field id={`f-c${i}-name`} label={t("companion.name.label")} sub={"#"+(i+1)}
                          value={c.name}
                          onChange={(e) => { setCompanion(i, "name", e.target.value); if(errors[`c${i}_name`]) setErrors(er => ({...er, [`c${i}_name`]:""})); }}
                          error={errors[`c${i}_name`]}
                          placeholder={t("companion.name.ph")}/>
                        <Field id={`f-c${i}-blood`} label={t("companion.blood.label")} sub={t("field.blood.sub")}
                          value={c.blood}
                          onChange={(e) => { setCompanion(i, "blood", e.target.value); if(errors[`c${i}_blood`]) setErrors(er => ({...er, [`c${i}_blood`]:""})); }}
                          error={errors[`c${i}_blood`]}
                          type="select" options={BLOOD_TYPES}
                          placeholder={t("field.blood.ph")}/>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* === SECTION 2: Diet === */}
          <div className="form-section diet">
            <div className="form-section-head"><span className="form-section-tag">🍽️ {t("form.section.tag.diet")}</span></div>
            <div className="form-section-title">{t("section.diet.head")}</div>
            <div className="form-section-sub">{t("section.diet.sub")}</div>
            <div className={"diet-grid " + (errors.diet ? "err" : "")}>
              {dietOpts.map(opt => (
                <label key={opt.val} className={"diet-opt " + (form.diet === opt.val ? "active" : "")}>
                  <input type="radio" name="diet" value={opt.val} checked={form.diet === opt.val}
                    onChange={() => { setForm(f => ({...f, diet: opt.val})); if(errors.diet) setErrors(er => ({...er, diet:""})); }}/>
                  <span>{opt.label}</span>
                </label>
              ))}
            </div>
            {form.diet === "other" && (
              <input type="text" placeholder={t("diet.other.ph")} value={form.dietOther} onChange={(e) => { setForm(f => ({...f, dietOther: e.target.value})); if(errors.dietOther) setErrors(er => ({...er, dietOther:""})); }} className="diet-other-input"/>
            )}
            {errors.diet && <div className="field-error-msg"><span>❗</span>{errors.diet}</div>}
            {errors.dietOther && <div className="field-error-msg"><span>❗</span>{errors.dietOther}</div>}

            {form.bringCompanions === "yes" && form.companions.length > 0 && (
              <>
                <label className="same-diet-row">
                  <input type="checkbox" className="chk" checked={form.sameDiet} onChange={(e) => setForm(f => ({...f, sameDiet: e.target.checked}))}/>
                  <span className="text-base font-bold leading-relaxed">{t("diet.same.label")}</span>
                </label>
                {!form.sameDiet && (
                  <div className="companion-diet-list">
                    {form.companions.map((c, i) => {
                      const companionName = c.name.trim() || `${t("companion.heading").replace("{{n}}", String(i+1))}`;
                      return (
                        <div key={i} className="companion-diet-row">
                          <div className="companion-diet-name">
                            <span className="companion-card-num">{i+1}</span>
                            <span>{companionName}</span>
                          </div>
                          <div className="diet-grid compact">
                            {dietOpts.map(opt => (
                              <label key={opt.val} className={"diet-opt " + (c.diet === opt.val ? "active" : "")}>
                                <input type="radio" name={`c${i}-diet`} value={opt.val} checked={c.diet === opt.val}
                                  onChange={() => { setCompanion(i, "diet", opt.val); if(errors[`c${i}_diet`]) setErrors(er => ({...er, [`c${i}_diet`]:""})); }}/>
                                <span>{opt.label}</span>
                              </label>
                            ))}
                          </div>
                          {c.diet === "other" && (
                            <input type="text" placeholder={t("diet.other.ph")} value={c.dietOther} onChange={(e) => { setCompanion(i, "dietOther", e.target.value); if(errors[`c${i}_dietOther`]) setErrors(er => ({...er, [`c${i}_dietOther`]:""})); }} className="diet-other-input"/>
                          )}
                          {errors[`c${i}_diet`] && <div className="field-error-msg"><span>❗</span>{errors[`c${i}_diet`]}</div>}
                          {errors[`c${i}_dietOther`] && <div className="field-error-msg"><span>❗</span>{errors[`c${i}_dietOther`]}</div>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </>
            )}
          </div>

          {/* === SECTION 3: Emergency === */}
          <div className="em-block">
            <div className="em-head"><span className="em-tag">⚠️ {t("form.section.tag.emergency")}</span></div>
            <div className="em-title">{t("emergency.head")}</div>
            <div className="em-sub">{t("emergency.sub")}</div>
            <div className="grid md:grid-cols-2 gap-5">
              <Field id="f-emName"  label={t("field.emName.label")}  sub={t("field.emName.sub")}  value={form.emName}  onChange={set("emName")}  onBlur={()=>setErrors(e=>({...e,emName:validateField("emName")}))}   error={errors.emName}  placeholder={t("field.emName.ph")}  autoComplete="name"/>
              <Field id="f-emPhone" label={t("field.emPhone.label")} sub={t("field.emPhone.sub")} value={form.emPhone} onChange={set("emPhone")} onBlur={()=>setErrors(e=>({...e,emPhone:validateField("emPhone")}))} error={errors.emPhone} placeholder={t("field.emPhone.ph")} autoComplete="tel" inputMode="numeric" type="tel"/>
            </div>
          </div>

          {/* Total seats hint */}
          {totalSeats > 1 && (
            <div className="p-3 rounded-xl bg-[color:var(--cream-warm)] border-2 border-[color:var(--ink)] text-sm font-bold text-center">
              {t("form.totalSeats").replace("{{n}}", String(totalSeats)).replace("{{c}}", String(totalSeats - 1))}
            </div>
          )}

          {/* === FINAL STEP: Risk Notice + Agreement (red-themed, must acknowledge) === */}
          <div className="final-agree">
            <div className="final-agree-head">
              <span className="em-tag" style={{background:"var(--coral-deep)"}}>⚠️ 送出前請先閱讀 / Before You Submit</span>
            </div>
            <div className="final-agree-title">🚨 {t("risk.head")}</div>
            <p className="final-agree-body whitespace-pre-line">{t("risk.body")}</p>

            <label className={"final-agree-check " + (agreed ? "checked" : "") + (errors._agree ? " err" : "")}>
              <input type="checkbox" className="chk" checked={agreed} onChange={e=>{
                setAgreed(e.target.checked);
                if(submitError) setSubmitError("");
                if(errors._agree) setErrors(er => ({...er, _agree:""}));
              }}/>
              <span className="text-base md:text-lg font-bold leading-relaxed">{t("form.agree")}</span>
            </label>
          </div>

          {submitError && (<div className="p-4 rounded-xl bg-[color:var(--coral)] text-white font-bold border-[3px] border-[color:var(--ink)] bounce-in" style={{boxShadow:"4px 4px 0 var(--ink)"}}>❗ {submitError}</div>)}
          <button type="submit" disabled={submitting || !agreed} className="btn-chunk w-full md:w-auto px-10 py-5 text-xl min-w-[260px] inline-flex items-center justify-center gap-2" title={!agreed ? "請先勾選同意 / Please tick the box first" : ""}>
            {submitting ? (<><svg className="animate-spin" width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" opacity=".3"/><path d="M12 2 A10 10 0 0 1 22 12" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>{t("form.submitting")}</>) : ( t("form.submit") )}
          </button>
          {!agreed && !submitting && (
            <div className="text-center text-sm font-bold text-[color:var(--coral-deep)] -mt-2">👆 請先勾選同意風險告知才能送出 / Check the box above to enable submission</div>
          )}
        </form>
      );
    }

    function SuccessCard({ data, t, lang, onAgain, serverContent, edits }){
      const seats = data.totalSeats || 1;
      const companions = data.companionCount || 0;
      // Look up admin-uploaded image (base64 data URL) — empty string = no image
      const imageData = (serverContent && edits)
        ? getDisplay("success.image.data", edits, serverContent)
        : "";
      const hasImage = imageData && String(imageData).indexOf("data:image") === 0;
      // Optional click-through URL — if set, wrap image in <a> opening new tab
      const rawUrl = (serverContent && edits)
        ? getDisplay("success.image.url", edits, serverContent)
        : "";
      const safeUrl = (() => {
        const u = String(rawUrl || "").trim();
        if(!u) return "";
        // Allow http(s), line, tel, mailto. Reject anything dangerous (javascript:, etc.)
        if(/^(https?:\/\/|line:\/\/|tel:|mailto:)/i.test(u)) return u;
        // No scheme → assume https
        if(/^[\w-]+(\.[\w-]+)+/.test(u)) return "https://" + u;
        return "";
      })();
      const isLinked = hasImage && safeUrl;

      // Rich-text success body (admin-edited HTML). Per-language key: `zh.ok.body.html` or `en.ok.body.html`.
      const richKey = lang + ".ok.body.html";
      const richBodyRaw = (serverContent && edits)
        ? (edits[richKey] !== undefined ? edits[richKey] : (serverContent[richKey] || ""))
        : "";
      const hasRichBody = richBodyRaw && String(richBodyRaw).replace(/<[^>]*>/g, "").trim();
      const richBodyHtml = hasRichBody ? (() => {
        let html = String(richBodyRaw);
        const tok = {
          "{{name}}": data.name || "",
          "{{confirmationNumber}}": data.confirmationNumber || "",
          "{{totalSeats}}": String(seats),
          "{{companionCount}}": String(companions),
          "{{company}}": data.company || ""
        };
        Object.keys(tok).forEach(k => { html = html.split(k).join(tok[k]); });
        return html;
      })() : "";

      return (
        <div className="relative p-8 md:p-12 rounded-2xl bg-[color:var(--wave)] text-white border border-[color:var(--wave-deep)] overflow-hidden bounce-in" style={{boxShadow:"0 10px 30px rgba(30,111,171,0.25)"}}>
          <div className="relative z-10">
            <div className="text-6xl mb-4">🎉</div>
            <h3 className="font-display text-4xl md:text-6xl mb-3">{t("ok.head")}</h3>
            {hasRichBody ? (
              <div className="success-rich-body text-lg md:text-xl mb-6 max-w-md opacity-95" dangerouslySetInnerHTML={{__html: richBodyHtml}}/>
            ) : (
              <p className="text-lg md:text-xl mb-6 max-w-md font-medium whitespace-pre-line opacity-95">{t("ok.sub")}</p>
            )}

            {/* QR / image block — moved here so it sits right under the body message
                (so "下方 QR Code" instruction points to the very next thing).
                Only renders if admin uploaded a QR. */}
            {hasImage && (
              <div className="mt-2 mb-8 pt-5 border-t border-white/30">
                <div className="font-display text-xl md:text-2xl mb-1">{t("ok.image.title")}</div>
                <div className="text-sm md:text-base opacity-90 mb-3 max-w-md">{t("ok.image.caption")}</div>
                {isLinked ? (
                  <a href={safeUrl} target="_blank" rel="noopener noreferrer"
                     className="inline-block p-3 md:p-4 bg-white rounded-2xl border border-white/40 transition-transform hover:scale-105 active:scale-95 cursor-pointer"
                     style={{boxShadow:"0 6px 20px rgba(0,0,0,0.2)"}}
                     title={lang === "en" ? "Tap to open the link" : "點圖開啟連結"}>
                    <img
                      src={imageData}
                      alt="QR Code link"
                      className="block w-44 h-44 md:w-56 md:h-56 object-contain"
                      style={{imageRendering:"pixelated"}}/>
                    <div className="text-center mt-2 text-[10px] md:text-xs font-bold text-[color:var(--wave-deep)] uppercase tracking-wider">
                      👆 {lang === "en" ? "Tap to open" : "點圖直接前往"}
                    </div>
                  </a>
                ) : (
                  <div className="inline-block p-3 md:p-4 bg-white rounded-2xl border border-white/40" style={{boxShadow:"0 6px 20px rgba(0,0,0,0.2)"}}>
                    <img
                      src={imageData}
                      alt="QR Code"
                      className="block w-44 h-44 md:w-56 md:h-56 object-contain"
                      style={{imageRendering:"pixelated"}}/>
                  </div>
                )}
              </div>
            )}

            {/* Big highlighted name × seat count */}
            <div className="inline-flex flex-wrap items-baseline gap-3 px-5 py-3 rounded-xl bg-white/15 backdrop-blur-sm border border-white/30 mb-8">
              <span className="font-display text-3xl md:text-4xl leading-none">{data.name || "—"}</span>
              <span className="opacity-70 text-2xl md:text-3xl leading-none">✕</span>
              <span className="font-num text-3xl md:text-4xl tabular-nums leading-none">{seats}</span>
              <span className="opacity-80 text-sm md:text-base font-bold ml-1">
                {lang === "en" ? (seats > 1 ? "seats" : "seat") : "席"}
                {companions > 0 && (
                  <span className="ml-1 opacity-75">
                    ({lang === "en" ? `you + ${companions} companion${companions > 1 ? "s" : ""}` : `本人 + 攜眷 ${companions}`})
                  </span>
                )}
              </span>
            </div>

            <div className="grid grid-cols-2 gap-6 max-w-md mb-6 pt-5 border-t border-white/30">
              <div>
                <div className="text-xs font-extrabold tracking-[0.2em] opacity-80 mb-1">{t("ok.conf")}</div>
                <div className="font-num text-3xl tabular-nums">{data.confirmationNumber}</div>
              </div>
              <div>
                <div className="text-xs font-extrabold tracking-[0.2em] opacity-80 mb-1">{t("ok.name")}</div>
                <div className="font-display text-2xl">{data.name || "—"}</div>
              </div>
            </div>

            <button onClick={onAgain} className="bg-white text-[color:var(--wave)] font-bold px-5 py-2.5 rounded-full text-sm transition-all hover:bg-[color:var(--sun-soft)]">
              + {t("ok.again")}
            </button>
          </div>
        </div>
      );
    }

    function ClosedCard({ kind, t }){
      const title = kind === "full" ? t("closed.full.title") : t("closed.deadline.title");
      const sub = kind === "full" ? t("closed.full.sub") : t("closed.deadline.sub");
      const emoji = kind === "full" ? "🙇" : "⏰";
      return (
        <div className="p-8 md:p-12 rounded-2xl bg-[color:var(--ink)] text-[color:var(--cream)] border-[3px] border-[color:var(--ink)] text-center" style={{boxShadow:"8px 8px 0 var(--nmdc-green)"}}>
          <div className="text-6xl mb-4">{emoji}</div>
          <h3 className="font-display text-3xl md:text-5xl mb-3">{title}</h3>
          <p className="text-lg md:text-xl opacity-90 max-w-md mx-auto">{sub}</p>
        </div>
      );
    }

    function FormSection({ config, configError, isOpen, isFull, isExpired, t, lang, success, onSuccess, onAgain, serverContent, edits }){
      return (
        <section id="register" className="py-16 md:py-24 bg-paper relative overflow-hidden">
          <BeachDoodles items={[
            { emoji:"🌊", left:"4%",  top:"20%", size:"34px", delay:0.2, anim:"float" },
            { emoji:"🏊", left:"88%", top:"75%", size:"40px", rot:10,  delay:1.0, anim:"sway" }
          ]}/>
          <div className="max-w-3xl mx-auto px-4 md:px-8 relative">
            <div className="text-center mb-10">
              <div className="inline-block tag bg-[color:var(--nmdc-green)] text-white border-[color:var(--ink)] mb-3">{t("form.tag")}</div>
              <h2 className="font-display text-4xl md:text-6xl mb-3"><span className="wavy-coral">{t("form.head")}</span></h2>
              <p className="text-lg font-medium text-[color:var(--ink-soft)]">{t("form.sub")}</p>
            </div>
            <div className="sticker p-6 md:p-10" style={{boxShadow:"10px 10px 0 var(--ink)"}}>
              {success ? (
                <SuccessCard data={success} t={t} lang={lang} onAgain={onAgain} serverContent={serverContent} edits={edits}/>
              ) : configError ? (
                <div className="p-5 rounded-xl bg-[color:var(--coral)] text-white font-bold border-[3px] border-[color:var(--ink)]">⚠ {configError}</div>
              ) : !config ? (
                <div className="space-y-4">
                  <div className="h-16 rounded-xl bg-[color:var(--cream-warm)] animate-pulse"/>
                  <div className="h-16 rounded-xl bg-[color:var(--cream-warm)] animate-pulse"/>
                  <div className="h-16 rounded-xl bg-[color:var(--cream-warm)] animate-pulse"/>
                </div>
              ) : isExpired ? (
                <ClosedCard kind="deadline" t={t}/>
              ) : isFull ? (
                <ClosedCard kind="full" t={t}/>
              ) : isOpen ? (
                <RegistrationForm t={t} lang={lang} onSuccess={onSuccess} configRemaining={config ? config.remaining : null}/>
              ) : (
                <ClosedCard kind="deadline" t={t}/>
              )}
            </div>
          </div>
        </section>
      );
    }

    // Footer — 2 columns: Contact + Organizer
    function Footer({ t, onEnterEdit }){
      const phone1 = t("footer.contactLine1.val");
      const phone2 = t("footer.contactLine2.val");
      return (
        <footer className="bg-[color:var(--nmdc-navy)] text-[color:var(--cream)] relative overflow-hidden">
          <Wave color="var(--nmdc-navy)" flip className="-mb-1"/>
          <div className="max-w-6xl mx-auto px-4 md:px-8 py-14 md:py-16 relative">
            <div className="grid md:grid-cols-2 gap-10 mb-10">
              <div>
                <div className="text-sm font-extrabold tracking-[0.2em] opacity-70 mb-4">{t("footer.contactHead")}</div>
                <div className="space-y-3 font-medium text-lg">
                  <div>
                    <span className="opacity-60 mr-2">{t("footer.contactLine1.label")}</span>
                    <a href={`tel:${phone1.replace(/\D/g,"")}`} className="hover:text-[color:var(--nmdc-green-light)] transition">{phone1}</a>
                  </div>
                  <div>
                    <span className="opacity-60 mr-2">{t("footer.contactLine2.label")}</span>
                    <a href={`tel:${phone2.replace(/\D/g,"")}`} className="hover:text-[color:var(--nmdc-green-light)] transition">{phone2}</a>
                  </div>
                </div>
              </div>
              <div>
                <div className="text-sm font-extrabold tracking-[0.2em] opacity-70 mb-4">{t("footer.orgHead")}</div>
                <div className="text-base leading-relaxed">
                  <div className="font-bold text-lg">{t("footer.orgName")}</div>
                  <div className="opacity-75 mt-1">{t("footer.orgAddr")}</div>
                  <div className="opacity-75 mt-1">{t("footer.orgPhone")} · {t("footer.orgTax")}</div>
                </div>
              </div>
            </div>
            <div className="pt-6 border-t border-white/15 flex flex-col md:flex-row md:items-center md:justify-between gap-2 text-sm opacity-60">
              <div>{t("footer.copy")}</div>
              <div className="flex items-center gap-3">
                <span>{t("footer.poweredBy")}</span>
                <button onClick={onEnterEdit} title="Admin edit" className="opacity-40 hover:opacity-100 transition" style={{padding:"2px 6px"}}>⚙️</button>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // ====================================================================
    // Main App
    // ====================================================================
    // ====================================================================
    // Language Picker — first-visit modal
    // ====================================================================
    function LanguagePicker({ onPick, onClose }){
      // Close on Escape
      useEffect(() => {
        const handler = (e) => { if(e.key === "Escape") onClose(); };
        window.addEventListener("keydown", handler);
        // Prevent body scroll
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => {
          window.removeEventListener("keydown", handler);
          document.body.style.overflow = prev;
        };
      }, [onClose]);

      return (
        <div className="lang-picker-backdrop" onClick={(e) => { if(e.target === e.currentTarget) onClose(); }}>
          <div className="lang-picker-card">
            <button className="lang-picker-close" onClick={onClose} title="Close">✕</button>
            <div className="lang-picker-emojis">🏖️ 🌊 🐚</div>
            <div className="lang-picker-title">
              Welcome!
              <div className="block text-[color:var(--nmdc-green)]" style={{fontSize:"0.62em", marginTop:"6px"}}>歡迎參加 NMDC 淨灘活動 💚</div>
            </div>

            <div className="lang-picker-slogan">
              <div className="slogan-zh">「我們的工程在海上，我們的心也在海邊」</div>
              <div className="slogan-en">We work on the sea — and we care for the shore</div>
            </div>

            <div className="lang-picker-sub">請選擇語言開始填寫報名表<br/>Choose your language to continue</div>
            <div className="lang-picker-grid">
              <button className="lang-picker-btn zh" onClick={() => onPick("zh")}>
                <div className="lang-picker-flag">
                  <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" width="60" height="40" style={{display:"block"}}>
                    {/* Red field */}
                    <rect width="60" height="40" fill="#FE0000"/>
                    {/* Blue canton */}
                    <rect width="30" height="20" fill="#000095"/>
                    {/* White sun: 12 rays + center disk */}
                    <g transform="translate(15 10)">
                      {Array.from({length:12}).map((_, i) => (
                        <polygon key={i} points="0,-7 1.55,-2.1 0,0 -1.55,-2.1" fill="#fff" transform={`rotate(${i*30})`}/>
                      ))}
                      <circle r="3" fill="#000095"/>
                      <circle r="2.5" fill="#fff"/>
                    </g>
                  </svg>
                </div>
                <div className="lang-picker-name">中文</div>
              </button>
              <button className="lang-picker-btn en" onClick={() => onPick("en")}>
                <div className="lang-picker-flag">🌍</div>
                <div className="lang-picker-name">English</div>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App(){
      const [lang, setLang] = useState(() => {
        // 白沙屯版鎖定中文
        if(IS_BAISHATUN) return "zh";
        try{ const saved = window.localStorage.getItem("nmdc_lang"); if(saved === "zh" || saved === "en") return saved; } catch(_){}
        return "zh";
      });
      useEffect(() => { try{ if(!IS_BAISHATUN) window.localStorage.setItem("nmdc_lang", lang); } catch(_){}; }, [lang]);
      useEffect(() => { document.documentElement.lang = lang === "zh" ? "zh-TW" : "en"; }, [lang]);

      // Language picker — 白沙屯版不顯示，其他版面正常顯示
      const [showLangPicker, setShowLangPicker] = useState(!IS_BAISHATUN);
      function pickLang(chosen){
        setLang(chosen);
        setShowLangPicker(false);
      }
      function dismissLangPicker(){
        setShowLangPicker(false);
      }

      const [config, setConfig] = useState(null);
      const [configError, setConfigError] = useState("");
      const [success, setSuccess] = useState(null);

      const [serverContent, setServerContent] = useState({});
      const [edits, setEdits] = useState({});
      const [editMode, setEditMode] = useState(false);
      const [panelOpen, setPanelOpen] = useState(false);
      const [editPassword, setEditPassword] = useState("");
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);

      const txt = useCallback((k) => {
        const key = `${lang}.${k}`;
        if(edits[key] !== undefined) return edits[key];
        if(serverContent[key] !== undefined) return serverContent[key];
        return DEFAULTS[lang]?.[k] ?? `[${k}]`;
      }, [lang, edits, serverContent]);

      async function loadConfig(){
        setConfigError("");
        try{
          const data = await xhrGet(GAS_URL + "?team=" + encodeURIComponent(TEAM));
          setConfig(data);
          if(data.content && typeof data.content === "object"){ setServerContent(data.content); }
        } catch(e){ setConfigError(DEFAULTS[lang]["err.config"] || "Can't load event info"); }
      }
      useEffect(() => {
        if(!GAS_URL || GAS_URL.startsWith("PASTE_")){
          setConfigError("GAS_URL not set — please paste your Web App URL in index.html");
          return;
        }
        loadConfig();
        const id = setInterval(loadConfig, 60000);
        return () => clearInterval(id);
      // eslint-disable-next-line
      }, []);

      // Hide the initial loader once data arrives OR error happens OR safety timeout.
      // We wait 500ms AFTER config arrives so React has time to:
      //   1. Commit the new state (config + serverContent)
      //   2. Re-render components with proper content
      //   3. Browser paints the real data
      // This prevents the brief "flash of default text" the user used to see.
      useEffect(() => {
        function hideLoader(){
          const el = document.getElementById("initial-loader");
          if(!el) return;
          if(el.classList.contains("is-hidden")) return;
          el.classList.add("is-hidden");
          setTimeout(() => { try{ el.remove(); } catch(_){} }, 900);
        }
        // Wait for config (or error) + 500ms buffer for paint
        if(config || configError){
          const t = setTimeout(hideLoader, 500);
          return () => clearTimeout(t);
        }
        // Safety: never let the loader stick more than 12 s
        const safety = setTimeout(hideLoader, 12000);
        return () => clearTimeout(safety);
      }, [config, configError, serverContent]);

      const isOpen = config && config.open && config.remaining > 0 && new Date() < new Date(config.deadline);
      const isFull = config && config.remaining === 0;
      const isExpired = config && new Date() >= new Date(config.deadline);

      function handleSuccess(res){
        setSuccess(res);
        setTimeout(() => { const el = document.getElementById("register"); if(el) el.scrollIntoView({ behavior:"smooth", block:"start" }); }, 50);
        setTimeout(loadConfig, 500);
      }
      function handleAgain(){ setSuccess(null); }
      function showToast(msg, kind="ok"){ setToast({ msg, kind }); setTimeout(() => setToast(null), 3500); }

      function enterEditMode(){
        if(editMode){ setPanelOpen(true); return; }
        const pw = window.prompt("管理密碼 / Admin password:");
        if(!pw) return;
        setEditPassword(pw); setEditMode(true); setPanelOpen(true);
      }
      function exitEditMode(){
        if(Object.keys(edits).length > 0){
          if(!window.confirm("還有未儲存的變更，確定離開？ / Unsaved changes — exit anyway?")) return;
          setEdits({});
        }
        setEditMode(false); setPanelOpen(false); setEditPassword("");
      }

      async function handleSave(){
        if(saving) return;
        if(Object.keys(edits).length === 0) return;
        setSaving(true);
        try{
          const res = await xhrPost(GAS_URL, { action:"saveContent", password:editPassword, edits });
          if(res.success){
            setServerContent(prev => ({ ...prev, ...edits }));
            setEdits({});
            showToast(`💾 已儲存 ${res.saved} 筆 / Saved`);
          } else if(res.error === "INVALID_PASSWORD"){
            showToast("密碼錯誤 / Wrong password", "err");
            setEditPassword(""); setEditMode(false); setPanelOpen(false);
          } else { showToast("儲存失敗 / Save failed: " + (res.error || ""), "err"); }
        } catch(e){ showToast("連線失敗 / Connection failed", "err"); }
        finally { setSaving(false); }
      }

      const dirtyCount = Object.keys(edits).length;

      // Display settings
      const showCountdown = getDisplay("display.showCountdown", edits, serverContent) === "true";
      const sectionOrderStr = getDisplay("display.sectionOrder", edits, serverContent);
      const sectionOrder = sectionOrderStr.split(",").map(s => s.trim()).filter(Boolean);
      // ensure any missing orderable sections are appended
      ORDERABLE_SECTIONS.forEach(s => { if(!sectionOrder.includes(s.id)) sectionOrder.push(s.id); });

      function renderSection(id){
        if(id === "info") return <InfoStickers key="info" t={txt} editMode={editMode}/>;
        if(id === "status"){
          if(!showCountdown) return null;
          return <StatusSection key="status" config={config} t={txt} lang={lang} edits={edits} serverContent={serverContent}/>;
        }
        if(id === "schedule") return <Schedule key="schedule" t={txt} lang={lang} edits={edits} serverContent={serverContent}/>;
        if(id === "form") return <FormSection key="form" config={config} configError={configError} isOpen={isOpen} isFull={isFull} isExpired={isExpired} t={txt} lang={lang} success={success} onSuccess={handleSuccess} onAgain={handleAgain} serverContent={serverContent} edits={edits}/>;
        if(id === "notes") return <Notes key="notes" t={txt}/>;
        return null;
      }

      return (
        <div className="min-h-screen">
          {showLangPicker && <LanguagePicker onPick={pickLang} onClose={dismissLangPicker}/>}
          {editMode && (<div className="edit-badge">⚙️ ADMIN MODE{dirtyCount > 0 && ` · ${dirtyCount} UNSAVED`}</div>)}
          <Header lang={lang} setLang={setLang} onEdit={() => setPanelOpen(true)} editMode={editMode} t={txt}/>
          <AnnouncementBanner t={txt}/>
          <Hero t={txt} editMode={editMode} edits={edits} serverContent={serverContent}/>
          {sectionOrder.map(id => renderSection(id))}
          <Footer t={txt} onEnterEdit={enterEditMode}/>

          <EditPanel
            open={panelOpen}
            onClose={() => setPanelOpen(false)}
            lang={lang} setLang={setLang}
            edits={edits} setEdits={setEdits}
            serverContent={serverContent}
            onSave={handleSave} saving={saving}
            dirtyCount={dirtyCount}
            editPassword={editPassword}
            registered={config ? config.registered : 0}
            onDataChanged={loadConfig}/>

          {editMode && (
            <div style={{position:"fixed", bottom:16, right:16, zIndex:45, display:"flex", gap:8, flexDirection:"column"}}>
              <button onClick={() => setPanelOpen(true)} className="btn-chunk px-4 py-2 text-sm">⚙️ {dirtyCount > 0 ? `Admin (${dirtyCount})` : "Admin"}</button>
              <button onClick={exitEditMode} className="btn-outline px-4 py-2 text-sm">🚪 Exit</button>
            </div>
          )}
          {toast && (<div className={"toast " + (toast.kind === "err" ? "err" : "")}>{toast.msg}</div>)}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
