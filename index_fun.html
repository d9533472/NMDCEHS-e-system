<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <meta name="theme-color" content="#00B050" />
  <title>2026 NMDC 團隊淨灘・GO! | Beach Cleanup Registration</title>
  <meta name="description" content="2026 NMDC 團隊淨灘｜SDGs/ESG Beach Cleanup — 報名就對了！" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.16.6/babel.min.js"></script>
  <!-- xlsx-js-style: enables Excel export with bold headers, colors, frozen panes, autofilter -->
  <script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

  <style>
    :root{
      /* ====== NEW PALETTE: Cream base + Wave Blue accent + Sun Yellow sparingly ====== */
      --cream:#FBF7EE;          /* primary background — soft cream */
      --cream-warm:#F4EEDF;     /* slightly deeper for section alternation */
      --ink:#163654;            /* main text — deep ocean ink (softer than pure black) */
      --ink-soft:#5C7187;       /* secondary text */
      --line:#E3DBC7;           /* subtle dividers / borders */
      --line-strong:#C9BFA6;    /* slightly stronger dividers */

      --wave:#1E6FAB;           /* main accent — wave blue */
      --wave-deep:#155989;      /* deeper hover state */
      --wave-soft:#E6EFF7;      /* very light blue tint backgrounds */

      --sun:#F5C24A;            /* sparing highlight only */
      --sun-soft:#FCEFC9;       /* light sun tint */

      /* legacy aliases — kept so existing class names still resolve */
      --nmdc-green:#1E6FAB;
      --nmdc-green-dark:#155989;
      --nmdc-green-light:#4A95C8;
      --nmdc-navy:#163654;
      --sun-deep:#D9A634;
      --sky:#4A95C8; --sky-deep:#1E6FAB;
      --coral:#F5C24A;
      --coral-deep:#D9A634;
      --sand:#F4EEDF; --sand-deep:#E3DBC7;
      --tpc-blue:#1E6FAB;
    }
    html,body{ background:var(--cream); color:var(--ink); scroll-behavior:smooth; }
    body{ font-family:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; font-size:16px; }

    /* All heading "fonts" are now the same sans, just heavier weight + tighter tracking */
    .font-display{ font-family:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif; font-weight:800; letter-spacing:-0.02em; }
    .font-chunk{ font-family:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif; font-weight:800; letter-spacing:-0.01em; }
    .font-num{ font-family:'Plus Jakarta Sans',system-ui,sans-serif; font-weight:800; font-feature-settings:'tnum'; letter-spacing:-0.02em; }

    /* Backgrounds — clean, no dots */
    .bg-paper{ background:var(--cream); }
    .bg-dots{ background:transparent; }

    /* ====== Hero text — sizes driven by CSS variables, admin-editable ====== */
    /* Defaults match the original Tailwind sizes; admin overrides via inline var. */
    .hero-chip-size{ font-size: var(--hero-chip-m, 0.81rem); }
    .hero-subtitle-size{ font-size: var(--hero-sub-m, 1.25rem); line-height:1.2; }
    .hero-title-size{ font-size: var(--hero-title-m, 3rem); line-height:0.95; }
    .hero-tagline-size{ font-size: var(--hero-tag-m, 1rem); line-height:1.4; }
    @media (min-width: 768px){
      .hero-chip-size{ font-size: var(--hero-chip-d, 0.85rem); }
      .hero-subtitle-size{ font-size: var(--hero-sub-d, 1.875rem); }
      .hero-title-size{ font-size: var(--hero-title-d, 8rem); line-height:0.9; }
      .hero-tagline-size{ font-size: var(--hero-tag-d, 1.5rem); }
    }

    /* Cards — flat white, light border, subtle shadow only */
    .sticker{ background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:0 1px 2px rgba(22,54,84,0.04); transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
    .sticker:hover{ transform:translate(-2px,-2px) rotate(0deg) !important; box-shadow:0 6px 18px rgba(22,54,84,0.08); border-color:var(--line-strong); }
    .sticker-clickable:hover{ cursor:pointer; }
    .sticker-green{ background:var(--wave); color:#fff; border-color:var(--wave-deep); }
    .sticker-sun{ background:var(--sun-soft); border-color:var(--sun); }
    .sticker-coral{ background:var(--wave-soft); color:var(--wave-deep); border-color:var(--wave); }
    .sticker-sky{ background:var(--wave-soft); border-color:var(--wave); }

    /* Buttons — modern flat, no chunky offset */
    .btn-chunk{ background:var(--wave); color:#fff; border:none; border-radius:999px; box-shadow:0 4px 12px rgba(30,111,171,0.25); font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; letter-spacing:0.01em; transition:background .15s ease, box-shadow .15s ease, transform .1s ease; }

    /* Recipients modal — overlay used for copy-emails workflow */
    .modal-overlay{
      position:fixed; inset:0; background:rgba(22,54,84,0.55);
      display:flex; align-items:center; justify-content:center;
      z-index:9500; padding:16px;
      animation: modal-fade .2s ease-out;
    }
    .modal-content{
      background:white; border:2.5px solid var(--ink); border-radius:16px;
      box-shadow:6px 6px 0 var(--ink);
      max-width:620px; width:100%; max-height:85vh;
      display:flex; flex-direction:column;
      padding:18px 20px;
    }
    @keyframes modal-fade{ from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);} }
    .modal-close{
      background:none; border:none; cursor:pointer;
      font-size:28px; line-height:1; color:var(--ink-soft);
      padding:0 4px; transition:color .12s ease;
    }
    .modal-close:hover{ color:var(--ink); }
    .modal-textarea{
      flex:1; width:100%; padding:12px 14px;
      border:2px solid var(--ink); border-radius:10px;
      font-family:'Menlo','Monaco','Courier New',monospace;
      font-size:12px; line-height:1.6; color:var(--ink);
      background:var(--cream); resize:vertical;
      min-height:180px;
    }
    .modal-textarea:focus{ outline:none; border-color:var(--wave); }

    /* === Groups tab: household cards + group boxes === */
    .hh-card{
      display:inline-flex; align-items:center; gap:5px;
      padding:5px 9px; border-radius:8px; cursor:pointer;
      background:white; border:1.5px solid var(--line);
      font-size:11.5px; line-height:1.3; user-select:none;
      transition:background .12s, border-color .12s, transform .08s;
      box-shadow:1px 1px 0 var(--line);
    }
    .hh-card:hover{ background:var(--cream-warm); border-color:var(--ink-soft); }
    .hh-card:active{ transform:translateY(1px); }
    .hh-card[data-selected="true"]{
      background:var(--wave); color:white;
      border-color:var(--wave-deep);
      box-shadow:2px 2px 0 var(--wave-deep);
    }
    .hh-serial{ font-family:'Menlo','Monaco',monospace; font-size:10px; opacity:0.7; font-weight:700; }
    .hh-card[data-selected="true"] .hh-serial{ opacity:0.85; }
    .hh-name{ font-weight:700; }
    .hh-comp{
      display:inline-block; padding:1px 5px; border-radius:6px;
      background:var(--sun); color:var(--ink); font-size:9.5px;
      font-weight:800; line-height:1.2; letter-spacing:.02em;
    }
    .hh-card[data-selected="true"] .hh-comp{ background:white; color:var(--ink); }
    .group-box{
      position:relative;
      background:white; border:2px solid var(--ink); border-radius:10px;
      padding:8px 8px 10px; min-height:120px;
      transition:background .12s, border-color .12s, box-shadow .12s;
    }
    .group-box[data-empty="true"]{ background:#FAFAFA; }
    .group-box[data-over="true"]{
      background:#E8F8EE; border-color:var(--nmdc-green);
      box-shadow:0 0 0 3px rgba(42,157,92,0.15);
    }
    .group-box[data-full="true"]{
      background:#EFE9DA;
      border-color:var(--ink-soft);
      opacity:0.72;
      cursor:not-allowed;
    }
    .group-box[data-full="true"] .hh-card{ cursor:pointer; }
    .btn-chunk:hover{ background:var(--wave-deep); box-shadow:0 6px 16px rgba(30,111,171,0.35); transform:translateY(-1px); }
    .btn-chunk:active{ transform:translateY(0); box-shadow:0 2px 6px rgba(30,111,171,0.25); }
    .btn-chunk:disabled{ background:#A8BCCD; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

    .btn-outline{ background:#fff; color:var(--wave); border:1.5px solid var(--wave); border-radius:999px; box-shadow:none; transition:all .15s ease; font-weight:600; }
    .btn-outline:hover{ background:var(--wave-soft); transform:translateY(-1px); }
    .btn-outline:active{ transform:translateY(0); }

    .btn-danger{ background:#E5685A; color:#fff; border:none; border-radius:999px; box-shadow:0 3px 10px rgba(229,104,90,0.25); font-weight:700; transition:all .15s ease; }
    .btn-danger:hover{ background:#D04A3C; transform:translateY(-1px); }

    /* Form fields — light border, blue focus ring */
    .field{ background:#fff; border:1.5px solid var(--line-strong); border-radius:10px; transition:all .15s ease; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:500; }
    .field:focus{ outline:none; border-color:var(--wave); box-shadow:0 0 0 3px var(--wave-soft); transform:none; }
    .field.err{ border-color:#E5685A; background:#FDF3F1; box-shadow:0 0 0 3px rgba(229,104,90,0.12); }
    .field.err:focus{ border-color:#D04A3C; box-shadow:0 0 0 3px rgba(229,104,90,0.18); }

    .chk{ appearance:none; width:22px; height:22px; border:1.5px solid var(--line-strong); border-radius:5px; background:#fff; cursor:pointer; position:relative; flex-shrink:0; margin-top:2px; transition:all .15s ease; }
    .chk:hover{ border-color:var(--wave); background:var(--wave-soft); }
    .chk:checked{ background:var(--wave); border-color:var(--wave); }
    .chk:checked::after{ content:""; position:absolute; left:6px; top:2px; width:6px; height:11px; border:solid #fff; border-width:0 2.5px 2.5px 0; transform:rotate(45deg); }

    .wavy{ padding-bottom:0; }   /* removed underline waves */
    .wavy-coral{ padding-bottom:0; }

    .tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; background:var(--wave-soft); border:1px solid var(--wave); color:var(--wave-deep); border-radius:999px; font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; }

    @keyframes spin-slow{ from{transform:rotate(0);} to{transform:rotate(360deg);} }
    @keyframes bounce-in{ 0%{opacity:0; transform:translateY(12px);} 100%{opacity:1; transform:none;} }
    @keyframes wiggle{ 0%,100%{ transform:rotate(0deg);} }                /* disabled wiggle */
    @keyframes float{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-4px);} }
    @keyframes count-bounce{ 0%,100%{ transform:scale(1);} }              /* disabled count bounce */
    @keyframes sway{ 0%,100%{ transform:rotate(0deg);} }                  /* disabled sway */
    .spin-slow{ animation:spin-slow 30s linear infinite; transform-origin:center; }
    .bounce-in{ animation:bounce-in .5s ease-out backwards; }
    .wiggle{ animation:none; }
    .float{ animation:float 5s ease-in-out infinite; }
    .count-bounce{ animation:none; }
    .sway{ animation:none; display:inline-block; }

    .ticket{ background:#fff; border:1px solid var(--line); border-radius:12px; position:relative; padding:18px 20px; box-shadow:0 1px 3px rgba(22,54,84,0.04); }

    /* Schedule rows — clean cards, blue time label */
    .sched-row{
      display:flex; align-items:stretch; gap:0;
      background:#fff; border:1px solid var(--line); border-radius:12px;
      box-shadow:0 1px 2px rgba(22,54,84,0.04);
      overflow:hidden;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .sched-row:hover{ transform:translateY(-2px); box-shadow:0 6px 18px rgba(22,54,84,0.08); border-color:var(--line-strong); }
    .sched-time{
      background:var(--wave-soft); color:var(--wave-deep);
      padding:14px 16px; display:flex; align-items:center; justify-content:center;
      font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.3rem; min-width:110px;
      border-right:1px solid var(--line);
      letter-spacing:-0.02em;
    }
    .sched-text{ flex:1; padding:14px 16px; display:flex; align-items:center; font-size:1rem; font-weight:500; color:var(--ink); }
    @media (max-width:640px){
      .sched-time{ min-width:80px; font-size:1.05rem; padding:10px; }
      .sched-text{ padding:10px 12px; font-size:0.95rem; }
    }

    /* Edit drawer — keep functional, lighter borders */
    .edit-drawer{ position:fixed; top:0; right:0; bottom:0; width:100%; max-width:560px; background:var(--cream); border-left:1px solid var(--line-strong); box-shadow:-6px 0 20px rgba(22,54,84,0.10); z-index:60; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }
    .edit-drawer.open{ transform:translateX(0); }
    .edit-drawer-head{ padding:14px 18px; background:var(--wave); color:#fff; border-bottom:none; display:flex; align-items:center; justify-content:space-between; }
    .edit-drawer-body{ flex:1; overflow-y:auto; padding:14px; }
    .edit-drawer-foot{ padding:12px 14px; border-top:1px solid var(--line); background:#fff; display:flex; gap:8px; }
    .edit-tabs{ display:flex; background:#fff; border-bottom:1px solid var(--line); overflow-x:auto; }
    .edit-tab{ flex:1; min-width:90px; padding:12px 8px; font-size:12px; font-weight:700; border-right:1px solid var(--line); cursor:pointer; text-align:center; background:#fff; transition:background .15s; white-space:nowrap; letter-spacing:0.02em; user-select:none; color:var(--ink-soft); }
    .edit-tab:last-child{ border-right:0; }
    .edit-tab:hover{ background:var(--cream-warm); color:var(--ink); }
    .edit-tab.active{ background:var(--wave); color:#fff; }

    .edit-section{ margin-bottom:12px; background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    .edit-section-head{ padding:10px 14px; background:var(--cream-warm); border-bottom:1px solid var(--line); font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-size:14px; user-select:none; color:var(--ink); }
    .edit-section.special .edit-section-head{ background:var(--wave-soft); color:var(--wave-deep); }
    .edit-section-body{ padding:8px 12px; }
    .edit-row{ padding:8px 0; border-bottom:1px dashed var(--line); }

    /* Rich-text success message body — sits on dark wave-blue background */
    .success-rich-body{ line-height:1.6; }
    .success-rich-body p{ margin:0 0 0.7em; }
    .success-rich-body a{ color:#FCEFC9; text-decoration:underline; font-weight:700; }
    .success-rich-body strong,.success-rich-body b{ font-weight:800; }
    .success-rich-body ul,.success-rich-body ol{ margin:0.4em 0 0.7em 1.4em; }
    .success-rich-body ul li{ list-style:disc; }
    .success-rich-body ol li{ list-style:decimal; }
    .success-rich-body h1,.success-rich-body h2,.success-rich-body h3{ font-weight:800; margin:0.6em 0 0.3em; }
    .success-rich-body img{ max-width:100%; height:auto; border-radius:8px; margin:0.4em 0; }

    /* Email preview body inside modal — reset Tailwind reset and approximate email-client rendering */
    .email-preview-body{ font-family:'Plus Jakarta Sans','Noto Sans TC',Arial,sans-serif; color:#222; line-height:1.6; font-size:15px; }
    .email-preview-body p{ margin:0 0 1em; }
    .email-preview-body h1,.email-preview-body h2,.email-preview-body h3{ margin:1em 0 0.5em; font-weight:700; color:#163654; }
    .email-preview-body h1{ font-size:1.6em; }
    .email-preview-body h2{ font-size:1.35em; }
    .email-preview-body h3{ font-size:1.15em; }
    .email-preview-body ul,.email-preview-body ol{ margin:0 0 1em 1.5em; padding-left:1em; }
    .email-preview-body ul li{ list-style:disc; }
    .email-preview-body ol li{ list-style:decimal; }
    .email-preview-body a{ color:#1E6FAB; text-decoration:underline; }
    .email-preview-body img{ max-width:100%; height:auto; border-radius:8px; margin:0.5em 0; }
    .email-preview-body b,.email-preview-body strong{ font-weight:700; }
    .email-preview-body em,.email-preview-body i{ font-style:italic; }
    .edit-row:last-child{ border-bottom:0; }
    .edit-key{ font-family:'Plus Jakarta Sans',monospace; font-size:10px; color:var(--ink-soft); font-weight:700; letter-spacing:0.05em; margin-bottom:4px; text-transform:uppercase; }
    .edit-input{ width:100%; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-size:14px; padding:8px 10px; border:2px solid var(--ink); border-radius:8px; background:#fff; font-weight:500; resize:vertical; box-sizing:border-box; }
    .edit-input:focus{ outline:none; box-shadow:2px 2px 0 var(--nmdc-green); }
    .edit-input.dirty{ background:#FFFAD6; }
    .lang-pill{ display:inline-flex; align-items:center; padding:4px 12px; border:2px solid var(--ink); border-radius:999px; font-weight:700; font-size:12px; cursor:pointer; background:#fff; }
    .lang-pill.active{ background:var(--nmdc-green); color:#fff; }
    .edit-backdrop{ position:fixed; inset:0; background:rgba(10,35,64,0.4); z-index:55; opacity:0; pointer-events:none; transition:opacity .2s; }
    .edit-backdrop.open{ opacity:1; pointer-events:auto; }
    .edit-badge{ position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:50; background:var(--nmdc-green); color:#fff; padding:6px 14px; border:2.5px solid var(--ink); border-radius:999px; box-shadow:3px 3px 0 var(--ink); font-weight:800; font-size:12px; letter-spacing:0.1em; }

    /* Emergency contact block on registration form (red theme) */
    .em-block{ position:relative; padding:22px 22px 26px; border-radius:18px; border:3px solid var(--ink); background:linear-gradient(180deg, #FFE5DE 0%, #FFD6CB 100%); box-shadow:6px 6px 0 var(--ink); margin-top:8px; }
    .em-block::before{ content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:60%; height:6px; background:repeating-linear-gradient(90deg, var(--coral-deep) 0 14px, #ffffff 14px 28px); border-radius:6px 6px 0 0; }
    .em-head{ display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .em-tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; background:var(--coral-deep); color:#fff; border:2.5px solid var(--ink); border-radius:999px; font-size:11px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; box-shadow:2px 2px 0 var(--ink); }
    .em-title{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.6rem; line-height:1.1; color:var(--coral-deep); }
    .em-sub{ font-size:14px; font-weight:600; color:#7a3528; margin-bottom:14px; }
    @media (min-width:768px){ .em-title{ font-size:2rem; } .em-sub{ font-size:15px; } }
    .em-block .field{ background:#fff; }
    .em-block .field:focus{ box-shadow:4px 4px 0 var(--coral-deep); }

    /* Final agreement — risk notice + mandatory checkbox */
    .final-agree{ position:relative; padding:22px 22px 20px; border-radius:18px; border:3px solid var(--coral-deep); background:linear-gradient(180deg, #FFE5DE 0%, #FFCEC0 100%); box-shadow:6px 6px 0 var(--ink); }
    .final-agree::before{ content:""; position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:70%; height:6px; background:repeating-linear-gradient(90deg, var(--coral-deep) 0 14px, var(--sun) 14px 28px); border-radius:6px 6px 0 0; }
    .final-agree-head{ text-align:center; margin-bottom:10px; }
    .final-agree-title{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.5rem; line-height:1.2; color:var(--coral-deep); margin-bottom:10px; text-align:center; }
    @media (min-width:768px){ .final-agree-title{ font-size:1.9rem; } }
    .final-agree-body{ background:#fff; padding:14px 16px; border-radius:12px; border:2px solid var(--ink); font-size:14px; line-height:1.65; color:var(--ink); margin-bottom:14px; font-weight:500; }
    @media (min-width:768px){ .final-agree-body{ font-size:15px; padding:16px 18px; } }
    .final-agree-check{ display:flex; align-items:flex-start; gap:12px; cursor:pointer; padding:14px 16px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; }
    .final-agree-check:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .final-agree-check.checked{ background:var(--nmdc-green); color:#fff; border-color:var(--ink); }
    .final-agree-check.checked .chk{ background:#fff; border-color:var(--ink); }
    .final-agree-check.checked .chk:checked{ background:#fff; }
    .final-agree-check.checked .chk:checked::after{ border-color:var(--nmdc-green); }
    .final-agree-check.err{ animation:shake .5s; border-color:var(--coral-deep); background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }
    @keyframes shake{
      0%, 100% { transform:translateX(0); }
      20%, 60% { transform:translateX(-6px); }
      40%, 80% { transform:translateX(6px); }
    }

    /* Flash attention on the first error after submit */
    @keyframes flash-attn{
      0%   { box-shadow:0 0 0 0 rgba(232,85,51,0.7), 4px 4px 0 var(--coral); }
      40%  { box-shadow:0 0 0 14px rgba(232,85,51,0), 6px 6px 0 var(--coral-deep); }
      100% { box-shadow:0 0 0 0 rgba(232,85,51,0), 4px 4px 0 var(--coral); }
    }
    .flash-error{ animation:flash-attn 1.1s cubic-bezier(.4,0,.6,1) 2, shake .5s; }

    /* Bigger error text with bounce */
    .field-error-msg{
      margin-top:6px; padding:8px 12px;
      background:#FFE5DE; border:2px solid var(--coral-deep); border-radius:8px;
      font-size:15px; font-weight:800; color:var(--coral-deep);
      display:flex; align-items:center; gap:6px;
      animation:err-pop .35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes err-pop{
      0%   { opacity:0; transform:translateY(-4px) scale(0.92); }
      60%  { opacity:1; transform:translateY(0) scale(1.04); }
      100% { opacity:1; transform:scale(1); }
    }

    /* Form sections — basic & diet */
    .form-section{ position:relative; padding:22px 22px 26px; border-radius:18px; border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink); }
    .form-section.basic{ background:linear-gradient(180deg, #FFF6DC 0%, #FFEEC0 100%); }
    .form-section.diet{ background:linear-gradient(180deg, #DCF6E5 0%, #C0EAD0 100%); }
    .form-section-head{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .form-section-tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border:2.5px solid var(--ink); border-radius:999px; font-size:11px; font-weight:900; letter-spacing:0.12em; text-transform:uppercase; box-shadow:2px 2px 0 var(--ink); }
    .form-section.basic .form-section-tag{ background:var(--sun-deep); color:#fff; }
    .form-section.diet .form-section-tag{ background:var(--nmdc-green-dark); color:#fff; }
    .form-section-title{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.6rem; line-height:1.1; color:var(--ink); }
    .form-section.diet .form-section-title{ color:var(--nmdc-green-dark); }
    .form-section-sub{ font-size:14px; font-weight:600; color:var(--ink-soft); margin-bottom:14px; }
    @media (min-width:768px){
      .form-section-title{ font-size:2rem; }
      .form-section-sub{ font-size:15px; }
    }

    /* Diet radio options */
    .diet-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .diet-opt{ display:flex; align-items:center; gap:10px; padding:14px 16px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; font-weight:700; }
    .diet-opt:hover{ background:var(--cream-warm); transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .diet-opt input{ accent-color:var(--nmdc-green-dark); width:20px; height:20px; flex-shrink:0; }
    .diet-opt.active{ background:var(--nmdc-green); color:#fff; }
    .diet-opt.active input{ accent-color:#fff; }
    .diet-other-input{ margin-top:10px; width:100%; padding:12px 14px; border:2.5px solid var(--ink); border-radius:10px; font-size:15px; font-family:inherit; font-weight:500; background:#fff; box-shadow:3px 3px 0 var(--ink); }
    .diet-other-input:focus{ outline:none; box-shadow:4px 4px 0 var(--nmdc-green-dark); }
    @media (max-width:520px){ .diet-grid{ grid-template-columns:1fr; } }

    /* Yes/No toggle */
    .yn-group{ display:flex; gap:10px; flex-wrap:wrap; }
    .yn-group.err{ padding:8px; border:2.5px solid var(--coral-deep); border-radius:14px; background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }
    .yn-btn{ flex:1; min-width:100px; padding:14px 18px; background:#fff; border:2.5px solid var(--ink); border-radius:12px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:3px 3px 0 var(--ink); transition:all .12s ease; font-family:inherit; }

    /* Stackable option picker (used for NMDC transport choice) */
    .opt-pick{
      display:block; width:100%; text-align:left;
      padding:13px 16px;
      background:white; color:var(--ink);
      border:2.5px solid var(--ink); border-radius:12px;
      font-weight:700; font-size:15px;
      cursor:pointer; transition:all .15s ease;
      font-family:inherit;
    }
    .opt-pick:hover{ background:var(--cream-warm); }
    .opt-pick.active{
      background:var(--wave); color:white;
      border-color:var(--wave-deep);
      box-shadow:3px 3px 0 var(--wave-deep);
    }
    .opt-pick-sub{
      font-size:11px; font-weight:600;
      opacity:0.85; margin-top:4px;
      letter-spacing:0.02em;
    }
    .yn-btn:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--ink); }
    .yn-btn.active.yes{ background:var(--nmdc-green); color:#fff; }
    .yn-btn.active.no{ background:var(--ink-soft); color:#fff; }

    .diet-grid.err{ padding:8px; border:2.5px solid var(--coral-deep); border-radius:14px; background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }

    .agree-row{ display:flex; align-items:flex-start; gap:12px; cursor:pointer; padding-top:12px; padding:16px; border-radius:12px; background:rgba(255,203,71,0.4); border:2px solid var(--ink); }
    .agree-row.err{ border:2.5px solid var(--coral-deep); background:#FFF0EC; box-shadow:4px 4px 0 var(--coral); }

    /* Companion sub-card */
    .companion-card{ background:#FFFEF5; border:2.5px dashed var(--ink); border-radius:14px; padding:14px 16px; margin-top:12px; }
    .companion-card-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.1rem; }
    .companion-card-num{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; background:var(--sun-deep); color:#fff; border:2px solid var(--ink); border-radius:999px; font-weight:800; font-size:13px; }
    .companion-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:520px){ .companion-grid{ grid-template-columns:1fr; } }

    .same-diet-row{ margin-top:14px; padding:12px 14px; background:rgba(255,255,255,0.6); border:2px solid var(--ink); border-radius:10px; display:flex; align-items:center; gap:10px; cursor:pointer; }
    .same-diet-row:hover{ background:#fff; }

    /* Per-companion diet rows shown when "same as me" is unchecked */
    .companion-diet-list{ margin-top:14px; display:flex; flex-direction:column; gap:12px; }
    .companion-diet-row{ background:rgba(255,255,255,0.7); border:2px dashed var(--ink); border-radius:12px; padding:14px; }
    .companion-diet-row .diet-opt{ padding:10px 12px; box-shadow:2px 2px 0 var(--ink); }
    .companion-diet-row .diet-opt:hover{ box-shadow:3px 3px 0 var(--ink); }
    .companion-diet-name{ display:flex; align-items:center; gap:8px; margin-bottom:10px; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.1rem; color:var(--nmdc-green-dark); }
    .companion-diet-name .companion-card-num{ background:var(--nmdc-green); }

    /* Reorder UI */
    .reorder-item{
      display:flex; align-items:center; gap:8px;
      padding:8px 10px; background:#fff;
      border:2px solid var(--ink); border-radius:8px;
      margin-bottom:6px; font-weight:700;
    }
    .reorder-handle{ color:var(--ink-soft); font-size:14px; }
    .reorder-btns{ display:flex; gap:4px; margin-left:auto; }
    .reorder-btn{
      padding:3px 8px; border:1.5px solid var(--ink);
      border-radius:6px; background:#fff; cursor:pointer;
      font-size:13px; font-weight:800;
    }
    .reorder-btn:hover{ background:var(--sun); }
    .reorder-btn:disabled{ opacity:0.3; cursor:not-allowed; }

    /* Toggle switch */
    .toggle{
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 14px; background:#fff;
      border:2px solid var(--ink); border-radius:12px;
      cursor:pointer; font-weight:700; font-size:14px;
      width:100%;
    }
    .toggle:hover{ background:var(--cream-warm); }
    .toggle-sw{
      width:42px; height:24px; background:#ccc;
      border:2px solid var(--ink); border-radius:999px;
      position:relative; flex-shrink:0;
      transition:background .2s;
    }
    .toggle-sw::after{
      content:""; position:absolute;
      left:2px; top:1px; width:16px; height:16px;
      background:#fff; border:1.5px solid var(--ink);
      border-radius:50%; transition:left .2s;
    }
    .toggle.on .toggle-sw{ background:var(--nmdc-green); }
    .toggle.on .toggle-sw::after{ left:20px; }

    /* Rich editor */
    .rich-toolbar{ display:flex; gap:4px; padding:6px; background:var(--cream-warm); border:2px solid var(--ink); border-bottom:0; border-radius:8px 8px 0 0; flex-wrap:wrap; align-items:center; }
    .rich-btn{ padding:6px 10px; border:1.5px solid var(--ink); border-radius:6px; background:#fff; font-weight:800; font-size:12px; cursor:pointer; min-width:32px; font-family:'Plus Jakarta Sans',sans-serif; }
    .rich-btn:hover{ background:var(--sun); }
    .rich-btn:active{ transform:translateY(1px); }
    .rich-select{ padding:6px 8px; border:1.5px solid var(--ink); border-radius:6px; background:#fff; font-weight:700; font-size:12px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; max-width:110px; }
    .rich-select:hover{ background:var(--sun); }
    .rich-palette{ position:absolute; top:100%; left:0; margin-top:4px; z-index:5; background:#fff; border:2px solid var(--ink); border-radius:8px; padding:6px; box-shadow:3px 3px 0 var(--ink); display:grid; grid-template-columns:repeat(5, 22px); gap:4px; width:146px; }
    .rich-swatch{ width:22px; height:22px; border:1.5px solid var(--ink); border-radius:4px; cursor:pointer; padding:0; }
    .rich-swatch:hover{ transform:scale(1.15); }

    /* === Schedule editor (admin) === */
    .sched-edit-card{ background:#fff; border:2px solid var(--ink); border-radius:12px; padding:10px; margin-bottom:8px; position:relative; box-shadow:3px 3px 0 var(--ink); }
    .sched-edit-card:hover{ background:#FFFBEB; }
    .sched-edit-head{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .sched-edit-num{ display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; background:var(--nmdc-green); color:#fff; border:2px solid var(--ink); border-radius:999px; font-weight:800; font-size:11px; flex-shrink:0; }
    .sched-edit-actions{ margin-left:auto; display:flex; gap:3px; }
    .sched-edit-act{ width:26px; height:26px; border:1.5px solid var(--ink); border-radius:6px; background:#fff; font-weight:800; font-size:11px; cursor:pointer; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .sched-edit-act:hover{ background:var(--sun); }
    .sched-edit-act:disabled{ opacity:0.3; cursor:not-allowed; }
    .sched-edit-act.danger{ background:#FFE5DE; }
    .sched-edit-act.danger:hover{ background:var(--coral); color:#fff; }
    .sched-edit-body{ display:grid; grid-template-columns:90px 1fr; gap:6px; }
    .sched-edit-time{ background:#F0F7FF; border:1.5px solid var(--ink); border-radius:6px; padding:6px 8px; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:14px; text-align:center; outline:none; font-weight:600; }
    .sched-edit-time:focus{ background:#fff; box-shadow:2px 2px 0 var(--sky-deep); }
    .sched-edit-text{ border:1.5px solid var(--ink); border-radius:6px; padding:6px 8px; font-size:13px; outline:none; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:500; }
    .sched-edit-text:focus{ box-shadow:2px 2px 0 var(--nmdc-green); }
    .sched-add-btn{ width:100%; padding:12px; background:var(--cream-warm); border:2px dashed var(--ink); border-radius:12px; font-weight:800; font-size:13px; cursor:pointer; color:var(--ink); transition:all .15s; font-family:'Plus Jakarta Sans',sans-serif; }
    .sched-add-btn:hover{ background:var(--sun); border-style:solid; transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }

    /* === Language Picker Modal === */
    .lang-picker-backdrop{ position:fixed; inset:0; background:rgba(10,35,64,0.65); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fade-in .35s ease; }
    @keyframes fade-in{ from{opacity:0;} to{opacity:1;} }
    .lang-picker-card{ background:var(--cream); border:4px solid var(--ink); border-radius:28px; box-shadow:12px 12px 0 var(--ink); padding:32px 28px 28px; max-width:560px; width:100%; position:relative; animation:pop-in .5s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop-in{ 0%{opacity:0; transform:scale(.85) translateY(20px);} 100%{opacity:1; transform:none;} }
    .lang-picker-close{ position:absolute; top:12px; right:12px; width:36px; height:36px; background:#fff; border:2.5px solid var(--ink); border-radius:999px; font-weight:800; cursor:pointer; box-shadow:2px 2px 0 var(--ink); }
    .lang-picker-close:hover{ background:var(--sun); transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }
    .lang-picker-title{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:2.4rem; line-height:1.1; text-align:center; margin-bottom:6px; }
    .lang-picker-sub{ text-align:center; font-size:14px; color:var(--ink-soft); font-weight:600; margin-bottom:24px; letter-spacing:0.02em; }
    .lang-picker-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .lang-picker-btn{ background:#fff; border:3px solid var(--ink); border-radius:20px; padding:22px 16px; cursor:pointer; font-family:inherit; text-align:center; box-shadow:5px 5px 0 var(--ink); transition:all .15s cubic-bezier(.34,1.56,.64,1); display:flex; flex-direction:column; align-items:center; gap:8px; }
    .lang-picker-btn:hover{ transform:translate(-3px,-3px); box-shadow:8px 8px 0 var(--ink); }
    .lang-picker-btn:active{ transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink); }
    .lang-picker-btn.zh:hover{ background:var(--sun); }
    .lang-picker-btn.en:hover{ background:var(--sky); }
    .lang-picker-flag{ font-size:48px; line-height:1; height:48px; display:flex; align-items:center; justify-content:center; }
    .lang-picker-flag svg{ height:40px; width:auto; }
    /* Flag (rectangular) — bordered + boxed */
    .lang-picker-btn.zh .lang-picker-flag svg{ border:1.5px solid var(--ink); border-radius:4px; box-shadow:2px 2px 0 var(--ink); }
    .lang-picker-name{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.6rem; line-height:1; }
    .lang-picker-tag{ font-size:12px; font-weight:700; color:var(--ink-soft); letter-spacing:0.1em; text-transform:uppercase; }
    .lang-picker-emojis{ text-align:center; font-size:28px; margin-bottom:8px; letter-spacing:8px; }
    .lang-picker-slogan{ position:relative; margin:18px auto 22px; padding:18px 26px; max-width:460px; background:linear-gradient(135deg, rgba(0,176,80,0.10) 0%, rgba(109,200,232,0.12) 100%); border:2.5px dashed var(--nmdc-green-dark); border-radius:14px; }
    .lang-picker-slogan::before{ content:"❝"; position:absolute; top:-22px; left:-8px; font-family:Georgia,serif; font-size:36px; color:var(--nmdc-green-dark); line-height:1; background:var(--cream); padding:0 6px; border-radius:50%; }
    .lang-picker-slogan::after{ content:"❞"; position:absolute; bottom:-32px; right:-8px; font-family:Georgia,serif; font-size:36px; color:var(--nmdc-green-dark); line-height:1; background:var(--cream); padding:0 6px; border-radius:50%; }
    .slogan-zh{ font-family:'Noto Sans TC',serif; font-weight:700; font-size:1.15rem; line-height:1.5; color:var(--ink); text-align:center; letter-spacing:0.04em; }
    .slogan-en{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:0.95rem; color:var(--nmdc-green-dark); text-align:center; margin-top:8px; letter-spacing:0.01em; line-height:1.3; }
    @media (max-width:480px){
      .lang-picker-slogan{ padding:14px 14px; margin:14px auto 20px; }
      .slogan-zh{ font-size:1rem; }
      .slogan-en{ font-size:0.85rem; }
    }
    @media (max-width:480px){
      .lang-picker-title{ font-size:1.9rem; }
      .lang-picker-card{ padding:26px 20px 22px; }
      .lang-picker-grid{ gap:10px; }
      .lang-picker-btn{ padding:18px 10px; }
      .lang-picker-flag{ font-size:38px; height:38px; }
      .lang-picker-flag svg{ height:32px; }
      .lang-picker-name{ font-size:1.3rem; }
    }
    .rich-editor{ border:2px solid var(--ink); border-top:0; border-radius:0 0 8px 8px; padding:14px; min-height:240px; font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-size:14px; background:#fff; outline:none; line-height:1.6; overflow-y:auto; max-height:500px; }
    .rich-editor:focus{ box-shadow:0 0 0 2px var(--nmdc-green); }
    .rich-editor.dirty{ background:#FFFAD6; }
    .rich-editor p{ margin:0 0 0.8em; }
    .rich-editor ul,.rich-editor ol{ margin:0 0 0.8em; padding-left:1.5em; }
    .rich-editor li{ margin:0 0 0.3em; }
    .rich-editor strong{ font-weight:700; }
    .rich-editor em{ font-style:italic; }
    .rich-editor a{ color:var(--nmdc-green-dark); text-decoration:underline; }
    .rich-editor h1,.rich-editor h2,.rich-editor h3{ font-weight:700; margin:0.6em 0 0.3em; }
    .rich-editor h2{ font-size:1.2em; }
    .rich-editor h3{ font-size:1.1em; }

    .token-chip{ display:inline-flex; align-items:center; padding:3px 8px; background:var(--sun); border:1.5px solid var(--ink); border-radius:999px; font-size:11px; font-weight:700; font-family:'Plus Jakarta Sans',monospace; cursor:pointer; margin:2px; }
    .token-chip:hover{ background:var(--sun-deep); }

    .reg-table{ width:100%; border-collapse:separate; border-spacing:0; font-size:13px; background:#fff; border:2px solid var(--ink); border-radius:10px; overflow:hidden; }
    .reg-table th,.reg-table td{ padding:10px 8px; border-bottom:1.5px dashed var(--sand-deep); text-align:left; vertical-align:top; }
    .reg-table tr:last-child td{ border-bottom:0; }
    .reg-table th{ background:var(--sun); font-weight:800; position:sticky; top:0; border-bottom:2px solid var(--ink); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; }
    .reg-table tr:hover td{ background:#FFFBEB; }
    .reg-lang-badge{ display:inline-block; padding:2px 8px; border:1.5px solid var(--ink); border-radius:999px; font-size:10px; font-weight:800; letter-spacing:0.05em; }
    .reg-lang-badge.zh{ background:#FFE5DE; color:#B53A1F; }
    .reg-lang-badge.en{ background:#D9EFFA; color:#1F6691; }
    .reg-serial{ font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif; font-weight:800; font-size:1.1em; color:var(--nmdc-green-dark); }
    .reg-small{ color:var(--ink-soft); font-size:11px; }

    .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:80; padding:12px 20px; border:2.5px solid var(--ink); border-radius:999px; box-shadow:4px 4px 0 var(--ink); font-weight:700; background:var(--nmdc-green); color:#fff; animation:bounce-in .5s cubic-bezier(.34,1.56,.64,1); max-width:90vw; text-align:center; }
    .toast.err{ background:var(--coral); }

    /* Floating beach doodles */
    .beach-doodle{ position:absolute; pointer-events:none; z-index:1; }

    @media (max-width:768px){
      input,select,textarea{ font-size:16px !important; }
      .edit-drawer{ max-width:100%; }
      body{ font-size:16px; }
    }

    @media (pointer:fine){
      ::-webkit-scrollbar{ width:14px; }
      ::-webkit-scrollbar-track{ background:var(--cream); }
      ::-webkit-scrollbar-thumb{ background:var(--nmdc-green); border:3px solid var(--cream); border-radius:999px; }
    }

    /* ============================================================
       Initial loader — beach-themed full-screen overlay
       Fades out only when ALL data has arrived + React has painted.
       ============================================================ */
    .loader-screen{
      position:fixed; inset:0; z-index:9999;
      /* Sky gradient: cream top → sand → soft blue → wave bottom */
      background:
        linear-gradient(180deg,
          #FBF7EE 0%,
          #FCEFC9 25%,
          #E6EFF7 65%,
          #C6DCEC 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:18px;
      opacity:1; pointer-events:auto;
      transition:opacity .85s ease;
      font-family:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif;
      padding:24px;
      overflow:hidden;
    }
    .loader-screen.is-hidden{ opacity:0; pointer-events:none; }

    /* ---- Rotating sun rays (behind logo) ---- */
    .loader-rays{
      position:absolute; top:50%; left:50%;
      width:540px; height:540px;
      transform:translate(-50%, -50%);
      background:repeating-conic-gradient(
        from 0deg,
        rgba(245,194,74,0.22) 0deg 4deg,
        transparent 4deg 22deg
      );
      border-radius:50%;
      -webkit-mask:radial-gradient(circle, transparent 27%, black 28%, black 90%, transparent 100%);
      mask:radial-gradient(circle, transparent 27%, black 28%, black 90%, transparent 100%);
      animation:loader-rays-rotate 50s linear infinite;
      pointer-events:none;
      z-index:0;
    }
    @keyframes loader-rays-rotate{
      to{ transform:translate(-50%, -50%) rotate(360deg); }
    }

    /* ---- Floating beach doodles ---- */
    .loader-doodles{
      position:absolute; inset:0;
      pointer-events:none;
      z-index:1;
    }
    .loader-doodles .dood{
      position:absolute;
      font-size:34px;
      opacity:0.5;
      animation:loader-dood-float 4s ease-in-out infinite;
      user-select:none;
    }
    .loader-doodles .d1{ top:12%; left:10%;  animation-delay:0s;   }
    .loader-doodles .d2{ top:18%; right:12%; animation-delay:0.6s; font-size:38px; }
    .loader-doodles .d3{ top:62%; left:6%;   animation-delay:1.2s; font-size:30px; opacity:0.4; }
    .loader-doodles .d4{ top:58%; right:8%;  animation-delay:0.4s; font-size:32px; opacity:0.4; }
    .loader-doodles .d5{ top:5%;  left:48%;  animation-delay:1.6s; font-size:28px; opacity:0.35; }
    .loader-doodles .d6{ top:78%; left:38%;  animation-delay:0.8s; font-size:30px; opacity:0.4; }
    @keyframes loader-dood-float{
      0%,100%{ transform:translateY(0) rotate(-3deg); }
      50%    { transform:translateY(-14px) rotate(5deg); }
    }

    /* ---- Animated waves at the bottom ---- */
    .loader-bottom-wave{
      position:absolute; bottom:0; left:0; right:0;
      width:100%; height:130px;
      pointer-events:none;
      z-index:1;
    }
    .loader-bottom-wave .lw{ fill:var(--wave); }
    .loader-bottom-wave .lw1{
      opacity:0.18;
      animation:loader-wave-flow1 7s ease-in-out infinite;
    }
    .loader-bottom-wave .lw2{
      opacity:0.32;
      animation:loader-wave-flow2 5s ease-in-out infinite;
    }
    .loader-bottom-wave .lw3{
      opacity:0.5;
      fill:var(--wave-deep);
      animation:loader-wave-flow3 6s ease-in-out infinite;
    }
    @keyframes loader-wave-flow1{
      0%,100%{ transform:translateX(0) scaleY(1); }
      50%    { transform:translateX(-40px) scaleY(0.92); }
    }
    @keyframes loader-wave-flow2{
      0%,100%{ transform:translateX(0) scaleY(1); }
      50%    { transform:translateX(35px) scaleY(1.08); }
    }
    @keyframes loader-wave-flow3{
      0%,100%{ transform:translateX(0) scaleY(1); }
      50%    { transform:translateX(-25px) scaleY(0.95); }
    }

    /* ---- Center stage (logo + bar) ---- */
    .loader-stage{
      position:relative;
      display:flex; flex-direction:column;
      align-items:center; gap:22px;
      width:100%; max-width:280px;
      z-index:5;
    }

    /* NMDC logo with subtle drop shadow + breathing */
    .loader-logo{
      width:100%; height:auto;
      max-width:240px;
      display:block;
      filter:drop-shadow(0 8px 16px rgba(22,54,84,0.18));
      animation:loader-logo-breathe 2.4s ease-in-out infinite;
    }
    @keyframes loader-logo-breathe{
      0%,100%{ opacity:0.95; transform:scale(1)     translateY(0); }
      50%    { opacity:1;    transform:scale(1.03)  translateY(-3px); }
    }

    /* Ocean-blue progress bar with shimmer */
    .loader-bar{
      width:200px; height:5px;
      background:rgba(22,54,84,0.12);
      border-radius:999px; overflow:hidden;
      position:relative;
      box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);
    }
    .loader-bar span{
      position:absolute; top:0; left:0;
      height:100%; width:45%;
      background:linear-gradient(90deg,
        transparent 0%,
        var(--wave) 25%,
        #4FA3D9 50%,
        var(--wave-deep) 75%,
        transparent 100%);
      border-radius:999px;
      animation:loader-bar-slide 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loader-bar-slide{
      0%   { left:-45%; }
      100% { left:100%; }
    }

    /* ---- Text labels ---- */
    .loader-text{
      font-weight:800;
      font-size:14px;
      letter-spacing:0.18em;
      color:var(--wave-deep);
      text-transform:uppercase;
      display:flex; align-items:center; gap:8px;
      margin-top:6px;
      z-index:5;
      text-shadow:0 1px 2px rgba(255,255,255,0.6);
    }
    .loader-text::after{
      content:"";
      display:inline-block;
      width:6px; height:6px;
      border-radius:50%;
      background:var(--wave);
      animation:loader-dot-blink 1.2s ease-in-out infinite;
    }
    @keyframes loader-dot-blink{
      0%,100%{ opacity:0.2; transform:scale(0.7); }
      50%    { opacity:1;   transform:scale(1); }
    }

    .loader-sub{
      font-size:13px;
      font-weight:700;
      color:var(--ink);
      letter-spacing:0.04em;
      z-index:5;
      text-shadow:0 1px 2px rgba(255,255,255,0.6);
    }

    /* ---- Respect reduced-motion preference ---- */
    @media (prefers-reduced-motion: reduce){
      .loader-logo{ animation:none; }
      .loader-bar span{ animation:none; left:30%; }
      .loader-text::after{ animation:none; }
      .loader-rays{ animation:none; }
      .loader-doodles .dood{ animation:none; }
      .loader-bottom-wave .lw{ animation:none; }
    }
  </style>
</head>

    const SCHEDULE_LEGACY_MAX = 20;

    // Parse schedule items for a given lang. Priority:
    // 1. JSON array in `${lang}.schedule.items`
    // 2. Legacy schedule.N.time / schedule.N.text keys (up to SCHEDULE_LEGACY_MAX)
    function parseScheduleItems(lang, edits, serverContent){
      const key = `${lang}.schedule.items`;
      const raw = edits[key] !== undefined ? edits[key] : serverContent[key];
      if(raw){
        try{
          const arr = JSON.parse(raw);
          if(Array.isArray(arr)){
            return arr.map(x => ({ time: String(x.time || ""), text: String(x.text || "") }));
          }
        } catch(_){}
      }
      // Legacy fallback
      const items = [];
      for(let i = 0; i < SCHEDULE_LEGACY_MAX; i++){
        const tKey = `${lang}.schedule.${i}.time`;
        const xKey = `${lang}.schedule.${i}.text`;
        const time = edits[tKey] !== undefined ? edits[tKey]
          : (serverContent[tKey] !== undefined ? serverContent[tKey] : (DEFAULTS[lang] && DEFAULTS[lang][`schedule.${i}.time`]) || "");
        const text = edits[xKey] !== undefined ? edits[xKey]
          : (serverContent[xKey] !== undefined ? serverContent[xKey] : (DEFAULTS[lang] && DEFAULTS[lang][`schedule.${i}.text`]) || "");
        if(time || text){ items.push({ time, text }); }
      }
      return items;
    }

    function xhrGet(url){
      return new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        x.open("GET", url, true);
        x.onload = () => {
          if(x.status >= 200 && x.status < 300){
            try{ res(JSON.parse(x.responseText)); } catch(e){ rej(e); }
          } else rej(new Error("HTTP " + x.status));
        };
        x.onerror = () => rej(new Error("Network"));
        x.ontimeout = () => rej(new Error("Timeout"));
        x.timeout = 20000;
        x.send();
      });
    }
    function xhrPost(url, data, timeout){
      timeout = timeout || 25000;
      return new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        x.open("POST", url, true);
        x.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
        x.onload = () => {
          if(x.status >= 200 && x.status < 300){
            try{ res(JSON.parse(x.responseText)); } catch(e){ rej(e); }
          } else rej(new Error("HTTP " + x.status));
        };
        x.onerror = () => rej(new Error("Network"));
        x.ontimeout = () => rej(new Error("Timeout"));
        x.timeout = timeout;
        x.send(JSON.stringify(data));
      });
    }

    function RichEditor({ value, onChange, dirty, tokens }){
      const tokenList = tokens || EMAIL_TOKENS;
      const ref = useRef(null);
      const imgFileRef = useRef(null);
      const [showColorPalette, setShowColorPalette] = useState(false);
      const [imgError, setImgError] = useState("");
      useEffect(() => {
        if(!ref.current) return;
        if(document.activeElement === ref.current) return;
        if(ref.current.innerHTML !== value) ref.current.innerHTML = value || "";
      }, [value]);

      const exec = (cmd, arg) => {
        ref.current && ref.current.focus();
        document.execCommand(cmd, false, arg);
        if(ref.current) onChange(ref.current.innerHTML);
      };
      const insertToken = (tok) => {
        ref.current && ref.current.focus();
        document.execCommand("insertText", false, tok);
        if(ref.current) onChange(ref.current.innerHTML);
      };
      const insertHtml = (html) => {
        ref.current && ref.current.focus();
        document.execCommand("insertHTML", false, html);
        if(ref.current) onChange(ref.current.innerHTML);
      };
      const applyColor = (c) => {
        setShowColorPalette(false);
        exec("foreColor", c);
      };
      const applyFont = (f) => {
        if(!f) return;
        exec("fontName", f);
      };
      const applySize = (s) => {
        if(!s) return;
        exec("fontSize", s);
      };

      function onPickImage(e){
        setImgError("");
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        if(!/^image\//.test(file.type)){ setImgError("請選擇圖片"); return; }

        const MAX_KB = 120;       // per-image cap inside email body
        const MAX_DIM = 800;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            try{
              let w = img.width, h = img.height;
              if(w > MAX_DIM || h > MAX_DIM){
                const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                w = Math.round(w * ratio); h = Math.round(h * ratio);
              }
              const canvas = document.createElement("canvas");
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, w, h);
              let dataUrl = canvas.toDataURL("image/jpeg", 0.85);
              if(dataUrl.length / 1024 > MAX_KB){
                let q = 0.75;
                while(q >= 0.4){
                  dataUrl = canvas.toDataURL("image/jpeg", q);
                  if(dataUrl.length / 1024 <= MAX_KB) break;
                  q -= 0.1;
                }
                if(dataUrl.length / 1024 > MAX_KB){
                  setImgError(`圖片壓縮後仍 > ${MAX_KB}KB，請選簡單一點的圖`);
                  return;
                }
              }
              insertHtml(`<p><img src="${dataUrl}" alt="" style="max-width:100%; height:auto; border-radius:8px;" /></p>`);
              if(imgFileRef.current) imgFileRef.current.value = "";
            } catch(err){ setImgError("處理圖片失敗"); }
          };
          img.onerror = () => setImgError("無法讀取圖片");
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }

      return (
        <div>
          <div className="rich-toolbar">
            {/* Font family */}
            <select className="rich-select" title="字體 Font family" defaultValue="" onChange={e => { applyFont(e.target.value); e.target.value = ""; }}>
              <option value="">🔤 字體</option>
              {RICH_FONTS.map(f => <option key={f.label} value={f.val} style={{fontFamily:f.val || 'inherit'}}>{f.label}</option>)}
            </select>
            {/* Font size */}
            <select className="rich-select" title="字級 Size" defaultValue="" onChange={e => { applySize(e.target.value); e.target.value = ""; }}>
              <option value="">📏 字級</option>
              {RICH_SIZES.map(s => <option key={s.val} value={s.val}>{s.label}</option>)}
            </select>
            <button type="button" className="rich-btn" onClick={() => exec("bold")}><b>B</b></button>
            <button type="button" className="rich-btn" onClick={() => exec("italic")}><i>I</i></button>
            <button type="button" className="rich-btn" onClick={() => exec("underline")}><u>U</u></button>
            {/* Color picker */}
            <div style={{position:"relative"}}>
              <button type="button" className="rich-btn" onClick={() => setShowColorPalette(v => !v)} title="文字顏色 Color">🎨</button>
              {showColorPalette && (
                <div className="rich-palette" onMouseLeave={() => setShowColorPalette(false)}>
                  {RICH_COLORS.map(c => (
                    <button key={c} type="button" className="rich-swatch" style={{background:c}} onClick={() => applyColor(c)} title={c}/>
                  ))}
                  <button type="button" className="rich-btn" style={{width:"100%", marginTop:4}} onClick={() => { setShowColorPalette(false); exec("removeFormat"); }}>✕ 清除</button>
                </div>
              )}
            </div>
            <button type="button" className="rich-btn" onClick={() => exec("insertUnorderedList")}>•</button>
            <button type="button" className="rich-btn" onClick={() => exec("insertOrderedList")}>1.</button>
            <button type="button" className="rich-btn" onClick={() => { const url = window.prompt("Link URL:"); if(url) exec("createLink", url); }}>🔗</button>
            <button type="button" className="rich-btn" onClick={() => exec("unlink")}>⌀</button>
            <button type="button" className="rich-btn" onClick={() => exec("formatBlock", "<h2>")}>H2</button>
            <button type="button" className="rich-btn" onClick={() => exec("formatBlock", "<p>")}>¶</button>
            <button type="button" className="rich-btn" onClick={() => imgFileRef.current && imgFileRef.current.click()} title="插入圖片 Insert image">🖼️</button>
            <button type="button" className="rich-btn" onClick={() => exec("removeFormat")} title="清除格式">✕Fmt</button>
            <input ref={imgFileRef} type="file" accept="image/*" onChange={onPickImage} className="hidden"/>
          </div>
          <div
            ref={ref}
            contentEditable
            suppressContentEditableWarning
            className={"rich-editor " + (dirty ? "dirty" : "")}
            onInput={() => ref.current && onChange(ref.current.innerHTML)}
            onBlur={() => ref.current && onChange(ref.current.innerHTML)}
          />
          {imgError && (
            <div className="mt-2 p-2 rounded bg-[color:#FDF3F1] border border-[#E5685A] text-xs text-[#D04A3C] font-bold">❗ {imgError}</div>
          )}
          <div className="mt-2 text-xs text-[color:var(--ink-soft)]">
            <div className="font-bold mb-1">🏷️ 可插入的標籤 / Placeholders：</div>
            <div>{tokenList.map(t => <span key={t.key} className="token-chip" onClick={() => insertToken(t.key)} title={t.label}>{t.key}</span>)}</div>
          </div>
        </div>
      );
    }

        setEdits(prev => {

    // ScheduleEditor — dynamic add/remove/reorder for schedule items
    function ScheduleEditor({ lang, edits, setEdits, serverContent }){
      const itemsKey = `${lang}.schedule.items`;
      const items = parseScheduleItems(lang, edits, serverContent);
      const isDirty = edits[itemsKey] !== undefined;

      function saveItems(newItems){
        // Strip fully empty items at the end (keep middle empties in case user is typing)
        while(newItems.length > 0 && !newItems[newItems.length-1].time && !newItems[newItems.length-1].text){
          newItems.pop();
        }
        setEdits(prev => ({ ...prev, [itemsKey]: JSON.stringify(newItems) }));
      }
      function updateItem(idx, field, val){
        const next = [...items];
        if(!next[idx]) next[idx] = { time:"", text:"" };
        next[idx] = { ...next[idx], [field]: val };
        // Don't trim here — user might still be typing
        setEdits(prev => ({ ...prev, [itemsKey]: JSON.stringify(next) }));
      }
      function addItem(){
        // Guess next time based on last entry
        let nextTime = "09:00";
        if(items.length > 0){
          const lastTime = items[items.length-1].time;
          const m = lastTime && lastTime.match(/^(\d{1,2}):(\d{2})$/);
          if(m){
            const h = parseInt(m[1], 10);
            const mm = parseInt(m[2], 10);
            const totalMin = Math.min(23*60 + 59, h*60 + mm + 30);  // +30 min
            nextTime = String(Math.floor(totalMin/60)).padStart(2,"0") + ":" + String(totalMin%60).padStart(2,"0");
          }
        }
        saveItems([...items, { time: nextTime, text: "" }]);
      }
      function removeItem(idx){
        if(!window.confirm(`確定刪除 #${idx+1} 「${items[idx].time} ${items[idx].text || ""}」？`)) return;
        const next = items.filter((_, i) => i !== idx);
        saveItems(next);
      }
      function moveItem(idx, dir){
        const target = idx + dir;
        if(target < 0 || target >= items.length) return;
        const next = [...items];
        [next[idx], next[target]] = [next[target], next[idx]];
        saveItems(next);
      }
      function resetItems(){
        setEdits(prev => { const n = { ...prev }; delete n[itemsKey]; return n; });
      }

      return (
        <div className="edit-row">
          <div className="flex items-center justify-between mb-2">
            <div className="edit-key">📋 流程項目 / schedule items ({items.length}) {isDirty && <span className="text-[color:var(--coral-deep)] ml-1">● 有變更</span>}</div>
            {isDirty && <button onClick={resetItems} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ reset</button>}
          </div>
          <div className="text-[11px] text-[color:var(--ink-soft)] mb-3 leading-relaxed">
            💡 可自由新增、刪除、調整順序。中文 / English 各自獨立一份 — 切換語言會看到不同內容。
          </div>

          {items.length === 0 && (
            <div className="text-center text-[color:var(--ink-soft)] text-xs font-medium py-4">
              — 還沒有任何流程項目 —
            </div>
          )}

          {items.map((item, i) => (
            <div key={i} className="sched-edit-card">
              <div className="sched-edit-head">
                <span className="sched-edit-num">{i+1}</span>
                <span className="text-xs font-bold text-[color:var(--ink-soft)] uppercase tracking-wider">Step {i+1}</span>
                <div className="sched-edit-actions">
                  <button type="button" className="sched-edit-act" onClick={() => moveItem(i, -1)} disabled={i === 0} title="上移">▲</button>
                  <button type="button" className="sched-edit-act" onClick={() => moveItem(i, 1)} disabled={i === items.length - 1} title="下移">▼</button>
                  <button type="button" className="sched-edit-act danger" onClick={() => removeItem(i)} title="刪除">🗑️</button>
                </div>
              </div>
              <div className="sched-edit-body">
                <input type="text" value={item.time} onChange={e => updateItem(i, "time", e.target.value)} placeholder="08:30" className="sched-edit-time"/>
                <input type="text" value={item.text} onChange={e => updateItem(i, "text", e.target.value)} placeholder={lang === "zh" ? "活動項目..." : "Activity..."} className="sched-edit-text"/>
              </div>
            </div>
          ))}

          <button type="button" className="sched-add-btn" onClick={addItem}>
            ➕ 新增項目 / Add step
          </button>
        </div>
      );
    }

    function LayoutSection({ open, onToggle, edits, setEdits, serverContent }){
      const showCountdownKey = "display.showCountdown";
      const sectionOrderKey = "display.sectionOrder";

      const showCountdown = getDisplay(showCountdownKey, edits, serverContent) === "true";
      const currentOrderStr = getDisplay(sectionOrderKey, edits, serverContent);
      const currentOrder = currentOrderStr.split(",").filter(Boolean);
      // Ensure all orderable sections included (add any missing to end)
      const orderedIds = [...currentOrder];
      ORDERABLE_SECTIONS.forEach(s => { if(!orderedIds.includes(s.id)) orderedIds.push(s.id); });
      // Filter out unknowns
      const finalOrder = orderedIds.filter(id => ORDERABLE_SECTIONS.some(s => s.id === id));

      function setDisplay(key, val){
        const defaultVal = DISPLAY_DEFAULTS[key];
        const committed = serverContent[key] !== undefined ? serverContent[key] : defaultVal;
        setEdits(prev => {
          const next = { ...prev };
          if(val === committed) delete next[key];
          else next[key] = val;
          return next;
        });
      }
      function toggleCountdown(){
        setDisplay(showCountdownKey, showCountdown ? "false" : "true");
      }
      function move(idx, dir){
        const newOrder = [...finalOrder];
        const target = idx + dir;
        if(target < 0 || target >= newOrder.length) return;
        [newOrder[idx], newOrder[target]] = [newOrder[target], newOrder[idx]];
        setDisplay(sectionOrderKey, newOrder.join(","));
      }
      function resetOrder(){
        setDisplay(sectionOrderKey, DISPLAY_DEFAULTS[sectionOrderKey]);
      }

      const countdownDirty = edits[showCountdownKey] !== undefined;
      const orderDirty = edits[sectionOrderKey] !== undefined;

      return (
        <div className="edit-section special">
          <div className="edit-section-head" onClick={onToggle}>
            <span>🎨 版面設定 Layout {(countdownDirty || orderDirty) && <span className="text-[color:var(--coral-deep)]">●</span>}</span>
            <span>{open ? "▾" : "▸"}</span>
          </div>
          {open && (
            <div className="edit-section-body">
              <div className="edit-row">
                <div className={"toggle " + (showCountdown ? "on" : "")} onClick={toggleCountdown}>
                  <div className="toggle-sw"/>
                  <div>
                    <div>⏰ 顯示報名倒數區 Show countdown</div>
                    <div className="text-xs text-[color:var(--ink-soft)] font-normal">包含倒數計時 + 名額進度條</div>
                  </div>
                </div>
              </div>

              <div className="edit-row">
                <div className="flex items-center justify-between mb-2">
                  <div className="edit-key">📐 區塊順序 Section order</div>
                  {orderDirty && <button onClick={resetOrder} className="text-[10px] font-bold text-[color:var(--coral-deep)] hover:underline">↺ 還原順序</button>}
                </div>
                {finalOrder.map((id, idx) => {
                  const sec = ORDERABLE_SECTIONS.find(s => s.id === id);
                  if(!sec) return null;
                  return (
                    <div key={id} className="reorder-item">
                      <span className="reorder-handle">☰</span>
                      <span className="flex-1">{sec.label}</span>
                      <div className="reorder-btns">
                        <button className="reorder-btn" onClick={() => move(idx, -1)} disabled={idx === 0}>▲</button>
                        <button className="reorder-btn" onClick={() => move(idx, 1)} disabled={idx === finalOrder.length - 1}>▼</button>
                      </div>
                    </div>
                  );
                })}
                <div className="text-xs text-[color:var(--ink-soft)] mt-2">⚡ 順序改動會同時套用到中／英版網站。</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Success Image Section (admin only — QR code on success card) ----
    function SuccessImageSection({ open, onToggle, edits, setEdits, serverContent }){
      const IMG_KEY = "success.image.data";
      const current = getDisplay(IMG_KEY, edits, serverContent);
      const isDirty = edits[IMG_KEY] !== undefined;
      const hasImage = current && String(current).indexOf("data:image") === 0;

      // Estimate file size from base64 (rough: every 4 b64 chars ≈ 3 bytes)
      const sizeKB = hasImage ? Math.round((current.length * 0.75) / 1024) : 0;

      const [error, setError] = useState("");
      const [busy, setBusy] = useState(false);
      const fileRef = useRef(null);

      const MAX_KB = 80;   // 80KB cap — well within Sheet cell size + JSON response size

      function setVal(v){
        const committed = serverContent[IMG_KEY] !== undefined ? serverContent[IMG_KEY] : (DISPLAY_DEFAULTS[IMG_KEY] || "");
        setEdits(prev => {
          const next = { ...prev };
          if(String(v) === String(committed)) delete next[IMG_KEY];
          else next[IMG_KEY] = String(v);
          return next;
        });
      }

      function onPick(e){
        setError("");
        const file = e.target.files && e.target.files[0];
        if(!file){ return; }
        if(!/^image\//.test(file.type)){ setError("請選擇圖片檔（PNG / JPG / WebP）"); return; }
        if(file.size > MAX_KB * 1024 * 4){
          // pre-screen against 4x compression budget — actual cap enforced after compression
          setError(`原始檔案 ${Math.round(file.size/1024)} KB 太大，請選 < ${MAX_KB*4} KB 的圖片`);
          return;
        }

        setBusy(true);
        // Read → render onto canvas at max 512px → re-encode as PNG → check size
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            try{
              const MAX_DIM = 512;
              let w = img.width, h = img.height;
              if(w > MAX_DIM || h > MAX_DIM){
                const ratio = Math.min(MAX_DIM / w, MAX_DIM / h);
                w = Math.round(w * ratio); h = Math.round(h * ratio);
              }
              const canvas = document.createElement("canvas");
              canvas.width = w; canvas.height = h;
              const ctx = canvas.getContext("2d");
              ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, w, h);   // flatten alpha → white (QR-friendly)
              ctx.drawImage(img, 0, 0, w, h);
              let dataUrl = canvas.toDataURL("image/png");
              if(dataUrl.length / 1024 > MAX_KB){
                // try JPEG with progressive quality
                let q = 0.9;
                while(q >= 0.4){
                  dataUrl = canvas.toDataURL("image/jpeg", q);
                  if(dataUrl.length / 1024 <= MAX_KB) break;
                  q -= 0.1;
                }
                if(dataUrl.length / 1024 > MAX_KB){
                  setError(`壓縮後仍 > ${MAX_KB}KB，請選更簡單的圖片`);
                  setBusy(false); return;
                }
              }
              setVal(dataUrl);
              setBusy(false);
              if(fileRef.current) fileRef.current.value = "";
            } catch(err){
              setError("處理圖片失敗：" + String(err).slice(0, 80));
              setBusy(false);
            }
          };
          img.onerror = () => { setError("無法讀取圖片"); setBusy(false); };
          img.src = ev.target.result;
        };
        reader.onerror = () => { setError("檔案讀取失敗"); setBusy(false); };
        reader.readAsDataURL(file);
      }

      function clearImage(){
        if(!window.confirm("確定要移除目前的圖片？")) return;
        setVal("");
      }

      return (
        <div className="edit-section special">
          <div className="edit-section-head" onClick={onToggle}>
            <span>📷 成功頁 QR / 圖片 Success Card Image {isDirty && <span className="text-[color:var(--wave-deep)]">●</span>}</span>
            <span>{open ? "▾" : "▸"}</span>
          </div>
          {open && (
            <div className="edit-section-body">
              <div className="text-xs text-[color:var(--ink-soft)] mb-3 leading-relaxed">
                上傳一張圖片（建議 QR Code），會顯示在報名成功的卡片上。<br/>
                ✨ 上傳後會自動縮放到 512px + 壓縮到 80KB 以內。
              </div>

              {hasImage ? (
                <div className="space-y-3">
                  <div className="p-3 rounded-lg bg-white border border-[color:var(--line)] inline-block">
                    <img src={current} alt="Current QR" style={{maxWidth:"180px", maxHeight:"180px", display:"block"}}/>
                  </div>
                  <div className="text-xs text-[color:var(--ink-soft)]">
                    目前圖片大小約 <strong>{sizeKB} KB</strong>
                  </div>
                  <div className="flex gap-2 flex-wrap">
                    <button type="button" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy}
                            className="btn-outline px-3 py-1.5 text-xs">
                      {busy ? "處理中…" : "🔄 換一張"}
                    </button>
                    <button type="button" onClick={clearImage} disabled={busy}
                            className="btn-danger px-3 py-1.5 text-xs">
                      🗑 移除圖片
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-2">
                  <button type="button" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy}
                          className="btn-chunk px-4 py-2 text-sm">
                    {busy ? "處理中…" : "📤 上傳 QR Code 圖片"}
                  </button>
                  <div className="text-xs text-[color:var(--ink-soft)]">支援 PNG / JPG / WebP</div>
                </div>
              )}

              <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/webp" onChange={onPick} className="hidden"/>

              {error && (
                <div className="mt-3 p-2 rounded bg-[color:#FDF3F1] border border-[#E5685A] text-xs text-[#D04A3C] font-bold">
                  ❗ {error}
                </div>
              )}

              {/* === URL input — makes the QR clickable === */}
              <div className="mt-4 pt-3 border-t border-dashed border-[color:var(--line)]">
                <div className="flex items-center justify-between mb-1">
                  <div className="edit-key">🔗 點擊連結 Click-through URL</div>
                  {edits["success.image.url"] !== undefined && (
                    <button onClick={() => setEdits(prev => { const n = { ...prev }; delete n["success.image.url"]; return n; })}
                            className="text-[10px] font-bold text-[color:var(--wave-deep)] hover:underline">↺ reset</button>
                  )}
                </div>
                <input type="url"
                  value={getDisplay("success.image.url", edits, serverContent)}
                  onChange={e => {
                    const v = e.target.value;
                    const committed = serverContent["success.image.url"] !== undefined ? serverContent["success.image.url"] : (DISPLAY_DEFAULTS["success.image.url"] || "");
                    setEdits(prev => {
                      const next = { ...prev };
                      if(v === committed) delete next["success.image.url"];
                      else next["success.image.url"] = v;
                      return next;
                    });
                  }}
                  placeholder="例：https://line.me/R/ti/g/your-group-id"
                  className={"edit-input " + (edits["success.image.url"] !== undefined ? "dirty" : "")}/>
                <div className="text-[10px] text-[color:var(--ink-soft)] mt-1 leading-relaxed">
