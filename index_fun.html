    // ---- Unit Stats Section (admin only — per-unit registration counts) ----
    function UnitStatsSection({ open, onToggle, edits, setEdits, serverContent }){
      const UNITS = [1, 2, 3, 4, 5];

      // ===== Mode =====
      const MODE_KEY = "stats.mode";
      const mode = (edits[MODE_KEY] !== undefined ? edits[MODE_KEY]
                    : serverContent[MODE_KEY] !== undefined ? serverContent[MODE_KEY]
                    : DISPLAY_DEFAULTS[MODE_KEY]);
      const modeDirty = edits[MODE_KEY] !== undefined;
      function setMode(m){
        const committed = serverContent[MODE_KEY] !== undefined ? serverContent[MODE_KEY] : DISPLAY_DEFAULTS[MODE_KEY];
        setEdits(prev => {
          const next = { ...prev };
          if(m === committed) delete next[MODE_KEY];
          else next[MODE_KEY] = m;
          return next;
        });
      }

      // ===== Manual counts =====
      function countKey(idx){ return `stats.unit${idx}.count`; }
      function getCount(idx){ return getDisplay(countKey(idx), edits, serverContent); }
      function isDirty(idx){ return edits[countKey(idx)] !== undefined; }
      function getLabelZh(idx){
        const key = `zh.stats.unit${idx}.label`;
        if(edits[key] !== undefined) return edits[key];
        if(serverContent[key] !== undefined) return serverContent[key];
        return (DEFAULTS.zh && DEFAULTS.zh[`stats.unit${idx}.label`]) || "—";
      }
      function setCount(idx, v){
        const key = countKey(idx);
        const committed = serverContent[key] !== undefined ? serverContent[key] : (DISPLAY_DEFAULTS[key] || "0");
        const cleaned = String(parseInt(v, 10) || 0);
        setEdits(prev => {
          const next = { ...prev };
          if(cleaned === String(committed)) delete next[key];
          else next[key] = cleaned;
          return next;
        });
      }
      function bump(idx, delta){
        const cur = parseInt(getCount(idx), 10) || 0;
        setCount(idx, Math.max(0, cur + delta));
      }
      function resetManual(){
        setEdits(prev => {
          const n = { ...prev };
          UNITS.forEach(i => { delete n[countKey(i)]; });
          return n;
        });
      }
      const anyCountDirty = UNITS.some(i => isDirty(i));
      const manualTotal = UNITS.reduce((a, i) => a + (parseInt(getCount(i), 10) || 0), 0);

      // ===== Keywords (only for unit 1-3; unit 4 = fallback) =====
      function kwKey(idx){ return `stats.unit${idx}.keywords`; }
      function getKw(idx){ return getDisplay(kwKey(idx), edits, serverContent); }
      function isKwDirty(idx){ return edits[kwKey(idx)] !== undefined; }
      function setKw(idx, v){
        const key = kwKey(idx);
        const committed = serverContent[key] !== undefined ? serverContent[key] : (DISPLAY_DEFAULTS[key] || "");
        setEdits(prev => {
          const next = { ...prev };
          if(v === committed) delete next[key];
          else next[key] = v;
          return next;
        });
      }
      function resetKw(idx){
        setEdits(prev => { const n = { ...prev }; delete n[kwKey(idx)]; return n; });
      }
      const anyKwDirty = [1,2,3,4].some(i => isKwDirty(i));

      return (
        <div className="edit-section special">
          <div className="edit-section-head" onClick={onToggle}>
            <span>📊 各單位報名人數 Unit Counts {(modeDirty || anyCountDirty || anyKwDirty) && <span className="text-[color:var(--wave-deep)]">●</span>}</span>
            <span>{open ? "▾" : "▸"}</span>
          </div>
          {open && (
            <div className="edit-section-body">

              {/* Mode toggle */}
              <div className="edit-row">
                <div className="edit-key mb-2">🔁 統計模式 Mode</div>
                <div className="flex gap-2 flex-wrap">
                  <button type="button" onClick={() => setMode("auto")}
                          className={"lang-pill " + (mode === "auto" ? "active" : "")}>
                    🤖 自動依公司欄分類
                  </button>
                  <button type="button" onClick={() => setMode("manual")}
                          className={"lang-pill " + (mode === "manual" ? "active" : "")}>
                    ✏️ 我自己填
                  </button>
                </div>
                <div className="text-xs text-[color:var(--ink-soft)] mt-2 leading-relaxed">
                  {mode === "auto"
                    ? "🤖 系統會掃描每筆報名的公司欄位，符合任一關鍵字就計入該格；都不符合則進「其他」格。"
                    : "✏️ 顯示你下面填的數字（不依報名資料）。"}
                </div>
              </div>

              {/* === Auto mode: keyword editor === */}
              {mode === "auto" && (
                <>
                  <div className="text-xs font-bold tracking-wider uppercase text-[color:var(--wave-deep)] mt-3 mb-2">🔍 自動分類關鍵字</div>
                  {[1, 2, 3, 4].map(i => (
                    <div key={i} className="edit-row">
                      <div className="flex items-center justify-between mb-1">
                        <div className="edit-key">#{i} · {getLabelZh(i)}</div>
                        {isKwDirty(i) && <button onClick={() => resetKw(i)} className="text-[10px] font-bold text-[color:var(--wave-deep)] hover:underline">↺ reset</button>}
                      </div>
                      <input type="text" value={getKw(i)}
                        onChange={e => setKw(i, e.target.value)}
                        placeholder="例：NMDC,XYZ Inc"
                        className={"edit-input " + (isKwDirty(i) ? "dirty" : "")}/>
                      <div className="text-[10px] text-[color:var(--ink-soft)] mt-1">
                        多個關鍵字用 <strong>,</strong> 分隔。公司欄位包含任一關鍵字就會被歸到這格。
                      </div>
                    </div>
                  ))}
                  <div className="edit-row">
                    <div className="edit-key mb-1">#5 · 其他 Others</div>
                    <div className="text-xs text-[color:var(--ink-soft)] leading-relaxed">
                      自動裝載「不符合 #1–#4 任何關鍵字」的報名，不需要設定。
                    </div>
                  </div>
                </>
              )}

              {/* === Manual mode: number inputs === */}
              {mode === "manual" && (
                <>
                  <div className="text-xs font-bold tracking-wider uppercase text-[color:var(--wave-deep)] mt-3 mb-2">✏️ 手動填寫人數</div>
                  {UNITS.map(i => (
                    <div key={i} className="edit-row">
                      <div className="flex items-center justify-between mb-1">
                        <div className="edit-key">#{i} · {getLabelZh(i)}</div>
                        {isDirty(i) && <button onClick={() => setEdits(prev => { const n = {...prev}; delete n[countKey(i)]; return n; })} className="text-[10px] font-bold text-[color:var(--wave-deep)] hover:underline">↺ reset</button>}
                      </div>
                      <div className="flex items-center gap-2">
                        <button type="button" onClick={() => bump(i, -1)} className="btn-outline px-3 py-1 text-sm font-bold" style={{minWidth:"40px"}}>−</button>
                        <input type="number" min="0" step="1"
                          value={getCount(i)}
                          onChange={e => setCount(i, e.target.value)}
                          className={"edit-input " + (isDirty(i) ? "dirty" : "")}
                          style={{textAlign:"center", flex:1}}/>
                        <button type="button" onClick={() => bump(i, 1)} className="btn-outline px-3 py-1 text-sm font-bold" style={{minWidth:"40px"}}>＋</button>
                        <span className="text-xs text-[color:var(--ink-soft)] font-bold w-6">人</span>
                      </div>
                    </div>
                  ))}
                  <div className="flex items-center justify-between pt-3 mt-2 border-t border-dashed border-[color:var(--line)]">
                    <div className="text-sm font-bold text-[color:var(--ink)]">
                      合計：<span className="font-num text-lg text-[color:var(--wave-deep)]">{manualTotal}</span> 人
                    </div>
                    {anyCountDirty && (
                      <button onClick={resetManual} className="text-xs font-bold text-[color:var(--wave-deep)] hover:underline">↺ 全部還原</button>
                    )}
                  </div>
                </>
              )}

              <div className="text-xs text-[color:var(--ink-soft)] mt-3 leading-relaxed">
                💡 改完按「💾 儲存」即生效，不用部署 GAS。<br/>
                💡 各格名稱（NMDC / TPC/POE 等）可在「文字編輯 → 倒數 & 名額 Status」分組改（中英分開）。
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Success Body Editor (rich-text body for success screen — embedded in "ok" group) ----
    function SuccessBodyEditor({ lang, edits, setEdits, serverContent }){
      const KEY = "ok.body.html";
      const editKey = `${lang}.${KEY}`;
      const subKey = `${lang}.ok.sub`;   // legacy plain text — used as initial seed if rich is empty
      // Auto-convert plain text (with line breaks) → HTML <p>/<br>
      function plainToHtml(text){
        const t = String(text || "");
        if(!t) return "";
        // Already HTML?
        if(/<[a-z][\s\S]*?>/i.test(t)) return t;
        // Escape & convert: split blank-line-separated paragraphs, then \n → <br>
        const esc = s => s.replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
        return t.split(/\n{2,}/).map(p => "<p>" + esc(p).replace(/\n/g, "<br>") + "</p>").join("");
      }
      function rawValue(){
        if(edits[editKey] !== undefined) return edits[editKey];
        if(serverContent[editKey]) return serverContent[editKey];
        return "";
      }
      function seedValue(){
        // Try legacy ok.sub (per language) as starting point
        if(edits[subKey] !== undefined) return edits[subKey];
        if(serverContent[subKey]) return serverContent[subKey];
        return (DEFAULTS[lang] && DEFAULTS[lang]["ok.sub"]) || "";
      }
      // Editor displays: rich content if set, else converted legacy ok.sub as a seed
      const displayValue = (() => {
        const r = rawValue();
        if(r) return r;
        return plainToHtml(seedValue());
      })();
      const isDirty = edits[editKey] !== undefined;
      function updateEdit(v){
        const committed = serverContent[editKey] || "";
        setEdits(prev => {
          const next = { ...prev };
          if(v === committed) delete next[editKey];
          else next[editKey] = v;
          return next;
        });
      }
      function clearBody(){
        if(!window.confirm("確定要清空富文字訊息？\n清空後會改回顯示原本的純文字（如果還有）。")) return;
        updateEdit("");
      }
      const hasContent = rawValue() && String(rawValue()).replace(/<[^>]*>/g, "").trim();
      const usingSeed = !rawValue() && !!seedValue();

      return (
        <div className="edit-row" style={{borderBottom:"none", paddingTop:14}}>
          <div className="rounded-xl border-2 border-[color:var(--wave)] bg-[color:var(--wave-soft)] p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="edit-key" style={{color:"var(--wave-deep)"}}>✨ 報名成功訊息 富文字 ・ {lang === "en" ? "English" : "中文"} {isDirty && <span className="text-[color:var(--wave-deep)]"> ●</span>}</div>
              {hasContent && (
                <button type="button" onClick={clearBody} className="text-[10px] font-bold text-[color:var(--wave-deep)] hover:underline">🧹 清空</button>
              )}
            </div>
            <div className="text-[11px] text-[color:var(--ink-soft)] mb-2 leading-relaxed">
              想要粗體 / 顏色 / 連結 / 清單就用這個富文字框。<br/>
              💡 可插入 <code className="bg-white px-1 rounded">{"{{name}}"}</code> <code className="bg-white px-1 rounded">{"{{confirmationNumber}}"}</code> <code className="bg-white px-1 rounded">{"{{totalSeats}}"}</code> 等標籤。<br/>
              {usingSeed && <span>💡 已自動把你原本的純文字訊息帶進來（可以直接編輯它）。</span>}
            </div>
            <RichEditor value={displayValue} onChange={updateEdit} dirty={isDirty} tokens={SUCCESS_TOKENS}/>
            <div className="text-[11px] text-[color:var(--ink-soft)] mt-2">
              {hasContent ? "✅ 報名成功畫面會顯示這段內容" : (usingSeed ? "ℹ️ 預覽中（尚未儲存）— 按上方「💾 儲存」後生效" : "⬜ 目前空白")}
            </div>
          </div>
        </div>
      );
    }

      const KEY = "ok.body.html";
      const editKey = `${lang}.${KEY}`;

        if(serverContent[editKey] !== undefined) return serverContent[editKey];
        return (DEFAULTS[lang] && DEFAULTS[lang][KEY]) || "";
      }
      const isDirty = edits[editKey] !== undefined;
      function updateEdit(v){
        const committed = serverContent[editKey] !== undefined ? serverContent[editKey] : ((DEFAULTS[lang] && DEFAULTS[lang][KEY]) || "");
        setEdits(prev => {
          const next = { ...prev };
          if(v === committed) delete next[editKey];
          else next[editKey] = v;
          return next;
        });

          )}

      );

    // ---- Tab 2: Email template ----
    function EmailTab({ lang, setLang, edits, setEdits, serverContent }){
      function valueOf(key){
        const editKey = `${lang}.${key}`;
        if(edits[editKey] !== undefined) return edits[editKey];
        if(serverContent[editKey] !== undefined) return serverContent[editKey];
        return DEFAULTS[lang][key] ?? "";
      }
      function isDirty(key){ return edits[`${lang}.${key}`] !== undefined; }
      function updateEdit(key, val){
        const editKey = `${lang}.${key}`;
        const committed = serverContent[editKey] !== undefined ? serverContent[editKey] : (DEFAULTS[lang][key] ?? "");
        setEdits(prev => { const next = { ...prev };
          if(val === committed) delete next[editKey]; else next[editKey] = val;
          return next;
        });
      }

      // Build the live token list for the current language so admin can copy-paste
      const [showTokens, setShowTokens] = useState(false);
      // Preview modal state
      const [previewOpen, setPreviewOpen] = useState(false);
      // Resolve a content key for current lang, honoring unsaved edits first
      function resolveContent(shortKey){
        const editKey = `${lang}.${shortKey}`;
        if(edits[editKey] !== undefined) return edits[editKey];
        if(serverContent[editKey] !== undefined) return serverContent[editKey];
        return DEFAULTS[lang][shortKey] ?? "";
      }
      const SITE_TOKENS = [
        { token:"info.when.big",       label:"📅 淨灘日期" },
        { token:"info.when.sub",       label:"📅 日期說明" },
        { token:"info.where.big",      label:"📍 淨灘地點" },
        { token:"info.where.sub",      label:"📍 地點說明" },
        { token:"info.where.mapUrl",   label:"🗺️ Google Maps 連結" },
        { token:"info.who.big",        label:"👥 預計人數" },
        { token:"info.contact.line1Label", label:"📞 聯絡人 1 標籤" },
        { token:"info.contact.line1Val",   label:"📞 聯絡人 1 號碼" },
        { token:"info.contact.line2Label", label:"📞 聯絡人 2 標籤" },
        { token:"info.contact.line2Val",   label:"📞 聯絡人 2 號碼" }
      ];
      const USER_TOKENS = [
        { token:"name",               label:"👤 姓名" },
        { token:"company",            label:"🏢 公司 / 團體" },
        { token:"title",              label:"💼 職稱" },
        { token:"email",              label:"📧 信箱" },
        { token:"phone",              label:"📱 電話" },
        { token:"blood",              label:"🩸 血型" },
        { token:"diet",               label:"🍽️ 飲食" },
        { token:"emName",             label:"🆘 緊急聯絡人" },
        { token:"emPhone",            label:"🆘 緊急聯絡電話" },
        { token:"companionCount",     label:"👨‍👩‍👧 攜眷人數" },
        { token:"totalSeats",         label:"🎟️ 總席次（本人+攜眷）" },
        { token:"confirmationNumber", label:"🔢 報名序號" },
        { token:"companionNames",     label:"👨‍👩‍👧 攜眷姓名（頓號分隔）" },
        { token:"companionList",      label:"👨‍👩‍👧 攜眷列表（HTML <ul>）" }
      ];
      const META_TOKENS = [
        { token:"eventName", label:"🏖️ 活動名稱" },
        { token:"deadline",  label:"⏰ 報名截止" }
      ];

      function copyToken(tok){
        const text = "{{" + tok + "}}";
        try{
          if(navigator.clipboard && navigator.clipboard.writeText){
            navigator.clipboard.writeText(text);
          } else {
            const ta = document.createElement("textarea");
            ta.value = text; document.body.appendChild(ta); ta.select();
            document.execCommand("copy"); document.body.removeChild(ta);
          }
        } catch(_){}
      }

      function TokenRow({ token, label, preview }){
        return (
          <div className="flex items-center gap-2 py-1.5 px-2 rounded hover:bg-[color:var(--cream-warm)] cursor-pointer group"
               onClick={() => copyToken(token)} title="點一下複製">

            <span className="text-xs text-[color:var(--ink-soft)] shrink-0">{label}</span>
            {preview !== undefined && (
              <span className="text-xs text-[color:var(--ink)] truncate flex-1 min-w-0">→ <span className="font-medium">{String(preview).slice(0, 40)}{String(preview).length > 40 ? "…" : ""}</span></span>
            )}
            <span className="opacity-0 group-hover:opacity-100 text-[10px] text-[color:var(--wave)] shrink-0">複製</span>
          </div>
        );
      }

      return (
        <div className="edit-drawer-body">
          <div className="mb-3 flex items-center gap-2">
            <span className="text-xs font-bold text-[color:var(--ink-soft)] tracking-wider uppercase shrink-0">Lang</span>
            <button className={"lang-pill " + (lang === "zh" ? "active" : "")} onClick={() => setLang("zh")}>中文</button>

          </div>

          <div className="p-3 rounded-xl bg-[color:var(--wave-soft)] border border-[color:var(--wave)] text-sm font-medium mb-4 text-[color:var(--ink)]">
            💌 <strong>確認信樣板</strong>：報名成功後系統會自動寄這封信。
            <div className="mt-1 text-xs text-[color:var(--ink-soft)]">
              ✨ <strong>連動功能</strong>：信裡放 <code className="bg-white px-1 rounded text-[color:var(--wave-deep)]">{'{{info.where.big}}'}</code> 之類的標籤，地點/時間/聯絡人改了，信件也會跟著變。
            </div>
          </div>

          {/* Tokens reference */}
          <div className="mb-4 border border-[color:var(--line)] rounded-lg overflow-hidden">
            <div className="flex items-center justify-between px-3 py-2 bg-[color:var(--cream-warm)] cursor-pointer"
                 onClick={() => setShowTokens(s => !s)}>
              <span className="text-sm font-bold text-[color:var(--ink)]">🏷️ 可用標籤列表（{lang === "zh" ? "中文" : "英文"} 當前值）</span>
              <span className="text-xs text-[color:var(--ink-soft)]">{showTokens ? "▾ 收起" : "▸ 展開"}</span>
            </div>
            {showTokens && (
              <div className="bg-white p-2 max-h-[300px] overflow-y-auto">
                <div className="text-[10px] font-bold uppercase tracking-wider text-[color:var(--wave-deep)] px-2 pt-1 pb-0.5">🌐 活動資訊（改 admin 會連動）</div>
                {SITE_TOKENS.map(it => (
                  <TokenRow key={it.token} token={it.token} label={it.label} preview={resolveContent(it.token)}/>
                ))}
                <div className="text-[10px] font-bold uppercase tracking-wider text-[color:var(--wave-deep)] px-2 pt-2 pb-0.5">👤 報名者資料（每封信不同）</div>
                {USER_TOKENS.map(it => (
                  <TokenRow key={it.token} token={it.token} label={it.label}/>
                ))}
                <div className="text-[10px] font-bold uppercase tracking-wider text-[color:var(--wave-deep)] px-2 pt-2 pb-0.5">⚙️ 系統值</div>
                {META_TOKENS.map(it => (
                  <TokenRow key={it.token} token={it.token} label={it.label}/>
                ))}
                <div className="text-[10px] text-[color:var(--ink-soft)] px-2 pt-2 pb-1">💡 點任一行可複製整個標籤到剪貼簿</div>
              </div>
            )}
          </div>

          <div className="edit-row mb-4">
            <div className="flex items-center justify-between">
              <div className="edit-key">📧 主旨 / Subject ({lang})</div>
              {isDirty("email.subject") && <span className="text-[10px] font-bold text-[color:var(--wave-deep)]">● dirty</span>}
            </div>
            <input type="text" value={valueOf("email.subject")} onChange={e => updateEdit("email.subject", e.target.value)} className={"edit-input " + (isDirty("email.subject") ? "dirty" : "")}/>
          </div>

          <div className="edit-row">
            <div className="flex items-center justify-between mb-2">
              <div className="edit-key">📝 內文 / Body ({lang})</div>
              {isDirty("email.body") && <span className="text-[10px] font-bold text-[color:var(--wave-deep)]">● dirty</span>}
            </div>
            <RichEditor value={valueOf("email.body")} onChange={v => updateEdit("email.body", v)} dirty={isDirty("email.body")}/>
          </div>

          <div className="mt-4">
            <button type="button" onClick={() => setPreviewOpen(true)} className="btn-outline w-full px-4 py-2 text-sm">
              👁️ 預覽這封確認信（{lang === "en" ? "English" : "中文"}）
            </button>
          </div>

          <EmailPreviewModal open={previewOpen} onClose={() => setPreviewOpen(false)}
            subject={valueOf("email.subject")} body={valueOf("email.body")} lang={lang}
            serverContent={serverContent} edits={edits}/>
        </div>
      );
    }

    // ---- Tab 3: Registrations ----
    // ============ Recipients modal ============
    // Pops up when admin clicks "📧 收件者". Aggregates unique emails from the *filtered*
    // registration list (respects unit / language / search filters above), lets the admin
    // pick a separator (; for Outlook, , for Gmail), and copies to clipboard.
    function RecipientsModal({ filtered, totalCount, onClose }){
      const [sep, setSep] = useState(";");      // ; for Outlook, , for Gmail
      const [copied, setCopied] = useState(false);

      // Dedup emails (case-insensitive). Sort for consistency.
      const uniqueEmails = useMemo(() => {
        const seen = new Set();
        const out = [];
        filtered.forEach(r => {
          const e = String(r.email || "").trim().toLowerCase();
          if(!e) return;
          if(seen.has(e)) return;
          seen.add(e); out.push(e);
        });
        out.sort();
        return out;
      }, [filtered]);

      // Lang breakdown of registrants whose emails are included (not unique-deduped — by record).
      const langCount = useMemo(() => {
        const acc = { zh: 0, en: 0 };
        filtered.forEach(r => {
          if(!r.email) return;
          const k = r.lang === "en" ? "en" : "zh";
          acc[k]++;
        });
        return acc;
      }, [filtered]);

      const joined = uniqueEmails.join(sep === ";" ? "; " : ", ");
      const isFiltered = filtered.length < totalCount;

      async function doCopy(){
        if(uniqueEmails.length === 0) return;
        try{
          await navigator.clipboard.writeText(joined);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch(e){
          // Fallback for older browsers / non-secure contexts
          const ta = document.getElementById("recipients-textarea");
          if(ta){
            ta.select();
            try{ document.execCommand("copy"); setCopied(true); setTimeout(() => setCopied(false), 2000); }
            catch(_){ alert("自動複製失敗，請手動選取下方文字後 Ctrl+C / Cmd+C"); }
          }
        }
      }

      // Close on ESC
      useEffect(() => {
        function onKey(e){ if(e.key === "Escape") onClose(); }
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="flex items-center justify-between mb-3">
              <div className="font-display text-xl text-[color:var(--ink)]">📧 彙整收件者</div>
              <button onClick={onClose} className="modal-close" aria-label="關閉">×</button>
            </div>

            {/* Count + lang breakdown */}
            <div className="mb-3 pb-3 border-b border-[color:var(--line)]">
              <div className="text-sm font-bold">
                共 <span className="text-[color:var(--wave-deep)] text-lg font-num">{uniqueEmails.length}</span> 個 unique email
                {isFiltered && (
                  <span className="ml-2 text-[10px] font-bold tracking-widest text-[color:var(--coral)] uppercase">已篩選 · Filtered</span>
                )}
              </div>
              <div className="text-xs text-[color:var(--ink-soft)] mt-1 flex flex-wrap gap-x-3 gap-y-0.5">
                <span>🇹🇼 中文 <span className="font-bold text-[color:var(--ink)]">{langCount.zh}</span></span>
                <span>🇬🇧 English <span className="font-bold text-[color:var(--ink)]">{langCount.en}</span></span>
                {isFiltered && <span className="text-[color:var(--ink-soft)]">（自 {totalCount} 筆總名單中）</span>}
              </div>
            </div>

            {/* Separator selector */}
            <div className="flex items-center gap-3 mb-2 text-xs">
              <span className="font-bold text-[color:var(--ink-soft)] tracking-wider uppercase">分隔符</span>
              <label className="flex items-center gap-1.5 cursor-pointer">
                <input type="radio" name="sep" checked={sep === ";"} onChange={() => setSep(";")} />
                <span><strong>;</strong> Outlook</span>
              </label>
              <label className="flex items-center gap-1.5 cursor-pointer">
                <input type="radio" name="sep" checked={sep === ","} onChange={() => setSep(",")} />
                <span><strong>,</strong> Gmail</span>
              </label>
            </div>

            {/* Textarea */}
            {uniqueEmails.length === 0 ? (
              <div className="modal-textarea flex items-center justify-center text-[color:var(--ink-soft)] italic">
                — 篩選後沒有可彙整的 email —
              </div>
            ) : (
              <textarea
                id="recipients-textarea"
                readOnly
                value={joined}
                className="modal-textarea"
              />
            )}

            {/* Actions */}
            <div className="flex gap-2 mt-3 justify-end">
              <button onClick={onClose} className="btn-outline px-4 py-2 text-sm">關閉</button>
              <button
                onClick={doCopy}
                disabled={uniqueEmails.length === 0}
                className="btn-chunk px-5 py-2 text-sm"
                style={{ background: copied ? "var(--nmdc-green)" : "var(--wave)" }}>
                {copied ? "✅ 已複製到剪貼簿！" : "📋 複製到剪貼簿"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ===========================================================================
    // GroupsTab — assign registrations to 20 groups × 10 seats for the event day.
    // Households (main registrant + companions) are atomic: they always stay together.
    // Multi-select via click → drag any selected card → all selected move together.
    // Full groups (10/10) are visually locked and reject drops.
    // Persistence: assignments saved to Content sheet under key "groups.assignments".
    // ===========================================================================
    const TOTAL_GROUPS    = 20;
    const SEATS_PER_GROUP = 10;

    function HouseholdCard({ household, selected, onToggleSelect, onDragStart, inGroup }){
      const h = household;
      return (
        <div
          draggable
          onDragStart={onDragStart}
          onClick={onToggleSelect}
          className="hh-card"
          data-selected={selected}
          data-ingroup={inGroup}
          title={`${h.serial} · ${h.name}${h.companionCount > 0 ? ` (+${h.companionCount} 攜眷)` : ""} · ${h.unit}`}>
          <span className="hh-serial">{h.serial}</span>
          <span className="hh-name">{h.name}</span>
          {h.companionCount > 0 && <span className="hh-comp">+{h.companionCount}</span>}
        </div>
      );
    }

    function GroupsTab({ editPassword, serverContent, onContentChange }){
      const [list, setList]               = useState(null);
      const [loading, setLoading]         = useState(false);
      const [err, setErr]                 = useState("");
      const [assignments, setAssignments] = useState({});  // { serial: groupId }
      const [selected, setSelected]       = useState(new Set());
      const [dragOverGroup, setDragOver]  = useState(null);
      const [draggingUnassigned, setDraggingUnassigned] = useState(false);
      const [dirty, setDirty]             = useState(false);
      const [saving, setSaving]           = useState(false);
      const [toast, setToast]             = useState("");

      // ===== Load registrations on mount =====
      async function loadData(){
        setLoading(true); setErr("");
        try{
          const res = await xhrPost(GAS_URL, { action:"listRegistrations", password:editPassword });
          if(res && res.success){ setList(res.registrations || []); }
          else { setErr(res && res.error ? res.error : "讀取失敗"); }
        } catch(e){ setErr("網路錯誤：" + e.message); }
        setLoading(false);
      }
      useEffect(() => { loadData(); }, []);   // eslint-disable-line

      // ===== Restore saved assignments from Content sheet =====
      useEffect(() => {
        if(!serverContent) return;
        const raw = serverContent["groups.assignments"];
        if(!raw) return;
        try{
          const parsed = JSON.parse(raw);
          if(parsed && typeof parsed === "object") setAssignments(parsed);
        } catch(_){ /* ignore corrupted JSON */ }
      }, [serverContent]);

      // ===== Households (atomic units for grouping) =====
      const households = useMemo(() => {
        if(!list) return [];
        return list.map(r => ({
          serial:         r.serial,
          name:           r.name,
          unit:           r.unit || "Other",
          company:        r.company,
          seats:          1 + (r.companionCount || 0),
          companionCount: r.companionCount || 0,
          companions:     r.companions || [],
          lang:           r.lang,
          transport:      r.transport
        }));
      }, [list]);

      // ===== Group buckets (computed from assignments) =====
      const { groups, unassigned } = useMemo(() => {
        const g = {};
        for(let i = 1; i <= TOTAL_GROUPS; i++) g[i] = { households: [], seats: 0 };
        const u = [];
        households.forEach(h => {
          const gid = assignments[h.serial];
          if(gid && g[gid]){ g[gid].households.push(h); g[gid].seats += h.seats; }
          else u.push(h);
        });
        return { groups: g, unassigned: u };
      }, [households, assignments]);

      const totalAssignedSeats = TOTAL_GROUPS * SEATS_PER_GROUP - Object.keys(groups).reduce((sum, gid) => sum + (SEATS_PER_GROUP - groups[gid].seats), 0);

      // ===== Selection =====
      function toggleSelect(serial, e){
        if(e) e.stopPropagation();
        setSelected(prev => {
          const next = new Set(prev);
          if(next.has(serial)) next.delete(serial); else next.add(serial);
          return next;
        });
      }
      function clearSelection(){ setSelected(new Set()); }
      function selectAllUnassigned(){ setSelected(new Set(unassigned.map(h => h.serial))); }

      // ===== Drag handlers =====
      function onCardDragStart(e, serial){
        let toMove;
        if(selected.has(serial) && selected.size > 1){
          toMove = Array.from(selected);              // drag all selected
        } else {
          toMove = [serial];                            // drag just this one
          setSelected(new Set([serial]));
        }
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("application/json", JSON.stringify(toMove));
        setDraggingUnassigned(toMove.some(s => !assignments[s]));
      }

      function onGroupDragOver(e, gid){
        const target = groups[gid];
        if(target && target.seats >= SEATS_PER_GROUP) return;   // full — don't accept
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if(dragOverGroup !== gid) setDragOver(gid);
      }

      function onGroupDrop(e, gid){
        e.preventDefault();
        setDragOver(null);
        let serials;
        try{ serials = JSON.parse(e.dataTransfer.getData("application/json")); }
        catch(_){ return; }

        // Calculate seats this drop will ADD to the group (skip serials already in this group)
        const toMove = serials.filter(s => assignments[s] !== gid);
        if(toMove.length === 0) return;

        const seatsToAdd = toMove.reduce((sum, s) => {
          const h = households.find(x => x.serial === s);
          return sum + (h ? h.seats : 0);
        }, 0);
        const currentSeats = groups[gid].seats;

        if(currentSeats + seatsToAdd > SEATS_PER_GROUP){
          flashToast(`❗ 第 ${gid} 組剩 ${SEATS_PER_GROUP - currentSeats} 席，無法放入 ${seatsToAdd} 席。請拆開或挑別組。`);
          return;
        }

        setAssignments(prev => {
          const next = { ...prev };
          toMove.forEach(s => { next[s] = gid; });
          return next;
        });
        setSelected(new Set());
        setDirty(true);
      }

      function onUnassignedDrop(e){
        e.preventDefault();
        setDragOver(null);
        let serials;
        try{ serials = JSON.parse(e.dataTransfer.getData("application/json")); }
        catch(_){ return; }
        const toMove = serials.filter(s => assignments[s] != null);
        if(toMove.length === 0) return;

        setAssignments(prev => {
          const next = { ...prev };
          toMove.forEach(s => { delete next[s]; });
          return next;
        });
        setSelected(new Set());
        setDirty(true);
      }

      function flashToast(msg){
        setToast(msg);
        setTimeout(() => setToast(""), 4000);
      }

      // ===== Save / clear =====
      async function save(){
        if(saving) return;
        setSaving(true); setErr("");
        try{
          const res = await xhrPost(GAS_URL, {
            action: "saveContent",
            password: editPassword,
            content: { "groups.assignments": JSON.stringify(assignments) }
          });
          if(res && res.success){
            setDirty(false);
            flashToast("✅ 分組已儲存");
            if(onContentChange) onContentChange();
          } else {
            setErr("儲存失敗：" + (res && res.error ? res.error : "未知錯誤"));
          }
        } catch(e){ setErr("網路錯誤：" + e.message); }
        setSaving(false);
      }

      function resetAll(){
        if(!window.confirm("確定要清除所有分組指派？\n（這只清空指派、不刪除報名資料。記得再按「儲存」才會永久生效）")) return;
        setAssignments({});
        setSelected(new Set());
        setDirty(true);
      }

      // ===== Export PDF (print-ready HTML in new tab) =====
      function exportPdf(){
        const html = buildSignInPrintHtml(groups);
        const w = window.open("", "_blank");
        if(!w){ alert("瀏覽器擋了 popup，請允許後再試"); return; }
        w.document.open(); w.document.write(html); w.document.close();
      }

      // ===== Export Excel (one tab per group, formatted) =====
      function exportExcel(){
        if(typeof XLSX === "undefined" || !XLSX.utils){
          alert("Excel 模組尚未載入完成，請稍候 1-2 秒再試 🙏");
          return;
        }
        buildSignInWorkbook(groups);
      }

      // ===== Render =====
      const unassignedSeats = unassigned.reduce((s, h) => s + h.seats, 0);
      const dropZoneClass = "min-h-[60px] p-2 rounded-md transition-colors";

      return (
        <div>
          {/* === Top action bar === */}
          <div className="flex flex-wrap gap-2 mb-2">
            <button onClick={save} disabled={saving || !dirty} className="btn-chunk px-4 py-2 text-sm">
              {saving ? "儲存中…" : (dirty ? "💾 儲存分組" : "✅ 已儲存")}
            </button>
            <button onClick={exportPdf} disabled={!list || list.length === 0} className="btn-outline px-3 py-2 text-sm">📄 PDF 簽到表</button>
            <button onClick={exportExcel} disabled={!list || list.length === 0} className="btn-outline px-3 py-2 text-sm">📊 Excel 簽到表</button>
            <button onClick={loadData} disabled={loading} className="btn-outline px-3 py-2 text-sm">{loading ? "…" : "🔄 重新載入"}</button>
            <button onClick={resetAll} disabled={Object.keys(assignments).length === 0} className="btn-outline px-3 py-2 text-sm text-[color:var(--coral)]">⚠️ 全部清空</button>
          </div>

          {err && <div className="mb-2 p-2 rounded bg-red-50 border border-red-300 text-xs text-red-700">{err}</div>}
          {toast && <div className="mb-2 p-2 rounded bg-[color:var(--sun-soft)] border border-[color:var(--sun)] text-sm font-bold">{toast}</div>}

          {/* === Selection toolbar === */}
          <div className="flex flex-wrap items-center gap-3 mb-3 p-2 px-3 rounded-md bg-[color:var(--cream-warm)] border border-[color:var(--line)] text-xs">
            <span className="font-bold">已選 <span className="text-[color:var(--wave-deep)] font-num text-base">{selected.size}</span> 戶</span>
            {selected.size > 0 && (
              <button onClick={clearSelection} className="text-[color:var(--coral)] hover:underline font-bold">✕ 取消選擇</button>
            )}
            <button onClick={selectAllUnassigned} disabled={unassigned.length === 0} className="hover:underline ml-auto font-bold">☑ 全選未分組 ({unassigned.length})</button>
            <span className="text-[color:var(--ink-soft)]">點卡片選 → 拖到組（多選一起拖）</span>
          </div>

          {/* === Unassigned pool === */}
          <div className="mb-4">
            <div className="text-xs font-bold tracking-widest text-[color:var(--ink-soft)] uppercase mb-1.5">
              📋 未分組 · <span className="text-[color:var(--ink)] font-num">{unassigned.length}</span> 戶 · <span className="text-[color:var(--ink)] font-num">{unassignedSeats}</span> 席
            </div>
            <div
              className={dropZoneClass + " border-2 border-dashed border-[color:var(--ink-soft)] bg-[color:#FAFAFA]"}
              onDragOver={e => { e.preventDefault(); }}
              onDrop={onUnassignedDrop}>
              {unassigned.length === 0 ? (
                <div className="text-xs text-[color:var(--ink-soft)] italic text-center py-4">✨ 全部都已分組</div>
              ) : (
                <div className="flex flex-wrap gap-1.5">
                  {unassigned.map(h => (
                    <HouseholdCard
                      key={h.serial}
                      household={h}
                      selected={selected.has(h.serial)}
                      onToggleSelect={() => toggleSelect(h.serial)}
                      onDragStart={e => onCardDragStart(e, h.serial)}
                    />
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* === 20 group boxes === */}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-2.5">
            {Array.from({ length: TOTAL_GROUPS }, (_, i) => i + 1).map(gid => {
              const group = groups[gid];
              const isFull   = group.seats >= SEATS_PER_GROUP;
              const isOver   = group.seats >  SEATS_PER_GROUP;   // shouldn't happen but defend
              const isActive = dragOverGroup === gid;
              return (
                <div
                  key={gid}
                  className="group-box"
                  data-full={isFull}
                  data-over={isActive}
                  data-empty={group.seats === 0}
                  onDragOver={e => onGroupDragOver(e, gid)}
                  onDragLeave={() => setDragOver(null)}
                  onDrop={e => onGroupDrop(e, gid)}>
                  <div className="flex items-baseline justify-between mb-1.5">
                    <div className="font-bold text-sm">第 {gid} 組</div>
                    <div className={"text-[11px] font-num font-bold " + (isFull ? "text-[color:var(--coral)]" : isOver ? "text-red-600" : "text-[color:var(--ink-soft)]")}>
                      {group.seats}/{SEATS_PER_GROUP}{isFull ? " ✓" : ""}
                    </div>
                  </div>
                  {group.households.length === 0 ? (
                    <div className="text-[10px] text-[color:var(--ink-soft)] italic text-center py-3">— 空 —</div>
                  ) : (
                    <div className="space-y-1">
                      {group.households.map(h => (
                        <HouseholdCard
                          key={h.serial}
                          household={h}
                          selected={selected.has(h.serial)}
                          onToggleSelect={() => toggleSelect(h.serial)}
                          onDragStart={e => onCardDragStart(e, h.serial)}
                          inGroup
                        />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="mt-4 text-xs text-[color:var(--ink-soft)]">
            💡 提示：選好的卡片拖出組箱子（拖到上方「未分組」區）就會移回未分組。
          </div>
        </div>
      );
    }

    // ============ Sign-in sheet — print-ready HTML (PDF via browser print) ============
    // ============ Sign-in sheet — print-ready HTML (PDF via browser print) ============
    // Simple, clean, energetic. One color scheme (NMDC blue + yellow accent + unit chips).
    // A4 portrait, no decorative top bands or bottom waves — focus on readability.
    function buildSignInPrintHtml(groupsMap){
      function esc(s){ return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
      const today = new Date();
      const dateStr = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,"0")}/${String(today.getDate()).padStart(2,"0")}`;

      // Unit colors — only functional color use (lets eyes instantly see who's from where)
      const UNIT_COLORS = {
        NMDC:  { bg:"#2A9D5C", text:"#FFFFFF" },
        TPC:   { bg:"#155989", text:"#FFFFFF" },
        POE:   { bg:"#E5685A", text:"#FFFFFF" },
        BST:   { bg:"#1E6FAB", text:"#FFFFFF" },
        Other: { bg:"#F5C24A", text:"#163654" }
      };

      let pages = "";
      let groupCount = 0;
      for(let gid = 1; gid <= TOTAL_GROUPS; gid++){
        const g = groupsMap[gid];
        if(!g || g.households.length === 0) continue;
        groupCount++;

        let bodyRows = "";
        let rowIdx = 1;
        g.households.forEach(h => {
          const U = UNIT_COLORS[h.unit] || UNIT_COLORS.Other;
          bodyRows += `<tr>
            <td class="idx">${rowIdx++}</td>
            <td class="serial">${esc(h.serial)}</td>
            <td class="name">${esc(h.name)}</td>
            <td class="unit"><span class="chip" style="background:${U.bg};color:${U.text};">${esc(h.unit)}</span></td>
            <td class="sig"></td>
          </tr>`;
          h.companions.forEach((c, i) => {
            bodyRows += `<tr>
              <td class="idx">${rowIdx++}</td>
              <td class="serial">${esc(h.serial)}-${i+1}</td>
              <td class="name">${esc(c.name || "（攜眷）")} <span class="tag">攜眷</span></td>
              <td class="unit"><span class="chip" style="background:${U.bg};color:${U.text};">${esc(h.unit)}</span></td>
              <td class="sig"></td>
            </tr>`;
          });
        });

        pages += `<div class="page">
  <div class="hdr">
    <div class="hdr-title">🌊 2026 NMDC 一起淨一夏</div>
    <div class="hdr-sub">海灘大掃除 · BEACH CLEANUP · 簽到表</div>
  </div>

  <div class="strip">
    <div class="strip-left">
      <span class="strip-badge">${gid}</span>
      <span class="strip-label">第 ${gid} 組</span>
    </div>

    // ============ Sign-in sheet — Excel workbook (one tab per group, styled, vibrant) ============

        g.households.forEach(h => {
          rows.push([idx++, h.serial, h.name, h.unit, ""]);
          unitRows.push({ r: rows.length - 1, unit: h.unit });
          h.companions.forEach((c, i) => {
            rows.push([idx++, `${h.serial}-${i+1}`, `${c.name || "（攜眷）"}  ‹攜眷›`, h.unit, ""]);

        for(let r = dataStart; r <= dataEnd; r++) ws["!rows"].push({ hpx: 30 });
        ws["!rows"].push({ hpx: 8  });   // spacer
        ws["!rows"].push({ hpx: 22 });   // footer

        // Merges — title + subtitle span all cols, group strip splits left/right
        ws["!merges"] = [
          { s:{r:0,c:0}, e:{r:0,c:4} },

          font:{ name:"Calibri", sz:10, bold:true, color:{ rgb:"5C7187" } },
          alignment:{ horizontal:"center", vertical:"center" }
        };
        const STRIP_LEFT_STYLE = {
          font:{ name:"Calibri", sz:14, bold:true, color:{ rgb:"FFFFFF" } },
          fill:{ patternType:"solid", fgColor:{ rgb:"1E6FAB" } },
          alignment:{ horizontal:"center", vertical:"center" }
        };
        const STRIP_RIGHT_STYLE = {
          font:{ name:"Calibri", sz:16, bold:true, color:{ rgb:"FFFFFF" } },
          fill:{ patternType:"solid", fgColor:{ rgb:"1E6FAB" } },
          alignment:{ horizontal:"center", vertical:"center" }
        };
        const HEADER_STYLE = {
          font:{ name:"Calibri", sz:12, bold:true, color:{ rgb:"FFFFFF" } },
          fill:{ patternType:"solid", fgColor:{ rgb:"1E6FAB" } },
          alignment:{ horizontal:"center", vertical:"center" },
          border:{
            top:{style:"thin",color:{rgb:"155989"}}, bottom:{style:"medium",color:{rgb:"155989"}},
            left:{style:"thin",color:{rgb:"155989"}}, right:{style:"thin",color:{rgb:"155989"}}
          }
        };
        const FOOTER_STYLE = {
          font:{ name:"Calibri", sz:10, color:{ rgb:"5C7187" } },
          alignment:{ horizontal:"left", vertical:"center" },
          border:{ top:{ style:"dashed", color:{ rgb:"5C7187" } } }
        };
        function dataStyle(altRow, col){
          const bg = altRow ? "FBF7EE" : "FFFFFF";
          const base = {
            font:{ name:"Calibri", sz:11, color:{ rgb:"163654" } },
            fill:{ patternType:"solid", fgColor:{ rgb:bg } },
            alignment:{ vertical:"center", wrapText:true },
            border:{

              bottom:{style:"thin",color:{rgb:"D8D2C0"}},
              left:{style:"thin",color:{rgb:"D8D2C0"}},
              right:{style:"thin",color:{rgb:"D8D2C0"}}
            }
          };
          if(col === 0){ base.alignment.horizontal = "center"; base.font = { ...base.font, bold:true, color:{ rgb:"1E6FAB" }, sz:13 }; }
          else if(col === 1){ base.alignment.horizontal = "center"; base.font = { ...base.font, name:"Consolas", sz:10, color:{ rgb:"5C7187" } }; }
          else if(col === 2){ base.alignment.horizontal = "left"; base.font = { ...base.font, bold:true }; }
          else if(col === 3){ base.alignment.horizontal = "center"; }
          else if(col === 4){ base.alignment.horizontal = "center"; }
          return base;
        }
        function unitCellStyle(unit){
          const U = UNIT_COLORS[unit] || UNIT_COLORS.Other;
          return {
            font:{ name:"Calibri", sz:10, bold:true, color:{ rgb:U.text } },
            fill:{ patternType:"solid", fgColor:{ rgb:U.bg } },
            alignment:{ horizontal:"center", vertical:"center" },
            border:{
              top:{style:"thin",color:{rgb:"D8D2C0"}},
              bottom:{style:"thin",color:{rgb:"D8D2C0"}},
              left:{style:"thin",color:{rgb:"D8D2C0"}},
              right:{style:"thin",color:{rgb:"D8D2C0"}}
            }
          };
        }

        const setStyle = (r, c, s) => {
          const a = XLSX.utils.encode_cell({ r, c });
          if(!ws[a]) ws[a] = { t:"s", v:"" };
          ws[a].s = s;
        };
        setStyle(0, 0, TITLE_STYLE);
        setStyle(1, 0, SUBTI_STYLE);
        setStyle(3, 0, STRIP_LEFT_STYLE);
        setStyle(3, 3, STRIP_RIGHT_STYLE);
        for(let c = 0; c < 5; c++) setStyle(5, c, HEADER_STYLE);
        for(let r = dataStart; r <= dataEnd; r++){
          const altRow = (r - dataStart) % 2 === 1;
          for(let c = 0; c < 5; c++){

              const u = unitRows.find(x => x.r === r);
              setStyle(r, c, unitCellStyle(u ? u.unit : "Other"));
            } else {
              setStyle(r, c, dataStyle(altRow, c));
            }
          }
        }
        const footerRow = rows.length - 1;
        for(let c = 0; c < 5; c++){
          const a = XLSX.utils.encode_cell({ r: footerRow, c });

        XLSX.utils.book_append_sheet(wb, ws, `第${gid}組`);
        appendedSheets++;
      }

      if(appendedSheets === 0){

        return;

      wb.Props = {
        Title:    "NMDC 一起淨一夏 簽到表",

    }

    function RegTab({ editPassword, registered, onDataChanged }){
      const [list, setList] = useState(null);

      async function load(){
        setLoading(true); setErr("");
        try{
          const res = await xhrPost(GAS_URL, { action:"listRegistrations", password:editPassword });
          if(res.success){
            // Safety net: normalize each registration so frontend never crashes on bad data.
            // companions can come back as a JSON string from older GAS versions — parse it.
            const raw = res.list || res.registrations || [];
            const normalized = raw.map(r => {
              let comps = r.companions;
              if(typeof comps === "string"){
                try{ const p = JSON.parse(comps); comps = Array.isArray(p) ? p : []; }
                catch(_){ comps = []; }
              }
              if(!Array.isArray(comps)) comps = [];
              // Backfill unit if GAS didn't return it (older GAS versions)
              if(!r.unit){ r = { ...r, unit: classifyCompanyClient(r.company) }; }
              return { ...r, companions: comps };
            });
            setList(normalized);
          }
          else { setErr("讀取失敗：" + (res.error || "未知")); setList([]); }

        if(c.indexOf("白沙屯") >= 0) return "BST";
        if(cLower.indexOf("poe") >= 0 || c.indexOf("香港商海油") >= 0) return "POE";
        if(cLower.indexOf("tpc") >= 0 || c.indexOf("台灣電力公司") >= 0 || c.indexOf("台電") >= 0) return "TPC";

      function exportCsv(){

        const rows = list.map(r => [
