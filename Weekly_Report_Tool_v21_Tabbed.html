    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }

            componentDidCatch(error, errorInfo) {
                console.error('React Error Boundary caught:', error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{
                            padding: '40px',
                            textAlign: 'center',
                            fontFamily: 'Arial, sans-serif'
                        }}>
                            <h1 style={{ color: '#ef4444' }}>😱 發生錯誤</h1>
                            <p style={{ margin: '20px 0', color: '#666' }}>
                                {this.state.error?.message || '未知錯誤'}
                            </p>
                            <button
                                onClick={() => window.location.reload()}
                                style={{
                                    padding: '10px 20px',
                                    backgroundColor: '#3b82f6',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '16px'
                                }}
                            >
                                🔄 重新載入頁面
                            </button>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        // --- Helper Functions ---
        function getContrastYIQ(hexcolor) {
            if (!hexcolor) return '#000000';
            const r = parseInt(hexcolor.substr(1,2),16);
            const g = parseInt(hexcolor.substr(3,2),16);
            const b = parseInt(hexcolor.substr(5,2),16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? '#1f2937' : '#ffffff';
        }

        // --- Main Component ---
        const WeeklyReport = () => {

                            if (data.sectionTitles.envMonitoring) {

            const updateField = (field, value) => {

            const updateArray = (arrayName, index, field, value) => {

            const archiveIssue = (index) => {

            const moveItemUp = (arrayName, index) => {
                if (index === 0) return;
                setReportData(prev => {

                    [newArray[index - 1], newArray[index]] = [newArray[index], newArray[index - 1]];
                    return { ...prev, [arrayName]: newArray };

                showToast('⬆️ 項目已上移');
            };

            const moveItemDown = (arrayName, index) => {
                setReportData(prev => {

                    const newArray = [...prev[arrayName]];
                    [newArray[index], newArray[index + 1]] = [newArray[index + 1], newArray[index]];
                    return { ...prev, [arrayName]: newArray };
                });
                showToast('⬇️ 項目已下移');
            };

            const moveActionUp = (issueIndex, actionIndex) => {

                const newIssues = [...reportData.issuesItems];
                const actions = newIssues[issueIndex].actions;
                [actions[actionIndex - 1], actions[actionIndex]] = [actions[actionIndex], actions[actionIndex - 1]];
                setReportData(prev => ({ ...prev, issuesItems: newIssues }));
            };

            const moveActionDown = (issueIndex, actionIndex) => {
                const newIssues = [...reportData.issuesItems];

            const handleImageUpload = (index, event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                // Check file type
                if (!file.type.startsWith('image/')) {
                    showToast('❌ 請選擇圖片檔案');
                    event.target.value = '';
                    return;
                }
                
                // Check file size (limit to 10MB)
                const maxSize = 10 * 1024 * 1024; // 10MB
                if (file.size > maxSize) {
                    showToast('❌ 圖片檔案太大，請選擇小於 10MB 的圖片');
                    event.target.value = '';
                    return;
                }
                
                // Show loading toast
                showToast('⏳ 正在壓縮圖片...');
                
                // Compress and resize image
                const img = new Image();
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    img.onload = () => {
                        try {
                            // Create canvas for compression
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            
                            // Calculate new dimensions (max 1200x1200 for better compression)
                            let width = img.width;
                            let height = img.height;
                            const maxDimension = 1200; // Reduced from 1920
                            
                            if (width > maxDimension || height > maxDimension) {
                                if (width > height) {
                                    height = (height / width) * maxDimension;
                                    width = maxDimension;
                                } else {
                                    width = (width / height) * maxDimension;
                                    height = maxDimension;
                                }
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            
                            // Draw and compress with higher compression
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // Convert to base64 with higher compression (0.6 quality)
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                            
                            updateArray('photos', index, 'imageData', compressedDataUrl);
                            showToast('✅ 照片已上傳');
                        } catch (error) {
                            console.error('Error updating photo:', error);
                            showToast('❌ 照片處理失敗：' + error.message);
                        }
                    };
                    
                    img.onerror = () => {
                        console.error('Image load error');
                        showToast('❌ 圖片載入失敗，請確認檔案格式正確');
                        event.target.value = '';
                    };
                    
                    img.src = e.target.result;
                };
                
                reader.onerror = () => {
                    console.error('FileReader error');
                    showToast('❌ 讀取圖片失敗');
                    event.target.value = '';
                };
                
                reader.readAsDataURL(file);
            };

                                        return(<div key={i} className={"p-4 rounded-lg border-2 "+bg}>
                                            <div className="flex justify-between items-start mb-2">

        // NCR Dashboard Component
        const NCRDashboard = ({ reportData, chartRefs }) => {
            const { totalNCR, closedNCR, openNCR, weeklyNew, categories } = reportData.ncrDashboard;
            const closureRate = totalNCR > 0 ? Math.round((closedNCR / totalNCR) * 100) : 0;
            const canvasRef = useRef(null);
            const chartInstanceRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current && categories.length > 0) {
                    // Destroy existing chart
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                    }

                    const ctx = canvasRef.current.getContext('2d');
                    
                    // Create gradient colors for each category
                    const createGradient = (color) => {
                        const gradient = ctx.createRadialGradient(150, 150, 0, 150, 150, 150);
                        // Lighter color in center
                        gradient.addColorStop(0, color + 'dd'); // More transparent
                        gradient.addColorStop(0.5, color);
                        gradient.addColorStop(1, color + 'cc'); // Slightly darker at edge
                        return gradient;
                    };
                    
                    // Register datalabels plugin if available
                    const plugins = [];
                    if (typeof ChartDataLabels !== 'undefined') {
                        plugins.push(ChartDataLabels);
                    }
                    
                    chartInstanceRef.current = new Chart(ctx, {
                        type: 'doughnut',
                        plugins: plugins,
                        data: {
                            labels: categories.map(c => c.name),
                            datasets: [{
                                data: categories.map(c => c.count),
                                backgroundColor: categories.map(c => c.color),
                                borderWidth: 3,
                                borderColor: '#ffffff',
                                hoverOffset: 15,
                                hoverBorderWidth: 4,
                                hoverBorderColor: '#ffffff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            aspectRatio: 1.8,
                            cutout: '50%',
                            animation: {
                                animateRotate: true,
                                animateScale: true,
                                duration: 1000,
                                easing: 'easeInOutQuart'
                            },
                            plugins: {
                                datalabels: {
                                    color: '#ffffff',
                                    backgroundColor: 'rgba(0, 0, 0, 0.25)',
                                    borderRadius: 4,
                                    padding: {
                                        top: 4,
                                        bottom: 4,
                                        left: 6,
                                        right: 6
                                    },
                                    font: {
                                        weight: 'bold',
                                        size: 13,
                                        family: 'Arial, sans-serif'
                                    },
                                    formatter: (value, context) => {
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return percentage + '%';
                                    },
                                    display: (context) => {
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = (context.dataset.data[context.dataIndex] / total) * 100;
                                        return percentage >= 5;
                                    }
                                },
                                legend: {
                                    position: 'right',
                                    labels: {
                                        font: { 
                                            size: 11,
                                            weight: '500'
                                        },
                                        padding: 10,
                                        boxWidth: 15,
                                        boxHeight: 15,
                                        usePointStyle: true,
                                        pointStyle: 'circle',
                                        generateLabels: function(chart) {
                                            const data = chart.data;
                                            return data.labels.map((label, i) => ({
                                                text: `${label}: ${data.datasets[0].data[i]}`,
                                                fillStyle: data.datasets[0].backgroundColor[i],
                                                hidden: false,
                                                index: i
                                            }));
                                        }
                                    }
                                },
                                tooltip: {
                                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                    padding: 12,
                                    cornerRadius: 8,
                                    titleFont: {
                                        size: 13,
                                        weight: 'bold'
                                    },
                                    bodyFont: {
                                        size: 12
                                    },
                                    callbacks: {
                                        label: function(context) {
                                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                            const value = context.parsed;
                                            const percentage = ((value / total) * 100).toFixed(1);
                                            return `${context.label}: ${value} (${percentage}%)`;
                                        }
                                    }
                                }
                            }
                        }
                    });

                    chartRefs.current['ncrPie'] = chartInstanceRef.current;
                }

                return () => {
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                    }
                };
            }, [categories]);

            return (
                <div className="space-y-4">
                    {/* Statistics Cards */}
                    <div className="grid grid-cols-5 gap-3 ncr-stats-grid">
                        {/* Total NCR */}
                        <div className="bg-gradient-to-br from-purple-500 to-purple-600 text-white rounded-lg p-4 shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold opacity-90">Total NCR</span>
                                <IconComp name="BarChart" size={16} className="opacity-75" />
                            </div>
                            <div className="text-3xl font-bold">{totalNCR}</div>
                            <div className="text-xs opacity-75 mt-1">All Issues</div>
                        </div>

                        {/* Closed NCR */}
                        <div className="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-lg p-4 shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold opacity-90">Closed</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-75">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                            <div className="text-3xl font-bold">{closedNCR}</div>
                            <div className="text-xs opacity-75 mt-1">Resolved</div>
                        </div>

                        {/* Open NCR */}
                        <div className="bg-gradient-to-br from-red-500 to-red-600 text-white rounded-lg p-4 shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold opacity-90">Open</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-75">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                            </div>
                            <div className="text-3xl font-bold">{openNCR}</div>
                            <div className="text-xs opacity-75 mt-1">Pending</div>
                        </div>

                        {/* Closure Rate */}
                        <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-lg p-4 shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold opacity-90">Closure Rate</span>
                                <IconComp name="TrendingUp" size={16} className="opacity-75" />
                            </div>
                            <div className="text-3xl font-bold">{closureRate}%</div>
                            <div className="text-xs opacity-75 mt-1">Performance</div>
                        </div>

                        {/* Weekly New */}
                        <div className="bg-gradient-to-br from-orange-500 to-orange-600 text-white rounded-lg p-4 shadow-md">

                                <span className="text-xs font-semibold opacity-90">Weekly New</span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-75">
                                    <path d="M12 5v14M5 12h14"></path>
                                </svg>
                            </div>
                            <div className="text-3xl font-bold">{weeklyNew || 0}</div>
                            <div className="text-xs opacity-75 mt-1">This Week</div>
                        </div>
                    </div>

                    {/* Pie Chart Section */}
                    {categories.length > 0 && (
                        <div className="bg-gradient-to-br from-white to-gray-50 border-2 border-gray-200 rounded-xl p-6 ncr-chart-container shadow-lg">

                                <IconComp name="PieChart" size={14} className="mr-2 text-purple-600" />
                                NCR Category Distribution
                            </h4>
                            <div style={{height: '250px', maxWidth: '600px', margin: '0 auto', position: 'relative'}}>
                                <canvas ref={canvasRef} style={{filter: 'drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1))'}}></canvas>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // KPI Dashboard Component
        const KPIDashboard = ({ reportData, setReportData, isEditing }) => {
            const { paul, raymond, sean, jacquline, notes } = reportData.kpiDashboard || {};

            const toggleKPI = (person, itemIndex) => {
                if (!isEditing) return;
                
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        [person]: {
                            ...prev.kpiDashboard[person],
                            items: prev.kpiDashboard[person].items.map((item, i) =>
                                i === itemIndex ? { ...item, completed: !item.completed } : item
                            )
                        }
                    }
                }));
            };

            const updateKPITask = (person, itemIndex, field, value) => {
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        [person]: {
                            ...prev.kpiDashboard[person],
                            items: prev.kpiDashboard[person].items.map((item, i) =>
                                i === itemIndex ? { ...item, [field]: value } : item
                            )
                        }
                    }
                }));
            };

            const addKPITask = (person) => {
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        [person]: {
                            ...prev.kpiDashboard[person],
                            items: [
                                ...prev.kpiDashboard[person].items,
                                { task: "New Task", target: "Monthly", completed: false }
                            ]
                        }
                    }
                }));
            };

            const deleteKPITask = (person, itemIndex) => {
                if (!window.confirm('確定要刪除這個任務嗎？')) return;
                
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        [person]: {
                            ...prev.kpiDashboard[person],
                            items: prev.kpiDashboard[person].items.filter((_, i) => i !== itemIndex)
                        }
                    }
                }));
            };

            const updateNotes = (value) => {
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        notes: value
                    }
                }));
            };

            const calculateCompletion = (items) => {
                if (!items || items.length === 0) return 0;
                const completed = items.filter(item => item.completed).length;
                return Math.round((completed / items.length) * 100);
            };

            const resetAllKPI = () => {
                if (!window.confirm('確定要重置所有KPI狀態嗎？')) return;
                
                setReportData(prev => ({
                    ...prev,
                    kpiDashboard: {
                        ...prev.kpiDashboard,
                        paul: {
                            ...prev.kpiDashboard.paul,
                            items: prev.kpiDashboard.paul.items.map(item => ({ ...item, completed: false }))
                        },
                        raymond: {
                            ...prev.kpiDashboard.raymond,
                            items: prev.kpiDashboard.raymond.items.map(item => ({ ...item, completed: false }))
                        },
                        sean: {
                            ...prev.kpiDashboard.sean,
                            items: prev.kpiDashboard.sean.items.map(item => ({ ...item, completed: false }))
                        },
                        jacquline: {
                            ...prev.kpiDashboard.jacquline,
                            items: prev.kpiDashboard.jacquline.items.map(item => ({ ...item, completed: false }))
                        }
                    }
                }));
            };

            const renderPersonCard = (personKey, personData) => {
                if (!personData) return null;
                
                const completionRate = calculateCompletion(personData.items);
                const completedCount = personData.items.filter(item => item.completed).length;
                const totalCount = personData.items.length;

                return (
                    <div 
                        key={personKey}
                        className="bg-white border-2 border-gray-200 rounded-xl overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300 kpi-person-card"
                    >
                        {/* Header with gradient */}
                        <div 
                            className="p-4 text-white relative overflow-hidden kpi-header"
                            style={{ 
                                background: `linear-gradient(135deg, ${personData.color} 0%, ${personData.color}dd 100%)`
                            }}
                        >
                            <div className="relative z-10">
                                <h4 className="text-xl font-bold">{personData.name}</h4>
                                <p className="text-sm opacity-90 mt-1">{personData.role}</p>
                            </div>
                            {/* Decorative circle */}
                            <div 
                                className="absolute -right-8 -top-8 w-32 h-32 rounded-full opacity-10"
                                style={{ backgroundColor: '#ffffff' }}
                            ></div>
                        </div>

                        {/* Stats Bar */}
                        <div className="px-4 py-3 bg-gray-50 border-b border-gray-200 kpi-stats">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-xs font-semibold text-gray-600">Completion Rate</span>
                                <span className="text-xs font-bold" style={{ color: personData.color }}>
                                    {completedCount}/{totalCount} Tasks
                                </span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden kpi-progress-bar">
                                <div 
                                    className="h-full rounded-full transition-all duration-500 ease-out flex items-center justify-end pr-2"
                                    style={{ 
                                        width: `${completionRate}%`,
                                        background: `linear-gradient(90deg, ${personData.color}dd 0%, ${personData.color} 100%)`
                                    }}
                                >
                                    {completionRate > 15 && (
                                        <span className="text-[10px] font-bold text-white kpi-progress-text">{completionRate}%</span>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* KPI Items */}
                        <div className="p-4 space-y-2 max-h-[400px] overflow-y-auto kpi-items">
                            {personData.items.map((item, index) => (
                                <div 
                                    key={index}
                                    className={`flex items-start gap-3 p-3 rounded-lg border transition-all duration-200 kpi-item ${
                                        item.completed 
                                            ? 'bg-green-50 border-green-200' 
                                            : 'bg-white border-gray-200 hover:border-gray-300'
                                    }`}
                                >
                                    {/* Checkbox */}
                                    {!isEditing ? (
                                        <div className={`flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center transition-all kpi-checkbox ${
                                            item.completed 
                                                ? 'border-green-500 bg-green-500' 
                                                : 'border-gray-300 bg-white'
                                        }`}>
                                            {item.completed && (
                                                <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path>
                                                </svg>
                                            )}
                                        </div>
                                    ) : (
                                        <div 
                                            className={`flex-shrink-0 w-5 h-5 rounded border-2 flex items-center justify-center transition-all cursor-pointer kpi-checkbox ${
                                                item.completed 
                                                    ? 'border-green-500 bg-green-500' 
                                                    : 'border-gray-300 bg-white'
                                            }`}
                                            onClick={() => toggleKPI(personKey, index)}
                                        >
                                            {item.completed && (
                                                <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path>
                                                </svg>
                                            )}
                                        </div>
                                    )}

                                    {/* Task Info */}
                                    <div className="flex-grow min-w-0">
                                        {isEditing ? (
                                            <>
                                                <input
                                                    type="text"
                                                    value={item.task}
                                                    onChange={(e) => updateKPITask(personKey, index, 'task', e.target.value)}
                                                    className="w-full text-sm font-medium border border-gray-300 rounded px-2 py-1 mb-2"
                                                    placeholder="Task name"
                                                />
                                                <div className="flex items-center gap-2">
                                                    <select
                                                        value={item.target}
                                                        onChange={(e) => updateKPITask(personKey, index, 'target', e.target.value)}
                                                        className="text-[10px] font-semibold border border-gray-300 rounded px-2 py-1"
                                                    >
                                                        <option value="Daily">Daily</option>
                                                        <option value="Weekly">Weekly</option>
                                                        <option value="Monthly">Monthly</option>
                                                        <option value="100% closure">100% closure</option>
                                                    </select>
                                                    <button
                                                        onClick={() => deleteKPITask(personKey, index)}
                                                        className="text-red-500 hover:text-red-700 text-xs"
                                                        title="Delete task"
                                                    >
                                                        🗑️
                                                    </button>
                                                </div>
                                            </>
                                        ) : (
                                            <>
                                                <p className={`text-sm font-medium break-words ${
                                                    item.completed ? 'text-gray-500 line-through' : 'text-gray-800'
                                                }`}>
                                                    {item.task}
                                                </p>
                                                <span className={`inline-block mt-1 px-2 py-0.5 rounded text-[10px] font-semibold kpi-tag ${
                                                    item.target.toLowerCase().includes('daily') ? 'bg-red-100 text-red-700' :
                                                    item.target.toLowerCase().includes('weekly') ? 'bg-yellow-100 text-yellow-700' :
                                                    item.target.toLowerCase().includes('monthly') ? 'bg-blue-100 text-blue-700' :
                                                    'bg-purple-100 text-purple-700'
                                                }`}>
                                                    {item.target}
                                                </span>
                                            </>
                                        )}
                                    </div>
                                </div>
                            ))}
                            
                            {/* Add Task Button in Edit Mode */}
                            {isEditing && (
                                <button
                                    onClick={() => addKPITask(personKey)}
                                    className="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-gray-400 hover:text-gray-700 transition-colors text-sm font-medium"
                                >
                                    + Add Task
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div>
                    {/* Edit Mode Info Banner */}
                    {isEditing && (
                        <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg no-print flex items-center justify-between">
                            <p className="text-sm text-blue-800 flex items-center">
                                <svg className="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                    <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" />
                                </svg>
                                <strong className="mr-1">編輯模式：</strong>可編輯任務名稱、頻率，點擊勾選框完成任務
                            </p>
                            <button
                                onClick={resetAllKPI}
                                className="px-3 py-1 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold rounded transition-colors flex items-center gap-1"
                            >
                                <IconComp name="RotateCcw" size={12} />
                                重置所有KPI
                            </button>
                        </div>
                    )}

                    {/* Grid Layout - 4 columns for desktop, responsive for smaller screens */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 kpi-grid">
                        {renderPersonCard('paul', paul)}
                        {renderPersonCard('raymond', raymond)}
                        {renderPersonCard('sean', sean)}
                        {renderPersonCard('jacquline', jacquline)}
                    </div>

                    {/* Notes Section */}
                    <div className="mt-6 bg-white border-2 border-gray-200 rounded-xl p-4 shadow-lg">
                        <h4 className="text-sm font-bold text-gray-700 mb-3 flex items-center">
                            <span className="mr-2">📝</span> Notes / Remarks
                        </h4>
                        {isEditing ? (
                            <textarea
                                value={notes || ''}
                                onChange={(e) => updateNotes(e.target.value)}
                                className="w-full border border-gray-300 rounded-lg p-3 text-sm resize-vertical min-h-[100px]"
                                placeholder="Add any notes or remarks about KPI Dashboard here..."
                            />
                        ) : (
                            <div className="text-sm text-gray-700 whitespace-pre-wrap">
                                {notes || <span className="text-gray-400 italic">No notes added</span>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Global error handler
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
            alert('發生錯誤：' + event.error.message + '\n\n請重新整理頁面。如果問題持續，請清除瀏覽器快取。');
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled promise rejection:', event.reason);
            alert('發生錯誤：' + event.reason + '\n\n請重新整理頁面。');
        });

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <WeeklyReport />
            </ErrorBoundary>
        );
    </script>

</body>
</html>
