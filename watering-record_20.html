<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營建工地每日噴灑水作業紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#f5f5f0;--card:#fff;--border:#c8c8c0;--text:#2a2a2a;--text-light:#6b6b6b;--accent:#2d5a27;--accent-light:#e8f0e6;--am:#3a6ea5;--pm:#b8651a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* Header */
  .app-header{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .app-header h1{font-size:17px;font-weight:700;letter-spacing:1px;}
  .tabs{display:flex;gap:3px;margin-left:auto;}
  .tab-btn{padding:7px 18px;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px 6px 0 0;cursor:pointer;transition:background .2s;}
  .tab-btn.active{background:var(--card);color:var(--accent);}

  /* Meta bar */
  .meta-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .meta-bar label{font-size:13px;font-weight:500;color:var(--text-light);}
  .meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:inherit;font-size:13px;}
  .meta-bar .mg{display:flex;align-items:center;gap:5px;}
  .project-input{width:260px;}
  .start-date-picker{background:var(--accent-light);border:2px solid var(--accent)!important;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:500;color:var(--accent);width:150px;}
  .loc-select{border:2px solid var(--am)!important;border-radius:6px;padding:4px 10px;font-weight:500;color:var(--am);background:#e8f0fa;}
  .loc-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;background:var(--am);}

  /* Tab panels */
  .tab-panel{display:none;padding:16px 24px;}
  .tab-panel.active{display:block;}

  /* Record table */
  .record-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .record-table th,.record-table td{border:1px solid var(--border);padding:6px 8px;text-align:center;vertical-align:middle;}
  .record-table th{background:#f0f0ea;font-weight:600;font-size:11px;color:var(--text-light);}
  .record-table .day-header{background:var(--accent);color:#fff;font-size:12px;}
  .record-table .am-row td:first-child{background:var(--am);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table .pm-row td:first-child{background:var(--pm);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table input[type="time"]{width:110px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;}
  .record-table input[type="number"]{width:65px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table input[type="text"]{width:70px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;font-family:inherit;}
  .method-select{width:100px;}

  /* Photo grid */
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;}
  .photo-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .photo-card .ph-header{background:#f0f0ea;padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-light);display:flex;justify-content:space-between;align-items:center;}
  .photo-card .ph-body{padding:10px;min-height:140px;display:flex;align-items:center;justify-content:center;position:relative;}
  .photo-card .ph-body img{max-width:100%;max-height:180px;border-radius:4px;object-fit:contain;}
  .photo-card .ph-body .placeholder{color:#bbb;font-size:12px;text-align:center;cursor:pointer;}
  .photo-card input[type="file"]{display:none;}
  .photo-card .ph-desc{padding:4px 10px 8px;font-size:11px;}
  .photo-card .ph-desc input{width:100%;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit;}
  .photo-card .remove-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}
  .photo-card:hover .remove-photo{display:flex;}

  /* Signature */
  .sig-section{margin-top:16px;background:var(--card);border-radius:8px;padding:14px;border:1px solid var(--border);}
  .sig-section h3{font-size:13px;margin-bottom:8px;color:var(--text-light);}
  .sig-row{display:flex;gap:24px;flex-wrap:wrap;}
  .sig-item{flex:1;min-width:200px;}
  .sig-item label{font-size:12px;color:var(--text-light);display:block;margin-bottom:4px;}
  .sig-item input{width:100%;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:inherit;font-size:13px;}
  .sig-upload-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .sig-preview{max-width:120px;max-height:50px;border:1px solid var(--border);border-radius:4px;object-fit:contain;background:#fafafa;}
  .sig-upload-btn{font-size:11px!important;padding:4px 10px!important;}
  .sig-remove-btn{font-size:11px!important;padding:3px 8px!important;}

  /* Buttons */
  .btn{padding:8px 18px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-sm{padding:6px 14px;font-size:12px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#1e4a1a;}
  .btn-save{background:var(--am);color:#fff;}
  .btn-save:hover{background:#2d5d8f;}
  .btn-pdf{background:var(--pm);color:#fff;}
  .btn-pdf:hover{background:#9e5515;}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
  .btn-outline:hover{background:#f0f0ea;}
  .btn-danger{background:#c53030;color:#fff;}
  .btn-danger:hover{background:#a02020;}
  .btn-new{background:var(--am);color:#fff;}

  /* Action bar */
  .actions{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--card);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:10;}
  .hidden{display:none!important;}

  /* Records list */
  .list-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .list-toolbar input,.list-toolbar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:13px;font-family:inherit;}
  .rec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:box-shadow .2s;}
  .rec-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .rec-card .rc-check{width:18px;height:18px;cursor:pointer;}
  .rec-card .rc-info{flex:1;}
  .rec-card .rc-info .rc-title{font-weight:600;font-size:14px;}
  .rec-card .rc-info .rc-sub{font-size:12px;color:var(--text-light);margin-top:2px;}
  .rec-card .rc-actions{display:flex;gap:6px;}
  .empty-list{text-align:center;padding:40px;color:var(--text-light);font-size:14px;}

  /* Toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}
  .toast.err{background:#c53030;}

  /* New record dialog */
  .newrec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .newrec-overlay.open{display:flex;}
  .newrec-box{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;}
  .newrec-box h3{margin-bottom:14px;font-size:16px;}
  .newrec-box label{font-size:13px;color:var(--text-light);display:block;margin:10px 0 4px;}
  .newrec-box select,.newrec-box input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:14px;}
  .newrec-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
  .dup-warn{margin-top:10px;padding:8px;border-radius:6px;background:#fff3cd;color:#856404;font-size:12px;display:none;}
  .dup-warn.show{display:block;}

  /* Post-save dialog */
  .dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .dialog-overlay.open{display:flex;}
  .dialog-box{background:var(--card);border-radius:12px;padding:24px;width:320px;max-width:90vw;text-align:center;}
  .dialog-box h3{margin-bottom:8px;}
  .dialog-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;}
  .dialog-box .btn{margin:4px;}

  /* Preview */
  #previewModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:20px;}
  #previewModal.open{display:block;}
  .preview-inner{max-width:1100px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;}
  .preview-toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--accent);color:#fff;}
  .preview-toolbar h3{flex:1;font-size:15px;}
  .preview-body{padding:20px;overflow-x:auto;}

  /* PDF area */
  #pdfOverlay{position:fixed;top:-99999px;left:0;z-index:-1;opacity:0;pointer-events:none;}
  .pdf-page{width:287mm;padding:8mm 10mm;font-family:'Noto Sans TC',sans-serif;background:#fff;}
  .pdf-page h2{text-align:center;font-size:16px;margin-bottom:6px;}
  .pdf-page .sub-info{text-align:center;font-size:11px;color:#555;margin-bottom:8px;}
  .pdf-page table{width:100%;border-collapse:collapse;font-size:10px;}
  .pdf-page th,.pdf-page td{border:1px solid #333;padding:4px 5px;text-align:center;}
  .pdf-page th{background:#e8e8e8;font-weight:600;}
  .pdf-page .sig-line{margin-top:12px;display:flex;justify-content:space-around;font-size:11px;align-items:flex-end;}
  .pdf-page .sig-line .sig-block{display:inline-flex;flex-direction:column;align-items:center;min-width:160px;}
  .pdf-page .sig-line .sig-block img{max-width:100px;max-height:40px;object-fit:contain;margin-bottom:2px;}
  .pdf-page .sig-line .sig-block .sig-label{border-top:1px solid #333;padding-top:2px;min-width:120px;text-align:center;}
  .pdf-page-break{page-break-before:always;}
  .pdf-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
  .pdf-photo-cell{border:1px solid #ccc;border-radius:4px;overflow:hidden;min-height:120px;}
  .pdf-photo-cell .ppc-header{background:#eee;padding:3px 6px;font-size:10px;font-weight:600;}
  .pdf-photo-cell .ppc-body{padding:6px;display:flex;align-items:center;justify-content:center;min-height:100px;}
  .pdf-photo-cell .ppc-body img{max-width:100%;max-height:140px;object-fit:contain;}
  .pdf-photo-cell .ppc-desc{padding:2px 6px 4px;font-size:9px;color:#555;}

  .btn-dice{background:#f0ad4e;color:#fff;border-radius:8px;font-size:13px;padding:6px 14px;display:inline-flex;align-items:center;gap:5px;}
  .btn-dice:hover{background:#ec971f;}

  /* Drive picker modal */
  .drive-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;align-items:center;justify-content:center;}
  .drive-overlay.open{display:flex;}
  .drive-box{background:var(--card);border-radius:12px;width:520px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
  .drive-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .drive-header h3{flex:1;font-size:15px;}
  .drive-header .btn{flex-shrink:0;}
  .drive-list{flex:1;overflow-y:auto;padding:8px 0;}
  .drive-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid #f0f0ea;}
  .drive-item:hover{background:var(--accent-light);}
  .drive-item.selected{background:#d0e8ff;}
  .drive-item .di-icon{font-size:20px;flex-shrink:0;}
  .drive-item .di-info{flex:1;min-width:0;}
  .drive-item .di-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .drive-item .di-meta{font-size:11px;color:var(--text-light);margin-top:2px;}
  .drive-item .di-size{font-size:11px;color:var(--text-light);flex-shrink:0;}
  .drive-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .drive-loading{text-align:center;padding:40px;color:var(--text-light);font-size:13px;}
  .drive-empty{text-align:center;padding:40px;color:var(--text-light);font-size:13px;}
  .btn-cloud{background:#1a73e8;color:#fff;}
  .btn-cloud:hover{background:#1557b0;}

  @media(max-width:768px){
    .app-header{padding:10px 14px;}
    .app-header h1{font-size:14px;}
    .tab-btn{padding:6px 12px;font-size:12px;}
    .meta-bar{padding:10px 14px;}
    .tab-panel{padding:12px 14px;}
    .photo-grid{grid-template-columns:repeat(2,1fr);}
    .actions{padding:10px 14px;}
    .record-table{font-size:11px;}
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>💧 營建工地每日噴灑水作業紀錄</h1>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab(0)">📝 灑水紀錄</button>
    <button class="tab-btn" onclick="switchTab(1)">📷 照片紀錄</button>
    <button class="tab-btn active" onclick="switchTab(2)">📋 已儲存紀錄</button>
  </div>
</div>

<div class="meta-bar" id="metaBar" style="display:none;">
  <div class="mg"><label>工程名稱</label><input type="text" id="projectName" class="project-input"></div>
  <div class="mg"><label>地點</label><span class="loc-badge" id="locBadge">—</span></div>
  <div class="mg"><label>起始日期</label><input type="date" id="startDate" class="start-date-picker" onchange="onStartDateChange()" disabled></div>
  <div class="mg"><label>～ 結束</label><span id="endDateLabel" style="font-size:13px;font-weight:500;">—</span></div>
</div>

<!-- Tab 0: Record table -->
<div class="tab-panel" id="tab0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
    <button class="btn btn-dice" onclick="randomizeTimes()">🎲 隨機產生時間</button>
    <span style="font-size:11px;color:var(--text-light);">上午 08:00~10:50 ／ 下午 13:00~15:40，間隔 10 分鐘</span>
  </div>
  <div id="recordTableWrap"></div>
  <div class="sig-section">
    <h3>簽核欄</h3>
    <div class="sig-row">
      <div class="sig-item">
        <label>現場環保工程師</label>
        <input type="text" id="sig_engineer" oninput="syncSig()">
        <div class="sig-upload-row">
          <img id="sigImg_engineer" class="sig-preview" style="display:none;">
          <button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile_engineer').click()">上傳簽名檔</button>
          <button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm_engineer" onclick="removeSigImg('engineer')" style="display:none;">✕</button>
          <input type="file" id="sigFile_engineer" accept="image/*" style="display:none" onchange="onSigImgSelect('engineer',event)">
        </div>
      </div>
      <div class="sig-item">
        <label>環境保護負責人</label>
        <input type="text" id="sig_manager" oninput="syncSig()">
        <div class="sig-upload-row">
          <img id="sigImg_manager" class="sig-preview" style="display:none;">
          <button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile_manager').click()">上傳簽名檔</button>
          <button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm_manager" onclick="removeSigImg('manager')" style="display:none;">✕</button>
          <input type="file" id="sigFile_manager" accept="image/*" style="display:none" onchange="onSigImgSelect('manager',event)">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tab 1: Photo records -->
<div class="tab-panel" id="tab1">
  <h3 style="font-size:14px;margin-bottom:4px;">📷 照片紀錄 — <span id="photoLocLabel">—</span></h3>
  <p style="font-size:12px;color:var(--text-light);margin-bottom:10px;">點擊卡片上傳照片，5天各一張 + 第6格自訂</p>
  <div class="photo-grid" id="photoGrid"></div>
  <div class="sig-section" style="margin-top:14px;">
    <h3>簽核欄（與紀錄表同步）</h3>
    <div class="sig-row">
      <div class="sig-item">
        <label>現場環保工程師</label>
        <input type="text" id="sig2_engineer" oninput="syncSig2()">
        <div class="sig-upload-row">
          <img id="sigImg2_engineer" class="sig-preview" style="display:none;">
          <button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile2_engineer').click()">上傳簽名檔</button>
          <button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm2_engineer" onclick="removeSigImg2('engineer')" style="display:none;">✕</button>
          <input type="file" id="sigFile2_engineer" accept="image/*" style="display:none" onchange="onSigImgSelect2('engineer',event)">
        </div>
      </div>
      <div class="sig-item">
        <label>環境保護負責人</label>
        <input type="text" id="sig2_manager" oninput="syncSig2()">
        <div class="sig-upload-row">
          <img id="sigImg2_manager" class="sig-preview" style="display:none;">
          <button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile2_manager').click()">上傳簽名檔</button>
          <button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm2_manager" onclick="removeSigImg2('manager')" style="display:none;">✕</button>
          <input type="file" id="sigFile2_manager" accept="image/*" style="display:none" onchange="onSigImgSelect2('manager',event)">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tab 2: Saved records list -->
<div class="tab-panel active" id="tab2">
  <div class="list-toolbar">
    <button class="btn btn-new" onclick="openNewRecDialog()">➕ 新增紀錄</button>
    <select id="filterLoc" onchange="renderList()"><option value="">全部地點</option><option value="台中">台中</option><option value="通霄">通霄</option></select>
    <input type="month" id="filterFrom" onchange="renderList()" title="起始月份">
    <span style="font-size:13px;color:var(--text-light);">～</span>
    <input type="month" id="filterTo" onchange="renderList()" title="結束月份">
    <select id="sortBy" onchange="renderList()">
      <option value="startDate_desc">起始日期（新→舊）</option>
      <option value="startDate_asc">起始日期（舊→新）</option>
      <option value="loc">地點</option>
    </select>
  </div>
  <div id="recordsList"></div>
  <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑️ 刪除勾選</button>
    <div style="flex:1;"></div>
    <button class="btn btn-cloud btn-sm" onclick="uploadToDrive()">☁️ 上傳合併到雲端</button>
    <button class="btn btn-cloud btn-sm" onclick="downloadFromDrive()" style="background:#34a853;">☁️ 從雲端同步</button>
    <button class="btn btn-outline btn-sm" onclick="openDrivePicker()" style="font-size:11px;">📂 備份檔</button>
    <span style="color:var(--border);">|</span>
    <button class="btn btn-outline btn-sm" onclick="exportAllJSON()">📥 匯出本機 JSON</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📤 匯入本機 JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<!-- Action bar for editing -->
<div class="actions hidden" id="actionBar">
  <button class="btn btn-new btn-sm" onclick="openNewRecDialog()">➕ 新增紀錄</button>
  <button class="btn btn-danger btn-sm" onclick="clearForm()">清除表單</button>
  <div style="flex:1;"></div>
  <button class="btn btn-save" onclick="saveRecord()">💾 儲存紀錄</button>
  <button class="btn btn-outline" onclick="openPreview()" style="border-color:var(--pm);color:var(--pm);">👁️ 預覽</button>
  <button class="btn btn-pdf" onclick="exportPDF()" id="btnPdf">匯出 PDF</button>
</div>

<div class="toast" id="toast"></div>

<!-- New record dialog -->
<div class="newrec-overlay" id="newrecDialog">
  <div class="newrec-box">

<script>
/* ===== Constants ===== */
const DAYS=5, PHOTOS=6, SK='watering_records_v3';
const DEFAULT_PROJECT='通霄電廠第二期更新改建計畫－海底輸氣管線統包工程';
const METHODS=['人工灑水','灑水車','灑水器自動噴灑','其他'];
const DM=1; // default method index (灑水車)

// ★ 貼上你的 Apps Script 部署 URL ★
const API_URL = 'https://script.google.com/macros/s/AKfycbwzwyi3taYBZb3MA1O82zH1ExVVBmsMVHerydDHHo0iVVgA-uK_6bQEFD600Nbpca2y-w/exec';

let currentEditKey=null;
let fieldSource={water:null,len:null,person:null};
let isEditing=false;
let selectedDriveFileId=null;

/* ===== Utility ===== */
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'')+' show';setTimeout(()=>t.className='toast',3500);}
function $(id){return document.getElementById(id);}
function getMonday(dateStr){const d=new Date(dateStr);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.toISOString().slice(0,10);}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtDateFull(s){if(!s)return'—';return s;}
function weekday(s){return['日','一','二','三','四','五','六'][new Date(s).getDay()];}

/* ===== Tab switching ===== */
function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  const isEdit=idx===0||idx===1;
  $('metaBar').style.display=isEdit?'flex':'none';
  $('actionBar').classList.toggle('hidden',!isEdit);
  if(idx===2)renderList();
}

/* ===== Build record table ===== */
function buildRecordTable(){
  let h='<table class="record-table"><thead><tr><th colspan="2">日期/時段</th><th>灑水開始時間</th><th>灑水結束時間</th><th>灑水方式</th><th>累計用水量(m³)</th><th>灑水面積(m²)</th><th>操作人員</th></tr></thead><tbody>';
  for(let d=0;d<DAYS;d++){
    const rid_am=`d${d}_am`, rid_pm=`d${d}_pm`;
    h+=`<tr class="day-header"><td colspan="8" id="dayLabel_${d}">第 ${d+1} 天</td></tr>`;
    h+=`<tr class="am-row"><td>上午</td><td style="width:70px;" id="dayDate_${d}_am"></td>`;
    h+=`<td><input type="time" id="${rid_am}_start"></td><td><input type="time" id="${rid_am}_end"></td>`;
    h+=`<td><select class="method-select" id="${rid_am}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`;
    h+=`<td><input type="number" id="${rid_am}_water" step="0.1" min="0" oninput="onFieldChange('${rid_am}_water','water')"></td>`;
    h+=`<td><input type="number" id="${rid_am}_len" step="0.1" min="0" oninput="onFieldChange('${rid_am}_len','len')"></td>`;
    h+=`<td><input type="text" id="${rid_am}_person" oninput="onFieldChange('${rid_am}_person','person')"></td></tr>`;
    h+=`<tr class="pm-row"><td>下午</td><td id="dayDate_${d}_pm"></td>`;
    h+=`<td><input type="time" id="${rid_pm}_start"></td><td><input type="time" id="${rid_pm}_end"></td>`;
    h+=`<td><select class="method-select" id="${rid_pm}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`;
    h+=`<td><input type="number" id="${rid_pm}_water" step="0.1" min="0" oninput="onFieldChange('${rid_pm}_water','water')"></td>`;
    h+=`<td><input type="number" id="${rid_pm}_len" step="0.1" min="0" oninput="onFieldChange('${rid_pm}_len','len')"></td>`;
    h+=`<td><input type="text" id="${rid_pm}_person" oninput="onFieldChange('${rid_pm}_person','person')"></td></tr>`;
  }
  h+='</tbody></table>';
  $('recordTableWrap').innerHTML=h;
}

/* ===== Build photo grid ===== */
function buildPhotoGrid(){
  let h='';
  for(let i=0;i<PHOTOS;i++){
    const label=i<5?`第 ${i+1} 天`:'自訂';
    h+=`<div class="photo-card" id="pc_${i}">
      <div class="ph-header"><span id="pcLabel_${i}">${label}</span><span style="font-size:11px;" id="pcDate_${i}"></span></div>
      <div class="ph-body" onclick="document.getElementById('photoInput_${i}').click()">
        <button class="remove-photo" onclick="event.stopPropagation();removePhoto(${i})">×</button>
        <div class="placeholder" id="phPlaceholder_${i}">點擊上傳照片</div>
        <img id="phImg_${i}" style="display:none;">
      </div>
      <div class="ph-desc"><input type="text" id="phDesc_${i}" placeholder="照片說明（選填）"></div>
      <input type="file" id="photoInput_${i}" accept="image/*" onchange="onPhotoSelect(${i},event)">
    </div>`;
  }
  $('photoGrid').innerHTML=h;
}

/* ===== Photo handlers ===== */
function onPhotoSelect(idx,e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    compressImage(ev.target.result,800,0.7,compressed=>{
      const img=$(`phImg_${idx}`);
      img.src=compressed;img.style.display='block';
      $(`phPlaceholder_${idx}`).style.display='none';
    });
  };
  reader.readAsDataURL(file);
}
function removePhoto(idx){
  $(`phImg_${idx}`).src='';$(`phImg_${idx}`).style.display='none';
  $(`phPlaceholder_${idx}`).style.display='block';
  $(`photoInput_${idx}`).value='';
}
function compressImage(dataUrl,maxW,quality,cb){
  const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxW){h=h*(maxW/w);w=maxW;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',quality));
  };img.src=dataUrl;
}

/* ===== Field auto-sync ===== */
function onFieldChange(srcId,field){
  const val=$(srcId).value;
  if(!fieldSource[field])fieldSource[field]=srcId;
  if(fieldSource[field]!==srcId)return;
  for(let d=0;d<DAYS;d++){
    for(const p of['am','pm']){
      const tid=`d${d}_${p}_${field}`;
      if(tid===srcId)continue;
      const el=$(tid);if(!el)continue;
      if(!el.dataset.manual||el.dataset.manual==='false'){
        el.value=val;el.dataset.autoFilled='true';
      }
    }
  }
}
function markManual(e){
  const el=e.target;
  if(el.dataset.autoFilled==='true'){el.dataset.manual='true';el.dataset.autoFilled='false';}
}
document.addEventListener('focus',e=>{
  if(e.target.matches&&(e.target.matches('input[type="number"]')||e.target.matches('input[type="text"]'))){
    e.target.addEventListener('input',markManual,{once:true});
  }
},true);

/* ===== Date logic ===== */
function onStartDateChange(){
  const sd=$('startDate').value;if(!sd)return;
  const monday=getMonday(sd);
  $('startDate').value=monday;
  const ed=addDays(monday,4);
  $('endDateLabel').textContent=fmtDateFull(ed);
  for(let d=0;d<DAYS;d++){
    const dt=addDays(monday,d);
    const label=`${fmtDate(dt)}（${weekday(dt)}）`;
    $(`dayLabel_${d}`).textContent=`${fmtDate(dt)}（${weekday(dt)}）`;
    $(`dayDate_${d}_am`).textContent=fmtDate(dt);
    $(`dayDate_${d}_pm`).textContent='';
    if(d<5){
      $(`pcDate_${d}`).textContent=label;
      $(`pcLabel_${d}`).textContent=`第 ${d+1} 天`;
    }
  }
  $('photoLocLabel').textContent=$('locBadge').textContent;
}

/* ===== Random times ===== */
function randomizeTimes(){
  for(let d=0;d<DAYS;d++){
    const amH=8+Math.floor(Math.random()*3);
    const amM=Math.floor(Math.random()*6)*10;
    const amStart=`${String(amH).padStart(2,'0')}:${String(amM).padStart(2,'0')}`;
    let amEndM=amM+10,amEndH=amH;if(amEndM>=60){amEndM-=60;amEndH++;}
    const amEnd=`${String(amEndH).padStart(2,'0')}:${String(amEndM).padStart(2,'0')}`;
    $(`d${d}_am_start`).value=amStart;$(`d${d}_am_end`).value=amEnd;

    const pmH=13+Math.floor(Math.random()*3);
    const pmM=Math.floor(Math.random()*5)*10;
    const pmStart=`${String(pmH).padStart(2,'0')}:${String(pmM).padStart(2,'0')}`;
    let pmEndM=pmM+10,pmEndH=pmH;if(pmEndM>=60){pmEndM-=60;pmEndH++;}
    const pmEnd=`${String(pmEndH).padStart(2,'0')}:${String(pmEndM).padStart(2,'0')}`;
    $(`d${d}_pm_start`).value=pmStart;$(`d${d}_pm_end`).value=pmEnd;
  }
}

/* ===== Sig sync ===== */
function syncSig(){
  $('sig2_engineer').value=$('sig_engineer').value;
  $('sig2_manager').value=$('sig_manager').value;
  // sync images too
  for(const role of['engineer','manager']){
    const src=$(`sigImg_${role}`).src;
    const vis=$(`sigImg_${role}`).style.display;
    $(`sigImg2_${role}`).src=src;
    $(`sigImg2_${role}`).style.display=vis;
    $(`sigRm2_${role}`).style.display=vis==='none'?'none':'inline-block';
  }
}
function syncSig2(){
  $('sig_engineer').value=$('sig2_engineer').value;
  $('sig_manager').value=$('sig2_manager').value;
  for(const role of['engineer','manager']){
    const src=$(`sigImg2_${role}`).src;
    const vis=$(`sigImg2_${role}`).style.display;
    $(`sigImg_${role}`).src=src;
    $(`sigImg_${role}`).style.display=vis;
    $(`sigRm_${role}`).style.display=vis==='none'?'none':'inline-block';
  }
}

/* ===== Signature image handlers ===== */
function onSigImgSelect(role,e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    compressImage(ev.target.result,400,0.8,compressed=>{
      $(`sigImg_${role}`).src=compressed;
      $(`sigImg_${role}`).style.display='block';
      $(`sigRm_${role}`).style.display='inline-block';
      syncSig();
    });
  };
  reader.readAsDataURL(file);
}
function removeSigImg(role){
  $(`sigImg_${role}`).src='';$(`sigImg_${role}`).style.display='none';
  $(`sigRm_${role}`).style.display='none';$(`sigFile_${role}`).value='';
  syncSig();
}
function onSigImgSelect2(role,e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    compressImage(ev.target.result,400,0.8,compressed=>{
      $(`sigImg2_${role}`).src=compressed;
      $(`sigImg2_${role}`).style.display='block';
      $(`sigRm2_${role}`).style.display='inline-block';
      syncSig2();
    });
  };
  reader.readAsDataURL(file);
}
function removeSigImg2(role){
  $(`sigImg2_${role}`).src='';$(`sigImg2_${role}`).style.display='none';
  $(`sigRm2_${role}`).style.display='none';$(`sigFile2_${role}`).value='';
  syncSig2();
}

/* ===== Collect / Load data ===== */
function collectData(){
  const data={
    project:$('projectName').value,
    location:$('locBadge').textContent,
    startDate:$('startDate').value,
    endDate:$('endDateLabel').textContent,
    sig:{
      engineer:$('sig_engineer').value,
      engineerImg:$('sigImg_engineer').style.display!=='none'?$('sigImg_engineer').src:'',
      manager:$('sig_manager').value,
      managerImg:$('sigImg_manager').style.display!=='none'?$('sigImg_manager').src:''
    },
    days:[],
    photos:[]
  };
  for(let d=0;d<DAYS;d++){
    const day={date:addDays(data.startDate,d),am:{},pm:{}};
    for(const p of['am','pm']){
      day[p]={
        start:$(`d${d}_${p}_start`).value,
        end:$(`d${d}_${p}_end`).value,
        method:$(`d${d}_${p}_method`).value,
        water:$(`d${d}_${p}_water`).value,
        len:$(`d${d}_${p}_len`).value,
        person:$(`d${d}_${p}_person`).value
      };
    }
    data.days.push(day);
  }
  for(let i=0;i<PHOTOS;i++){
    const img=$(`phImg_${i}`);
    data.photos.push({
      src:img.style.display!=='none'?img.src:'',
      desc:$(`phDesc_${i}`).value
    });
  }
  data.savedAt=new Date().toISOString();
  return data;
}
function loadData(data){
  $('projectName').value=data.project||DEFAULT_PROJECT;
  $('locBadge').textContent=data.location||'—';
  $('startDate').value=data.startDate||'';
  onStartDateChange();
  if(data.sig){
    $('sig_engineer').value=data.sig.engineer||'';
    $('sig_manager').value=data.sig.manager||'';
    if(data.sig.engineerImg){$('sigImg_engineer').src=data.sig.engineerImg;$('sigImg_engineer').style.display='block';$('sigRm_engineer').style.display='inline-block';}
    if(data.sig.managerImg){$('sigImg_manager').src=data.sig.managerImg;$('sigImg_manager').style.display='block';$('sigRm_manager').style.display='inline-block';}
    syncSig();
  }
  if(data.days){
    data.days.forEach((day,d)=>{
      if(d>=DAYS)return;
      for(const p of['am','pm']){
        if(!day[p])return;
        $(`d${d}_${p}_start`).value=day[p].start||'';
        $(`d${d}_${p}_end`).value=day[p].end||'';
        $(`d${d}_${p}_method`).value=day[p].method??DM;
        $(`d${d}_${p}_water`).value=day[p].water||'';
        $(`d${d}_${p}_len`).value=day[p].len||'';
        $(`d${d}_${p}_person`).value=day[p].person||'';
      }
    });
  }
  if(data.photos){
    data.photos.forEach((ph,i)=>{
      if(i>=PHOTOS)return;
      if(ph.src){$(`phImg_${i}`).src=ph.src;$(`phImg_${i}`).style.display='block';$(`phPlaceholder_${i}`).style.display='none';}
      $(`phDesc_${i}`).value=ph.desc||'';
    });
  }
  $('photoLocLabel').textContent=data.location||'—';
}

/* ===== Storage ===== */
function getAll(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return {};}}
function saveAll(obj){localStorage.setItem(SK,JSON.stringify(obj));}
function recKey(loc,sd){return `${loc}_${sd}`;}

/* ===== Save ===== */
function saveRecord(){
  const data=collectData();
  if(!data.startDate||!data.location||data.location==='—'){toast('請先選擇地點和日期',true);return;}
  const all=getAll();
  const key=recKey(data.location,data.startDate);
  const isUpdate=!!all[key];
  all[key]=data;
  saveAll(all);
  currentEditKey=key;
  toast(isUpdate?'✅ 已更新既有紀錄':'✅ 已新增紀錄');
  $('postSaveMsg').textContent=`${data.location} ${data.startDate} ～ ${data.endDate}`;
  $('postSaveDialog').classList.add('open');
}
function postSaveExportPdf(){closePostSave();exportPDF();}
function postSaveNewRecord(){closePostSave();openNewRecDialog();}
function closePostSave(){$('postSaveDialog').classList.remove('open');}

/* ===== Clear form ===== */
function clearForm(){
  if(isEditing&&!confirm('目前正在編輯紀錄，確定清除？'))return;
  clearFormSilent();
  toast('表單已清除');
}
function clearFormSilent(){
  for(let d=0;d<DAYS;d++){
    for(const p of['am','pm']){
      $(`d${d}_${p}_start`).value='';$(`d${d}_${p}_end`).value='';
      $(`d${d}_${p}_method`).value=DM;
      $(`d${d}_${p}_water`).value='';$(`d${d}_${p}_len`).value='';
      $(`d${d}_${p}_person`).value='';
      const wEl=$(`d${d}_${p}_water`),lEl=$(`d${d}_${p}_len`),pEl=$(`d${d}_${p}_person`);
      if(wEl){wEl.dataset.manual='false';wEl.dataset.autoFilled='false';}
      if(lEl){lEl.dataset.manual='false';lEl.dataset.autoFilled='false';}
      if(pEl){pEl.dataset.manual='false';pEl.dataset.autoFilled='false';}
    }
  }
  for(let i=0;i<PHOTOS;i++)removePhoto(i);
  $('sig_engineer').value='';$('sig_manager').value='';
  for(const role of['engineer','manager']){removeSigImg(role);}
  syncSig();
  fieldSource={water:null,len:null,person:null};
  currentEditKey=null;isEditing=false;
}

/* ===== New Record dialog ===== */
function openNewRecDialog(){
  if(isEditing&&!confirm('目前正在編輯，確定要新增新紀錄？'))return;
  $('newrecLoc').value='通霄';
  $('newrecLocCustom').style.display='none';
  const today=new Date().toISOString().slice(0,10);
  $('newrecDate').value=getMonday(today);
  $('newrecDupWarn').classList.remove('show');
  $('newrecLoadBtn').style.display='none';
  $('newrecDialog').classList.add('open');
  onNewrecDateChange();
}
$('newrecLoc').addEventListener('change',function(){
  $('newrecLocCustom').style.display=this.value==='__other'?'block':'none';
  onNewrecDateChange();
});
function getNewrecLoc(){
  const v=$('newrecLoc').value;
  return v==='__other'?($('newrecLocCustom').value.trim()||'未命名'):v;
}
function onNewrecDateChange(){
  const sd=$('newrecDate').value;if(!sd)return;
  $('newrecDate').value=getMonday(sd);
  const loc=getNewrecLoc();
  const all=getAll();
  const key=recKey(loc,$('newrecDate').value);
  if(all[key]){
    $('newrecDupWarn').textContent=`⚠️ 已有「${loc} ${$('newrecDate').value}」的紀錄`;
    $('newrecDupWarn').classList.add('show');
    $('newrecLoadBtn').style.display='inline-block';
  }else{
    $('newrecDupWarn').classList.remove('show');
    $('newrecLoadBtn').style.display='none';
  }
}
function newrecLoadExisting(){
  const loc=getNewrecLoc();
  const sd=$('newrecDate').value;
  const all=getAll();
  const key=recKey(loc,sd);
  if(all[key]){
    clearFormSilent();
    loadData(all[key]);
    currentEditKey=key;isEditing=true;
    closeNewrecDialog();switchTab(0);
    toast('已帶入既有資料');
  }
}
function newrecConfirm(){
  const loc=getNewrecLoc();
  if(!loc){toast('請輸入地點',true);return;}
  const sd=$('newrecDate').value;
  if(!sd){toast('請選擇日期',true);return;}
  clearFormSilent();
  $('locBadge').textContent=loc;
  $('startDate').value=sd;
  $('projectName').value=DEFAULT_PROJECT;
  onStartDateChange();
  randomizeTimes();
  currentEditKey=recKey(loc,sd);isEditing=true;
  closeNewrecDialog();switchTab(0);
  toast(`新紀錄：${loc} ${sd}`);
}
function closeNewrecDialog(){$('newrecDialog').classList.remove('open');}

/* ===== Records list ===== */
function renderList(){
  const all=getAll();
  let entries=Object.entries(all);
  const fLoc=$('filterLoc').value;
  const fFrom=$('filterFrom').value;
  const fTo=$('filterTo').value;
  if(fLoc)entries=entries.filter(([,v])=>v.location===fLoc);
  if(fFrom)entries=entries.filter(([,v])=>v.startDate>=fFrom);
  if(fTo)entries=entries.filter(([,v])=>v.startDate<=(fTo+'-31'));
  const sort=$('sortBy').value;
  if(sort==='startDate_desc')entries.sort((a,b)=>b[1].startDate.localeCompare(a[1].startDate));
  else if(sort==='startDate_asc')entries.sort((a,b)=>a[1].startDate.localeCompare(b[1].startDate));
  else if(sort==='loc')entries.sort((a,b)=>(a[1].location||'').localeCompare(b[1].location||''));

  if(!entries.length){$('recordsList').innerHTML='<div class="empty-list">📭 尚無紀錄</div>';return;}
  let h='';
  entries.forEach(([key,rec])=>{
    const photos=rec.photos?rec.photos.filter(p=>p.src).length:0;
    h+=`<div class="rec-card">
      <input type="checkbox" class="rc-check" data-key="${key}">
      <div class="rc-info">
        <div class="rc-title">${rec.location||'—'} ｜ ${rec.startDate} ～ ${rec.endDate||''}</div>
        <div class="rc-sub">${rec.project||''} ・ 照片 ${photos} 張 ・ 儲存於 ${rec.savedAt?new Date(rec.savedAt).toLocaleString('zh-TW'):''}</div>
      </div>
      <div class="rc-actions">
        <button class="btn btn-outline btn-sm" onclick="editRecord('${key}')">✏️ 編輯</button>
      </div>
    </div>`;
  });
  $('recordsList').innerHTML=h;
}
function editRecord(key){
  const all=getAll();
  if(!all[key])return;
  clearFormSilent();
  loadData(all[key]);
  currentEditKey=key;isEditing=true;
  switchTab(0);
  toast('已載入紀錄');
}
function deleteSelected(){
  const checks=document.querySelectorAll('.rc-check:checked');
  if(!checks.length){toast('請先勾選要刪除的紀錄',true);return;}
  if(!confirm(`確定刪除 ${checks.length} 筆紀錄？`))return;
  const all=getAll();
  checks.forEach(c=>delete all[c.dataset.key]);
  saveAll(all);
  renderList();
  toast(`已刪除 ${checks.length} 筆`);
}

/* ===== JSON import/export ===== */
function exportAllJSON(){
  const all=getAll();
  const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`灑水紀錄_全部_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('已匯出 JSON');
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      const all=getAll();
      let added=0,updated=0;
      Object.entries(imported).forEach(([key,val])=>{
        if(all[key])updated++;else added++;
        all[key]=val;
      });
      saveAll(all);renderList();
      toast(`匯入完成：新增 ${added} 筆，更新 ${updated} 筆`);
    }catch(err){toast('匯入失敗：'+err.message,true);}
  };
  r.readAsText(f);e.target.value='';
}

/* ===== PDF Generation ===== */
function buildPdfHtml(data){
  const loc=data.location||'—';
  const sd=data.startDate||'';
  const ed=data.endDate||'';
  // Page 1: record table
  let h=`<div class="pdf-page">
    <h2>營建工地每日噴灑水作業紀錄表</h2>
    <div class="sub-info">工程名稱：${data.project||''} ｜ 地點：${loc} ｜ 期間：${sd} ～ ${ed}</div>
    <table>
      <thead><tr><th>日期</th><th>時段</th><th>開始時間</th><th>結束時間</th><th>灑水方式</th><th>累計用水量(m³)</th><th>灑水面積(m²)</th><th>操作人員</th></tr></thead><tbody>`;
  if(data.days){
    data.days.forEach((day,d)=>{
      const dt=day.date?`${fmtDate(day.date)}(${weekday(day.date)})`:`第${d+1}天`;
      for(const p of['am','pm']){
        const r=day[p]||{};
        h+=`<tr><td>${p==='am'?dt:''}</td><td>${p==='am'?'上午':'下午'}</td>`;
        h+=`<td>${r.start||''}</td><td>${r.end||''}</td>`;
        h+=`<td>${METHODS[r.method]||METHODS[DM]}</td>`;
        h+=`<td>${r.water||''}</td><td>${r.len||''}</td><td>${r.person||''}</td></tr>`;
      }
    });
  }
  h+='</tbody></table>';
  h+=`<div class="sig-line">
    <div class="sig-block">${data.sig?.engineerImg?`<img src="${data.sig.engineerImg}">`:''}<div class="sig-label">現場環保工程師：${data.sig?.engineer||''}</div></div>
    <div class="sig-block">${data.sig?.managerImg?`<img src="${data.sig.managerImg}">`:''}<div class="sig-label">環境保護負責人：${data.sig?.manager||''}</div></div>
  </div></div>`;

  // Page 2: photos
  h+=`<div class="pdf-page pdf-page-break">
    <h2>營建工地噴灑水作業照片紀錄</h2>
    <div class="sub-info">地點：${loc} ｜ 期間：${sd} ～ ${ed}</div>
    <div class="pdf-photo-grid">`;
  if(data.photos){
    data.photos.forEach((ph,i)=>{
      const dt=i<5&&data.days&&data.days[i]?`${fmtDate(data.days[i].date)}(${weekday(data.days[i].date)})`:i===5?'自訂':'';
      const label=i<5?`第 ${i+1} 天`:dt;
      h+=`<div class="pdf-photo-cell">
        <div class="ppc-header">${label} ${dt&&i<5?dt:''}</div>
        <div class="ppc-body" style="min-height:140px;">${ph.src?`<img src="${ph.src}" style="max-height:140px;">`:'<span style="color:#ccc;">無照片</span>'}</div>
        <div class="ppc-desc">${ph.desc||''}</div>
      </div>`;
    });
  }
  h+=`</div><div class="sig-line" style="margin-top:10px;">
    <div class="sig-block">${data.sig?.engineerImg?`<img src="${data.sig.engineerImg}">`:''}<div class="sig-label">現場環保工程師：${data.sig?.engineer||''}</div></div>
    <div class="sig-block">${data.sig?.managerImg?`<img src="${data.sig.managerImg}">`:''}<div class="sig-label">環境保護負責人：${data.sig?.manager||''}</div></div>
  </div></div>`;
  return h;
}

async function exportPDF(){
  const btn=$('btnPdf');btn.disabled=true;btn.textContent='匯出中...';
  try{
    const data=collectData();
    const c=$('pdfContent');c.innerHTML=buildPdfHtml(data);
    $('pdfOverlay').style.position='absolute';$('pdfOverlay').style.top='0';$('pdfOverlay').style.opacity='1';
    await html2pdf().set({
      margin:0,filename:`灑水紀錄_${data.location||''}_${data.startDate||''}.pdf`,
      image:{type:'jpeg',quality:0.92},
      html2canvas:{scale:2,useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
      pagebreak:{mode:['css'],before:'.pdf-page-break'}
    }).from(c).save();
    toast('PDF 已匯出');
  }catch(err){toast('PDF匯出失敗：'+err.message,true);}
  $('pdfOverlay').style.position='fixed';$('pdfOverlay').style.top='-99999px';$('pdfOverlay').style.opacity='0';
  btn.disabled=false;btn.textContent='匯出 PDF';
}

/* ===== Preview ===== */
function openPreview(){
  const data=collectData();
  $('previewBody').innerHTML=buildPdfHtml(data);
  $('previewModal').classList.add('open');
}
function closePreview(){$('previewModal').classList.remove('open');}
function exportPdfFromPreview(){closePreview();exportPDF();}

/* ===== Google Drive Sync (防覆蓋版) ===== */
function checkApiUrl(){
  if(!API_URL||API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    toast('⚠️ 請先設定 API_URL（Apps Script 部署網址）',true);
    return false;
  }
  return true;
}

async function uploadToDrive(){
  if(!checkApiUrl())return;
  const all=getAll();
  const keys=Object.keys(all);
  if(!keys.length){toast('沒有紀錄可上傳',true);return;}
  const uploader=prompt('請輸入你的名字（用於識別上傳者）：','');
  if(uploader===null)return;
  toast('☁️ 合併上傳中...');
  try{
    const resp=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({data:all,uploader:uploader||'未知'})
    });
    const result=await resp.json();
    if(result.success){
      let msg=`✅ 雲端合併完成！新增 ${result.added} 筆、更新 ${result.updated} 筆`;
      if(result.skipped>0)msg+=`、跳過 ${result.skipped} 筆（雲端較新）`;
      msg+=`，雲端共 ${result.totalRecords} 筆`;
      toast(msg);
    }else{
      toast('❌ 上傳失敗：'+result.error,true);
    }
  }catch(err){
    toast('❌ 網路錯誤：'+err.message,true);
  }
}

async function downloadFromDrive(){
  if(!checkApiUrl())return;
  toast('☁️ 從雲端讀取中...');
  try{
    const resp=await fetch(API_URL+'?action=read');
    const result=await resp.json();
    if(!result.success){
      toast('❌ 讀取失敗：'+result.error,true);return;
    }
    if(!result.data||!Object.keys(result.data).length){
      toast('📭 雲端尚無資料');return;
    }
    const imported=result.data;
    const all=getAll();
    let added=0,updated=0,skipped=0;
    Object.entries(imported).forEach(([key,val])=>{
      if(!all[key]){all[key]=val;added++;}
      else{
        const oldTime=all[key].savedAt||'';
        const newTime=val.savedAt||'';
        if(newTime>=oldTime){all[key]=val;updated++;}
        else{skipped++;}
      }
    });
    saveAll(all);renderList();
    let msg=`✅ 已從雲端同步：新增 ${added} 筆、更新 ${updated} 筆`;
    if(skipped>0)msg+=`、跳過 ${skipped} 筆（本機較新）`;
    toast(msg);
  }catch(err){
    toast('❌ 網路錯誤：'+err.message,true);
  }
}

async function openDrivePicker(){
  if(!checkApiUrl())return;
  selectedDriveFileId=null;
  $('driveLoadBtn').disabled=true;
  $('drivePickerModal').classList.add('open');
  $('driveFileList').innerHTML='<div class="drive-loading">☁️ 載入備份清單中...</div>';
  try{
    const resp=await fetch(API_URL+'?action=list');
    const result=await resp.json();
    if(!result.success){
      $('driveFileList').innerHTML=`<div class="drive-empty">❌ ${result.error}</div>`;return;
    }
    if(!result.files||!result.files.length){
      $('driveFileList').innerHTML='<div class="drive-empty">📭 沒有備份檔案</div>';return;
    }
    let h='';
    result.files.forEach(f=>{
      const size=f.size>1024?(f.size/1024).toFixed(1)+' KB':f.size+' B';
      const created=new Date(f.created).toLocaleString('zh-TW');
      h+=`<div class="drive-item" data-id="${f.id}" onclick="selectDriveFile(this,'${f.id}')">
        <div class="di-icon">📄</div>
        <div class="di-info">
          <div class="di-name">${f.name}</div>
          <div class="di-meta">${created}</div>
        </div>
        <div class="di-size">${size}</div>
      </div>`;
    });
    $('driveFileList').innerHTML=h;
  }catch(err){
    $('driveFileList').innerHTML=`<div class="drive-empty">❌ 網路錯誤：${err.message}</div>`;
  }
}

function selectDriveFile(el,fileId){
  document.querySelectorAll('.drive-item').forEach(d=>d.classList.remove('selected'));
  el.classList.add('selected');
  selectedDriveFileId=fileId;
  $('driveLoadBtn').disabled=false;
}

async function loadSelectedDriveFile(){
  if(!selectedDriveFileId)return;
  $('driveLoadBtn').disabled=true;
  $('driveLoadBtn').textContent='讀取中...';
  try{
    const resp=await fetch(API_URL+'?action=get&fileId='+selectedDriveFileId);
    const result=await resp.json();
    if(!result.success){
      toast('❌ 讀取失敗：'+result.error,true);
      $('driveLoadBtn').disabled=false;$('driveLoadBtn').textContent='讀取選擇的檔案';return;
    }
    const imported=result.data;
    const all=getAll();
    let added=0,updated=0;
    Object.entries(imported).forEach(([key,val])=>{
      if(all[key])updated++;else added++;
      all[key]=val;
    });
    saveAll(all);renderList();closeDrivePicker();
    toast(`✅ 已從備份載入：新增 ${added} 筆，更新 ${updated} 筆`);
  }catch(err){
    toast('❌ 網路錯誤：'+err.message,true);
  }
  $('driveLoadBtn').disabled=false;$('driveLoadBtn').textContent='讀取選擇的檔案';
}

function closeDrivePicker(){
  $('drivePickerModal').classList.remove('open');
  selectedDriveFileId=null;
}

buildRecordTable();
buildPhotoGrid();
$('projectName').value=DEFAULT_PROJECT;
switchTab(2);
renderList();
