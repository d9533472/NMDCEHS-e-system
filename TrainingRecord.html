<!DOCTYPE html>
<html lang="zh-Hant">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>教育訓練紀錄系統</title>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  :root{
    --bg:#eef4f0; --panel:#ffffff; --panel2:#f1f7f3; --line:#e0ece6;
    --txt:#16302a; --mut:#5d7a70; --accent:#0f9d76; --accent-d:#0c8765;
    --ok:#12b76a; --warn:#f59e0b; --bad:#ef4444; --chip:#e8f3ee;
    --shadow:0 1px 2px rgba(8,40,30,.04), 0 10px 28px rgba(8,40,30,.08);
    --shadow-sm:0 1px 2px rgba(8,40,30,.05), 0 4px 12px rgba(8,40,30,.06);
    --g1:linear-gradient(135deg,#6366f1,#8b5cf6);
    --g2:linear-gradient(135deg,#0ea5e9,#22d3ee);
    --g3:linear-gradient(135deg,#10b981,#34d399);
    --g4:linear-gradient(135deg,#f59e0b,#fb923c);
    --g5:linear-gradient(135deg,#ec4899,#f472b6);
    --g6:linear-gradient(135deg,#3b82f6,#06b6d4);
    --g7:linear-gradient(135deg,#0d9488,#2dd4bf);
    --g8:linear-gradient(135deg,#65a30d,#a3e635);
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--txt);
    background-color:var(--bg);
    background-image:linear-gradient(rgba(15,157,118,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(15,157,118,.04) 1px,transparent 1px);
    background-size:27px 27px;
    font-family:"Noto Sans TC","Microsoft JhengHei","Segoe UI",system-ui,sans-serif;font-size:14px;
    -webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1200px;margin:0 auto;padding:22px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .grow{flex:1}
  .muted{color:var(--mut)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:9px 16px;font-weight:600;font-size:14px;transition:.15s;box-shadow:0 1px 2px rgba(15,157,118,.28)}
  .btn:hover{background:var(--accent-d)}
  .btn.sec{background:#fff;color:var(--txt);border:1px solid var(--line);box-shadow:none}
  .btn.sec:hover{background:var(--panel2);border-color:#d3dceb}
  .btn.ghost{background:transparent;color:var(--mut);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{background:var(--panel2);color:var(--txt)}
  .btn.danger{background:#fff;color:var(--bad);border:1px solid #f3c9c9;box-shadow:none}
  .btn.danger:hover{background:#fdecec}
  .btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
  input[type=text],input[type=number],input[type=date],input[type=time],select,textarea{
    background:#fff;border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:9px 12px;width:100%;font-size:14px;transition:.15s;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,157,118,.16)}
  input:disabled{background:var(--panel2);color:var(--mut)}
  textarea{resize:vertical;min-height:64px}
  label{display:block;font-size:12.5px;color:var(--mut);margin:0 0 6px;font-weight:500}
  .field{margin-bottom:15px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow-sm)}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:12px;padding:15px 22px;
    background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar h1{font-size:16.5px;margin:0;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:9px}
  .topbar h1::before{content:"";width:12px;height:12px;border-radius:4px;background:var(--g3)}
  .topbar .sub{font-size:11.5px;color:var(--mut);margin-left:20px}
  /* kpi */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px}
  .kpi{border-radius:18px;padding:16px 16px 15px;color:#fff;position:relative;overflow:hidden;
    box-shadow:0 8px 22px rgba(16,24,40,.12)}
  .kpi::after{content:"";position:absolute;right:-22px;top:-22px;width:84px;height:84px;
    border-radius:50%;background:rgba(255,255,255,.16)}
  .kpi .v{font-size:27px;font-weight:800;line-height:1.05;letter-spacing:.5px}
  .kpi .k{font-size:12px;color:rgba(255,255,255,.92);margin-top:5px;font-weight:500}
  .kpi .bar{height:5px;border-radius:4px;background:rgba(255,255,255,.32);margin-top:10px;overflow:hidden}
  .kpi .bar>i{display:block;height:100%;border-radius:4px;background:#fff}
  /* presets */
  .preset{background:var(--panel2);color:var(--mut);border:1px solid var(--line);
    border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600;transition:.15s}
  .preset:hover{border-color:#cdd8ea;color:var(--txt)}
  .preset.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(15,157,118,.32)}
  /* table */
  .tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  .tbl th{text-align:left;color:var(--mut);font-weight:600;font-size:12px;
    padding:11px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  .tbl td{padding:11px 10px;border-bottom:1px solid #eef2f8;vertical-align:middle}
  .tbl tr:last-child td{border-bottom:none}
  .tbl tbody tr{transition:.12s}
  .tbl tbody tr:hover td{background:#f6f9ff}
  .chip{display:inline-block;background:var(--chip);border-radius:999px;
    padding:3px 11px;font-size:11.5px;color:#41546b;font-weight:600}
  .chip.ok{background:#e3f8ee;color:#0a8f54}
  .chip.no{background:#fdeaea;color:#d23f3f}
  .pill{font-size:11px;padding:2px 9px;border-radius:7px;background:var(--chip);color:#41546b;font-weight:600}
  /* misc */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#1f2a37;color:#fff;border:none;padding:11px 20px;border-radius:12px;
    z-index:60;box-shadow:0 12px 32px rgba(16,24,40,.28);font-size:13.5px}
  .modalbg{position:fixed;inset:0;background:rgba(17,24,39,.42);backdrop-filter:blur(3px);z-index:40;
    display:flex;align-items:flex-start;justify-content:center;padding:26px;overflow:auto}
  .modalbg .card{box-shadow:var(--shadow)}
  .photoBox{border:1.5px dashed #d6deea;border-radius:12px;height:150px;display:flex;
    align-items:center;justify-content:center;overflow:hidden;background:var(--panel2)}
  .photoBox img{width:100%;height:100%;object-fit:cover}
  .att{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);
    border-radius:11px;background:var(--panel2);margin-bottom:8px}
  .att .nm{font-size:13px;word-break:break-all}
  input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;vertical-align:middle}
  .selbar{display:flex;align-items:center;gap:10px;background:#eef3ff;border:1px solid #d7e2fb;
    border-radius:12px;padding:9px 14px;margin-bottom:12px}
  .tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:999px;margin-right:4px;
    background:#eef1f4;color:#9aa7b4;border:1px solid #e4e9ef;font-weight:600}
  .tag.on{background:#e3f8ee;color:#0a8f54;border-color:#bdeed6}
  .ckbox{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--txt);cursor:pointer;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-weight:600}
  .ckbox input{margin:0}
  .act{display:inline-flex;gap:5px;justify-content:flex-end}
  .iconbtn{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--line);background:#fff;border-radius:8px;color:var(--mut);transition:.15s;padding:0}
  .iconbtn:hover{background:var(--panel2);color:var(--accent);border-color:#bfe0d2}
  .iconbtn.danger:hover{color:var(--bad);border-color:#f3c9c9;background:#fdecec}
  .modal-card{width:760px;max-width:100%}
  .modal-head{display:flex;justify-content:space-between;align-items:center;
    margin:-2px 0 18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .modal-head h2{margin:0;font-size:18px;font-weight:800;letter-spacing:.2px}
  .modal-head .x{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
    background:#fff;color:var(--mut);font-size:15px;line-height:1;transition:.15s}
  .modal-head .x:hover{background:var(--panel2);color:var(--txt)}
  .sec{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;
    color:var(--txt);margin:20px 0 11px}
  .sec::before{content:"";width:4px;height:14px;border-radius:3px;background:var(--accent)}
  .form-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;
    padding-top:16px;border-top:1px solid var(--line)}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:9px 13px;min-width:92px}
  .stat .lbl{font-size:11px;color:var(--mut)}
  .stat .val{font-size:15px;font-weight:700;margin-top:2px;color:var(--txt)}
  .ver{background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    color:var(--txt);padding:7px 10px;font-size:12.5px;max-width:230px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #cfd9e8;
    border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .center{min-height:78vh;display:flex;align-items:center;justify-content:center}
  @media(max-width:860px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .hideSm{display:none}
    .topbar .sub{display:none}
  }
</style>

/*==================== 工具 ====================*/
function xhr(method, url, body, retries=2){
  return new Promise((resolve,reject)=>{
    const attempt = left=>{
      const x = new XMLHttpRequest();
      x.open(method, url, true);
      if(method==="POST") x.setRequestHeader("Content-Type","text/plain;charset=utf-8");
      x.timeout = 60000;
      x.onload = ()=>{
        if(x.status>=200 && x.status<400){
          try{ resolve(JSON.parse(x.responseText)); }
          catch(e){ resolve({ok:false,error:"回應格式錯誤",raw:x.responseText}); }
        } else if(left>0){ setTimeout(()=>attempt(left-1),800); }
        else reject(new Error("HTTP "+x.status));
      };
      x.onerror = ()=> left>0 ? setTimeout(()=>attempt(left-1),800) : reject(new Error("網路錯誤"));
      x.ontimeout = ()=> left>0 ? setTimeout(()=>attempt(left-1),800) : reject(new Error("逾時"));
      x.send(body||null);
    };
    attempt(retries);
  });
}
const gasGet  = params => xhr("GET", GAS_URL + "?" + new URLSearchParams(params).toString());
const gasPost = payload => xhr("POST", GAS_URL, JSON.stringify(payload));

function extractDriveId(url){
  if(!url) return "";
  url = String(url).trim();
  if(/^[A-Za-z0-9_-]{20,}$/.test(url)) return url;            // 直接是 ID
  let m = url.match(/\/d\/([A-Za-z0-9_-]+)/) || url.match(/[?&]id=([A-Za-z0-9_-]+)/);
  return m ? m[1] : "";
}
function driveThumb(url, w=1600){
  const id = extractDriveId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w${w}` : url;
}
function calcHours(s,e){
  if(!s||!e) return 0;
  const [sh,sm]=s.split(":").map(Number), [eh,em]=e.split(":").map(Number);
  let d=(eh*60+em)-(sh*60+sm); if(d<0) d+=1440;
  return Math.round(d/60*100)/100;
}
function monthKey(d){ return d ? String(d).slice(0,7) : ""; }
const nowMonth = ()=> new Date().toISOString().slice(0,7);
function pct(a,b){ return b? Math.round(a/b*100):0; }
function presetRange(key){
  const t=new Date(); const d=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  const f=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
  const dow=(d.getDay()+6)%7;  // 週一為一週起始
  if(key==="thisWeek"){ const s=new Date(d); s.setDate(d.getDate()-dow); const e=new Date(s); e.setDate(s.getDate()+6); return [f(s),f(e)]; }
  if(key==="lastWeek"){ const s=new Date(d); s.setDate(d.getDate()-dow-7); const e=new Date(s); e.setDate(s.getDate()+6); return [f(s),f(e)]; }
  if(key==="lastMonth"){ const s=new Date(d.getFullYear(),d.getMonth()-1,1); const e=new Date(d.getFullYear(),d.getMonth(),0); return [f(s),f(e)]; }
  if(key==="thisYear"){ return [f(new Date(d.getFullYear(),0,1)), f(new Date(d.getFullYear(),11,31))]; }
  if(key==="lastYear"){ return [f(new Date(d.getFullYear()-1,0,1)), f(new Date(d.getFullYear()-1,11,31))]; }
  return ["",""]; // all
}

function fileToScaled(file,maxDim=2048){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width:w,height:h}=img;
        const s=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const png=file.type==="image/png";
        res({base64:c.toDataURL(png?"image/png":"image/jpeg",0.92).split(",")[1],
             mime:png?"image/png":"image/jpeg"});
      };
      img.onerror=rej; img.src=e.target.result;
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function fileToRawB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(",")[1]);
    r.onerror=rej; r.readAsDataURL(file);
  });
}
async function uploadToDrive(file,isImage){
  let base64,mime;
  if(isImage){ const o=await fileToScaled(file); base64=o.base64; mime=o.mime; }
  else { base64=await fileToRawB64(file); mime=file.type||"application/octet-stream"; }
  return gasPost({action:"upload", fileName:file.name, mimeType:mime, base64});
}

function isImageAtt(a){
  const s=(a.fileName||"")+" "+(a.fileUrl||"");
  return /^image\//i.test(a.fileType||"") || /\.(jpe?g|png|gif|webp)(\?|$|\s)/i.test(s);
}
function isPdfAtt(a){
  const s=(a.fileName||"")+" "+(a.fileUrl||"");
  return /pdf/i.test(a.fileType||"") || /\.pdf(\?|$|\s)/i.test(s);
}
// 從 Drive 取回任意檔案的位元組（PDF/圖片皆可），透過 GAS 代理避開 CORS
async function fetchFileBytes(url){
  const id=extractDriveId(url); if(!id) return null;
  try{
    const r=await gasGet({action:"image",id});
    if(!r.ok || !r.dataUrl) return null;
    const comma=r.dataUrl.indexOf(","), b64=r.dataUrl.slice(comma+1);
    const mime=(r.dataUrl.slice(5,comma).split(";")[0])||"";
    const bin=atob(b64), arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return {mime, bytes:arr, dataUrl:r.dataUrl};
  }catch(e){ return null; }
}
// 把一張 canvas 當成整頁圖片畫進 pdf-lib 文件（A4，置中）
async function addImagePage(out, canvas){
  const png=await out.embedPng(canvas.toDataURL("image/png"));
  const pw=595.28, ph=841.89, page=out.addPage([pw,ph]);
  let w=pw, h=pw*canvas.height/canvas.width;
  if(h>ph){ h=ph; w=ph*canvas.width/canvas.height; }
  page.drawImage(png,{x:(pw-w)/2, y:(ph-h)/2, width:w, height:h});
}

// 組裝整份 PDF：照片紀錄頁 +（選用）附件內容合併
async function buildMergedPdf(recs, opts={}, onProgress){
  const { PDFDocument } = PDFLib;
  const out = await PDFDocument.create();
  for(let i=0;i<recs.length;i++){
    const rec=recs[i];
    if(onProgress) onProgress(i+1, recs.length);
    await addImagePage(out, await renderRecordCanvas(rec));   // 照片紀錄頁
    if(opts.includeAttachments){
      const atts=(rec.attachments||[]).filter(a=>a.fileUrl||a.fileName);
      const others=[];
      for(const a of atts){
        if(isImageAtt(a)){
          const f=await fetchFileBytes(a.fileUrl);
          await addImagePage(out, await attImageCanvas(rec, a, f&&f.dataUrl));
        } else if(isPdfAtt(a)){
          const f=await fetchFileBytes(a.fileUrl);
          let merged=false;
          if(f){ try{
            const src=await PDFDocument.load(f.bytes,{ignoreEncryption:true});
            const pages=await out.copyPages(src, src.getPageIndices());
            pages.forEach(p=>out.addPage(p)); merged=true;
          }catch(e){ merged=false; } }
          if(!merged) others.push(a);   // 加密或損壞的 PDF → 退回清單
        } else {
          others.push(a);              // DOCX 等無法合併 → 清單
        }
      }
      if(others.length) await addImagePage(out, await attListCanvas(rec, others));
    }
  }
  return out.save();
}
function downloadBytes(bytes, name){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([bytes],{type:"application/pdf"}));
  a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}
async function exportPdf(rec, opts={}){
  try{
    const bytes=await buildMergedPdf([rec], opts);
    downloadBytes(bytes, `環保教育訓練記錄照片_${rec.company||""}_${rec.trainingDate||""}.pdf`);
  }catch(e){ alert("PDF 匯出失敗："+e); }
}
async function exportPdfBatch(recs, opts={}, onProgress){
  const bytes=await buildMergedPdf(recs, opts, onProgress);
  const d=new Date(), ts=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  downloadBytes(bytes, `環保教育訓練記錄照片_批次${recs.length}筆_${ts}.pdf`);
}

              <div className="act">
                <button className="iconbtn" title="匯出 PDF" onClick={()=>exportPdf(r,{includeAttachments:includeAtt})}><Icon n="pdf"/></button>
                <button className="iconbtn" title="編輯" onClick={()=>onEdit(r)}><Icon n="edit"/></button>
                <button className="iconbtn danger" title="刪除" onClick={()=>onDelete(r)}><Icon n="trash"/></button>
              </div>
            </td>
          </tr>);
        })}
        </tbody>
      </table>
      </div>
    </div>
    {showStats && <StatsModal rows={contractorStats} onClose={()=>setShowStats(false)}/>}
  </div>);
}

function StatsModal({rows,onClose}){
  const totalPeople=rows.reduce((s,r)=>s+r.people,0);
  const totalSessions=rows.reduce((s,r)=>s+r.sessions,0);
  const max=Math.max(1,...rows.map(r=>r.people));
  const csv=()=>{
    const lines=[["包商","場次","受訓人次"],...rows.map(r=>[r.name,r.sessions,r.people])];
    const str="\ufeff"+lines.map(a=>a.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([str],{type:"text/csv"})); a.download="包商受訓統計.csv"; a.click();
  };
  return (
  <div className="modalbg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="card modal-card" style={{width:580}}>
      <div className="modal-head"><h2>包商受訓統計</h2>
        <button className="x" onClick={onClose} aria-label="關閉">✕</button></div>
      <div className="row" style={{justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span className="muted" style={{fontSize:12.5}}>共 {rows.length} 家包商 · {totalSessions} 場次 · 總受訓人次 <b style={{color:"var(--txt)"}}>{totalPeople}</b></span>
        <button className="btn sec sm" onClick={csv} disabled={!rows.length}>⬇ CSV</button>
      </div>
      <div style={{maxHeight:"58vh",overflow:"auto"}}>
        <table className="tbl">
          <thead><tr><th>包商</th><th style={{textAlign:"right"}}>場次</th>
            <th style={{textAlign:"right"}}>受訓人次</th><th style={{width:130}}></th></tr></thead>
          <tbody>
            {rows.length===0 && <tr><td colSpan="4" className="muted" style={{textAlign:"center",padding:26}}>目前篩選條件下無資料</td></tr>}
            {rows.map(r=>(
              <tr key={r.name}>
                <td style={{fontWeight:600}}>{r.name}</td>
                <td style={{textAlign:"right"}}>{r.sessions}</td>
                <td style={{textAlign:"right",fontWeight:800}}>{r.people}</td>
                <td><div style={{height:8,borderRadius:4,background:"var(--chip)"}}>
                  <i style={{display:"block",height:"100%",borderRadius:4,width:(r.people/max*100)+"%",background:"var(--g3)"}}/></div></td>
              </tr>))}
          </tbody>
        </table>
      </div>
      <div className="muted" style={{fontSize:11,marginTop:10}}>
        ※ 依目前主頁篩選條件（日期 / 公司 / 講師 / 標記）統計。場次＝出現該包商的訓練筆數；受訓人次＝各場該包商人數加總。</div>
    </div>
  </div>);
}
function PhotoInput({label,url,caption,onUrl,onCaption,onToast}){
  const [busy,setBusy]=useState(false);

    const file=e.target.files[0]; if(!file) return;
    setBusy(true);
    try{ const r=await uploadToDrive(file,true);
      if(r.ok){ onUrl(r.link); onToast("照片已上傳"); } else onToast("上傳失敗："+(r.error||""));
    }catch(err){ onToast("上傳失敗"); }
    setBusy(false); e.target.value="";
  };
  return (
    <div className="field">
      <label>{label}</label>
      <div className="photoBox" style={{marginBottom:8}}>
        {url ? <img src={driveThumb(url,800)} alt="" onError={e=>e.target.style.display="none"}/>

/*==================== App ====================*/
function App(){
  const [records,setRecords]=useState(()=>{ try{return JSON.parse(localStorage.getItem("tr_records")||"[]").map(normRec);}catch(e){return [];} });
  const [snapshots,setSnapshots]=useState([]);
  const [currentSnap,setCurrentSnap]=useState(null);   // {id,name}
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [user,setUser]=useState(()=>localStorage.getItem("tr_user")||INSTRUCTORS[0]);
  const [editing,setEditing]=useState(undefined);      // undefined=closed, null=new, obj=edit
  const [viewing,setViewing]=useState(null);
  const [showLoad,setShowLoad]=useState(false);
  const [includeAtt,setIncludeAtt]=useState(false);
  const [toast,setToast]=useState("");
  const toastT=useRef();
  const showToast=m=>{ setToast(m); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(""),2600); };
  const cacheLocal=recs=>{ try{ localStorage.setItem("tr_records",JSON.stringify(recs)); }catch(e){} };

  const refreshSnapshots=async()=>{
    try{ const r=await gasGet({action:"snapshots"}); if(r.ok){ setSnapshots(r.snapshots||[]); return r.snapshots||[]; } }catch(e){}
    return [];
  };
  const loadVersion=async id=>{
    setLoading(true);
    try{ const r=await gasGet({action:"load",id:id||"latest"});
      if(r.ok){ const recs=(r.records||[]).map(normRec); setRecords(recs); cacheLocal(recs);
        setCurrentSnap(r.id?{id:r.id,name:r.name}:null); }
      else showToast("讀取失敗");
    }catch(e){ showToast("讀取失敗，顯示本機快取"); }
    setLoading(false);
  };
  useEffect(()=>{ (async()=>{
    const s=await refreshSnapshots();
    if(s.length) await loadVersion(s[0].id);
    else setLoading(false);   // 無快照：保留本機快取（可能為空）
  })(); },[]);

  const persist=async next=>{
    setRecords(next); cacheLocal(next); setSaving(true);
    try{ const r=await gasPost({action:"save",records:next});
      if(r.ok){ await refreshSnapshots(); setCurrentSnap({id:r.id,name:r.name}); setSaving(false); return true; }
    }catch(e){}
    setSaving(false); return false;
  };

  const onSaved=async rec=>{
    rec=normRec(rec);
    const i=records.findIndex(o=>o.id===rec.id);
    const next = i>=0 ? records.map(o=>o.id===rec.id?rec:o) : [rec,...records];
    const ok=await persist(next);
    if(ok){ setEditing(undefined); showToast("已儲存（已寫入新版本）"); }
    return ok;
  };
  const del=async r=>{
    if(!confirm(`確定刪除「${r.company} ${r.trainingDate}」？\n（會寫入一個新版本快照）`)) return;
    const ok=await persist(records.filter(o=>o.id!==r.id));
    showToast(ok?"已刪除":"刪除失敗");
  };
  const knownContractors=useMemo(()=>loadKnownContractors(records),[records]);
  const changeUser=u=>{ setUser(u); try{localStorage.setItem("tr_user",u);}catch(e){} };
  const verLabel=s=>{ const m=(s&&s.name||"").match(/_(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})/);
    return m? `${m[2]}/${m[3]} ${m[4]}:${m[5]}` : ""; };
  const currentLabel=currentSnap? verLabel(currentSnap) : "";
  const saveNow=async()=>{ const ok=await persist(records); showToast(ok?"已儲存（已寫入新版本）":"儲存失敗，請重試"); };
  const openLoad=async()=>{ await refreshSnapshots(); setShowLoad(true); };
  const pickVersion=async id=>{ await loadVersion(id); setShowLoad(false); showToast("已載入該版本"); };

  return (
  <div>
    <div className="topbar">
      <div className="grow"><h1>教育訓練紀錄系統</h1>
        <span className="sub">{PROJECT_NAME}</span></div>
      <span className="muted" style={{fontSize:12,marginRight:4}}>操作人</span>
      <select className="ver" style={{maxWidth:120}} value={user} onChange={e=>changeUser(e.target.value)} title="操作人">
        {INSTRUCTORS.map(i=><option key={i}>{i}</option>)}
      </select>
    </div>
    <Dashboard records={records} loading={loading||saving}
      currentLabel={currentLabel} onSave={saveNow} onOpenLoad={openLoad} onRefresh={()=>loadVersion("latest")}
      includeAtt={includeAtt} onToggleAtt={()=>setIncludeAtt(v=>!v)}
      onNew={()=>setEditing(null)} onEdit={r=>{setViewing(null);setEditing(r);}}
      onView={r=>setViewing(r)} onDelete={del}/>
    {editing!==undefined &&
      <RecordForm rec={editing} knownContractors={knownContractors} currentUser={user}
        onSave={onSaved} onCancel={()=>setEditing(undefined)} onToast={showToast}/>}
    {viewing &&
      <Detail rec={viewing} includeAtt={includeAtt} onClose={()=>setViewing(null)} onEdit={r=>{setViewing(null);setEditing(r);}}/>}
    {showLoad &&
      <LoadModal snapshots={snapshots} currentId={currentSnap&&currentSnap.id} loading={loading}
        onLoad={pickVersion} onRefresh={refreshSnapshots} onClose={()=>setShowLoad(false)}/>}
    {saving ? <div className="toast">儲存中…</div> : (toast && <div className="toast">{toast}</div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
