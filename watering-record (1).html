<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營建工地每日噴灑水作業紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#f5f5f0;--card:#fff;--border:#c8c8c0;--text:#2a2a2a;--text-light:#6b6b6b;--accent:#2d5a27;--accent-light:#e8f0e6;--am:#3a6ea5;--pm:#b8651a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app-header{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .app-header h1{font-size:17px;font-weight:700;letter-spacing:1px;}
  .tabs{display:flex;gap:3px;margin-left:auto;}
  .tab-btn{padding:7px 18px;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px 6px 0 0;cursor:pointer;transition:background .2s;}
  .tab-btn.active{background:var(--card);color:var(--accent);}
  .meta-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .meta-bar label{font-size:13px;font-weight:500;color:var(--text-light);}
  .meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:inherit;font-size:13px;}
  .meta-bar .mg{display:flex;align-items:center;gap:5px;}
  .project-input{width:260px;}
  .start-date-picker{background:var(--accent-light);border:2px solid var(--accent)!important;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:500;color:var(--accent);width:150px;}
  .loc-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;background:var(--am);}
  .tab-panel{display:none;padding:16px 24px;}
  .tab-panel.active{display:block;}
  .record-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .record-table th,.record-table td{border:1px solid var(--border);padding:6px 8px;text-align:center;vertical-align:middle;}
  .record-table th{background:#f0f0ea;font-weight:600;font-size:11px;color:var(--text-light);}
  .record-table .day-header{background:var(--accent);color:#fff;font-size:12px;}
  .record-table .am-row td:first-child{background:var(--am);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table .pm-row td:first-child{background:var(--pm);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table input[type="time"]{width:110px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;}
  .record-table input[type="number"]{width:65px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table input[type="text"]{width:70px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;font-family:inherit;}
  .method-select{width:100px;}
  .photo-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:10px;}
  .photo-card{width:calc(25% - 12px);min-width:160px;}
  /* New format: photo table */
  .photo-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .photo-table th,.photo-table td{border:1px solid var(--border);padding:6px 8px;text-align:center;vertical-align:middle;}
  .photo-table th{background:#f0f0ea;font-weight:600;font-size:11px;color:var(--text-light);}
  .photo-table .pt-day{background:var(--accent);color:#fff;font-weight:600;font-size:12px;width:70px;}
  .photo-table .pt-photo{width:28%;min-height:80px;cursor:pointer;position:relative;}
  .photo-table .pt-photo img{max-width:100%;max-height:120px;object-fit:contain;border-radius:3px;}
  .photo-table .pt-photo .pt-placeholder{color:#bbb;font-size:11px;}
  .photo-table .pt-photo .pt-remove{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  .photo-table .pt-photo:hover .pt-remove{display:flex;}
  .photo-table .pt-meter{width:11%;vertical-align:top;padding:4px;}
  .photo-table .pt-meter-num{width:90%;border:1px solid #ddd;border-radius:3px;padding:3px 5px;font-size:12px;text-align:center;font-family:inherit;margin-bottom:4px;}
  .photo-table .pt-meter-photos{display:flex;gap:3px;}
  .photo-table .pt-mini{flex:1;min-height:140px;border:1px dashed var(--border);border-radius:4px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .photo-table .pt-mini img{max-width:100%;max-height:320px;object-fit:contain;}
  .photo-table .pt-mini .pt-placeholder{color:#bbb;font-size:9px;text-align:center;}
  .photo-table .pt-mini .pt-remove{position:absolute;top:1px;right:1px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
  .photo-table .pt-mini:hover .pt-remove{display:flex;}
  .photo-table input[type="number"]{width:80px;border:1px solid #ddd;border-radius:3px;padding:3px 5px;font-size:12px;text-align:center;font-family:inherit;}
  .photo-table .pt-total{font-weight:700;color:var(--am);font-size:14px;text-align:center;}
  .btn-add-period{border:none;background:rgba(255,255,255,.4);color:#fff;font-size:14px;font-weight:700;cursor:pointer;border-radius:4px;padding:1px 8px;margin-left:6px;vertical-align:middle;}.btn-add-period:hover{background:rgba(255,255,255,.7);color:var(--accent);}
  .btn-del-row{border:none;background:#c53030;color:#fff;font-size:10px;cursor:pointer;border-radius:3px;padding:1px 6px;margin-left:3px;}.btn-del-row:hover{background:#a02020;}
  .cum-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;}
  .cum-table th,.cum-table td{border:1px solid var(--border);padding:5px 8px;text-align:center;}
  .cum-table th{background:#f0f0ea;font-weight:600;font-size:11px;color:var(--text-light);}
  .cum-table input[type="number"]{width:70px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;text-align:center;}
  .cum-total{font-weight:700;color:var(--am);}
  .photo-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .photo-card .ph-header{background:#f0f0ea;padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-light);display:flex;justify-content:space-between;align-items:center;}
  .photo-card .ph-body{padding:10px;min-height:140px;display:flex;align-items:center;justify-content:center;position:relative;}
  .photo-card .ph-body img{max-width:100%;max-height:180px;border-radius:4px;object-fit:contain;}
  .photo-card .ph-body .placeholder{color:#bbb;font-size:12px;text-align:center;cursor:pointer;}
  .photo-card input[type="file"]{display:none;}
  .photo-card .ph-desc{padding:4px 10px 8px;font-size:11px;}
  .photo-card .ph-desc input{width:100%;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit;}
  .photo-card .remove-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}
  .photo-card:hover .remove-photo{display:flex;}
  .sig-section{margin-top:16px;background:var(--card);border-radius:8px;padding:14px;border:1px solid var(--border);}
  .sig-section h3{font-size:13px;margin-bottom:8px;color:var(--text-light);}
  .sig-row{display:flex;gap:24px;flex-wrap:wrap;}
  .sig-item{flex:1;min-width:200px;}
  .sig-item label{font-size:12px;color:var(--text-light);display:block;margin-bottom:4px;}
  .sig-item input{width:100%;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:inherit;font-size:13px;}
  .sig-upload-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .sig-preview{max-width:120px;max-height:50px;border:1px solid var(--border);border-radius:4px;object-fit:contain;background:#fafafa;}
  .sig-upload-btn{font-size:11px!important;padding:4px 10px!important;}
  .sig-remove-btn{font-size:11px!important;padding:3px 8px!important;}
  .btn{padding:8px 18px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-sm{padding:6px 14px;font-size:12px;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1e4a1a;}
  .btn-save{background:var(--am);color:#fff;}.btn-save:hover{background:#2d5d8f;}
  .btn-pdf{background:var(--pm);color:#fff;}.btn-pdf:hover{background:#9e5515;}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}.btn-outline:hover{background:#f0f0ea;}
  .btn-danger{background:#c53030;color:#fff;}.btn-danger:hover{background:#a02020;}
  .btn-new{background:var(--am);color:#fff;}
  .btn-cloud{background:#1a73e8;color:#fff;}.btn-cloud:hover{background:#1557b0;}
  .btn-dice{background:#f0ad4e;color:#fff;border-radius:8px;font-size:13px;padding:6px 14px;display:inline-flex;align-items:center;gap:5px;}.btn-dice:hover{background:#ec971f;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .actions{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--card);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:10;}
  .hidden{display:none!important;}
  .list-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .list-toolbar input,.list-toolbar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:13px;font-family:inherit;}
  .rec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:box-shadow .2s;}
  .rec-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .rec-card .rc-check{width:18px;height:18px;cursor:pointer;}
  .rec-card .rc-info{flex:1;}
  .rec-card .rc-info .rc-title{font-weight:600;font-size:14px;}
  .rec-card .rc-info .rc-sub{font-size:12px;color:var(--text-light);margin-top:2px;}
  .rec-card .rc-actions{display:flex;gap:6px;}
  .empty-list{text-align:center;padding:40px;color:var(--text-light);font-size:14px;}
  .pg-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
  .pg-btn:hover{background:var(--accent-light);}.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}.pg-btn:disabled{opacity:.4;cursor:default;}
  .pg-info{font-size:12px;color:var(--text-light);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}.toast.err{background:#c53030;}
  .newrec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .newrec-overlay.open{display:flex;}
  .newrec-box{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;}
  .newrec-box h3{margin-bottom:14px;font-size:16px;}
  .newrec-box label{font-size:13px;color:var(--text-light);display:block;margin:10px 0 4px;}
  .newrec-box select,.newrec-box input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:14px;}
  .newrec-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
  .dup-warn{margin-top:10px;padding:8px;border-radius:6px;background:#fff3cd;color:#856404;font-size:12px;display:none;}.dup-warn.show{display:block;}
  .dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .dialog-overlay.open{display:flex;}
  .dialog-box{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;text-align:center;}
  .dialog-box h3{margin-bottom:8px;}.dialog-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;}.dialog-box .btn{margin:4px;}
  #previewModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:20px;}
  #previewModal.open{display:block;}
  .preview-inner{max-width:1100px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;}
  .preview-toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--accent);color:#fff;}.preview-toolbar h3{flex:1;font-size:15px;}
  .preview-body{padding:10px;overflow-x:auto;}
  .pdf-render-zone{width:297mm;margin:0 auto;background:#fff;}
  .pdf-page{width:100%;height:198mm;max-height:198mm;padding:6mm 15mm;font-family:'Noto Sans TC',sans-serif;background:#fff;page-break-inside:avoid;box-sizing:border-box;overflow:hidden;}
  .pdf-page+.pdf-page{page-break-before:always;}
  .pdf-page h2{text-align:center;font-size:22px;margin-bottom:6px;}
  .pdf-page .sub-info{text-align:center;font-size:14px;color:#555;margin-bottom:8px;}
  .pdf-page table{width:100%;border-collapse:collapse;font-size:13px;}
  .pdf-page th,.pdf-page td{border:1px solid #333;padding:5px 6px;text-align:center;}
  .pdf-page th{background:#e8e8e8;font-weight:600;}
  .pdf-page .day-header-pdf td{background:#f5f5f0;font-weight:600;padding:5px 6px;font-size:13px;}
  .pdf-page .sig-line{margin-top:10px;display:flex;justify-content:space-around;font-size:14px;align-items:flex-end;}
  .pdf-page .sig-line .sig-block{display:inline-flex;flex-direction:column;align-items:center;min-width:180px;}
  .pdf-page .sig-line .sig-block img{max-width:120px;max-height:50px;object-fit:contain;margin-bottom:2px;}
  .pdf-page .sig-line .sig-block .sig-space{width:140px;height:50px;}
  .pdf-page .sig-line .sig-block .sig-label{border-top:1px solid #333;padding-top:3px;min-width:140px;text-align:center;}
  .pdf-photo-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:8px;}
  .pdf-photo-cell{width:calc(25% - 6px);border:1px solid #ccc;border-radius:4px;overflow:hidden;display:flex;flex-direction:column;align-items:center;}
  .pdf-photo-cell .ppc-header{width:100%;background:#eee;padding:3px 6px;font-size:12px;font-weight:600;text-align:center;}
  .pdf-photo-cell .ppc-body{padding:3px;display:flex;align-items:center;justify-content:center;flex:1;width:100%;}
  .pdf-photo-cell .ppc-body img{max-width:100%;max-height:250px;object-fit:contain;}
  .pdf-photo-cell .ppc-desc{padding:2px 6px 4px;font-size:11px;color:#555;text-align:center;width:100%;}
  /* PDF new format photo table */
  .pdf-pt{width:100%;border-collapse:collapse;font-size:13px;}
  .pdf-pt th,.pdf-pt td{border:1px solid #333;padding:4px 5px;text-align:center;vertical-align:middle;}
  .pdf-pt th{background:#e8e8e8;font-weight:600;}
  .pdf-pt .pt-day-cell{background:#f5f5f0;font-weight:600;width:16px;font-size:9px;padding:1px 2px;white-space:nowrap;}
  .pdf-pt .pt-img-cell{width:36%;position:relative;}
  .pdf-pt .pt-img-cell img{max-width:100%;max-height:130px;object-fit:contain;}
  .pdf-pt .pt-img-wrap{position:relative;display:inline-block;}
  .pdf-pt .pt-img-wrap img{max-width:100%;max-height:130px;object-fit:contain;display:block;}
  .pdf-pt .pt-watermark{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;white-space:nowrap;}
  .pdf-pt .pt-meter-cell{width:8%;font-size:12px;}
  .pdf-pt .pt-total-cell{font-weight:700;width:7%;font-size:12px;}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .loading-overlay.open{display:flex;}
  .loading-overlay .spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  .loading-overlay .load-msg{font-size:14px;color:var(--text);font-weight:500;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .meter-report{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:8px;overflow:hidden;}
  .meter-report th,.meter-report td{border:1px solid var(--border);padding:6px 10px;text-align:center;}
  .meter-report th{background:#f0f0ea;font-weight:600;font-size:12px;}
  .meter-report .month-total{background:#e8f0e6;font-weight:700;color:var(--accent);vertical-align:middle;}
  .meter-report .grand-total{background:var(--accent);color:#fff;font-weight:700;vertical-align:middle;}
  .meter-report-header{text-align:center;margin-bottom:8px;}
  .meter-report-header h2{font-size:18px;margin-bottom:4px;}
  .meter-report-header .sub{font-size:13px;color:var(--text-light);}
  @media(max-width:768px){
    .app-header{padding:10px 14px;}.app-header h1{font-size:14px;}.tab-btn{padding:6px 12px;font-size:12px;}
    .meta-bar{padding:10px 14px;}.tab-panel{padding:12px 14px;}
    .photo-card{width:calc(50% - 8px);min-width:140px;}.actions{padding:10px 14px;}.record-table{font-size:11px;}
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>💧 營建工地每日噴灑水作業紀錄</h1>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab(0)">📝 灑水紀錄</button>
    <button class="tab-btn" onclick="switchTab(1)">📷 照片紀錄</button>
    <button class="tab-btn active" onclick="switchTab(2)">📋 已儲存紀錄</button>
    <button class="tab-btn" onclick="switchTab(3)">💧 每日用水量</button>
    <button class="tab-btn" onclick="switchTab(4)">📊 用水抄表紀錄表</button>
  </div>
</div>

<div class="meta-bar" id="metaBar" style="display:none;">
  <div class="mg"><label>工程名稱</label><input type="text" id="projectName" class="project-input"></div>
  <div class="mg"><label>地點</label><span class="loc-badge" id="locBadge">—</span></div>
  <div class="mg"><label>起始日期</label><input type="date" id="startDate" class="start-date-picker" onchange="onStartDateChange()" disabled></div>
  <div class="mg"><label>～ 結束</label><span id="endDateLabel" style="font-size:13px;font-weight:500;">—</span></div>
</div>

<div class="tab-panel" id="tab0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
    <button class="btn btn-dice" onclick="randomizeTimes()">🎲 隨機產生時間</button>
    <span style="font-size:11px;color:var(--text-light);">上午 08:00~10:50 ／ 下午 13:00~15:40，間隔 10 分鐘</span>
  </div>
  <div id="recordTableWrap"></div>
  <div class="sig-section">
    <h3>簽核欄</h3>
    <div class="sig-row">
      <div class="sig-item"><label>現場環保工程師</label><input type="text" id="sig_engineer" oninput="syncSig()">
        <div class="sig-upload-row"><img id="sigImg_engineer" class="sig-preview" style="display:none;"><button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile_engineer').click()">上傳簽名檔</button><button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm_engineer" onclick="removeSigImg('engineer')" style="display:none;">✕</button><input type="file" id="sigFile_engineer" accept="image/*" style="display:none" onchange="onSigImgSelect('engineer',event)"></div>

<script>
/* ===== Config ===== */
const DAYS=7, PHOTOS=7;
const NEW_FORMAT_DATE='2026-04-20'; // 此日期之後使用新照片表格式（含水表）
const DEFAULT_PROJECT='通霄電廠第二期更新改建計畫－海底輸氣管線統包工程';
const METHODS=['人工灑水','灑水車','灑水器自動噴灑','其他'];
const DM=1;
const PAGE_SIZE=20;
const API_URL='https://script.google.com/macros/s/AKfycbwXhNnRZWVQcu_y8kJ_tMlbEZbOmDi-M8lLiR4XN8SZDZtPd2q9LHrbt3hy1XmAOSCRVw/exec';

/* ===== State（純記憶體，不用 localStorage）===== */
let cloudIndex={};    // 雲端索引（輕量 metadata）
let currentPage=1;
let currentEditKey=null;
let isEditing=false;
let fieldSource={water:null,len:null,person:null};

/* ===== Utility ===== */
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'')+' show';setTimeout(()=>t.className='toast',3500);}
function $(id){return document.getElementById(id);}
function showLoading(msg){$('loadMsg').textContent=msg||'載入中...';$('loadingOverlay').classList.add('open');}
function hideLoading(){$('loadingOverlay').classList.remove('open');}
function getMonday(dateStr){const d=new Date(dateStr);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.toISOString().slice(0,10);}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function weekday(s){return['日','一','二','三','四','五','六'][new Date(s).getDay()];}
function recKey(loc,sd){return `${loc}_${sd}`;}
function isNewFormat(sd){return sd&&sd>=NEW_FORMAT_DATE;}

/* ===== API Layer（XHR + 自動重試）===== */
function apiGet(params,retries){
  retries=retries||0;const maxR=3;
  const url=API_URL+(params?'?'+params:'');
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',url,true);
    xhr.timeout=30000;
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        try{resolve(JSON.parse(xhr.responseText));}
        catch(e){if(retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),1500*(retries+1));}else{reject(new Error('回應格式錯誤'));}}
      }else if(xhr.status===429&&retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('HTTP '+xhr.status));}
    };
    xhr.onerror=xhr.ontimeout=function(){
      if(retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),2000*(retries+1));}
      else{reject(new Error('網路錯誤，請檢查連線'));}
    };
    xhr.send();
  });
}
function apiPost(body,retries){
  retries=retries||0;const maxR=3;
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',API_URL,true);
    xhr.setRequestHeader('Content-Type','text/plain;charset=utf-8');
    xhr.timeout=90000;
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        try{resolve(JSON.parse(xhr.responseText));}
        catch(e){if(retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),2000*(retries+1));}else{reject(new Error('回應格式錯誤'));}}
      }else if(xhr.status===429&&retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('HTTP '+xhr.status));}
    };
    xhr.onerror=xhr.ontimeout=function(){
      if(retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('網路錯誤，請檢查連線'));}
    };
    xhr.send(JSON.stringify(body));
  });
}

/* ===== Tab ===== */
function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  $('metaBar').style.display=(idx===0||idx===1)?'flex':'none';
  $('actionBar').classList.toggle('hidden',idx>1);
  if(idx===2)renderList();
  if(idx===3)renderCumulative();
  if(idx===4)renderMeterReport();
}

/* ===== Build UI ===== */
function buildRecordTable(){
  let h='<table class="record-table" id="recTable"><thead><tr><th colspan="2">日期/時段</th><th>灑水開始時間</th><th>灑水結束時間</th><th>灑水方式</th><th class="water-col">每日用水量(m³)<br><span id="waterNote" style="font-weight:400;font-size:9px;color:#999;">水表數據自動計算</span></th><th>灑水面積(m²)</th><th>操作人員</th></tr></thead><tbody>';
  for(let d=0;d<DAYS;d++){
    const ra=`d${d}_am`,rp=`d${d}_pm`;
    h+=`<tr class="day-header"><td id="dayColspan_${d}" colspan="8"><span id="dayLabel_${d}">第 ${d+1} 天</span> <button class="btn-add-period" onclick="addPeriod(${d})" title="新增灑水時段">＋</button></td></tr>`;
    h+=`<tr class="am-row" id="row_${d}_am"><td>上午</td><td style="width:70px;" id="dayDate_${d}_am"></td>`;
    h+=`<td><input type="time" id="${ra}_start"></td><td><input type="time" id="${ra}_end"></td>`;
    h+=`<td><select class="method-select" id="${ra}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`;
    h+=`<td rowspan="2" class="water-col" id="waterCell_${d}" style="vertical-align:middle;"><input type="number" id="d${d}_water" step="0.1" readonly style="background:#f0f0ea;color:var(--am);text-align:center;border:none;font-weight:600;width:70px;"></td>`;
    h+=`<td><input type="number" id="${ra}_len" step="0.1" min="0" oninput="onFieldChange('${ra}_len','len')"></td>`;
    h+=`<td><input type="text" id="${ra}_person" oninput="onFieldChange('${ra}_person','person')"></td></tr>`;
    h+=`<tr class="pm-row" id="row_${d}_pm"><td>下午</td><td style="width:70px;" id="dayDate_${d}_pm"></td>`;
    h+=`<td><input type="time" id="${rp}_start"></td><td><input type="time" id="${rp}_end"></td>`;
    h+=`<td><select class="method-select" id="${rp}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`;
    h+=`<td><input type="number" id="${rp}_len" step="0.1" min="0" oninput="onFieldChange('${rp}_len','len')"></td>`;
    h+=`<td><input type="text" id="${rp}_person" oninput="onFieldChange('${rp}_person','person')"></td></tr>`;
    // 動態新增的時段會插在這裡（由 addPeriod 函式處理）
    h+=`<!-- extraRows_${d} -->`;
  }
  h+='</tbody></table>';$('recordTableWrap').innerHTML=h;
}
// 每天額外時段
let extraCount=new Array(7).fill(0);
function addPeriod(d){
  const n=extraCount[d]++;
  const pid=`d${d}_x${n}`;
  const wc=$(`waterCell_${d}`);
  if(wc)wc.rowSpan=3+n;
  const tr=document.createElement('tr');
  tr.className='am-row';tr.id=`row_${d}_x${n}`;
  const labels=['上午','下午','第3次','第4次','第5次','第6次'];
  const label=labels[n+2]||`第${n+3}次`;
  tr.innerHTML=`<td style="font-size:11px;"><select id="${pid}_label" style="font-size:11px;width:55px;border:1px solid #ddd;border-radius:3px;"><option>上午</option><option>下午</option><option selected>${label}</option></select><button class="btn-del-row" onclick="delPeriod(${d},${n})">✕</button></td><td style="width:70px;font-size:11px;"></td>`
    +`<td><input type="time" id="${pid}_start"></td><td><input type="time" id="${pid}_end"></td>`
    +`<td><select class="method-select" id="${pid}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`
    +`<td><input type="number" id="${pid}_len" step="0.1" min="0"></td>`
    +`<td><input type="text" id="${pid}_person"></td>`;
  // 找到最後一個 extra row 或 pm row，插在後面
  let anchor=$(`row_${d}_pm`);
  for(let i=n-1;i>=0;i--){const prev=$(`row_${d}_x${i}`);if(prev){anchor=prev;break;}}
  anchor.parentNode.insertBefore(tr,anchor.nextSibling);
}
function delPeriod(d,n){
  const tr=$(`row_${d}_x${n}`);if(tr)tr.remove();
  const wc=$(`waterCell_${d}`);
  if(wc){const remaining=document.querySelectorAll(`[id^="row_${d}_x"]`).length;wc.rowSpan=2+remaining;}
}
function buildPhotoGrid(){
  let h='';for(let i=0;i<PHOTOS;i++){
    h+=`<div class="photo-card" id="pc_${i}"><div class="ph-header"><span id="pcLabel_${i}">${i<5?'第 '+(i+1)+' 天':i===5?'週六':'週日'}</span><span style="font-size:11px;" id="pcDate_${i}"></span></div><div class="ph-body" onclick="document.getElementById('photoInput_${i}').click()"><button class="remove-photo" onclick="event.stopPropagation();removePhoto(${i})">×</button><div class="placeholder" id="phPlaceholder_${i}">點擊上傳照片</div><img id="phImg_${i}" style="display:none;"></div><div class="ph-desc"><input type="text" id="phDesc_${i}" placeholder="照片說明（選填）"></div><input type="file" id="photoInput_${i}" accept="image/*" onchange="onPhotoSelect(${i},event)"></div>`;
  }$('photoGrid').innerHTML=h;
}
function buildPhotoTable(){
  const dayLabels=['第一天','第二天','第三天','第四天','第五天','第六天','第七天'];
  let h='<table class="photo-table"><thead><tr><th>日期</th><th>灑水照片</th><th colspan="2">第1次取水（前→後）</th><th colspan="2">第2次取水（前→後）</th><th>總灑水量<br>(m³)<br><span style="font-weight:400;font-size:9px;color:var(--text-light);">與灑水紀錄<br>「每日用水量」連動</span></th></tr></thead><tbody>';
  for(let d=0;d<DAYS;d++){
    h+=`<tr>`;
    h+=`<td class="pt-day"><span id="ptDayLabel_${d}">${dayLabels[d]}</span><br><span style="font-size:10px;" id="ptDayDate_${d}"></span></td>`;
    // 灑水照片（每天1張）
    h+=`<td class="pt-photo" onclick="document.getElementById('ptInput_${d}_spray').click()">`;
    h+=`<button class="pt-remove" onclick="event.stopPropagation();removePtPhoto(${d},'spray')">×</button>`;
    h+=`<div class="pt-placeholder" id="ptPh_${d}_spray">點擊上傳</div>`;
    h+=`<img id="ptImg_${d}_spray" style="display:none;">`;
    h+=`<input type="file" id="ptInput_${d}_spray" accept="image/*" style="display:none" onchange="onPtPhotoSelect(${d},'spray',event)">`;
    h+=`</td>`;
    // 4個水表度數（純數字輸入）
    for(const m of['m1s','m1e','m2s','m2e']){
      const label={m1s:'取水前',m1e:'取水後',m2s:'取水前',m2e:'取水後'}[m];
      h+=`<td class="pt-meter" style="vertical-align:middle;text-align:center;">`;
      h+=`<div style="font-size:10px;color:var(--text-light);margin-bottom:3px;">${label}</div>`;
      h+=`<input type="number" id="ptNum_${d}_${m}" step="0.01" min="0" placeholder="水表度數" oninput="calcAndSync(${d})" class="pt-meter-num">`;
      h+=`</td>`;
    }
    h+=`<td class="pt-total" id="ptTotal_${d}">—</td>`;
    h+=`</tr>`;
  }
  h+='</tbody></table>';
  $('photoTableWrap').innerHTML=h;
}
function calcAndSync(d){
  const m1s=parseFloat($(`ptNum_${d}_m1s`).value)||0;
  const m1e=parseFloat($(`ptNum_${d}_m1e`).value)||0;
  const m2s=parseFloat($(`ptNum_${d}_m2s`).value)||0;
  const m2e=parseFloat($(`ptNum_${d}_m2e`).value)||0;
  const w1=m1e>m1s?(m1e-m1s):0;
  const w2=m2e>m2s?(m2e-m2s):0;
  const total=w1+w2;
  $(`ptTotal_${d}`).textContent=total>0?total.toFixed(1):'—';
  // 更新每日用水量顯示
  updateRecordCumDisplay();
}

// 顯示灑水紀錄表的每日用水量
function updateRecordCumDisplay(){
  const sd=$('startDate').value;
  if(!sd)return;
  const loc=$('locBadge').textContent;
  const useNew=isNewFormat(sd);
  for(let d=0;d<DAYS;d++){
    const dt=addDays(sd,d);
    let w=0;
    if(useNew){
      const totalEl=$(`ptTotal_${d}`);
      w=totalEl?parseFloat(totalEl.textContent)||0:0;
    }else{
      // pre-4/20: 從 cumData 取
      if(cumData[loc]&&cumData[loc][dt])w=cumData[loc][dt];
    }
    const el=$(`d${d}_water`);
    if(el)el.value=w>0?w.toFixed(1):'';
  }
}

function switchPhotoFormat(useNew){
  $('photoGrid').style.display=useNew?'none':'flex';
  $('photoTableWrap').style.display=useNew?'block':'none';

  // 每日用水量欄：一律顯示、一律唯讀

    if(el){el.readOnly=true;el.style.background='#f0f0ea';el.style.color='var(--am)';}

}

function compressImage(u,maxW,q,cb){const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));};img.src=u;}

function randomizeTimes(){
  function rndTime(hMin,hMax,mSlots){const h=hMin+Math.floor(Math.random()*(hMax-hMin+1)),m=Math.floor(Math.random()*mSlots)*10;let eh=h,em=m+10;if(em>=60){em-=60;eh++;}return{s:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,e:`${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`};}
  for(let d=0;d<DAYS;d++){
    const am=rndTime(8,10,6);$(`d${d}_am_start`).value=am.s;$(`d${d}_am_end`).value=am.e;
    const pm=rndTime(13,15,5);$(`d${d}_pm_start`).value=pm.s;$(`d${d}_pm_end`).value=pm.e;
    // 額外時段也隨機
    for(let n=0;n<extraCount[d];n++){const el=$(`d${d}_x${n}_start`);if(!el)continue;const isAm=Math.random()>0.5;const t=isAm?rndTime(8,10,6):rndTime(13,15,5);el.value=t.s;$(`d${d}_x${n}_end`).value=t.e;}
  }
}

/* ===== Collect / Load ===== */
function collectData(){
  const data={project:$('projectName').value,location:$('locBadge').textContent,startDate:$('startDate').value,endDate:$('endDateLabel').textContent,
    sig:{engineer:$('sig_engineer').value,engineerImg:$('sigImg_engineer').style.display!=='none'?$('sigImg_engineer').src:'',manager:$('sig_manager').value,managerImg:$('sigImg_manager').style.display!=='none'?$('sigImg_manager').src:''},
    days:[]};
  for(let d=0;d<DAYS;d++){
    const dt=addDays(data.startDate,d);
    // 日水量：post-4/20 從照片表水表計算取得，pre-4/20 從累計頁籤取得
    let dailyW='';
    if(isNewFormat(data.startDate)){
      const totalEl=$(`ptTotal_${d}`);
      const v=totalEl?parseFloat(totalEl.textContent):0;
      if(v>0)dailyW=v.toFixed(1);
    }else{
      const loc=data.location||$('locBadge').textContent;
      if(cumData[loc]&&cumData[loc][dt])dailyW=String(cumData[loc][dt]);
    }
    const day={date:dt,water:dailyW,am:{},pm:{},extra:[]};for(const p of['am','pm']){day[p]={start:$(`d${d}_${p}_start`).value,end:$(`d${d}_${p}_end`).value,method:$(`d${d}_${p}_method`).value,len:$(`d${d}_${p}_len`).value,person:$(`d${d}_${p}_person`).value};}for(let n=0;n<extraCount[d];n++){const pid=`d${d}_x${n}`;const el=$(`${pid}_start`);if(!el||!$(`row_${d}_x${n}`))continue;const lbl=$(`${pid}_label`);day.extra.push({label:lbl?lbl.value:`第${n+3}次`,start:el.value,end:$(`${pid}_end`).value,method:$(`${pid}_method`).value,len:$(`${pid}_len`).value,person:$(`${pid}_person`).value});}data.days.push(day);}
  if(isNewFormat(data.startDate)){
    data.photoFormat='table';
    data.photoTable=[];
    for(let d=0;d<DAYS;d++){
      const row={};
      for(const p of['spray']){
        const img=$(`ptImg_${d}_${p}`);
        row[p+'Src']=img&&img.style.display!=='none'?img.src:'';
      }
      for(const m of['m1s','m1e','m2s','m2e']){
        row[m+'Val']=$(`ptNum_${d}_${m}`)?$(`ptNum_${d}_${m}`).value:'';
      }
      const v1s=parseFloat(row.m1sVal)||0,v1e=parseFloat(row.m1eVal)||0;
      const v2s=parseFloat(row.m2sVal)||0,v2e=parseFloat(row.m2eVal)||0;
      row.water=((v1e>v1s?v1e-v1s:0)+(v2e>v2s?v2e-v2s:0))||'';
      if(row.water)row.water=parseFloat(row.water).toFixed(1);
      data.photoTable.push(row);
    }
  }else{
    // 舊格式：photos
    data.photoFormat='grid';
    data.photos=[];
    for(let i=0;i<PHOTOS;i++){const img=$(`phImg_${i}`);data.photos.push({src:img&&img.style.display!=='none'?img.src:'',desc:$(`phDesc_${i}`)?$(`phDesc_${i}`).value:''});}
  }
  data.savedAt=new Date().toISOString();return data;
}
function loadData(data){
  $('projectName').value=data.project||DEFAULT_PROJECT;$('locBadge').textContent=data.location||'—';$('startDate').value=data.startDate||'';onStartDateChange();
  if(data.sig){$('sig_engineer').value=data.sig.engineer||'';$('sig_manager').value=data.sig.manager||'';if(data.sig.engineerImg){$('sigImg_engineer').src=data.sig.engineerImg;$('sigImg_engineer').style.display='block';$('sigRm_engineer').style.display='inline-block';}if(data.sig.managerImg){$('sigImg_manager').src=data.sig.managerImg;$('sigImg_manager').style.display='block';$('sigRm_manager').style.display='inline-block';}syncSig();}
  if(data.days){data.days.forEach((day,d)=>{if(d>=DAYS)return;for(const p of['am','pm']){if(!day[p])return;$(`d${d}_${p}_start`).value=day[p].start||'';$(`d${d}_${p}_end`).value=day[p].end||'';$(`d${d}_${p}_method`).value=day[p].method??DM;$(`d${d}_${p}_len`).value=day[p].len||'';$(`d${d}_${p}_person`).value=day[p].person||'';}if(day.extra){day.extra.forEach((ex,n)=>{addPeriod(d);const pid=`d${d}_x${n}`;const lbl=$(`${pid}_label`);if(lbl&&ex.label)lbl.value=ex.label;$(`${pid}_start`).value=ex.start||'';$(`${pid}_end`).value=ex.end||'';$(`${pid}_method`).value=ex.method??DM;$(`${pid}_len`).value=ex.len||'';$(`${pid}_person`).value=ex.person||'';});}});}
  if(data.photoFormat==='table'&&data.photoTable){
    switchPhotoFormat(true);
    data.photoTable.forEach((pt,d)=>{
      if(d>=DAYS)return;
      for(const p of['spray']){
        const src=pt[p+'Src'];
        if(src){const el=$(`ptImg_${d}_${p}`);if(el){el.src=src;el.style.display='block';const ph=$(`ptPh_${d}_${p}`);if(ph)ph.style.display='none';}}
      }
      for(const m of['m1s','m1e','m2s','m2e']){
        if(pt[m+'Val']){const el=$(`ptNum_${d}_${m}`);if(el)el.value=pt[m+'Val'];}
      }
      calcAndSync(d);
    });
  }else if(data.photos){
    // 舊格式
    switchPhotoFormat(false);
    data.photos.forEach((ph,i)=>{if(i>=PHOTOS)return;if(ph.src){$(`phImg_${i}`).src=ph.src;$(`phImg_${i}`).style.display='block';$(`phPlaceholder_${i}`).style.display='none';}$(`phDesc_${i}`).value=ph.desc||'';});
  }
  $('photoLocLabel').textContent=data.location||'—';
  // 載入累計水量數據並更新顯示
  const loc=data.location||'—';
  if(loc!=='—'&&!cumData[loc])loadCumData(loc).then(()=>updateRecordCumDisplay());
  else updateRecordCumDisplay();
}

/* ===== Save（cloud-first，等驗證通過才算成功）===== */
async function saveRecord(){
  const data=collectData();
  if(!data.startDate||!data.location||data.location==='—'){toast('請先選擇地點和日期',true);return;}
  const key=recKey(data.location,data.startDate);
  const btn=$('btnSave');btn.disabled=true;btn.textContent='⏳ 上傳驗證中...';
  try{
    const result=await apiPost({action:'save',key:key,data:data});
    if(!result.success)throw new Error(result.error||'儲存失敗');
    // 更新記憶體索引
    const dw=[];if(data.days){data.days.forEach(day=>{dw.push(parseFloat(day.water)||0);});}cloudIndex[key]={location:data.location,startDate:data.startDate,endDate:data.endDate,project:data.project,savedAt:data.savedAt,fileId:result.fileId||'',dailyWaters:dw};
    currentEditKey=key;
    $('postSaveTitle').textContent='✅ 儲存成功';
    $('postSaveMsg').innerHTML=`${data.location} ${data.startDate} ～ ${data.endDate}<br><span style="color:#2d5a27;">✅ 已同步到雲端（驗證通過）</span>`;
    $('postSaveDialog').classList.add('open');
    toast('✅ 儲存完成，雲端驗證通過');
  }catch(err){
    $('postSaveTitle').textContent='⚠️ 儲存失敗';
    $('postSaveMsg').innerHTML=`<span style="color:#c53030;">❌ ${err.message}</span><br>請檢查網路後重試`;
    $('postSaveDialog').classList.add('open');
    toast('❌ 雲端儲存失敗：'+err.message,true);
  }finally{
    btn.disabled=false;btn.textContent='💾 儲存紀錄';
  }
}

/* ===== Records List（從記憶體 cloudIndex 渲染）===== */
function renderList(resetPage){
  if(resetPage)currentPage=1;
  let entries=Object.entries(cloudIndex).filter(([k])=>!k.startsWith('__'));
  const fLoc=$('filterLoc').value,fFrom=$('filterFrom').value,fTo=$('filterTo').value;
  if(fLoc)entries=entries.filter(([,v])=>v.location===fLoc);
  if(fFrom)entries=entries.filter(([,v])=>v.startDate>=fFrom);
  if(fTo)entries=entries.filter(([,v])=>v.startDate<=(fTo+'-31'));
  const sort=$('sortBy').value;
  if(sort==='startDate_desc')entries.sort((a,b)=>b[1].startDate.localeCompare(a[1].startDate));
  else if(sort==='startDate_asc')entries.sort((a,b)=>a[1].startDate.localeCompare(b[1].startDate));
  else if(sort==='loc')entries.sort((a,b)=>(a[1].location||'').localeCompare(b[1].location||''));
  const total=entries.length,totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>totalPages)currentPage=totalPages;
  if(!total){$('recordsList').innerHTML='<div class="empty-list">📭 尚無紀錄（請確認網路連線）</div>';$('paginationBar').innerHTML='';return;}
  const start=(currentPage-1)*PAGE_SIZE;
  let h='';entries.slice(start,start+PAGE_SIZE).forEach(([key,meta])=>{
    const saved=meta.savedAt?new Date(meta.savedAt).toLocaleString('zh-TW'):'';
    h+=`<div class="rec-card"><input type="checkbox" class="rc-check" data-key="${key}"><div class="rc-info"><div class="rc-title">${meta.location||'—'} ｜ ${meta.startDate} ～ ${meta.endDate||''}</div><div class="rc-sub">${meta.project||''} ・ ${saved}</div></div><div class="rc-actions"><button class="btn btn-outline btn-sm" onclick="editRecord('${key}')">☁️ 載入編輯</button></div></div>`;
  });
  $('recordsList').innerHTML=h;
  // 分頁
  if(totalPages<=1){$('paginationBar').innerHTML=`<span class="pg-info">共 ${total} 筆</span>`;return;}
  let pg=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>◀</button>`;
  let ps=Math.max(1,currentPage-3),pe=Math.min(totalPages,ps+6);if(pe-ps<6)ps=Math.max(1,pe-6);
  if(ps>1)pg+=`<button class="pg-btn" onclick="goPage(1)">1</button>`;if(ps>2)pg+=`<span class="pg-info">...</span>`;
  for(let p=ps;p<=pe;p++)pg+=`<button class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  if(pe<totalPages-1)pg+=`<span class="pg-info">...</span>`;if(pe<totalPages)pg+=`<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  pg+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>▶</button>`;
  pg+=`<span class="pg-info" style="margin-left:8px;">第 ${currentPage}/${totalPages} 頁・共 ${total} 筆</span>`;
  $('paginationBar').innerHTML=pg;
}

/* ===== Import（舊資料匯入，逐筆上傳到雲端）===== */
async function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      const keys=Object.keys(imported);
      if(!keys.length){toast('檔案無資料',true);return;}
      if(!confirm(`讀取到 ${keys.length} 筆紀錄，要逐筆上傳到雲端嗎？`))return;
      showLoading(`☁️ 上傳中... 0/${keys.length}`);
      let ok=0,fail=0;
      for(let i=0;i<keys.length;i++){
        $('loadMsg').textContent=`☁️ 上傳中... ${i+1}/${keys.length}`;
        try{
          const result=await apiPost({action:'save',key:keys[i],data:imported[keys[i]]});
          if(result.success){ok++;const rec=imported[keys[i]];const dw=[];if(rec.days){rec.days.forEach(day=>{dw.push(parseFloat(day.water)||0);});}cloudIndex[keys[i]]={location:rec.location||'',startDate:rec.startDate||'',endDate:rec.endDate||'',project:rec.project||'',savedAt:rec.savedAt||'',fileId:result.fileId||'',dailyWaters:dw};}
          else fail++;
        }catch(err){fail++;}
      }
      hideLoading();renderList();
      toast(`✅ 匯入完成：${ok} 筆成功${fail?'，'+fail+' 筆失敗':''}`);
    }catch(err){hideLoading();toast('匯入失敗：'+err.message,true);}
  };
  r.readAsText(f);e.target.value='';
}

/* ★ 核心匯出：逐頁截圖 → 合併成一份 PDF，不會有跨頁問題 ★ */
async function doExportFromPreview(){
  const zone=$('pdfRenderZone');
  if(!zone){toast('沒有可匯出的內容',true);return;}
  // 等所有圖片載入
  const imgs=zone.querySelectorAll('img');
  if(imgs.length){
    await Promise.all([...imgs].map(img=>img.complete?Promise.resolve():new Promise(r=>{img.onload=r;img.onerror=r;})));
  }
  // 強制照片不超過限制高度
  zone.querySelectorAll('.ppc-body img').forEach(img=>{
    if(img.naturalHeight>250){
      const ratio=250/img.naturalHeight;
      img.style.height='250px';
      img.style.width=(img.naturalWidth*ratio)+'px';
    }
  });
  zone.querySelectorAll('.pt-img-wrap img, .pt-img-cell > img').forEach(img=>{
    if(img.naturalHeight>130){
      const ratio=130/img.naturalHeight;
      img.style.height='130px';
      img.style.width=(img.naturalWidth*ratio)+'px';
    }
  });
  // 暫時讓預覽滿版
  const modal=$('previewModal');
  const inner=modal.querySelector('.preview-inner');
  const body=$('previewBody');
  const origInner=inner.style.cssText;
  const origBody=body.style.cssText;
  const isPortrait=_pdfOrientation==='portrait';
  const renderW=isPortrait?794:1122; // 210mm or 297mm in px
  inner.style.cssText=`max-width:none;margin:0;border-radius:0;overflow:visible;width:${renderW}px;`;
  body.style.cssText='padding:0;overflow:visible;';
  zone.style.width=renderW+'px';
  modal.scrollTop=0;

  const pages=[...zone.querySelectorAll('.pdf-page')];
  if(!pages.length){toast('沒有頁面',true);return;}

  try{
    // 1. 逐頁截圖
    const canvases=[];
    for(let i=0;i<pages.length;i++){
      toast(`📄 截圖中... ${i+1}/${pages.length} 頁`);
      const c=await html2canvas(pages[i],{scale:2,useCORS:true,logging:false,scrollX:0,scrollY:0,windowWidth:renderW});
      canvases.push(c);
    }

    // 2. 建立 PDF
    toast('📄 合併 PDF 中...');
    const{jsPDF:JsPDF}=window.jspdf;

    // 3. 逐頁加入 PDF（每頁獨立，不會溢出）
    const pdf=new JsPDF({orientation:_pdfOrientation,unit:'mm',format:'a4'});
    const pdfW=isPortrait?210:297,pdfH=isPortrait?297:210;

    canvases.forEach((canvas,i)=>{
      if(i>0)pdf.addPage();
      const imgData=canvas.toDataURL('image/jpeg',0.92);
      // 等比縮放填滿頁寬，高度不超過頁高
      const w=pdfW;
      const h=(canvas.height/canvas.width)*pdfW;
      // 水平置中（寬度已填滿），垂直靠上
      pdf.addImage(imgData,'JPEG',0,0,w,Math.min(h,pdfH));
    });

    pdf.save(_pdfFilename);
    toast('✅ PDF 已匯出');
  }catch(err){toast('PDF匯出失敗：'+err.message,true);}

  // 還原樣式
  inner.style.cssText=origInner;
  body.style.cssText=origBody;
  zone.style.width='';
}

let cumData={};  // {loc: {date: dailyWater}}
const CUM_KEY_PREFIX='__cumulative_';

async function loadCumData(loc){
  try{
    const result=await apiGet('action=get&key='+encodeURIComponent(CUM_KEY_PREFIX+loc));
    if(result.success&&result.data)cumData[loc]=result.data;
    else cumData[loc]={};

async function saveCumData(){

  document.querySelectorAll('[id^="cumInput_"]').forEach(el=>{

    const val=parseFloat(el.value);

  });

  }catch(e){toast('❌ 儲存失敗：'+e.message,true);}
}
let _cumDates=[];  // 保存排序後的日期用於即時重算
let _cumAutoMap={};  // post-4/20 自動計算的值

async function renderCumulative(){
  const loc=$('cumLoc').value;
  if(!cumData[loc])await loadCumData(loc);
  const dailyMap={...(cumData[loc]||{})};
  _cumAutoMap={};

  // 找出該地點所有紀錄
  const postRecords=[];// post-4/20 需要抓水表數據的紀錄
  Object.entries(cloudIndex).forEach(([key,meta])=>{
    if(meta.location!==loc||!meta.startDate)return;
    if(key.startsWith('__'))return;
    if(meta.dailyWaters){
      // 已有快取
      meta.dailyWaters.forEach((w,i)=>{const dt=addDays(meta.startDate,i);if(w>0){dailyMap[dt]=w;_cumAutoMap[dt]=w;}else if(!(dt in dailyMap))dailyMap[dt]=0;});
    }else if(isNewFormat(meta.startDate)){
      // post-4/20 但沒有 dailyWaters → 需要從雲端抓
      postRecords.push(key);
      for(let i=0;i<7;i++){const dt=addDays(meta.startDate,i);if(!(dt in dailyMap))dailyMap[dt]=0;}
    }else{
      for(let i=0;i<7;i++){const dt=addDays(meta.startDate,i);if(!(dt in dailyMap))dailyMap[dt]=0;}
    }
  });

  // 從雲端抓缺少 dailyWaters 的 post-4/20 紀錄
  if(postRecords.length){
    $('cumBody').innerHTML='<tr><td colspan="3" style="padding:12px;color:var(--text-light);">⏳ 讀取水表資料中...</td></tr>';
    for(const key of postRecords){
      try{
        const result=await apiGet('action=get&key='+encodeURIComponent(key));
        if(result.success&&result.data){
          const rec=result.data;
          const dw=[];
          if(rec.photoTable){rec.photoTable.forEach(pt=>{dw.push(parseFloat(pt.water)||0);});}
          else if(rec.days){rec.days.forEach(day=>{dw.push(parseFloat(day.water)||0);});}
          // 快取到 cloudIndex 避免重複抓
          cloudIndex[key].dailyWaters=dw;
          dw.forEach((w,i)=>{const dt=addDays(rec.startDate,i);if(w>0){dailyMap[dt]=w;_cumAutoMap[dt]=w;}});
        }
      }catch(e){/* skip */}
    }
  }

  _cumDates=Object.keys(dailyMap).sort();
  let cum=0,h='';
  if(!_cumDates.length){h='<tr><td colspan="3" style="color:#999;padding:20px;">尚無紀錄</td></tr>';}
  else{_cumDates.forEach(dt=>{
    const w=dailyMap[dt]||0;cum+=w;
    const isOld=dt<NEW_FORMAT_DATE;
    h+=`<tr><td style="white-space:nowrap;">${dt}（${weekday(dt)}）</td>`;
    if(isOld){h+=`<td><input type="number" id="cumInput_${dt.replace(/-/g,'')}" data-date="${dt}" value="${w||''}" step="0.1" min="0" style="width:70px;" oninput="recalcCum()"></td>`;}
    else{h+=`<td class="cum-auto">${w?w.toFixed(1):'—'}</td>`;}
    h+=`<td class="cum-total" id="cumTotal_${dt.replace(/-/g,'')}">${cum.toFixed(1)}</td></tr>`;
  });}
  $('cumBody').innerHTML=h;
}

function recalcCum(){
  let cum=0;
  _cumDates.forEach(dt=>{
    const key=dt.replace(/-/g,'');
    const input=$(`cumInput_${key}`);
    const w=input?parseFloat(input.value)||0:(_cumAutoMap[dt]||0);
    cum+=w;
    const totalEl=$(`cumTotal_${key}`);
    if(totalEl)totalEl.textContent=cum.toFixed(1);
  });
}

/* ===== Meter Report (用水抄表紀錄表) ===== */
// 共用：收集每週水量資料
function collectWeeklyData(loc){
  const weeklyMap={};
  Object.entries(cloudIndex).forEach(([key,meta])=>{
    if(meta.location!==loc||!meta.startDate||key.startsWith('__'))return;
    let wt=0;
    if(meta.dailyWaters){meta.dailyWaters.forEach(w=>{wt+=w||0;});}
    weeklyMap[meta.startDate]=(weeklyMap[meta.startDate]||0)+wt;
  });
  if(cumData[loc]){
    Object.entries(cumData[loc]).forEach(([dt,w])=>{
      const mon=getMonday(dt);
      weeklyMap[mon]=(weeklyMap[mon]||0)+w;
    });
  }
  const weeks=Object.keys(weeklyMap).sort();
  // 按結束日期所屬月份分組
  const months=[];// [{month:'2025-09', weeks:[{sd,ed,wt}]}]
  let curMonth=null;
  weeks.forEach(sd=>{
    const ed=addDays(sd,6);
    const m=ed.slice(0,7);// 跨月時歸屬到結束日的月份
    const wt=weeklyMap[sd]||0;
    if(!curMonth||curMonth.month!==m){
      curMonth={month:m,weeks:[]};months.push(curMonth);
    }
    curMonth.weeks.push({sd,ed,wt});
  });
  return months;
}

async function renderMeterReport(){
  const loc=$('meterLoc').value;
  const pos=$('meterPosition').value||'工地裸露地表灑水車用';
  if(!cumData[loc])await loadCumData(loc);
  const months=collectWeeklyData(loc);
  if(!months.length){$('meterReportWrap').innerHTML='<div style="text-align:center;padding:30px;color:var(--text-light);">尚無水量資料</div>';return;}
  let h=`<div class="meter-report-header"><h2>用水抄表紀錄表</h2><div class="sub">工程名稱：${DEFAULT_PROJECT}（${loc}工區）</div><div class="sub">水表用途：${pos}</div></div>`;
  h+=`<table class="meter-report"><thead><tr><th>日期區間</th><th>每周累積水量</th><th>每月累積水量</th><th>總水量</th></tr></thead><tbody>`;
  let grandTotal=0;
  months.forEach(mg=>{
    const monthTotal=mg.weeks.reduce((s,w)=>s+w.wt,0);
    grandTotal+=monthTotal;
    const rs=mg.weeks.length;
    mg.weeks.forEach((w,wi)=>{
      h+=`<tr><td>${w.sd} ～ ${w.ed}</td><td>${w.wt>0?w.wt.toFixed(1)+' m³':'—'}</td>`;
      if(wi===0){
        h+=`<td class="month-total" rowspan="${rs}">${monthTotal.toFixed(1)} m³</td>`;
        h+=`<td class="grand-total" rowspan="${rs}" style="background:var(--am);color:#fff;">${grandTotal.toFixed(1)} m³</td>`;
      }
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table>`;
  $('meterReportWrap').innerHTML=h;
}

/* ===== Meter Report Signatures ===== */
function onMeterSigSelect(role,e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{compressImage(ev.target.result,400,0.8,c=>{$(`meterSigImg_${role}`).src=c;$(`meterSigImg_${role}`).style.display='block';$(`meterSigRm_${role}`).style.display='inline-block';});};r.readAsDataURL(f);}
function removeMeterSig(role){$(`meterSigImg_${role}`).src='';$(`meterSigImg_${role}`).style.display='none';$(`meterSigRm_${role}`).style.display='none';$(`meterSigFile_${role}`).value='';}

function buildMeterReportPdfHtml(){
  const loc=$('meterLoc').value;
  const pos=$('meterPosition').value||'工地裸露地表灑水車用';
  const months=collectWeeklyData(loc);
  const engName=$('meterSig_engineer').value||'';
  const mgrName=$('meterSig_manager').value||'';
  const engImg=$('meterSigImg_engineer').style.display!=='none'?$('meterSigImg_engineer').src:'';
  const mgrImg=$('meterSigImg_manager').style.display!=='none'?$('meterSigImg_manager').src:'';

  let h=`<div class="pdf-page" style="width:210mm;height:290mm;max-height:290mm;padding:12mm 16mm;box-sizing:border-box;font-family:'Noto Sans TC',sans-serif;background:#fff;">`;
  // 標題
  h+=`<h2 style="text-align:center;font-size:22px;font-weight:700;margin:0 0 12px;letter-spacing:2px;">用水抄表紀錄表</h2>`;
  // 上方資訊（靠左）
  h+=`<table style="width:100%;border-collapse:collapse;margin-bottom:12px;">`;
  h+=`<tr><td style="border:1.5px solid #333;padding:8px 12px;font-size:13px;text-align:left;" colspan="4"><b>工程名稱：</b>${DEFAULT_PROJECT}（${loc}工區）</td></tr>`;
  h+=`<tr><td style="border:1.5px solid #333;padding:8px 12px;font-size:13px;text-align:left;" colspan="2"><b>水表用途：</b>${pos}</td>`;
  h+=`<td style="border:1.5px solid #333;padding:8px 12px;font-size:13px;text-align:left;" colspan="2"><b>水表位置：</b>${$('meterPosition').value||''}</td></tr>`;
  h+=`</table>`;
  // 主表格
  h+=`<table style="width:100%;border-collapse:collapse;font-size:13px;">`;
  h+=`<thead><tr>`;
  h+=`<th style="border:1.5px solid #333;padding:8px;background:#e8e8e8;font-weight:700;width:38%;">日期區間</th>`;
  h+=`<th style="border:1.5px solid #333;padding:8px;background:#e8e8e8;font-weight:700;width:20%;">每周累積水量</th>`;
  h+=`<th style="border:1.5px solid #333;padding:8px;background:#e8e8e8;font-weight:700;width:21%;">每月累積水量</th>`;
  h+=`<th style="border:1.5px solid #333;padding:8px;background:#e8e8e8;font-weight:700;width:21%;">總水量</th>`;
  h+=`</tr></thead><tbody>`;
  let grandTotal=0;
  months.forEach(mg=>{
    const monthTotal=mg.weeks.reduce((s,w)=>s+w.wt,0);
    grandTotal+=monthTotal;
    const rs=mg.weeks.length;
    mg.weeks.forEach((w,wi)=>{
      h+=`<tr>`;
      h+=`<td style="border:1px solid #333;padding:6px 10px;text-align:left;">${w.sd} ～ ${w.ed}</td>`;
      h+=`<td style="border:1px solid #333;padding:6px;text-align:center;">${w.wt>0?w.wt.toFixed(1)+' m³':'—'}</td>`;
      if(wi===0){
        h+=`<td style="border:1px solid #333;padding:6px;text-align:center;font-weight:700;background:#f5f5f0;vertical-align:middle;" rowspan="${rs}">${monthTotal.toFixed(1)} m³</td>`;
        h+=`<td style="border:1px solid #333;padding:6px;text-align:center;font-weight:700;background:#e8f0e6;vertical-align:middle;" rowspan="${rs}">${grandTotal.toFixed(1)} m³</td>`;
      }
      h+=`</tr>`;
    });
  });
  // 空行填充
  const totalRows=months.reduce((s,m)=>s+m.weeks.length,0);
  if(totalRows<10){for(let i=0;i<10-totalRows;i++){h+=`<tr><td style="border:1px solid #333;padding:6px;">&nbsp;</td><td style="border:1px solid #333;padding:6px;"></td><td style="border:1px solid #333;padding:6px;"></td><td style="border:1px solid #333;padding:6px;"></td></tr>`;}}
  h+=`</tbody></table>`;
  // 簽名欄
  h+=`<div style="display:flex;justify-content:space-around;margin-top:24px;font-size:13px;align-items:flex-end;">`;
  h+=`<div style="display:inline-flex;flex-direction:column;align-items:center;min-width:180px;">`;
  h+=engImg?`<img src="${engImg}" style="max-width:120px;max-height:50px;object-fit:contain;margin-bottom:2px;">`:'<div style="width:140px;height:50px;"></div>';
  h+=`<div style="border-top:1px solid #333;padding-top:3px;min-width:140px;text-align:center;">現場環保工程師：${engName}</div></div>`;
  h+=`<div style="display:inline-flex;flex-direction:column;align-items:center;min-width:180px;">`;
  h+=mgrImg?`<img src="${mgrImg}" style="max-width:120px;max-height:50px;object-fit:contain;margin-bottom:2px;">`:'<div style="width:140px;height:50px;"></div>';
  h+=`<div style="border-top:1px solid #333;padding-top:3px;min-width:140px;text-align:center;">環境保護負責人：${mgrName}</div></div>`;
  h+=`</div>`;
  h+=`</div>`;
  return h;
}

async function exportMeterPdf(){
  const loc=$('meterLoc').value;
  if(!cumData[loc])await loadCumData(loc);
  const html=buildMeterReportPdfHtml();
  _pdfFilename=`用水抄表紀錄表_${loc}.pdf`;
  _pdfOrientation='portrait';
  $('previewTitle').textContent='📄 用水抄表紀錄表';
  $('previewBody').innerHTML=`<div class="pdf-render-zone" id="pdfRenderZone" style="width:210mm;">${html}</div>`;
  $('previewModal').classList.add('open');
  $('previewModal').scrollTop=0;
}

      loadCumData('台中').catch(()=>{});
      loadCumData('通霄').catch(()=>{});

      renderList();
      toast('☁️ 雲端無資料');
    }
  }catch(err){
    renderList();
    toast('⚠️ 無法連線雲端：'+err.message,true);
  }finally{hideLoading();}
})();
