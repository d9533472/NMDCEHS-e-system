<script>
const HOLIDAYS_2026 = {
  '2026-01-01':'元旦',
  '2026-02-16':'除夕','2026-02-17':'春節','2026-02-18':'春節','2026-02-19':'春節','2026-02-20':'春節',
  '2026-02-27':'和平紀念(補)',
  '2026-04-03':'兒童節(補)','2026-04-06':'清明(補)',
  '2026-05-01':'勞動節',
  '2026-06-19':'端午節',
  '2026-09-25':'中秋節','2026-09-28':'教師節',
  '2026-10-09':'國慶(補)',
  '2026-10-26':'光復(補)',
  '2026-12-25':'行憲紀念',
};
const pad = n => String(n).padStart(2,'0');
const dstr = (y,m,d) => y+'-'+pad(m)+'-'+pad(d);
const fromStr = s => { const a=s.split('-').map(Number); return new Date(a[0],a[1]-1,a[2]); };
const toStr = dt => dstr(dt.getFullYear(), dt.getMonth()+1, dt.getDate());
const addDays = (s,n) => { const dt=fromStr(s); dt.setDate(dt.getDate()+n); return toStr(dt); };
const getDow = s => fromStr(s).getDay();
const isHoliday = s => !!HOLIDAYS_2026[s];
const isWeekend = s => { const d=getDow(s); return d===0||d===6; };
const isNonWork = s => isWeekend(s)||isHoliday(s);
function autoType(s){
  if(!isNonWork(s)) return 'WORK';
  let start=s; while(isNonWork(addDays(start,-1))) start=addDays(start,-1);
  let len=0,cur=start; while(isNonWork(cur)){len++;cur=addDays(cur,1);}
  let pos=0,p=start; while(p!==s){pos++;p=addDays(p,1);}
  if(len===1) return 'DUTY1';
  if(len===2) return pos===0?'DUTY2':'DUTY1';
  return pos<=1?'DUTY2':'DUTY1';
}
function dayType(s,ov){ if(ov&&ov[s])return ov[s]; return autoType(s); }
function monthDays(y,m){ const n=new Date(y,m,0).getDate(),a=[]; for(let d=1;d<=n;d++)a.push(dstr(y,m,d)); return a; }
const isWork = st => st==='中'||st==='霄'||st==='R';
function resolve(s,person,manual,auto,ov){
  const mv=manual[s]&&manual[s][person.id]; if(mv!==undefined)return mv;
  const av=auto[s]&&auto[s][person.id]; if(av!==undefined)return av;

function generate(y,m,people,manual,ov){
  const days=monthDays(y,m), auto={}, load={};

  const stateOf=(s,p)=>resolve(s,p,manual,auto,ov);

  const tcOrder=['sean','jacqueline','paul'], txOrder=['raymond','jacqueline','paul'];
  function pick(s,cap,order,exclude){
    const c=people.filter(p=>p[cap]&&p.id!==exclude&&!fixed(s,p.id)&&!(auto[s]&&auto[s][p.id]!==undefined));
    if(!c.length)return null;
    c.sort((a,b)=> load[a.id]!==load[b.id]?load[a.id]-load[b.id]:order.indexOf(a.id)-order.indexOf(b.id));
    return c[0];

    const t=dayType(s,ov); if(t==='WORK')continue;

    if(t==='DUTY2'){
      let first=null;
      if(!h中){const p=pick(s,'tc',tcOrder,null); if(p){setA(s,p.id,'中');load[p.id]++;first=p.id;}}
      if(!h霄){const p=pick(s,'tx',txOrder,first); if(p){setA(s,p.id,'霄');load[p.id]++;}}
    }else{
      if(!any){
        const c=people.filter(p=>!fixed(s,p.id));
        c.sort((a,b)=>load[a.id]-load[b.id]||people.indexOf(a)-people.indexOf(b));
        if(c[0]){setA(s,c[0].id,c[0].single);load[c[0].id]++;}
      }
    }
  }
  // weekday cover: if Sean/Raymond on leave on a workday, Paul covers their post
  const byId=Object.fromEntries(people.map(p=>[p.id,p]));

    for(const s of days){
      if(dayType(s,ov)!=='WORK')continue;
      if(manual[s]&&manual[s]['paul']!==undefined)continue;
      const seanOff=sean&&resolve(s,sean,manual,auto,ov)==='H';
      const rayOff =ray &&resolve(s,ray ,manual,auto,ov)==='H';
      if(!seanOff&&!rayOff)continue;
      let post;
      if(seanOff&&rayOff){ const jp=jac?resolve(s,jac,manual,auto,ov):null; post=jp==='中'?'霄':jp==='霄'?'中':'霄'; }
      else post=seanOff?'中':'霄';
      setA(s,'paul',post);
    }
  }

  return auto;
}
function fixStreak(y,m,person,manual,auto,ov){
  const days=monthDays(y,m);
  for(let g=0;g<60;g++){
    const st=days.map(s=>resolve(s,person,manual,auto,ov));
    let s=-1,rs=-1;
    for(let i=0;i<st.length;i++){ if(isWork(st[i])){if(rs<0)rs=i; if(i-rs+1>=7){s=rs;break;}} else rs=-1; }
    if(s<0)break;
    const hi=Math.min(days.length-1,s+6); let t=-1;
    for(let i=hi;i>=s;i--){ const ds=days[i];

    if(t<0){ for(let i=hi;i>=s;i--){ const ds=days[i];

}
function detectStreaks(y,m,people,manual,auto,ov){
  const days=monthDays(y,m), bad=new Set();
  for(const p of people){ const st=days.map(s=>resolve(s,p,manual,auto,ov)); let i=0;
    while(i<st.length){ if(isWork(st[i])){let j=i; while(j<st.length&&isWork(st[j]))j++;
      if(j-i>=7){for(let k=i;k<j;k++)bad.add(days[k]+'|'+p.id);} i=j;} else i++; } }
  return bad;
}
function coverageWarn(s,people,manual,auto,ov){
  const t=dayType(s,ov); if(t==='WORK')return null;
  let h中=false,h霄=false,any=false;
  for(const p of people){const st=resolve(s,p,manual,auto,ov); if(isWork(st)){any=true;if(st==='中')h中=true;if(st==='霄')h霄=true;}}
  if(t==='DUTY2'){ if(!h中&&!h霄)return '缺中/霄'; if(!h中)return '缺台中'; if(!h霄)return '缺通霄'; return null; }
  return any?null:'缺值班';
}
</script>
