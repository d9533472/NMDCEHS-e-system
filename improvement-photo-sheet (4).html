<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>改善照片表產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0eb;--bg2:#fffdf9;--card:#fff;--border:#d4c9b8;--text:#2c2418;--text2:#6b5d4d;--text3:#9a8c7a;--accent:#1a6b4a;--accent-bg:rgba(26,107,74,.06);--red:#c0392b;--orange:#d4770b;--blue:#2471a3;--shadow:0 2px 12px rgba(44,36,24,.08);--radius:8px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{background:linear-gradient(135deg,#1a3c34,#2d6b4e);color:#fff;padding:20px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:1px}
.app-header p{font-size:12px;opacity:.7;margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;opacity:.9}
.sync-bar .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-bar .dot.on{background:#4ade80}.sync-bar .dot.off{background:#f87171}
.sync-bar .dot.spin{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.container{max-width:900px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:16px;box-shadow:var(--shadow)}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:6px;transition:all .2s;font-family:inherit}
.tab.active{background:var(--accent);color:#fff;font-weight:700}
.tab:not(.active):hover{background:var(--accent-bg)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-header .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-header .icon.before{background:rgba(192,57,43,.1);color:var(--red)}
.card-header .icon.during{background:rgba(212,119,11,.1);color:var(--orange)}
.card-header .icon.after{background:rgba(26,107,74,.1);color:var(--accent)}
.card-header .icon.info{background:rgba(36,113,163,.1);color:var(--blue)}
.card-header .icon.cloud{background:rgba(74,222,128,.1);color:#16a34a}
.card-header h3{font-size:15px;font-weight:700}
.card-header small{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.card-body{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--bg2);color:var(--text);transition:border .2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field .hint-text{font-size:11px;color:var(--text3);margin-top:3px}
.photo-zone{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .25s;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg2)}
.photo-zone:hover,.photo-zone.dragover{border-color:var(--accent);background:var(--accent-bg)}
.photo-zone:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(26,107,74,.15)}
.photo-zone .hint{font-size:13px;color:var(--text3);margin-top:8px}
.photo-zone .hint b{color:var(--accent)}
.photo-zone input[type=file]{display:none}
.photo-preview{position:relative;width:100%;border-radius:8px;overflow:hidden;background:#f0ece6}
.photo-preview img{width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.photo-preview .remove-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.photo-preview .remove-btn:hover{background:rgba(192,57,43,.9)}
.photo-date-stamp{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.55);color:#fff;font-size:13px;font-weight:600;padding:3px 10px;border-radius:4px;pointer-events:none;font-family:'Noto Sans TC',sans-serif}
.photo-date-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.photo-date-label{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap}
.photo-date-input{padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg2);color:var(--text);flex:1;max-width:180px}
.photo-date-input:focus{outline:none;border-color:var(--accent)}
.photo-loading{border:2px solid var(--border);border-radius:8px;padding:30px;text-align:center;background:var(--bg2);color:var(--text3);font-size:13px}
.photo-loading .mini-spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px}
.preview-doc{background:#fff;border:1px solid #ccc;padding:40px 50px;max-width:780px;margin:0 auto;font-family:'Noto Serif TC','DFKai-SB','標楷體',serif;box-shadow:0 2px 20px rgba(0,0,0,.1)}
.preview-doc .doc-org{text-align:center;font-size:16pt;margin-bottom:4px;letter-spacing:2px}
.preview-doc .doc-title{text-align:center;font-size:16pt;margin-bottom:10px;letter-spacing:6px}
.preview-doc .doc-project{font-size:12pt;margin-bottom:14px}
.preview-table{width:100%;border-collapse:collapse;font-size:11pt}
.preview-table td{border:1.5px solid #000;padding:8px;vertical-align:top}
.preview-table .label-cell{width:30px;writing-mode:vertical-rl;text-align:center;font-size:10pt;letter-spacing:2px;line-height:1.8;padding:6px 4px}
.preview-table .photo-cell{width:55%;text-align:center;padding:6px}
.preview-table .photo-cell img{max-width:100%;max-height:240px;object-fit:contain}
.preview-table .desc-cell{width:auto;font-size:10.5pt;line-height:1.7;padding:10px}
.preview-table .desc-title{font-weight:700;margin-bottom:4px}
.no-photo-placeholder{color:#999;padding:40px;font-size:12px}
.btn{padding:12px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#155a3e;transform:translateY(-1px)}
.btn-sync{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-sync:hover:not(:disabled){background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-1px)}
.btn-load{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.btn-load:hover:not(:disabled){background:linear-gradient(135deg,#0e7490,#155e75);transform:translateY(-1px)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#ebe5dc}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.record-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.record-item:hover{background:var(--accent-bg)}
.record-item:last-child{border-bottom:none}
.record-item .rec-idx{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.record-item .rec-info{flex:1;min-width:0;overflow:hidden}
.record-item .rec-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.record-item .rec-sub{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.record-item .rec-del-btn{flex-shrink:0;width:36px;height:36px;padding:0;border:none;border-radius:50%;background:transparent;color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.record-item .rec-del-btn:hover{background:rgba(192,57,43,.1)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:all .35s ease}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.loading-overlay{position:fixed;inset:0;background:rgba(245,240,235,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;font-size:14px;color:var(--text2)}
.record-loading{text-align:center;padding:60px 20px;color:var(--text3)}
.record-loading .spinner-sm{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
/* 子頁籤 */
.sub-tabs{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:14px}
.sub-tab{flex:1;padding:10px 12px;border:none;background:var(--bg2);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.sub-tab.active{background:var(--accent);color:#fff}
.sub-tab:not(.active):hover{background:var(--accent-bg)}
.linked-hint{display:inline-block;font-size:10px;color:var(--accent);background:var(--accent-bg);padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}
/* ============ 手機版優化 ============ */
@media(max-width:640px){
  /* 整體容器 */
  body{font-size:14px}
  .container{padding:8px}

  /* 頂部標題列 */
  .app-header{padding:14px 16px}
  .app-header h1{font-size:16px;letter-spacing:0.5px}
  .app-header p{font-size:11px}
  .sync-bar{font-size:10px;margin-top:4px}

  /* Tab 頁籤 */
  .tabs{padding:3px;margin-bottom:10px;gap:2px}
  .tab{padding:8px 4px;font-size:12px}

  /* 卡片 */
  .card{border-radius:10px;margin-bottom:10px}
  .card-header{padding:12px 14px;gap:8px}
  .card-header .icon{width:28px;height:28px;font-size:14px;border-radius:7px}
  .card-header h3{font-size:14px}
  .card-header small{font-size:10px}
  .card-body{padding:14px}

  /* 表單 */
  .field{margin-bottom:10px}
  .field label{font-size:11px;margin-bottom:4px}
  .field input,.field textarea,.field select{padding:10px;font-size:15px;border-radius:8px}
  .field textarea{min-height:72px}

  /* 按鈕 */
  .btn-group{gap:6px;margin-top:14px}
  .btn-group .btn{width:100%;justify-content:center;padding:13px 16px;font-size:14px;border-radius:10px}

  /* 照片格子：手機改單欄 */
  .photo-grid{gap:8px}
  .photo-grid-item{width:100%}
  .photo-grid-item img{height:220px}
  .photo-grid-item .remove-btn{width:28px;height:28px;font-size:16px;top:6px;right:6px}
  .photo-grid-item .photo-date-stamp{font-size:11px;padding:2px 8px;bottom:6px;right:6px}
  .photo-grid-item .date-row{padding:6px 10px;font-size:12px}
  .photo-grid-item .date-row input{font-size:13px;padding:5px 8px}
  .photo-add-zone{width:100%;min-height:80px;padding:16px;border-radius:10px}
  .photo-add-zone>div:first-child{font-size:32px!important}
  .photo-add-zone>div:nth-child(2){font-size:13px!important}

  /* 紀錄列表 */
  .record-item{padding:12px 10px;gap:8px}
  .record-item .rec-title{font-size:14px}
  .record-item .rec-sub{font-size:12px;margin-top:4px;-webkit-line-clamp:2}
  .record-item .rec-del-btn{width:34px;height:34px;font-size:15px}
  .rec-check{width:22px;height:22px;margin-top:2px}
  .select-bar{padding:10px 14px;font-size:12px}

  /* 預覽 */
  .preview-doc{padding:16px 10px}
  .preview-doc .doc-org{font-size:13pt;letter-spacing:1px}
  .preview-doc .doc-title{font-size:13pt;letter-spacing:3px}
  .preview-doc .doc-project{font-size:10pt}
  .preview-table{font-size:10pt}
  .preview-table .label-cell{width:22px;font-size:9pt;padding:4px 2px}
  .preview-table .photo-cell{padding:4px}
  .preview-table .photo-cell img{max-height:180px}
  .preview-table .desc-cell{font-size:9.5pt;padding:6px}

  /* 彈窗 */
  .success-box{padding:24px 20px;max-width:95%}
  .success-box .icon-big{font-size:40px}
  .success-box h3{font-size:15px}
  .success-box p{font-size:12px}
  .success-box .folder-btn{padding:14px;font-size:14px}

  /* 進度條 */

  /* Toast */
  .toast{bottom:16px;font-size:12px;padding:10px 20px;max-width:90%}

  /* 子頁籤 */
  .sub-tabs{border-radius:8px}
  .sub-tab{padding:10px 8px;font-size:12px}
  /* 照片日期選擇器 */
  .photo-date-input{max-width:none;font-size:13px}
}
/* Checkbox */
.rec-check{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.select-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.select-bar button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;padding:2px 6px}
.select-bar button:hover{text-decoration:underline}
/* Export modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal{background:var(--card);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.3);width:100%;max-width:420px;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.modal-header button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)}
.modal-body{padding:20px}
.modal-opt{display:flex;gap:8px;margin-bottom:16px}
.modal-opt button{flex:1;padding:14px 8px;border:2px solid var(--border);border-radius:8px;background:var(--bg2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s;text-align:center}
.modal-opt button.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.modal-opt button:hover{border-color:var(--accent)}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* 頂部細線進度條（不擋畫面）*/
.top-progress{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15);z-index:1000;overflow:hidden}
.top-progress .bar{height:100%;background:linear-gradient(90deg,#4ade80,#fbbf24,#4ade80);background-size:200% 100%;transition:width .3s ease;animation:shimmer 2s linear infinite;box-shadow:0 0 8px rgba(74,222,128,.6)}
@keyframes shimmer{0%{background-position:0 0}100%{background-position:200% 0}}
.success-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:400;padding:20px}
.success-box{background:var(--card);border-radius:14px;box-shadow:0 10px 50px rgba(0,0,0,.3);padding:32px;text-align:center;max-width:360px;width:100%;animation:popIn .25s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.success-box .icon-big{font-size:48px;margin-bottom:12px}
.success-box h3{font-size:17px;color:var(--text);margin-bottom:6px}
.success-box p{font-size:13px;color:var(--text2);margin-bottom:20px}
.success-box .folder-btn{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:background .2s}
.success-box .folder-btn:hover{background:#155a3e}
.success-box .close-link{color:var(--text3);font-size:13px;cursor:pointer;border:none;background:none;font-family:inherit}
.success-box .close-link:hover{color:var(--text)}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.photo-grid-item{position:relative;width:calc(50% - 4px);border-radius:8px;overflow:hidden;background:#f0ece6}
.photo-grid-item img{width:100%;height:160px;object-fit:contain;display:block}
.photo-grid-item .remove-btn{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.photo-grid-item .photo-date-stamp{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px}
.photo-grid-item .date-row{display:flex;align-items:center;gap:4px;padding:4px 6px;background:var(--bg2);font-size:11px}
.photo-grid-item .date-row input{padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit}
.photo-add-zone{width:calc(50% - 4px);min-height:120px;border:2px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.photo-add-zone:hover{border-color:var(--accent);background:var(--accent-bg)}
.photo-add-zone input[type=file]{display:none}
@media(max-width:400px){.photo-grid-item,.photo-add-zone{width:100%}}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-el" class="toast"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxHiB96YpiaqihKYI3_k27921f3lRL_ZgX0EdTXOMZd5_8hhA0XI4z6l8MQKHw7fgth0A/exec';

const DEFAULT_HEADER = {
  org:'台灣電力公司北部施工處', title:'改 善 照 片 表',
  project:'通霄電廠二期更新改建計畫海底輸氣管線統包工程',
};

function toast(msg,ms=2500){const el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms)}
function xhrGet(url){return new Promise((ok,no)=>{const x=new XMLHttpRequest();x.open('GET',url,true);x.onload=()=>{try{const j=JSON.parse(x.responseText);ok(j)}catch{no(new Error('GET回應非JSON'))}};x.onerror=()=>no(new Error('Network'));x.timeout=30000;x.ontimeout=()=>no(new Error('Timeout'));x.send()})}
async function xhrGetRetry(url,retries=2){for(let i=0;i<retries;i++){try{return await xhrGet(url)}catch(e){if(i===retries-1)throw e;await new Promise(r=>setTimeout(r,1500*(i+1)))}}}

// 索引快取（秒開）
const INDEX_CACHE_KEY='photosheet_index_cache';
function getCachedIndex(){try{const c=sessionStorage.getItem(INDEX_CACHE_KEY);if(c){const d=JSON.parse(c);if(Date.now()-d.ts<300000)return d.data}}catch(e){}return null} // 5分鐘有效
function setCachedIndex(data){try{sessionStorage.setItem(INDEX_CACHE_KEY,JSON.stringify({ts:Date.now(),data}))}catch(e){}}
function xhrPost(url,data){return new Promise((ok,no)=>{const x=new XMLHttpRequest();x.open('POST',url,true);x.setRequestHeader('Content-Type','text/plain;charset=utf-8');x.onload=()=>{try{const j=JSON.parse(x.responseText);if(j.ok===false)no(new Error(j.error||'Server error'));else ok(j)}catch{no(new Error('POST回應非JSON'))}};x.onerror=()=>no(new Error('Network'));x.timeout=60000;x.ontimeout=()=>no(new Error('Timeout'));x.send(JSON.stringify(data))})}
async function xhrPostRetry(url,data,retries=3){for(let i=0;i<retries;i++){try{return await xhrPost(url,data)}catch(e){if(i===retries-1)throw e;await new Promise(r=>setTimeout(r,1000*Math.pow(2,i)))}}}
function compressImage(dataUrl,maxW=1400,q=0.7){return new Promise(r=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',q))};img.src=dataUrl})}

function stampDateOnImage(dataUrl, dateStr) {
  if (!dataUrl || !dateStr) return Promise.resolve(dataUrl);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
      const ctx = c.getContext('2d'); ctx.drawImage(img,0,0);
      const fs = Math.max(16, Math.round(img.width/30));
      const pad = Math.round(fs*0.6);
      ctx.font = `bold ${fs}px 'Noto Sans TC',Arial,sans-serif`;
      const m = ctx.measureText(dateStr);
      const tx = img.width-m.width-pad, ty = img.height-pad;
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(tx-pad/2,ty-fs,m.width+pad,fs*1.4);
      ctx.fillStyle='#ffffff'; ctx.fillText(dateStr,tx,ty);
      resolve(c.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>resolve(dataUrl); img.src=dataUrl;
  });
}

// ===== 資料結構：每階段照片為陣列 =====
// photos: [{photoId:'', date:'2026-03-05', localSrc:'data:...'}]
function emptyRecord(defaults) {
  const d = defaults || DEFAULT_HEADER;
  const today = new Date().toISOString().slice(0,10);
  return { id:Date.now(), date:today, label:'',
    org:d.org||DEFAULT_HEADER.org, title:d.title||DEFAULT_HEADER.title, project:d.project||DEFAULT_HEADER.project,
    beforePhotos:[], beforeDesc:'',
    duringPhotos:[], duringDesc:'',
    afterPhotos:[],  afterDesc:'',
    causeAnalysis:'', prevention:'', completionDate:today, remarks:'', mgmtType:'env' };
}

// 舊格式轉新格式
function migrateRecord(d) {
  if (!d.org) d.org = DEFAULT_HEADER.org;
  if (!d.title) d.title = DEFAULT_HEADER.title;
  if (!d.project) d.project = DEFAULT_HEADER.project;
  if (d.project === '通霄電廠二期海底輸氣管線統包工程') d.project = DEFAULT_HEADER.project;
  const today = d.date || new Date().toISOString().slice(0,10);
  for (const key of ['before','during','after']) {
    if (!d[key+'Photos']) {
      d[key+'Photos'] = [];
      const pid = d[key+'PhotoId'];
      const pdate = d[key+'PhotoDate'] || today;
      if (pid) d[key+'Photos'].push({photoId:pid, date:pdate, localSrc:''});
      delete d[key+'PhotoId']; delete d[key+'PhotoDate'];
    }
  }
  return d;
}

// ---- 照片快取（避免重複載入同一張照片）----
const PHOTO_CACHE = new Map();

// ---- Google Drive 直接連結（由 Google CDN 傳送，不經過 GAS）----
// 備註：需要當前 Google 帳號對 Drive 檔案有讀取權限
function driveImageUrl(fileId) {
  if (!fileId) return '';
  return `https://lh3.googleusercontent.com/d/${fileId}=w1200`;
}

// ---- 單張照片非同步讀取（直接連結 + 快取 + GAS fallback）----
function usePhotoLoader(fileId) {
  const [src,setSrc]=useState(fileId && PHOTO_CACHE.has(fileId) ? PHOTO_CACHE.get(fileId) : (fileId ? driveImageUrl(fileId) : ''));
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(false);
  useEffect(()=>{
    if(!fileId){setSrc('');setLoading(false);setError(false);return}
    // 命中快取
    if(PHOTO_CACHE.has(fileId)){setSrc(PHOTO_CACHE.get(fileId));setLoading(false);setError(false);return}
    // 直接用 Drive CDN URL，browser 負責載入和快取
    setSrc(driveImageUrl(fileId));
    setLoading(false);
    setError(false);
  },[fileId]);
  return {src,loading,error};
}

// ---- 透過 GAS 取得 base64（匯出 Word 用，需要真實圖片資料）----
async function fetchPhotoBase64(fileId) {
  if (!fileId) return '';
  if (PHOTO_CACHE.has(fileId)) return PHOTO_CACHE.get(fileId);
  try {
    const res = await xhrGetRetry(GAS_URL+'?action=photo&fileId='+fileId);
    if (res.ok && res.dataUrl) {
      PHOTO_CACHE.set(fileId, res.dataUrl);
      return res.dataUrl;
    }
  } catch(e) { console.warn('fetchPhotoBase64 fail:', e); }
  return '';
}

// ---- 單張照片顯示 ----
function PhotoItem({photo, onRemove, onDateChange}) {
  const [imgError, setImgError] = useState(false);
  const remote = usePhotoLoader(!photo.localSrc ? photo.photoId : '');
  const displaySrc = photo.localSrc || remote.src;
  if (!displaySrc) return null;
  if (imgError) return (
    <div className="photo-grid-item">
      <div style={{height:160,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--red)',fontSize:11,gap:4,padding:8,textAlign:'center'}}>
        <div style={{fontSize:20}}>⚠️</div>
        <div>照片無法載入</div>
        <div style={{fontSize:9,color:'var(--text3)',wordBreak:'break-all'}}>ID: {photo.photoId?.substring(0,12)}...</div>
        <button className="remove-btn" style={{position:'static',marginTop:4}} onClick={onRemove} title="移除">移除</button>
      </div>
    </div>
  );
  return (
    <div className="photo-grid-item">
      <img src={displaySrc} onError={()=>setImgError(true)} />
      <button className="remove-btn" onClick={onRemove} title="移除">×</button>
      {photo.date && <div className="photo-date-stamp">{photo.date}</div>}
      <div className="date-row">
        <span>📅</span>
        <input type="date" value={photo.date||''} onChange={e=>onDateChange(e.target.value)} />
      </div>
    </div>
  );
}

// ---- 多照片區塊 ----
function MultiPhotoSection({photos, onUpdate, label}) {
  const inputRef = useRef();
  const handleFile = async(file) => {
    if(!file||!file.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const compressed = await compressImage(e.target.result);
      const newPhoto = {photoId:'', date:new Date().toISOString().slice(0,10), localSrc:compressed};
      onUpdate([...photos, newPhoto]);
      toast('✅ 照片已加入');
    };
    reader.readAsDataURL(file);
  };
  const removeAt = (idx) => onUpdate(photos.filter((_,i)=>i!==idx));
  const updateDateAt = (idx,date) => onUpdate(photos.map((p,i)=>i===idx?{...p,date}:p));

  return (
    <div className="photo-grid">
      {photos.map((p,i) => <PhotoItem key={i} photo={p} onRemove={()=>removeAt(i)} onDateChange={v=>updateDateAt(i,v)} />)}
      <div className="photo-add-zone" onClick={()=>inputRef.current?.click()}>
        <div style={{fontSize:28,opacity:.3}}>+</div>
        <div style={{fontSize:11,color:'var(--text3)'}}>新增{label}照片</div>
        <input type="file" accept="image/*" ref={inputRef} onChange={e=>{handleFile(e.target.files?.[0]);e.target.value=''}} />
      </div>
    </div>
  );
}

    if (!GAS_URL) { setLoadingApp(false); return; }
    setIndexError(null);

      setLoadingApp(false);
    } else {
      setLoadingApp(true);
    }

    let lastErr = null;
    for (let i = 0; i < 3; i++) {
      try {
        const res = await xhrGet(GAS_URL+'?action=index');
        if (res.ok && res.data) {
          if (res.data.header?.org) setHeader(res.data.header);
          if (res.data.records) setIndex(res.data.records);
          setCachedIndex(res.data);
          setLoadingApp(false);
          setIndexError(null);
          return;
        }
        lastErr = new Error(res.error || '索引資料格式錯誤');
      } catch (e) {
        lastErr = e;
        console.warn(`索引載入 ${i+1}/3 失敗:`, e.message);
        if (i < 2) await new Promise(r => setTimeout(r, 2000 * (i+1)));
      }
    }
    // 如果有快取就不報錯（已經顯示了）
    if (!cached) {
      setIndexError(lastErr?.message || '未知錯誤');
      setLoadingApp(false);
      toast('⚠️ 索引載入失敗：' + (lastErr?.message||''), 5000);
    } else {
      toast('⚠️ 索引更新失敗，顯示的是快取資料', 3000);
    }
  }, []);

  useEffect(() => { loadIndex(); }, [loadIndex]);

  // Load single record (with retry)
  const loadRecord = async(idx)=>{
    const meta=index[idx];if(!meta)return;
    setCurrentIdx(idx);setTab('edit');setLoadingRec(true);setDirty(false);setFolderLink(null);setEditSubTab('photo');
    try{
      const res=await xhrGetRetry(GAS_URL+'?action=record&id='+meta.id);
      if(res.ok&&res.data){
        const migrated = migrateRecord(res.data);
        setRec(migrated);
        setHeader(h=>({...h,org:res.data.org||h.org,title:res.data.title||h.title,project:res.data.project||h.project}));
      }

    const r=emptyRecord(defaults);
    setRec(r);setFolderLink(null);
    setIndex(prev=>[...prev,{id:r.id,date:r.date,label:'',beforeDesc:'',beforeCount:0,duringCount:0,afterCount:0,hasBeforePhoto:false,hasDuringPhoto:false,hasAfterPhoto:false}]);
    setCurrentIdx(index.length);setTab('edit');setDirty(true);toast('➕ 新增紀錄');
  };

  const updateField=(f,v)=>{setRec(prev=>({...prev,[f]:v}));setDirty(true)};

  const deleteRecord=async(idx)=>{
    const meta=index[idx];if(!meta)return;

    if(GAS_URL){setSyncing(true);try{await xhrPostRetry(GAS_URL,{action:'deleteRecord',id:meta.id})}catch(e){}setSyncing(false)}

    try{const res=await xhrGetRetry(GAS_URL+'?action=index');if(res.ok&&res.data){if(res.data.header?.org)setHeader(res.data.header);setIndex(res.data.records||[]);setCachedIndex(res.data);setRec(null);setCurrentIdx(-1);toast('✅ 已更新')}}catch(e){toast('❌ 失敗')}setSyncing(false);
  };

  // Global paste → add to current editing stage
  useEffect(()=>{
    const handler=(e)=>{
      if(!rec)return;
      const tag=document.activeElement?.tagName;
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;

              if(res.ok&&res.fileId) photos[pi]={...photos[pi],photoId:res.fileId,localSrc:''};
            }catch(e){console.warn('upload fail:',e)}
          }
        }
        updated[key+'Photos']=photos;
      }
      setProgress({pct:70,text:'儲存紀錄...'});
      const toSave={...updated};
      for(const key of ['before','during','after']){

      }
      const recHeader={org:updated.org,title:updated.title,project:updated.project};

      if(!saveRes.ok)throw new Error(saveRes.error||'Save failed');

  // ===== Word =====
  const loadDocxLib = async () => {
    if(window.docx)return;
    const urls=['https://unpkg.com/docx@8.5.0/build/index.umd.js','https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js'];
    for(const url of urls){try{await new Promise((ok,no)=>{const s=document.createElement('script');s.src=url;s.onload=()=>{if(window.docx)ok();else no()};s.onerror=()=>no();document.head.appendChild(s)});if(window.docx)return}catch(e){}}
    throw new Error('docx.js 載入失敗');
  };

  const buildDocxBlob = async (recs, format='TPC') => {
    const D=window.docx;
    const border={style:D.BorderStyle.SINGLE,size:4,color:'000000'};
    const borders={top:border,bottom:border,left:border,right:border};
    const cm={top:80,bottom:80,left:120,right:120};
    const font='DFKai-SB'; const fsT=36;const fsP=28;const fsB=26;const fsL=18;
    const b64toU8=(b64)=>{const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a};
    const imgDims=(src,mW,mH)=>new Promise(r=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(mW/w,mH/h,1);r({w:Math.round(w*s),h:Math.round(h*s)})};img.onerror=()=>r({w:mW,h:mH});img.src=src});

    // Build photo paragraphs for a stage (array of photos)
    const makePhotoParas = async (photos) => {
      if(!photos||!photos.length) return [new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{before:600,after:600},children:[new D.TextRun({text:'（未附照片）',font,size:22,color:'999999'})]})];
      const paras=[];
      for(const p of photos){
        const src=p._src;
        if(!src){paras.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'（照片載入失敗）',font,size:20,color:'CC0000'})]}));continue}
        try{
          const b64=src.substring(src.indexOf(',')+1);
          const dims=await imgDims(src,320,200);
          paras.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.ImageRun({data:b64toU8(b64),transformation:{width:dims.w,height:dims.h},type:'jpg'})]}));
        }catch(e){paras.push(new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'（照片嵌入失敗）',font,size:20,color:'CC0000'})]}))}
      }
      return paras;
    };

    const makeDesc=(title,desc)=>new D.TableCell({borders,margins:cm,verticalAlign:D.VerticalAlign.CENTER,width:{size:2830,type:D.WidthType.DXA},
      children:[new D.Paragraph({children:[new D.TextRun({text:title,font,size:fsB,bold:true})]}),new D.Paragraph({spacing:{before:100},children:[new D.TextRun({text:desc||'',font,size:fsB})]})]});
    const rowH=D.HeightRule?{value:3200,rule:D.HeightRule.ATLEAST}:{value:3200,rule:'atLeast'};
    const textDir=(D.TextDirection&&D.TextDirection.BOTTOM_TO_TOP_LEFT_TO_RIGHT)?D.TextDirection.BOTTOM_TO_TOP_LEFT_TO_RIGHT:'btLr';

    const sections=[];
    for(const r of recs){
      const bp=await makePhotoParas(r.beforePhotos);
      const dp=await makePhotoParas(r.duringPhotos);
      const ap=await makePhotoParas(r.afterPhotos);

      if (format === 'POE') {
        // ===== POE 格式：2欄（標籤 + 照片說明合併）=====
        const poeLabel = (text) => new D.TableCell({borders,margins:cm,verticalAlign:D.VerticalAlign.CENTER,width:{size:562,type:D.WidthType.DXA},
          children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text,font,size:fsB})]})]});
        const poeContent = (photoParas, descTitle, desc) => new D.TableCell({borders,margins:cm,verticalAlign:D.VerticalAlign.CENTER,width:{size:9214,type:D.WidthType.DXA},
          children:[...photoParas, new D.Paragraph({spacing:{before:120},children:[new D.TextRun({text:descTitle,font,size:fsB,bold:true}),new D.TextRun({text:desc||'',font,size:fsB})]})]});
        const poeRowH = D.HeightRule?{value:4050,rule:D.HeightRule.ATLEAST}:{value:4050,rule:'atLeast'};

        sections.push({
          properties:{page:{size:{width:11906,height:16838},margin:{top:1134,bottom:1134,left:1247,right:1247}}},
          children:[
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:'台灣電力公司[北部施工處]',font,size:28})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:120},children:[new D.TextRun({text:'承攬商環境保護改善通知單缺失改善照片回覆表',font,size:28})]}),
            new D.Table({width:{size:9776,type:D.WidthType.DXA},columnWidths:[562,9214],alignment:D.AlignmentType.CENTER,rows:[
              new D.TableRow({height:poeRowH,children:[poeLabel('改善前'),poeContent(bp,'說明：',r.beforeDesc)]}),
              new D.TableRow({height:poeRowH,children:[poeLabel('改善中'),poeContent(dp,'說明：',r.duringDesc)]}),
              new D.TableRow({height:poeRowH,children:[poeLabel('改善後'),poeContent(ap,'說明：',r.afterDesc)]}),
            ]}),
            ...((r.label||r.date)?[new D.Paragraph({spacing:{before:120},children:[new D.TextRun({text:`${r.label||''}　${r.date||''}`,font,size:fsL,color:'666666'})]})]:[])]});
      } else {
        // ===== TPC 格式：第1頁 對策表 + 第2頁 照片表 =====
        const pageProps={page:{size:{width:11906,height:16838},margin:{top:851,bottom:851,left:1021,right:1021}}};

        // --- 第1頁：對策表封面 ---
        const isEnv = r.mgmtType !== 'quality';
        const checkQ = isEnv ? '□' : '☑';
        const checkE = isEnv ? '☑' : '□';
        const coverBorder={style:D.BorderStyle.SINGLE,size:6,color:'000000'};
        const cBorders={top:coverBorder,bottom:coverBorder,left:coverBorder,right:coverBorder};
        const cMg={top:60,bottom:60,left:100,right:100};
        const cFs=24; // 12pt

        // Build 改善對策及結果 content paragraphs
        const strategyParas = [
          new D.Paragraph({spacing:{before:40},children:[new D.TextRun({text:'原因分析：',font,size:cFs,bold:true})]}),
          new D.Paragraph({children:[new D.TextRun({text:r.causeAnalysis||'',font,size:cFs})]}),
          new D.Paragraph({spacing:{before:160},children:[new D.TextRun({text:'改善措施：',font,size:cFs,bold:true})]}),
          new D.Paragraph({children:[new D.TextRun({text:r.duringDesc||'',font,size:cFs})]}),
          new D.Paragraph({spacing:{before:160},children:[new D.TextRun({text:'預防對策：',font,size:cFs,bold:true})]}),
          new D.Paragraph({children:[new D.TextRun({text:r.prevention||'',font,size:cFs})]}),
          new D.Paragraph({spacing:{before:160},children:[new D.TextRun({text:'改善後：',font,size:cFs,bold:true})]}),
          new D.Paragraph({children:[new D.TextRun({text:r.afterDesc||'',font,size:cFs})]}),
        ];

        const coverTable = new D.Table({
          width:{size:9800,type:D.WidthType.DXA},
          columnWidths:[1800,5600,1000,1400],
          alignment:D.AlignmentType.CENTER,
          rows:[
            // 表頭列
            new D.TableRow({children:[
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1800,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.CENTER,
                children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'缺失項目',font,size:cFs,bold:true})]}),
                          new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'（含建議）',font,size:cFs,bold:true})]})]}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:5600,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.CENTER,
                children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'改善對策及結果',font,size:cFs,bold:true})]}),
                          new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'（附改善前中後照片請註明）',font,size:cFs,bold:true})]})]}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1000,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.CENTER,
                children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'完成',font,size:cFs,bold:true})]}),
                          new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'日期',font,size:cFs,bold:true})]})]}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1400,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.CENTER,
                children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'備註',font,size:cFs,bold:true})]}),
                          new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'（未完成者',font,size:20})]}),
                          new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'請說明）',font,size:20})]})]}),
            ]}),
            // 內容列
            new D.TableRow({height:{value:8000,rule:D.HeightRule?D.HeightRule.ATLEAST:'atLeast'},children:[
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1800,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.TOP,
                children:[new D.Paragraph({children:[new D.TextRun({text:r.beforeDesc||'',font,size:cFs})]})]}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:5600,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.TOP,
                children:strategyParas}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1000,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.TOP,
                children:[new D.Paragraph({children:[new D.TextRun({text:r.completionDate||'',font,size:cFs})]})]}),
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1400,type:D.WidthType.DXA},verticalAlign:D.VerticalAlign.TOP,
                children:[new D.Paragraph({children:[new D.TextRun({text:r.remarks||'',font,size:cFs})]})]}),
            ]}),
            // 承包商列
            new D.TableRow({height:{value:900,rule:D.HeightRule?D.HeightRule.ATLEAST:'atLeast'},children:[
              new D.TableCell({borders:cBorders,margins:cMg,width:{size:1800,type:D.WidthType.DXA},columnSpan:4,
                children:[new D.Paragraph({children:[new D.TextRun({text:'承包商（工地負責人核章）',font,size:cFs})]})]}),
            ]}),
          ]
        });

        // 封面 section
        sections.push({
          properties:pageProps,
          children:[
            new D.Paragraph({children:[new D.TextRun({text:`${checkQ}施工品質${checkE}環保管理`,font,size:24,bold:true})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{before:80,after:80},children:[new D.TextRun({text:'施工品質/環保走動管理改善對策及結果表',font,size:32,bold:true})]}),
            new D.Paragraph({spacing:{after:40},children:[new D.TextRun({text:'標案名稱：'+(r.project||header.project),font,size:cFs})]}),
            new D.Paragraph({spacing:{after:120},children:[
              new D.TextRun({text:'走動管理日期：'+(r.date||''),font,size:cFs}),
              new D.TextRun({text:'　　　　　　　　　　　　　　　　　　　第　頁共　頁',font,size:cFs}),
            ]}),
            coverTable,
            new D.Paragraph({spacing:{before:60},children:[new D.TextRun({text:'註：1.若本工程符合營造業法第30條規定需置工地主任之工程，則承包商之欄位需由該法規定之工地主任核章。',font,size:18})]}),
            new D.Paragraph({children:[new D.TextRun({text:'　　2.各相關人員核章前，請先確認缺失已改善完成。',font,size:18})]}),
            new D.Paragraph({alignment:D.AlignmentType.RIGHT,spacing:{before:200},children:[new D.TextRun({text:'表格：PPCO-QQL-50-G02(R2)',font,size:16,color:'666666',bold:true,border:{style:D.BorderStyle.SINGLE,size:2,color:'666666'}})]}),
          ]
        });

        // --- 第2頁：照片表 ---
        const pc=(paras)=>new D.TableCell({borders,margins:cm,verticalAlign:D.VerticalAlign.CENTER,width:{size:5140,type:D.WidthType.DXA},children:paras});
        const lc=new D.TableCell({borders,margins:{top:40,bottom:40,left:40,right:40},verticalAlign:D.VerticalAlign.CENTER,width:{size:530,type:D.WidthType.DXA},rowSpan:3,textDirection:textDir,
          children:[new D.Paragraph({alignment:D.AlignmentType.CENTER,children:[new D.TextRun({text:'(改善前中後、同一角度拍攝之照片，並加以說明。)',font,size:fsL})]})]});
        sections.push({
          properties:{page:{size:{width:11906,height:16838},margin:{top:1134,bottom:1134,left:1247,right:1247}}},
          children:[
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:40},children:[new D.TextRun({text:r.org||header.org,font,size:fsT})]}),
            new D.Paragraph({alignment:D.AlignmentType.CENTER,spacing:{after:100},children:[new D.TextRun({text:r.title||header.title,font,size:fsT})]}),
            new D.Paragraph({spacing:{after:200},children:[new D.TextRun({text:'工程名稱：',font,size:fsP}),new D.TextRun({text:r.project||header.project,font,size:fsP})]}),
            new D.Table({width:{size:8500,type:D.WidthType.DXA},columnWidths:[530,5140,2830],alignment:D.AlignmentType.CENTER,rows:[
              new D.TableRow({height:rowH,children:[lc,pc(bp),makeDesc('改善前(缺失說明)：',r.beforeDesc)]}),
              new D.TableRow({height:rowH,children:[pc(dp),makeDesc('改善中(改善措施)：',r.duringDesc)]}),
              new D.TableRow({height:rowH,children:[pc(ap),makeDesc('改善後(改善結果)：',r.afterDesc)]}),
            ]}),
            ...((r.label||r.date)?[new D.Paragraph({spacing:{before:120},children:[new D.TextRun({text:`${r.label||''}　${r.date||''}`,font,size:fsL,color:'666666'})]})]:[])]});
      }
    }
    return await D.Packer.toBlob(new D.Document({sections}));
  };

  // ===== RENDER =====
  if(indexError)return(<div className="loading-overlay">
    <div style={{fontSize:48,marginBottom:12}}>⚠️</div>
    <h3 style={{color:'var(--red)',marginBottom:8}}>索引載入失敗</h3>
    <p style={{fontSize:13,color:'var(--text2)',marginBottom:16,maxWidth:400,textAlign:'center'}}>{indexError}</p>
    <div style={{fontSize:11,color:'var(--text3)',marginBottom:16,maxWidth:400,textAlign:'center',lineHeight:1.6}}>
      可能原因：<br/>
      ① GAS 尚未部署或需重新部署<br/>
      ② 授權過期（開啟 GAS URL 重新授權）<br/>
      ③ 網路問題
    </div>
    <button className="btn btn-primary" onClick={loadIndex}>🔄 重試</button>
    <a href={GAS_URL} target="_blank" rel="noopener" style={{marginTop:12,fontSize:12,color:'var(--text3)'}}>🔗 直接開啟 GAS URL 檢查</a>
  </div>);
  const dotCls=loadingApp||syncing||loadingRec?'spin':(GAS_URL?'on':'off');

  return(<div>
    {(progress||loadingApp)&&<div className="top-progress"><div className="bar" style={{width:progress?progress.pct+'%':'100%'}}></div></div>}
    <div className="app-header">
      <h1>📋 改善照片表產生器</h1>
      <p>NMDC EHS — 貼照片、寫說明、儲存並匯出 Word</p>
      <div className="sync-bar"><span className={`dot ${dotCls}`}></span>
        {loadingApp?'載入索引中...':progress?(progress.pct+'% · '+progress.text):!GAS_URL?'離線':syncing?'同步中...':loadingRec?'載入中...':dirty?'● 未儲存':`${index.length} 筆紀錄`}
      </div>
    </div>
    <div className="container">
      <div className="tabs">
        <button className={`tab ${tab==='list'?'active':''}`} onClick={()=>setTab('list')}>📑 紀錄 ({index.length})</button>
        <button className={`tab ${tab==='edit'?'active':''}`} onClick={()=>{if(!rec&&index.length)loadRecord(0);else setTab('edit')}}>✏️ 編輯</button>
        <button className={`tab ${tab==='preview'?'active':''}`} onClick={()=>setTab('preview')}>👁 預覽</button>
      </div>

      {/* LIST */}
      {tab==='list'&&<div>
        <div className="card"><div className="card-header"><div className="icon info">📑</div><div><h3>所有紀錄</h3><small>勾選後匯出 Word，或點擊進入編輯</small></div></div>
        {index.length>0&&<div className="select-bar">
          <input type="checkbox" className="rec-check" checked={selected.size===index.length&&index.length>0} onChange={e=>{if(e.target.checked)setSelected(new Set(index.map(r=>String(r.id))));else setSelected(new Set())}}/>
          <span>{selected.size>0?`已選 ${selected.size} / ${index.length}`:'全選'}</span>
          {selected.size>0&&<button onClick={()=>setSelected(new Set())}>取消</button>}
        </div>}
        {index.length===0&&<div style={{padding:32,textAlign:'center',color:'var(--text3)'}}>{loadingApp?'☁️ 載入中...':'📭 尚無紀錄'}</div>}
        {index.map((r,i)=>(
          <div key={r.id} className="record-item">
            <input type="checkbox" className="rec-check" checked={selected.has(String(r.id))} onClick={e=>e.stopPropagation()} onChange={e=>{setSelected(prev=>{const s=new Set(prev);if(e.target.checked)s.add(String(r.id));else s.delete(String(r.id));return s})}}/>
            <div className="rec-info" onClick={()=>loadRecord(i)} style={{cursor:'pointer',flex:1}}>
              <div className="rec-title">{r.label||`紀錄 #${i+1}`}</div>
              <div className="rec-sub">{r.date||'—'} — {r.beforeDesc||'未填寫'}</div>
            </div>
            <button className="rec-del-btn" onClick={e=>{e.stopPropagation();deleteRecord(i)}} title="刪除">🗑</button>
          </div>
        ))}</div>
        <div className="btn-group">
          <button className="btn btn-primary" onClick={addRecord}>➕ 新增</button>
          {selected.size>0&&<button className="btn btn-sync" onClick={()=>exportSelectedWord('TPC')} disabled={syncing}>📤 TPC ({selected.size}筆)</button>}
          {selected.size>0&&<button className="btn btn-sync" style={{background:'#2980b9'}} onClick={()=>exportSelectedWord('POE')} disabled={syncing}>📤 POE ({selected.size}筆)</button>}
          <button className="btn btn-load" onClick={reloadIndex} disabled={syncing}>🔄 重新載入</button>
        </div>
      </div>}

      {/* EDIT */}
      {tab==='edit'&&<div>
        {loadingRec?<div className="record-loading"><div className="spinner-sm"></div><p>☁️ 載入紀錄...</p></div>
        :!rec?<div style={{textAlign:'center',padding:40,color:'var(--text3)'}}><p>請從列表選擇或新增</p><div className="btn-group" style={{justifyContent:'center'}}><button className="btn btn-primary" onClick={addRecord}>➕ 新增</button></div></div>
        :<div>
          <div className="card"><div className="card-header"><div className="icon info">🏢</div><div><h3>文件資訊</h3></div></div>
          <div className="card-body">
            <div className="field"><label>機關名稱</label><input value={rec.org||DEFAULT_HEADER.org} readOnly style={{background:'var(--bg)',cursor:'default'}}/></div>
            <div className="field"><label>表單標題</label><input value={rec.title||DEFAULT_HEADER.title} onChange={e=>updateField('title',e.target.value)}/></div>
            <div className="field"><label>工程名稱</label><input value={rec.project||DEFAULT_HEADER.project} readOnly style={{background:'var(--bg)',cursor:'default'}}/></div>
            <div style={{display:'flex',gap:10}}>
              <div className="field" style={{flex:1}}><label>紀錄標籤</label><input value={rec.label} onChange={e=>updateField('label',e.target.value)} placeholder="NMDC-NCR-001"/></div>
              <div className="field" style={{flex:1}}><label>日期</label><input type="date" value={rec.date} onChange={e=>updateField('date',e.target.value)}/></div>
            </div>
          </div></div>

          {/* 子頁籤 */}
          <div className="sub-tabs">
            <button className={`sub-tab ${editSubTab==='photo'?'active':''}`} onClick={()=>setEditSubTab('photo')}>📷 照片表</button>
            <button className={`sub-tab ${editSubTab==='cover'?'active':''}`} onClick={()=>setEditSubTab('cover')}>📝 對策表</button>
          </div>

          {/* ---- 子頁籤 1：照片表 ---- */}
          {editSubTab==='photo'&&<div>
            <div className="card"><div className="card-header"><div className="icon before">❌</div><div><h3>改善前（缺失說明）</h3></div></div>
            <div className="card-body">
              <MultiPhotoSection photos={rec.beforePhotos} onUpdate={p=>updatePhotos('before',p)} label="改善前"/>
              <div className="field" style={{marginTop:8}}><label>缺失說明<span className="linked-hint">↔ 對策表連動</span></label><textarea value={rec.beforeDesc} onChange={e=>updateField('beforeDesc',e.target.value)} placeholder="描述缺失..."/></div>
            </div></div>

            <div className="card"><div className="card-header"><div className="icon during">🔧</div><div><h3>改善中（改善措施）</h3></div></div>
            <div className="card-body">
              <MultiPhotoSection photos={rec.duringPhotos} onUpdate={p=>updatePhotos('during',p)} label="改善中"/>
              <div className="field" style={{marginTop:8}}><label>改善措施<span className="linked-hint">↔ 對策表連動</span></label><textarea value={rec.duringDesc} onChange={e=>updateField('duringDesc',e.target.value)} placeholder="描述措施..."/></div>
            </div></div>

            <div className="card"><div className="card-header"><div className="icon after">✅</div><div><h3>改善後（改善結果）</h3></div></div>
            <div className="card-body">
              <MultiPhotoSection photos={rec.afterPhotos} onUpdate={p=>updatePhotos('after',p)} label="改善後"/>
              <div className="field" style={{marginTop:8}}><label>改善結果<span className="linked-hint">↔ 對策表連動</span></label><textarea value={rec.afterDesc} onChange={e=>updateField('afterDesc',e.target.value)} placeholder="描述結果..."/></div>
            </div></div>
          </div>}

          {/* ---- 子頁籤 2：對策表 ---- */}
          {editSubTab==='cover'&&<div>
            <div className="card"><div className="card-header"><div className="icon info">📋</div><div><h3>施工品質/環保走動管理改善對策及結果表</h3><small>TPC 匯出第一頁</small></div></div>
            <div className="card-body">
              <div className="field"><label>管理類別</label>
                <div style={{display:'flex',gap:16,marginTop:4}}>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:14,cursor:'pointer'}}><input type="radio" name="mgmtType" value="quality" checked={rec.mgmtType==='quality'} onChange={()=>updateField('mgmtType','quality')}/> 施工品質管理</label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:14,cursor:'pointer'}}><input type="radio" name="mgmtType" value="env" checked={rec.mgmtType!=='quality'} onChange={()=>updateField('mgmtType','env')}/> 環保管理</label>
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <div className="field" style={{flex:1}}><label>走動管理日期<span className="linked-hint">↔ 日期連動</span></label><input type="date" value={rec.date} onChange={e=>updateField('date',e.target.value)}/></div>
                <div className="field" style={{flex:1}}><label>完成日期</label><input type="date" value={rec.completionDate||''} onChange={e=>updateField('completionDate',e.target.value)}/></div>
              </div>
            </div></div>

            <div className="card"><div className="card-header"><div className="icon before">❌</div><div><h3>缺失項目（含建議）</h3></div></div>
            <div className="card-body">
              <div className="field"><label>缺失說明<span className="linked-hint">↔ 照片表連動</span></label><textarea value={rec.beforeDesc} onChange={e=>updateField('beforeDesc',e.target.value)} placeholder="描述缺失..."/></div>
            </div></div>

            <div className="card"><div className="card-header"><div className="icon info">🔍</div><div><h3>改善對策及結果</h3></div></div>
            <div className="card-body">
              <div className="field"><label>原因分析</label><textarea value={rec.causeAnalysis||''} onChange={e=>updateField('causeAnalysis',e.target.value)} placeholder="分析缺失產生的原因..."/></div>
              <div className="field"><label>改善措施<span className="linked-hint">↔ 照片表連動</span></label><textarea value={rec.duringDesc} onChange={e=>updateField('duringDesc',e.target.value)} placeholder="描述改善措施..."/></div>
              <div className="field"><label>預防對策</label><textarea value={rec.prevention||''} onChange={e=>updateField('prevention',e.target.value)} placeholder="後續預防措施..."/></div>
              <div className="field"><label>改善後<span className="linked-hint">↔ 照片表連動</span></label><textarea value={rec.afterDesc} onChange={e=>updateField('afterDesc',e.target.value)} placeholder="描述改善結果..."/></div>
            </div></div>

            <div className="card"><div className="card-header"><div className="icon cloud">📝</div><div><h3>備註</h3></div></div>
            <div className="card-body">
              <div className="field"><label>備註（未完成者請說明）</label><textarea value={rec.remarks||''} onChange={e=>updateField('remarks',e.target.value)} placeholder="備註..."/></div>
            </div></div>
          </div>}

          <div className="btn-group">
            <button className="btn btn-primary" onClick={saveOnly} disabled={syncing}>{syncing?'⏳ 處理中...':dirty?'💾 儲存 ●':'💾 儲存'}</button>
            <button className="btn btn-sync" onClick={()=>saveAndExport('TPC')} disabled={syncing}>☁️ TPC 匯出</button>
            <button className="btn btn-sync" style={{background:'#2980b9'}} onClick={()=>saveAndExport('POE')} disabled={syncing}>☁️ POE 匯出</button>
            <button className="btn btn-secondary" onClick={()=>setTab('preview')}>👁 預覽</button>
            <button className="btn btn-secondary" onClick={()=>setTab('list')}>📑 列表</button>
          </div>
        </div>}
      </div>}

      {/* PREVIEW */}
      {tab==='preview'&&<div>
        {!rec?<div style={{textAlign:'center',padding:40,color:'var(--text3)'}}><p>請先選擇紀錄</p></div>
        :<div>
          <div className="preview-doc">
            <div className="doc-org">{rec.org||header.org}</div><div className="doc-title">{rec.title||header.title}</div>
            <div className="doc-project">工程名稱：{rec.project||header.project}</div>
            <PreviewTable rec={rec}/>
            {(rec.label||rec.date)&&<div style={{marginTop:8,fontSize:'9pt',color:'#666'}}>{rec.label&&<span>{rec.label}　</span>}{rec.date}</div>}
          </div>
          <div className="btn-group" style={{marginTop:16}}>
            <button className="btn btn-primary" onClick={saveOnly} disabled={syncing}>{syncing?'⏳ 處理中...':dirty?'💾 儲存 ●':'💾 儲存'}</button>
            <button className="btn btn-sync" onClick={()=>saveAndExport('TPC')} disabled={syncing}>☁️ TPC 匯出</button>
            <button className="btn btn-sync" style={{background:'#2980b9'}} onClick={()=>saveAndExport('POE')} disabled={syncing}>☁️ POE 匯出</button>
            <button className="btn btn-secondary" onClick={()=>setTab('edit')}>✏️ 編輯</button>
          </div>
        </div>}
      </div>}

      {/* 成功彈窗 */}
      {folderLink&&<div className="success-modal" onClick={()=>setFolderLink(null)}>
        <div className="success-box" onClick={e=>e.stopPropagation()}>
          <div className="icon-big">✅</div>
          <h3>儲存並匯出完成！</h3>
          <p>Word 檔已上傳至改善單資料夾</p>
          <button className="folder-btn" onClick={()=>{window.open(folderLink.url,'_blank');setFolderLink(null)}}>📁 打開「{folderLink.name}」資料夾</button>
          <button className="close-link" onClick={()=>setFolderLink(null)}>關閉</button>
        </div>
      </div>}

      <div style={{textAlign:'center',padding:'20px 0',fontSize:11,color:'#9a8c7a'}}>NMDC EHS 改善照片表 v8.0 ☁️ 多照片支援</div>
    </div>
  </div>);
}

// 預覽用
function PreviewPhotoCells({photos}) {
  return photos.map((p,i)=>{
    const src = p.localSrc || (p.photoId ? driveImageUrl(p.photoId) : '');
    if(!src)return null;
    return <div key={i} style={{display:'inline-block',width:photos.length>1?'48%':'96%',margin:'1%',position:'relative'}}>
      <img src={src} style={{width:'100%',maxHeight:200,objectFit:'contain',borderRadius:4}}/>
      {p.date&&<div style={{position:'absolute',bottom:4,right:4,background:'rgba(0,0,0,.5)',color:'#fff',fontSize:9,padding:'1px 5px',borderRadius:3}}>{p.date}</div>}
    </div>;
  });
}

function PreviewTable({rec}) {
  return (
    <table className="preview-table"><tbody>
      <tr><td className="label-cell" rowSpan={3}>(改善前中後、同一角度拍攝之照片，並加以說明。)</td>
        <td className="photo-cell">{rec.beforePhotos?.length?<PreviewPhotoCells photos={rec.beforePhotos}/>:<div className="no-photo-placeholder">（未附照片）</div>}</td>
        <td className="desc-cell"><div className="desc-title">改善前(缺失說明)：</div><div>{rec.beforeDesc||'—'}</div></td></tr>
      <tr><td className="photo-cell">{rec.duringPhotos?.length?<PreviewPhotoCells photos={rec.duringPhotos}/>:<div className="no-photo-placeholder">（未附照片）</div>}</td>
        <td className="desc-cell"><div className="desc-title">改善中(改善措施)：</div><div>{rec.duringDesc||'—'}</div></td></tr>
      <tr><td className="photo-cell">{rec.afterPhotos?.length?<PreviewPhotoCells photos={rec.afterPhotos}/>:<div className="no-photo-placeholder">（未附照片）</div>}</td>
        <td className="desc-cell"><div className="desc-title">改善後(改善結果)：</div><div>{rec.afterDesc||'—'}</div></td></tr>
    </tbody></table>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
