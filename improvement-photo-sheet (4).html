<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>改善照片表產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f0eb;--bg2:#fffdf9;--card:#fff;--border:#d4c9b8;--text:#2c2418;--text2:#6b5d4d;--text3:#9a8c7a;--accent:#1a6b4a;--accent-bg:rgba(26,107,74,.06);--red:#c0392b;--orange:#d4770b;--blue:#2471a3;--shadow:0 2px 12px rgba(44,36,24,.08);--radius:8px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{background:linear-gradient(135deg,#1a3c34,#2d6b4e);color:#fff;padding:20px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.app-header h1{font-size:20px;font-weight:700;letter-spacing:1px}
.app-header p{font-size:12px;opacity:.7;margin-top:2px}
.sync-bar{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;opacity:.9}
.sync-bar .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-bar .dot.on{background:#4ade80}.sync-bar .dot.off{background:#f87171}
.sync-bar .dot.spin{background:#fbbf24;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.container{max-width:900px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:16px;box-shadow:var(--shadow)}
.tab{flex:1;padding:10px 8px;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-radius:6px;transition:all .2s;font-family:inherit}
.tab.active{background:var(--accent);color:#fff;font-weight:700}
.tab:not(.active):hover{background:var(--accent-bg)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-header .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-header .icon.before{background:rgba(192,57,43,.1);color:var(--red)}
.card-header .icon.during{background:rgba(212,119,11,.1);color:var(--orange)}
.card-header .icon.after{background:rgba(26,107,74,.1);color:var(--accent)}
.card-header .icon.info{background:rgba(36,113,163,.1);color:var(--blue)}
.card-header .icon.cloud{background:rgba(74,222,128,.1);color:#16a34a}
.card-header h3{font-size:15px;font-weight:700}
.card-header small{font-size:11px;color:var(--text3);display:block;margin-top:1px}
.card-body{padding:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:var(--bg2);color:var(--text);transition:border .2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);background:#fff}
.field textarea{resize:vertical;min-height:80px;line-height:1.6}
.field .hint-text{font-size:11px;color:var(--text3);margin-top:3px}
.photo-zone{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .25s;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg2)}
.photo-zone:hover,.photo-zone.dragover{border-color:var(--accent);background:var(--accent-bg)}
.photo-zone:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(26,107,74,.15)}
.photo-zone .hint{font-size:13px;color:var(--text3);margin-top:8px}

.photo-zone input[type=file]{display:none}
.photo-preview{position:relative;width:100%;border-radius:8px;overflow:hidden;background:#f0ece6}
.photo-preview img{width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.photo-preview .remove-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

.preview-table{width:100%;border-collapse:collapse;font-size:11pt}
.preview-table td{border:1.5px solid #000;padding:8px;vertical-align:top}
.preview-table .label-cell{width:30px;writing-mode:vertical-rl;text-align:center;font-size:10pt;letter-spacing:2px;line-height:1.8;padding:6px 4px}
.preview-table .photo-cell{width:55%;text-align:center;padding:6px}
.preview-table .photo-cell img{max-width:100%;max-height:240px;object-fit:contain}
.preview-table .desc-cell{width:auto;font-size:10.5pt;line-height:1.7;padding:10px}
.preview-table .desc-title{font-weight:700;margin-bottom:4px}
.no-photo-placeholder{color:#999;padding:40px;font-size:12px}
.btn{padding:12px 24px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#155a3e;transform:translateY(-1px)}
.btn-sync{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
.btn-sync:hover:not(:disabled){background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-1px)}
.btn-load{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.btn-load:hover:not(:disabled){background:linear-gradient(135deg,#0e7490,#155e75);transform:translateY(-1px)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#ebe5dc}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.record-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.record-item:hover{background:var(--accent-bg)}
.record-item:last-child{border-bottom:none}
.record-item .rec-idx{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.record-item .rec-info{flex:1;min-width:0}
.record-item .rec-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.record-item .rec-sub{font-size:11px;color:var(--text3);margin-top:2px}
.record-item .rec-photos{display:flex;gap:2px}
.record-item .rec-photos .dot{width:8px;height:8px;border-radius:50%}
.record-item .rec-photos .dot.filled{background:var(--accent)}.record-item .rec-photos .dot.empty{background:var(--border)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:all .35s ease}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.loading-overlay{position:fixed;inset:0;background:rgba(245,240,235,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.loading-overlay .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{margin-top:16px;font-size:14px;color:var(--text2)}
.record-loading{text-align:center;padding:60px 20px;color:var(--text3)}
.record-loading .spinner-sm{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@media(max-width:600px){.container{padding:10px}.preview-doc{padding:20px 16px}.card-body{padding:14px}.btn-group{flex-direction:column}.btn{width:100%;justify-content:center}}
/* Checkbox */
.rec-check{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.select-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
.select-bar button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;padding:2px 6px}
.select-bar button:hover{text-decoration:underline}
/* Export modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal{background:var(--card);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.3);width:100%;max-width:420px;overflow:hidden}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.modal-header button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3)}
.modal-body{padding:20px}
.modal-opt{display:flex;gap:8px;margin-bottom:16px}
.modal-opt button{flex:1;padding:14px 8px;border:2px solid var(--border);border-radius:8px;background:var(--bg2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s;text-align:center}
.modal-opt button.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.modal-opt button:hover{border-color:var(--accent)}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* Progress overlay */
.progress-overlay{position:fixed;inset:0;background:rgba(245,240,235,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:350;padding:20px}
.progress-box{background:var(--card);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.2);padding:30px 40px;text-align:center;max-width:380px;width:100%}
.progress-box h3{font-size:16px;margin-bottom:16px;color:var(--text)}
.progress-bar-wrap{width:100%;height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:12px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#2d9d6e);border-radius:5px;transition:width .3s ease}
.progress-box .progress-text{font-size:13px;color:var(--text2)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-el" class="toast"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxHiB96YpiaqihKYI3_k27921f3lRL_ZgX0EdTXOMZd5_8hhA0XI4z6l8MQKHw7fgth0A/exec';
// ============================================================

const DEFAULT_HEADER = {
  org:'台灣電力公司綜合施工處', title:'改 善 照 片 表',
  project:'台中減碳技術園區(A標)小規模碳捕集廠設備採購帶安裝及運轉維護與測試服務案',
};

function toast(msg,ms=2500){const el=document.getElementById('toast-el');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms)}

function xhrGet(url){return new Promise((ok,no)=>{const x=new XMLHttpRequest();x.open('GET',url,true);x.onload=()=>{
  try{const j=JSON.parse(x.responseText);ok(j)}catch{no(new Error('GET回應非JSON('+x.status+'): '+x.responseText.substring(0,80)))}
};x.onerror=()=>no(new Error('Network error'));x.timeout=30000;x.ontimeout=()=>no(new Error('Timeout 30s'));x.send()})}
function xhrPost(url,data){return new Promise((ok,no)=>{const x=new XMLHttpRequest();x.open('POST',url,true);x.setRequestHeader('Content-Type','text/plain;charset=utf-8');x.onload=()=>{
  if(x.status>=400){no(new Error('HTTP '+x.status));return}
  try{const j=JSON.parse(x.responseText);if(j.ok===false)no(new Error(j.error||'Server error'));else ok(j)}
  catch{no(new Error('POST回應非JSON('+x.status+'): '+x.responseText.substring(0,80)))}
};x.onerror=()=>no(new Error('Network error'));x.timeout=60000;x.ontimeout=()=>no(new Error('Timeout 60s'));x.send(JSON.stringify(data))})}

// 3次重試 + exponential backoff
async function xhrPostRetry(url, data, retries=3) {
  for (let i = 0; i < retries; i++) {
    try { return await xhrPost(url, data); }
    catch(e) {
      console.warn(`POST attempt ${i+1}/${retries} failed:`, e.message);
      if (i === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
    }
  }
}

function compressImage(dataUrl,maxW=1400,q=0.7){return new Promise(r=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=h*maxW/w;w=maxW}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',q))};img.src=dataUrl})}

function emptyRecord(defaults){
  const d = defaults || DEFAULT_HEADER;
  const today = new Date().toISOString().slice(0,10);
  return{id:Date.now(),date:today,label:'',
    org:d.org||DEFAULT_HEADER.org, title:d.title||DEFAULT_HEADER.title, project:d.project||DEFAULT_HEADER.project,
    beforeDesc:'',duringDesc:'',afterDesc:'',beforePhotoId:'',duringPhotoId:'',afterPhotoId:'',
    beforePhotoDate:today, duringPhotoDate:today, afterPhotoDate:today};
}

// ---- 在照片右下角烙印日期 ----
function stampDateOnImage(dataUrl, dateStr) {
  if (!dataUrl || !dateStr) return Promise.resolve(dataUrl);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      // 日期文字大小依照片寬度自適應
      const fontSize = Math.max(16, Math.round(img.width / 30));
      const pad = Math.round(fontSize * 0.6);
      ctx.font = `bold ${fontSize}px 'Noto Sans TC', Arial, sans-serif`;
      const text = dateStr;
      const metrics = ctx.measureText(text);
      const tx = img.width - metrics.width - pad;
      const ty = img.height - pad;
      // 半透明黑底
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      const boxH = fontSize * 1.4;
      ctx.fillRect(tx - pad/2, ty - fontSize, metrics.width + pad, boxH);
      // 白字
      ctx.fillStyle = '#ffffff';
      ctx.fillText(text, tx, ty);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ---- 單張照片非同步讀取 ----
function usePhotoLoader(fileId) {
  const [src, setSrc] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);
  useEffect(() => {
    if (!fileId || !GAS_URL) { setSrc(''); setLoading(false); return; }
    let cancelled = false;
    setLoading(true); setError(false); setSrc('');
    xhrGet(GAS_URL + '?action=photo&fileId=' + fileId)
      .then(res => { if (!cancelled && res.ok) setSrc(res.dataUrl); })
      .catch(() => { if (!cancelled) setError(true); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [fileId]);
  return { src, loading, error };
}

// ---- PhotoUploader (支援 fileId 非同步載入 + 照片日期) ----
function PhotoUploader({localSrc, fileId, onChange, label, photoDate}) {
  const inputRef = useRef();
  const [dragover, setDragover] = useState(false);
  const remote = usePhotoLoader(!localSrc ? fileId : '');
  const displaySrc = localSrc || remote.src;

  const handleFile = useCallback(async(file)=>{
    if(!file||!file.type.startsWith('image/')){toast('⚠️ 請選擇圖片');return}
    const reader=new FileReader();
    reader.onload=async(e)=>{onChange(await compressImage(e.target.result));toast('✅ 照片已載入')};
    reader.readAsDataURL(file);
  },[onChange]);
  const handlePaste = useCallback((e)=>{
    const items=e.clipboardData?.items;if(!items)return;
    for(const item of items){if(item.type.startsWith('image/')){e.preventDefault();e.stopPropagation();handleFile(item.getAsFile());return}}
  },[handleFile]);
  const onDrop=(e)=>{e.preventDefault();setDragover(false);handleFile(e.dataTransfer.files?.[0])};

  if (!displaySrc && remote.loading) return (
    <div className="photo-loading"><div className="mini-spin"></div>☁️ 載入{label}照片中...</div>
  );
  if (!displaySrc && remote.error) return (
    <div className="photo-loading" style={{color:'var(--red)'}}>⚠️ {label}照片載入失敗<br/><button className="btn btn-secondary" style={{marginTop:8,padding:'6px 16px',fontSize:12}} onClick={()=>inputRef.current?.click()}>重新上傳</button>
      <input type="file" accept="image/*" ref={inputRef} style={{display:'none'}} onChange={e=>handleFile(e.target.files?.[0])} /></div>
  );
  if (displaySrc) return (
    <div className="photo-preview">
      <img src={displaySrc} alt={label} />
      <button className="remove-btn" onClick={()=>onChange('')} title="移除">×</button>
      {photoDate && <div className="photo-date-stamp">{photoDate}</div>}
    </div>
  );
  // 空白上傳區
  return (
    <div className={`photo-zone ${dragover?'dragover':''}`} tabIndex={0}
      onClick={()=>inputRef.current?.click()} onPaste={handlePaste}
      onDragOver={e=>{e.preventDefault();setDragover(true)}} onDragLeave={()=>setDragover(false)} onDrop={onDrop}>
      <div style={{fontSize:36,opacity:.3}}>📷</div>
      <div className="hint">點擊 / 拖放 / <b>Ctrl+V</b></div>
      <input type="file" accept="image/*" ref={inputRef} onChange={e=>handleFile(e.target.files?.[0])} />
    </div>
  );
}

// ============================ APP ============================
function App(){
  const [tab,setTab]=useState('list');
  const [header,setHeader]=useState(DEFAULT_HEADER);
  const [index,setIndex]=useState([]);
  // current record: 文字+fileIds (from cloud) + local base64 (new uploads)
  const [rec,setRec]=useState(null);
  const [localPhotos,setLocalPhotos]=useState({before:'',during:'',after:''}); // 新上傳的本機 base64
  const [currentIdx,setCurrentIdx]=useState(-1);
  const [loadingApp,setLoadingApp]=useState(true);
  const [loadingRec,setLoadingRec]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [dirty,setDirty]=useState(false);
  const [selected,setSelected]=useState(new Set()); // selected record ids
  const [showExport,setShowExport]=useState(false);
  const [exportFmt,setExportFmt]=useState('pdf'); // pdf | word
  const [exportMode,setExportMode]=useState('combined'); // combined | individual
  const [progress,setProgress]=useState(null); // {pct, text} or null

  // ===== Load index =====
  useEffect(()=>{
    if(!GAS_URL){setLoadingApp(false);return}
    xhrGet(GAS_URL+'?action=index')
      .then(res=>{
        if(res.ok&&res.data){
          if(res.data.header?.org)setHeader(res.data.header);
          if(res.data.records){
            setIndex(res.data.records);
            // 🔗 Deep-link: 讀取 URL hash 自動跳到指定記錄
            const hash=window.location.hash;
            const m=hash.match(/#label=(.+)/);
            if(m){
              const targetLabel=decodeURIComponent(m[1]);
              const records=res.data.records;
              const idx=records.findIndex(r=>r.label===targetLabel);
              if(idx>=0){
                const meta=records[idx];
                setCurrentIdx(idx);setTab('edit');setLoadingRec(true);setDirty(false);
                xhrGet(GAS_URL+'?action=record&id='+meta.id)
                  .then(r=>{if(r.ok&&r.data)setRec({...r.data});else setRec({...emptyRecord(null),id:meta.id,date:meta.date,label:meta.label});})
                  .catch(()=>setRec({...emptyRecord(null),id:meta.id,date:meta.date,label:meta.label}))
                  .finally(()=>{setLoadingRec(false);setDirty(false);});
              }
              window.history.replaceState(null,'',window.location.pathname);
            }
          }
        }
      })
      .catch(e=>{console.error(e);toast('⚠️ 索引載入失敗')})
      .finally(()=>setLoadingApp(false));
  },[]);

  // ===== Load record (text+fileIds only, fast) =====
  const loadRecord = async(idx)=>{
    const meta=index[idx]; if(!meta)return;
    setCurrentIdx(idx); setTab('edit'); setLoadingRec(true); setDirty(false);
    setLocalPhotos({before:'',during:'',after:''});
    try{
      const res=await xhrGet(GAS_URL+'?action=record&id='+meta.id);
      if(res.ok&&res.data){
        // 舊紀錄可能沒有 org/title/project，補預設值
        const d = res.data;
        if(!d.org) d.org = DEFAULT_HEADER.org;
        if(!d.title) d.title = DEFAULT_HEADER.title;
        if(!d.project) d.project = DEFAULT_HEADER.project;
        // 舊紀錄可能沒有照片日期，用紀錄日期當預設
        if(!d.beforePhotoDate) d.beforePhotoDate = d.date || new Date().toISOString().slice(0,10);
        if(!d.duringPhotoDate) d.duringPhotoDate = d.date || new Date().toISOString().slice(0,10);
        if(!d.afterPhotoDate) d.afterPhotoDate = d.date || new Date().toISOString().slice(0,10);
        setRec(d);
        // 同步全域 header（給新增紀錄用）
        setHeader({org:d.org, title:d.title, project:d.project});
      }
      else{setRec({...emptyRecord(header),id:meta.id,date:meta.date,label:meta.label})}
    }catch(e){
      toast('⚠️ 紀錄載入失敗');
      setRec({...emptyRecord(header),id:meta.id,date:meta.date,label:meta.label});
    }
    setLoadingRec(false);
    // 照片由 usePhotoLoader 在 PhotoUploader 裡各自非同步載入
  };

  const addRecord=()=>{
    // 新紀錄繼承目前紀錄的表頭資訊
    const defaults = rec ? {org:rec.org, title:rec.title, project:rec.project} : header;
    const r=emptyRecord(defaults);
    setRec(r); setLocalPhotos({before:'',during:'',after:''});
    const meta={id:r.id,date:r.date,label:'',beforeDesc:'',hasBeforePhoto:false,hasDuringPhoto:false,hasAfterPhoto:false};
    setIndex(prev=>[...prev,meta]); setCurrentIdx(index.length);
    setTab('edit'); setDirty(true); toast('➕ 新增紀錄');
  };

  const updateField=(f,v)=>{setRec(prev=>({...prev,[f]:v}));setDirty(true)};

  // 照片更新：存本機 base64，清除對應 fileId
  const setPhoto=(key,dataUrl)=>{
    setLocalPhotos(prev=>({...prev,[key]:dataUrl}));
    if(!dataUrl){
      // 移除照片：清 fileId + local
      setRec(prev=>({...prev,[key+'PhotoId']:''}));
    } else {
      // 新照片：先清舊 fileId，存時會上傳
      setRec(prev=>({...prev,[key+'PhotoId']:''}));
    }
    setDirty(true);
  };

  // ===== Save =====
  const saveRecord = async()=>{
    if(!GAS_URL||!rec){toast('⚠️ 無法儲存');return}
    setSyncing(true); toast('☁️ 儲存中...');
    try{
      const updated={...rec};
      // 上傳新照片（一張一張）
      for(const key of ['before','during','after']){
        const b64=localPhotos[key];
        if(b64){
          toast(`☁️ 上傳${key==='before'?'改善前':key==='during'?'改善中':'改善後'}照片...`);
          const res=await xhrPostRetry(GAS_URL,{action:'uploadPhoto',fileName:`${rec.label||rec.id}_${key}_${Date.now()}.jpg`,dataUrl:b64});
          if(res.ok&&res.fileId) updated[key+'PhotoId']=res.fileId;
        }
      }
      // 存紀錄（含 org/title/project）
      const recHeader = {org:updated.org, title:updated.title, project:updated.project};
      toast('☁️ 儲存紀錄...');
      const res=await xhrPostRetry(GAS_URL,{action:'saveRecord',record:updated,header:recHeader});
      if(!res.ok)throw new Error(res.error||'Save failed');
      setRec(updated);
      setLocalPhotos({before:'',during:'',after:''});
      // 更新全域預設（給新增紀錄用）
      setHeader({org:updated.org, title:updated.title, project:updated.project});
      // 更新 index
      const meta={id:updated.id,date:updated.date||'',label:updated.label||'',
        beforeDesc:(updated.beforeDesc||'').substring(0,50),
        hasBeforePhoto:!!updated.beforePhotoId, hasDuringPhoto:!!updated.duringPhotoId, hasAfterPhoto:!!updated.afterPhotoId};
      setIndex(prev=>{const arr=[...prev];const ei=arr.findIndex(r=>String(r.id)===String(updated.id));if(ei>=0)arr[ei]=meta;else arr.push(meta);return arr});
      setDirty(false); toast('✅ 已儲存！');
    }catch(e){console.error('Save error:',e);toast('❌ '+e.message, 8000)}
    setSyncing(false);
  };

  const deleteRecord=async(idx)=>{
    const meta=index[idx];if(!meta)return;
    if(!confirm(`確定刪除「${meta.label||'#'+(idx+1)}」？`))return;
    if(GAS_URL){setSyncing(true);try{await xhrPostRetry(GAS_URL,{action:'deleteRecord',id:meta.id})}catch(e){toast('⚠️ 雲端刪除失敗')}setSyncing(false)}
    setIndex(prev=>prev.filter((_,i)=>i!==idx));
    if(currentIdx===idx){setRec(null);setCurrentIdx(-1);setTab('list')}
    else if(currentIdx>idx)setCurrentIdx(currentIdx-1);
    toast('🗑️ 已刪除');
  };

  const reloadIndex=async()=>{
    if(!GAS_URL)return;setSyncing(true);toast('🔄 重新載入...');
    try{const res=await xhrGet(GAS_URL+'?action=index');if(res.ok&&res.data){if(res.data.header?.org)setHeader(res.data.header);setIndex(res.data.records||[]);setRec(null);setCurrentIdx(-1);toast('✅ 索引已更新')}}
    catch(e){toast('❌ 失敗')}setSyncing(false);
  };

  // ===== 載入勾選的完整紀錄（含進度）=====
  const fetchSelectedRecords = async () => {
    if (dirty && rec) {
      if (confirm('有未儲存的變更，要先儲存再匯出嗎？')) {
        await saveRecord();
      }
    }
    const ids = selected.size > 0 ? [...selected] : index.map(r => String(r.id));
    const results = [];
    const total = ids.length;
    for (let i = 0; i < total; i++) {
      const id = ids[i];
      const meta = index.find(m => String(m.id) === id);
      const label = meta?.label || '#'+(i+1);

      // 當前編輯中的紀錄 → 用記憶體版本
      if (rec && String(rec.id) === id) {
        setProgress({pct: Math.round((i+1)/total*50), text: `載入 ${i+1}/${total}：${label}（編輯中）`});
        const r = {...rec};
        for (const key of ['before','during','after']) {
          if (localPhotos[key]) {
            r['_'+key+'Src'] = localPhotos[key];
          } else if (r[key+'PhotoId']) {
            try {
              const pr = await xhrGet(GAS_URL+'?action=photo&fileId='+r[key+'PhotoId']);
              if (pr.ok) r['_'+key+'Src'] = pr.dataUrl;
            } catch(e) { console.warn('photo load fail:', key, e); }
          }
        }
        results.push(r);
        continue;
      }

      // 其他紀錄 → 從雲端讀
      setProgress({pct: Math.round((i+1)/total*50), text: `載入 ${i+1}/${total}：${label}...`});
      try {
        const res = await xhrGet(GAS_URL+'?action=record&id='+id);
        if (res.ok && res.data) {
          const r = res.data;
          if (!r.org) r.org = DEFAULT_HEADER.org;
          if (!r.title) r.title = DEFAULT_HEADER.title;
          if (!r.project) r.project = DEFAULT_HEADER.project;
          if (!r.beforePhotoDate) r.beforePhotoDate = r.date || '';
          if (!r.duringPhotoDate) r.duringPhotoDate = r.date || '';
          if (!r.afterPhotoDate) r.afterPhotoDate = r.date || '';
          for (const key of ['before','during','after']) {
            const fid = r[key+'PhotoId'];
            if (fid) {
              setProgress({pct: Math.round((i+0.5)/total*50), text: `載入照片 ${label} ${{before:'改善前',during:'改善中',after:'改善後'}[key]}...`});
              try {
                const pr = await xhrGet(GAS_URL+'?action=photo&fileId='+fid);
                if (pr.ok) r['_'+key+'Src'] = pr.dataUrl;
              } catch(e) { console.warn('photo load fail:', key, e); }
            }
          }
          results.push(r);
          continue;
        }
      } catch(e) { console.error('record load fail:', id, e); }
      results.push({...emptyRecord(header), id, date:meta?.date||'', label:meta?.label||''});
    }

    // 最後一步：烙印日期到照片上
    setProgress({pct: 80, text: '烙印照片日期...'});
    for (const r of results) {
      for (const key of ['before','during','after']) {
        const src = r['_'+key+'Src'];
        const dateStr = r[key+'PhotoDate'];
        if (src && dateStr) {
          try {
            r['_'+key+'Src'] = await stampDateOnImage(src, dateStr);
          } catch(e) { console.warn('stamp fail:', key, e); }
        }
      }
    }
    return results;
  };

  // ===== Print HTML (PDF) =====
  const buildPrintHTML = (recs) => {
    const titleLabels = recs.map(r=>r.label||r.id).join('_');
    const pages = recs.map((r, ri) => {
      const ph = (key) => { const src=r['_'+key+'Src']; return src?`<img src="${src}" style="max-width:100%;max-height:260px;object-fit:contain;display:block;margin:0 auto">`:`<div style="color:#999;padding:50px 0;font-size:12px">（未附照片）</div>`; };
      return `<div class="page" ${ri>0?'style="page-break-before:always"':''}>
        <div class="doc-org">${r.org||header.org}</div><div class="doc-title">${r.title||header.title}</div>
        <div class="doc-project">工程名稱：${r.project||header.project}</div>
        <table><tr><td class="lc" rowspan="3"><div class="vt">（改善前中後、同一角度拍攝之照片，並加以說明。）</div></td>
          <td class="pc">${ph('before')}</td><td class="dc"><div class="dt">改善前(缺失說明)：</div><div>${r.beforeDesc||''}</div></td></tr>
        <tr><td class="pc">${ph('during')}</td><td class="dc"><div class="dt">改善中(改善措施)：</div><div>${r.duringDesc||''}</div></td></tr>
        <tr><td class="pc">${ph('after')}</td><td class="dc"><div class="dt">改善後(改善結果)：</div><div>${r.afterDesc||''}</div></td></tr></table>
        ${(r.label||r.date)?`<div class="fn">${r.label||''}　${r.date||''}</div>`:''}</div>`;
    }).join('');
    return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>照片改善表_${titleLabels}</title><style>
      @page{size:A4 portrait;margin:7mm 7mm 10mm 7mm}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DFKai-SB','標楷體','Noto Serif TC',serif;color:#000}
      .doc-org{text-align:center;font-size:18pt;letter-spacing:2px;margin-bottom:2px}
      .doc-title{text-align:center;font-size:18pt;letter-spacing:6px;margin-bottom:8px}
      .doc-project{font-size:13pt;margin-bottom:10px}
      table{width:100%;border-collapse:collapse;table-layout:fixed}
      td{border:1.5px solid #000;padding:6px;vertical-align:top}
      .lc{width:28px;padding:4px 2px;vertical-align:middle;text-align:center}
      .vt{writing-mode:vertical-rl;text-orientation:mixed;font-size:10pt;letter-spacing:1px;line-height:1.6;margin:0 auto;white-space:nowrap}
      .pc{width:55%;text-align:center;vertical-align:middle;padding:6px;height:230px}
      .dc{font-size:12pt;line-height:1.7;padding:10px 12px;vertical-align:middle}
      .dt{font-weight:bold;margin-bottom:4px;font-size:12pt}
      .fn{margin-top:6px;font-size:9pt;color:#666}
      @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
    </style></head><body>${pages}</body></html>`;
  };

  const printHTML = (html) => {
    const w = window.open('','_blank');
    if (!w) { toast('⚠️ 請允許彈出視窗'); return; }
    w.document.write(html); w.document.close();
    const imgs = w.document.querySelectorAll('img'); let ld=0; const tot=imgs.length;
    const go = () => setTimeout(()=>{w.focus();w.print()},300);
    if (!tot) go(); else imgs.forEach(img=>{ if(img.complete){ld++;if(ld>=tot)go()}else{img.onload=img.onerror=()=>{ld++;if(ld>=tot)go()}} });
  };

  // ===== Word =====
  const loadDocxLib = async () => {
    if (window.docx) return;
    // 嘗試多個 CDN
    const urls = [
      'https://unpkg.com/docx@8.5.0/build/index.umd.js',
      'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js',
    ];
    for (const url of urls) {
      try {
        await new Promise((ok, no) => {
          const s = document.createElement('script');
          s.src = url;
          s.onload = () => { if (window.docx) ok(); else no(new Error('loaded but no window.docx')); };
          s.onerror = () => no(new Error('load failed'));
          document.head.appendChild(s);
        });
        if (window.docx) return; // 成功
      } catch(e) { console.warn('docx CDN fail:', url, e); }
    }
    throw new Error('docx.js 載入失敗，請確認網路連線');
  };

  const buildDocxBlob = async (recs) => {
    await loadDocxLib();
    const D = window.docx;
    console.log('docx loaded, keys:', Object.keys(D).slice(0,10).join(','));
    const border = {style:D.BorderStyle.SINGLE,size:4,color:'000000'};
    const borders = {top:border,bottom:border,left:border,right:border};
    const cm = {top:80,bottom:80,left:120,right:120};
    const font = 'DFKai-SB';
    const fsTitle = 36;
    const fsProject = 28;
    const fsBody = 26;
    const fsLabel = 18;

    const b64toU8 = (b64) => {
      const bin = atob(b64);
      const a = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
      return a;
    };

    const imgDims = (dataUrl, mW, mH) => new Promise(r => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        const s = Math.min(mW / w, mH / h, 1);
        r({w: Math.round(w * s), h: Math.round(h * s)});
      };
      img.onerror = () => r({w: mW, h: mH});
      img.src = dataUrl;
    });

    const makePhotoPara = async (src) => {
      if (!src) return new D.Paragraph({
        alignment: D.AlignmentType.CENTER,
        spacing: {before: 800, after: 800},
        children: [new D.TextRun({text: '（未附照片）', font, size: 22, color: '999999'})]
      });
      try {
        const commaIdx = src.indexOf(',');
        if (commaIdx < 0) throw new Error('invalid dataUrl');
        const b64 = src.substring(commaIdx + 1);
        const dims = await imgDims(src, 350, 240);
        const imgData = b64toU8(b64);
        // Detect type from header
        const mimeStr = src.substring(0, commaIdx);
        const imgType = mimeStr.includes('png') ? 'png' : 'jpg';
        return new D.Paragraph({
          alignment: D.AlignmentType.CENTER,
          children: [new D.ImageRun({
            data: imgData,
            transformation: {width: dims.w, height: dims.h},
            type: imgType,
          })]
        });
      } catch(e) {
        console.warn('Photo embed fail:', e);
        return new D.Paragraph({
          alignment: D.AlignmentType.CENTER,
          spacing: {before: 800, after: 800},
          children: [new D.TextRun({text: '（照片載入失敗）', font, size: 22, color: 'CC0000'})]
        });
      }
    };

    const makeDesc = (title, desc) => new D.TableCell({
      borders, margins: cm,
      verticalAlign: D.VerticalAlign.CENTER,
      width: {size: 3200, type: D.WidthType.DXA},
      children: [
        new D.Paragraph({children: [new D.TextRun({text: title, font, size: fsBody, bold: true})]}),
        new D.Paragraph({spacing: {before: 100}, children: [new D.TextRun({text: desc || '', font, size: fsBody})]}),
      ]
    });

    // Safely get HeightRule
    const rowHeight = D.HeightRule
      ? {value: 3200, rule: D.HeightRule.ATLEAST}
      : {value: 3200, rule: 'atLeast'};

    // Safely get TextDirection
    const textDir = (D.TextDirection && D.TextDirection.BOTTOM_TO_TOP_LEFT_TO_RIGHT)
      ? D.TextDirection.BOTTOM_TO_TOP_LEFT_TO_RIGHT : 'btLr';

    const sections = [];
    for (let ri = 0; ri < recs.length; ri++) {
      const r = recs[ri];
      setProgress({pct: Math.round((ri+1)/recs.length*100), text: `產生 Word ${ri+1}/${recs.length}...`});

      const bp = await makePhotoPara(r['_beforeSrc']);
      const dp = await makePhotoPara(r['_duringSrc']);
      const ap = await makePhotoPara(r['_afterSrc']);

      const photoCell = (para) => new D.TableCell({
        borders, margins: cm,
        verticalAlign: D.VerticalAlign.CENTER,
        width: {size: 5700, type: D.WidthType.DXA},
        children: [para]
      });

      const labelCell = new D.TableCell({
        borders,
        margins: {top: 40, bottom: 40, left: 40, right: 40},
        verticalAlign: D.VerticalAlign.CENTER,
        width: {size: 600, type: D.WidthType.DXA},
        rowSpan: 3,
        textDirection: textDir,
        children: [new D.Paragraph({
          alignment: D.AlignmentType.CENTER,
          children: [new D.TextRun({text: '(改善前中後、同一角度拍攝之照片，並加以說明。)', font, size: fsLabel})]
        })]
      });

      sections.push({
        properties: {page: {size: {width: 11906, height: 16838}, margin: {top: 426, bottom: 567, left: 426, right: 424}}},
        children: [
          new D.Paragraph({alignment: D.AlignmentType.CENTER, spacing: {after: 40}, children: [new D.TextRun({text: r.org||header.org, font, size: fsTitle})]}),
          new D.Paragraph({alignment: D.AlignmentType.CENTER, spacing: {after: 100}, children: [new D.TextRun({text: r.title||header.title, font, size: fsTitle})]}),
          new D.Paragraph({spacing: {after: 200}, children: [new D.TextRun({text: '工程名稱：', font, size: fsProject}), new D.TextRun({text: r.project||header.project, font, size: fsProject})]}),
          new D.Table({
            width: {size: 9500, type: D.WidthType.DXA},
            columnWidths: [600, 5700, 3200],
            rows: [
              new D.TableRow({height: rowHeight, children: [labelCell, photoCell(bp), makeDesc('改善前(缺失說明)：', r.beforeDesc)]}),
              new D.TableRow({height: rowHeight, children: [photoCell(dp), makeDesc('改善中(改善措施)：', r.duringDesc)]}),
              new D.TableRow({height: rowHeight, children: [photoCell(ap), makeDesc('改善後(改善結果)：', r.afterDesc)]}),
            ]
          }),
          ...((r.label||r.date) ? [new D.Paragraph({spacing: {before: 120}, children: [new D.TextRun({text: `${r.label||''}　${r.date||''}`, font, size: fsLabel, color: '666666'})]})] : []),
        ]
      });
    }
    console.log('Building doc with', sections.length, 'sections');
    const doc = new D.Document({sections});
    return await D.Packer.toBlob(doc);
  };

  const downloadBlob = (blob, name) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
  };

  // ===== Export dispatcher =====
  const doExport = async () => {
    setShowExport(false);
    const selCount = selected.size || index.length;
    if (selCount === 0) { toast('⚠️ 沒有紀錄'); return; }
    setSyncing(true);
    setProgress({pct: 0, text: '準備中...'});

    try {
      const recs = await fetchSelectedRecords();
      const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');

      if (exportFmt === 'pdf') {
        if (exportMode === 'combined') {
          setProgress({pct: 95, text: '開啟列印視窗...'});
          printHTML(buildPrintHTML(recs));
          toast('✅ 列印視窗已開啟');
        } else {
          for (let i = 0; i < recs.length; i++) {
            setProgress({pct: Math.round((i+1)/recs.length*100), text: `開啟 ${i+1}/${recs.length}...`});
            printHTML(buildPrintHTML([recs[i]]));
            await new Promise(r => setTimeout(r, 600));
          }
          toast(`✅ 已開啟 ${recs.length} 個列印視窗`);
        }
      } else {
        // Word
        try { await loadDocxLib(); } catch(e) { throw new Error('docx.js 函式庫載入失敗，請確認網路連線'); }
        if (exportMode === 'combined') {
          setProgress({pct: 50, text: '產生 Word 文件...'});
          const blob = await buildDocxBlob(recs);
          const labels = recs.map(r=>r.label||r.id).join('_');
          downloadBlob(blob, `照片改善表_${labels}.docx`);
          toast('✅ Word 已下載！');
        } else {
          const zip = new JSZip();
          for (let i = 0; i < recs.length; i++) {
            setProgress({pct: Math.round((i+1)/recs.length*100), text: `產生 ${i+1}/${recs.length}...`});
            const blob = await buildDocxBlob([recs[i]]);
            zip.file(`照片改善表_${recs[i].label || recs[i].id}.docx`, blob);
          }
          setProgress({pct: 98, text: '打包 ZIP...'});
          const zipBlob = await zip.generateAsync({type:'blob'});
          const zipLabels = recs.map(r=>r.label||r.id).join('_');
          downloadBlob(zipBlob, `照片改善表_${zipLabels}.zip`);
          toast('✅ ZIP 已下載！');
        }
      }
    } catch(e) {
      console.error('Export error:', e);
      toast('❌ 匯出失敗：' + e.message);
    }
    setProgress(null);
    setSyncing(false);
  };

  // JSON
  const exportJSON=()=>{const blob=new Blob([JSON.stringify({header,index},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`照片改善表_索引_${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),3000);toast('💾 已匯出')};

  // 匯入：支援舊格式（含 base64 照片）自動上傳 Drive
  const importJSON=()=>{
    const input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=async(e)=>{
      const file=e.target.files?.[0];if(!file)return;
      const text=await file.text();
      let data;
      try{data=JSON.parse(text)}catch{toast('❌ JSON 格式錯誤');return}

      if(data.header)setHeader(data.header);

      // Case 1: 新格式（只有 index）
      if(data.index?.length&&!data.records){
        setIndex(data.index);toast('✅ 已匯入索引');return;
      }

      // Case 2: 舊格式（records 含 base64 照片）→ 逐筆上傳 Drive
      const recs=data.records;
      if(!recs?.length){toast('⚠️ 無紀錄可匯入');return}

      if(!GAS_URL){toast('⚠️ 需設定 GAS URL 才能匯入含照片的紀錄');return}
      if(!confirm(`將匯入 ${recs.length} 筆紀錄（含照片上傳），繼續？`))return;

      setSyncing(true);
      const newIndex=[...index];
      let ok=0,fail=0;

      for(let ri=0;ri<recs.length;ri++){
        const r=recs[ri];
        toast(`☁️ 匯入 ${ri+1}/${recs.length}：${r.label||'#'+(ri+1)}...`);
        const record={
          id:r.id||Date.now()+ri, date:r.date||'', label:r.label||'',
          org:r.org||data.header?.org||header.org||DEFAULT_HEADER.org,
          title:r.title||data.header?.title||header.title||DEFAULT_HEADER.title,
          project:r.project||data.header?.project||header.project||DEFAULT_HEADER.project,
          beforeDesc:r.beforeDesc||'', duringDesc:r.duringDesc||'', afterDesc:r.afterDesc||'',
          beforePhotoId:'', duringPhotoId:'', afterPhotoId:'',
        };

        // 上傳每張照片
        for(const key of ['before','during','after']){
          const photoField=key+'Photo';
          const b64=r[photoField];
          if(b64&&b64.length>100&&b64.startsWith('data:')){
            toast(`☁️ 上傳照片 ${ri+1}/${recs.length} ${key}...`);
            try{
              const res=await xhrPostRetry(GAS_URL,{action:'uploadPhoto',fileName:`${record.label||record.id}_${key}_${Date.now()}.jpg`,dataUrl:b64});
              if(res.ok&&res.fileId)record[key+'PhotoId']=res.fileId;
            }catch(e){console.warn('Photo upload fail:',e)}
          }
          // 如果已有 fileId（從 v4 格式）
          const existingId=r[key+'PhotoId'];
          if(existingId&&!record[key+'PhotoId'])record[key+'PhotoId']=existingId;
        }

        // 存紀錄
        try{
          const res=await xhrPostRetry(GAS_URL,{action:'saveRecord',record,header:ri===0?data.header:undefined});
          if(res.ok){
            const meta={id:record.id,date:record.date,label:record.label,
              beforeDesc:(record.beforeDesc||'').substring(0,50),
              hasBeforePhoto:!!record.beforePhotoId,hasDuringPhoto:!!record.duringPhotoId,hasAfterPhoto:!!record.afterPhotoId};
            newIndex.push(meta);ok++;
          }else{fail++}
        }catch(e){fail++;console.error('Save fail:',e)}
      }

      setIndex(newIndex);
      setSyncing(false);
      toast(`✅ 匯入完成！成功 ${ok} 筆${fail?`，失敗 ${fail} 筆`:''}`);
    };
    input.click();
  };

  // Global paste
  useEffect(()=>{
    const handler=(e)=>{
      if(!rec)return;const tag=document.activeElement?.tagName;
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
      if(document.activeElement?.classList?.contains('photo-zone'))return;
      const items=e.clipboardData?.items;if(!items)return;
      for(const item of items){if(item.type.startsWith('image/')){
        e.preventDefault();const file=item.getAsFile();if(!file)return;
        let tf=null;
        if(!localPhotos.before&&!rec.beforePhotoId)tf='before';
        else if(!localPhotos.during&&!rec.duringPhotoId)tf='during';
        else if(!localPhotos.after&&!rec.afterPhotoId)tf='after';
        else{toast('⚠️ 三張照片都已填入');return}
        const reader=new FileReader();
        reader.onload=async(ev)=>{const compressed=await compressImage(ev.target.result);setPhoto(tf,compressed);
          toast(`✅ 已貼入${{before:'改善前',during:'改善中',after:'改善後'}[tf]}照片`)};
        reader.readAsDataURL(file);return;
      }}
    };
    document.addEventListener('paste',handler);return()=>document.removeEventListener('paste',handler);
  },[rec,localPhotos]);

  // ===== RENDER =====
  if(loadingApp)return(<div className="loading-overlay"><div className="spinner"></div><p>☁️ 載入索引...</p></div>);
  const dotCls=syncing||loadingRec?'spin':(GAS_URL?'on':'off');

  return(<div>
    {/* Progress overlay */}
    {progress && <div className="progress-overlay">
      <div className="progress-box">
        <h3>📤 處理中</h3>
        <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:progress.pct+'%'}}></div></div>
        <div className="progress-text">{progress.pct}% — {progress.text}</div>
      </div>
    </div>}
    <div className="app-header">
      <h1>📋 改善照片表產生器</h1>
      <p>NMDC EHS — 貼照片、寫說明、自動產生 PDF</p>
      <div className="sync-bar"><span className={`dot ${dotCls}`}></span>
        {!GAS_URL?'離線模式':syncing?'同步中...':loadingRec?'載入紀錄...':dirty?'● 有未儲存變更':`${index.length} 筆紀錄`}
      </div>
    </div>
    <div className="container">
      <div className="tabs">
        <button className={`tab ${tab==='list'?'active':''}`} onClick={()=>setTab('list')}>📑 紀錄 ({index.length})</button>
        <button className={`tab ${tab==='edit'?'active':''}`} onClick={()=>{if(!rec&&index.length)loadRecord(0);else setTab('edit')}}>✏️ 編輯</button>
        <button className={`tab ${tab==='preview'?'active':''}`} onClick={()=>setTab('preview')}>👁 預覽</button>
        <button className={`tab ${tab==='settings'?'active':''}`} onClick={()=>setTab('settings')}>⚙️</button>
      </div>

      {/* LIST */}
      {tab==='list'&&<div>
        <div className="card"><div className="card-header"><div className="icon info">📑</div><div><h3>所有紀錄</h3><small>勾選後匯出，或點擊進入編輯</small></div></div>
        {index.length>0 && <div className="select-bar">
          <input type="checkbox" className="rec-check" checked={selected.size===index.length&&index.length>0} onChange={e=>{if(e.target.checked)setSelected(new Set(index.map(r=>String(r.id))));else setSelected(new Set())}} />
          <span>{selected.size>0?`已選 ${selected.size} / ${index.length}`:'全選'}</span>
          {selected.size>0 && <button onClick={()=>setSelected(new Set())}>取消</button>}
        </div>}
        {index.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text3)'}}>尚無紀錄</div>}
        {index.map((r,i)=>(
          <div key={r.id} className="record-item">
            <input type="checkbox" className="rec-check" checked={selected.has(String(r.id))} onClick={e=>e.stopPropagation()} onChange={e=>{
              setSelected(prev=>{const s=new Set(prev);if(e.target.checked)s.add(String(r.id));else s.delete(String(r.id));return s})}} />
            <div className="rec-info" onClick={()=>loadRecord(i)} style={{cursor:'pointer'}}>
              <div className="rec-title">{r.label||`紀錄 #${i+1}`}</div>
              <div className="rec-sub">{r.date||'—'} — {r.beforeDesc||'未填寫'}</div>
            </div>
            <div className="rec-photos" title="前/中/後">{[r.hasBeforePhoto,r.hasDuringPhoto,r.hasAfterPhoto].map((p,pi)=><div key={pi} className={`dot ${p?'filled':'empty'}`}/>)}</div>
            <button className="btn btn-danger" style={{padding:'6px 12px',fontSize:12}} onClick={e=>{e.stopPropagation();deleteRecord(i)}}>🗑</button>
          </div>
        ))}</div>
        <div className="btn-group">
          <button className="btn btn-primary" onClick={addRecord}>➕ 新增</button>
          <button className="btn btn-load" onClick={reloadIndex} disabled={syncing}>🔄 重新載入</button>
          <button className="btn btn-primary" onClick={()=>setShowExport(true)} disabled={index.length===0}>
            📤 匯出{selected.size>0?` (${selected.size}筆)`:''}
          </button>
          <button className="btn btn-secondary" onClick={exportJSON}>💾 JSON</button>
          <button className="btn btn-secondary" onClick={importJSON}>📂 匯入</button>
        </div>
      </div>}

      {/* EXPORT MODAL */}
      {showExport && <div className="modal-overlay" onClick={()=>setShowExport(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header">
            <span>📤 匯出改善照片表</span>
            <button onClick={()=>setShowExport(false)}>×</button>
          </div>
          <div className="modal-body">
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>
              {selected.size>0?`已勾選 ${selected.size} 筆`:`全部 ${index.length} 筆`}（未勾選＝全部匯出）
            </div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:6}}>格式</div>
            <div className="modal-opt">
              <button className={exportFmt==='pdf'?'sel':''} onClick={()=>setExportFmt('pdf')}>📄 PDF<br/><span style={{fontSize:11,fontWeight:400}}>列印 / 儲存為PDF</span></button>
              <button className={exportFmt==='word'?'sel':''} onClick={()=>setExportFmt('word')}>📝 Word<br/><span style={{fontSize:11,fontWeight:400}}>.docx 文件</span></button>
            </div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--text2)',marginBottom:6}}>方式</div>
            <div className="modal-opt">
              <button className={exportMode==='combined'?'sel':''} onClick={()=>setExportMode('combined')}>📋 合併一個檔案<br/><span style={{fontSize:11,fontWeight:400}}>所有紀錄在同一檔</span></button>
              <button className={exportMode==='individual'?'sel':''} onClick={()=>setExportMode('individual')}>📁 分開各別檔案<br/><span style={{fontSize:11,fontWeight:400}}>{exportFmt==='word'?'打包為 ZIP':'逐一開啟列印'}</span></button>
            </div>
          </div>
          <div className="modal-foot">
            <button className="btn btn-secondary" onClick={()=>setShowExport(false)}>取消</button>
            <button className="btn btn-primary" onClick={doExport}>確認匯出</button>
          </div>
        </div>
      </div>}

      {/* EDIT */}
      {tab==='edit'&&<div>
        {loadingRec?<div className="record-loading"><div className="spinner-sm"></div><p>☁️ 載入紀錄...</p></div>
        :!rec?<div style={{textAlign:'center',padding:40,color:'var(--text3)'}}><p>請從列表選擇或新增</p><div className="btn-group" style={{justifyContent:'center'}}><button className="btn btn-primary" onClick={addRecord}>➕ 新增</button></div></div>
        :<div>
          <div className="card"><div className="card-header"><div className="icon info">🏢</div><div><h3>文件資訊</h3></div></div>
          <div className="card-body">
            <div className="field"><label>機關名稱</label><select value={rec.org||DEFAULT_HEADER.org} onChange={e=>updateField('org',e.target.value)}>
              <option value="台灣電力公司綜合施工處">台灣電力公司綜合施工處</option>
              <option value="台灣電力公司北部施工處">台灣電力公司北部施工處</option>
            </select></div>
            <div className="field"><label>表單標題</label><input value={rec.title||DEFAULT_HEADER.title} onChange={e=>updateField('title',e.target.value)}/></div>
            <div className="field"><label>工程名稱</label><select value={rec.project||DEFAULT_HEADER.project} onChange={e=>updateField('project',e.target.value)}>
              <option value="台中減碳技術園區(A標)小規模碳捕集廠設備採購帶安裝及運轉維護與測試服務案">台中減碳技術園區(A標)小規模碳捕集廠設備採購帶安裝及運轉維護與測試服務案</option>
              <option value="通霄電廠二期海底輸氣管線統包工程">通霄電廠二期海底輸氣管線統包工程</option>
            </select></div>
            <div style={{display:'flex',gap:10}}>
              <div className="field" style={{flex:1}}><label>紀錄標籤</label><input value={rec.label} onChange={e=>updateField('label',e.target.value)} placeholder="WM-001"/></div>
              <div className="field" style={{flex:1}}><label>日期</label><input type="date" value={rec.date} onChange={e=>updateField('date',e.target.value)}/></div>
            </div>
          </div></div>

          <div className="card"><div className="card-header"><div className="icon before">❌</div><div><h3>改善前（缺失說明）</h3></div></div>
          <div className="card-body">
            <PhotoUploader localSrc={localPhotos.before} fileId={rec.beforePhotoId} onChange={v=>setPhoto('before',v)} label="改善前" photoDate={rec.beforePhotoDate||''}/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12}}>
              <div className="field" style={{flex:1,marginBottom:0}}><label>缺失說明</label></div>
              <div className="field" style={{marginBottom:0,flexShrink:0}}><label>📅 照片日期</label><input type="date" className="photo-date-input" value={rec.beforePhotoDate||''} onChange={e=>updateField('beforePhotoDate',e.target.value)}/></div>
            </div>
            <div className="field" style={{marginTop:4}}><textarea value={rec.beforeDesc} onChange={e=>updateField('beforeDesc',e.target.value)} placeholder="描述缺失..."/></div>
          </div></div>

          <div className="card"><div className="card-header"><div className="icon during">🔧</div><div><h3>改善中（改善措施）</h3></div></div>
          <div className="card-body">
            <PhotoUploader localSrc={localPhotos.during} fileId={rec.duringPhotoId} onChange={v=>setPhoto('during',v)} label="改善中" photoDate={rec.duringPhotoDate||''}/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12}}>
              <div className="field" style={{flex:1,marginBottom:0}}><label>改善措施</label></div>
              <div className="field" style={{marginBottom:0,flexShrink:0}}><label>📅 照片日期</label><input type="date" className="photo-date-input" value={rec.duringPhotoDate||''} onChange={e=>updateField('duringPhotoDate',e.target.value)}/></div>
            </div>
            <div className="field" style={{marginTop:4}}><textarea value={rec.duringDesc} onChange={e=>updateField('duringDesc',e.target.value)} placeholder="描述措施..."/></div>
          </div></div>

          <div className="card"><div className="card-header"><div className="icon after">✅</div><div><h3>改善後（改善結果）</h3></div></div>
          <div className="card-body">
            <PhotoUploader localSrc={localPhotos.after} fileId={rec.afterPhotoId} onChange={v=>setPhoto('after',v)} label="改善後" photoDate={rec.afterPhotoDate||''}/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12}}>
              <div className="field" style={{flex:1,marginBottom:0}}><label>改善結果</label></div>
              <div className="field" style={{marginBottom:0,flexShrink:0}}><label>📅 照片日期</label><input type="date" className="photo-date-input" value={rec.afterPhotoDate||''} onChange={e=>updateField('afterPhotoDate',e.target.value)}/></div>
            </div>
            <div className="field" style={{marginTop:4}}><textarea value={rec.afterDesc} onChange={e=>updateField('afterDesc',e.target.value)} placeholder="描述結果..."/></div>
          </div></div>

          <div className="btn-group">
            <button className="btn btn-sync" onClick={saveRecord} disabled={syncing}>{syncing?'⏳ 儲存中...':dirty?'☁️ 儲存 ●':'☁️ 儲存'}</button>
            <button className="btn btn-primary" onClick={()=>setShowExport(true)}>📤 匯出</button>
            <button className="btn btn-secondary" onClick={()=>setTab('preview')}>👁 預覽</button>
            <button className="btn btn-secondary" onClick={()=>setTab('list')}>📑 列表</button>
          </div>
        </div>}
      </div>}

      {/* PREVIEW */}
      {tab==='preview'&&<div>
        {!rec?<div style={{textAlign:'center',padding:40,color:'var(--text3)'}}><p>請先選擇紀錄</p></div>
        :<div>
          <div className="preview-doc">
            <div className="doc-org">{rec.org||header.org}</div><div className="doc-title">{rec.title||header.title}</div>
            <div className="doc-project">工程名稱：{rec.project||header.project}</div>
            <PreviewTable rec={rec} localPhotos={localPhotos}/>
            {(rec.label||rec.date)&&<div style={{marginTop:8,fontSize:'9pt',color:'#666'}}>{rec.label&&<span>{rec.label}　</span>}{rec.date}</div>}
          </div>
          <div className="btn-group" style={{marginTop:16}}>
            <button className="btn btn-primary" onClick={()=>setShowExport(true)}>📤 匯出</button>
            <button className="btn btn-secondary" onClick={()=>setTab('edit')}>✏️ 編輯</button>
          </div>
        </div>}
      </div>}

      {/* SETTINGS */}
      {tab==='settings'&&<div>
        <div className="card"><div className="card-header"><div className="icon cloud">☁️</div><div><h3>雲端設定</h3><small>Drive JSON + 照片獨立檔案</small></div></div>
        <div className="card-body">
          <div className="field"><label>GAS URL</label><input defaultValue={GAS_URL} style={{fontFamily:'monospace',fontSize:12}} readOnly/><div className="hint-text">修改 HTML 頂部 <code>GAS_URL</code></div></div>
          <div style={{padding:14,background:'var(--bg2)',borderRadius:6,fontSize:13,lineHeight:1.9,color:'var(--text2)'}}>
            <b>📋 設定：</b><br/>
            1️⃣ 建立 Drive 資料夾 → 複製 Folder ID<br/>
            2️⃣ 任一 Sheet → Apps Script → 貼 Code.gs → 填 Folder ID<br/>
            3️⃣ 部署 Web App（Me / Anyone）<br/>
            4️⃣ URL 貼到 <code>GAS_URL</code><br/><br/>
            <b>📁 檔案架構：</b><br/>
            <code>_index.json</code> 輕量索引（秒開）<br/>
            <code>rec_xxx.json</code> 紀錄文字 + photoFileId<br/>
            <code>photo_xxx.jpg</code> 照片獨立檔案（個別載入）
          </div>
        </div></div>
        <div className="card"><div className="card-header"><div className="icon info">💾</div><div><h3>資料管理</h3></div></div>
        <div className="card-body"><div className="btn-group" style={{marginTop:0}}>
          <button className="btn btn-secondary" onClick={exportJSON}>💾 匯出</button>
          <button className="btn btn-secondary" onClick={importJSON}>📂 匯入</button>
        </div></div></div>
        <div className="card"><div className="card-header"><div className="icon info">ℹ️</div><div><h3>系統</h3></div></div>
        <div className="card-body" style={{fontSize:13,color:'var(--text2)',lineHeight:1.8}}>
          紀錄：{index.length} 筆　|　版本：v6.0（勾選匯出·Word·PDF）
        </div></div>
      </div>}

      <div style={{textAlign:'center',padding:'20px 0',fontSize:11,color:'#9a8c7a'}}>
        NMDC EHS 改善照片表 v6.0 ☁️ 勾選匯出・Word・PDF
      </div>
    </div>
  </div>);
}

// 預覽用：個別載入照片的 table cell
function PreviewPhotoCell({localSrc, fileId}) {
  const remote = usePhotoLoader(!localSrc ? fileId : '');
  const src = localSrc || remote.src;
  if (remote.loading) return <td className="photo-cell"><div className="no-photo-placeholder">☁️ 載入中...</div></td>;
  if (src) return <td className="photo-cell"><img src={src}/></td>;
  return <td className="photo-cell"><div className="no-photo-placeholder">（未附照片）</div></td>;
}

function PreviewTable({rec, localPhotos}) {
  return (
    <table className="preview-table"><tbody>
      <tr><td className="label-cell" rowSpan={3}>(改善前中後、同一角度拍攝之照片，並加以說明。)</td>
        <PreviewPhotoCell localSrc={localPhotos.before} fileId={rec.beforePhotoId}/>
        <td className="desc-cell"><div className="desc-title">改善前(缺失說明)：</div><div>{rec.beforeDesc||'—'}</div></td></tr>
      <tr><PreviewPhotoCell localSrc={localPhotos.during} fileId={rec.duringPhotoId}/>
        <td className="desc-cell"><div className="desc-title">改善中(改善措施)：</div><div>{rec.duringDesc||'—'}</div></td></tr>
      <tr><PreviewPhotoCell localSrc={localPhotos.after} fileId={rec.afterPhotoId}/>
        <td className="desc-cell"><div className="desc-title">改善後(改善結果)：</div><div>{rec.afterDesc||'—'}</div></td></tr>
    </tbody></table>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
