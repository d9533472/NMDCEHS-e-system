<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPC 海管工程 改善單管理系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #eef2f7;
  --bg-secondary: #e4ecf4;
  --bg-card: #ffffff;
  --bg-card-hover: #f5f8fc;
  --bg-input: #f0f4f8;
  --border: #c8d8e8;
  --border-focus: #0ea5e9;
  --text-primary: #0f2540;
  --text-secondary: #3a5a7a;
  --text-muted: #7a9ab8;
  --accent-blue: #0ea5e9;
  --accent-blue-dim: rgba(14,165,233,0.12);
  --accent-orange: #f59e0b;
  --accent-orange-dim: rgba(245,158,11,0.12);
  --accent-red: #ef4444;
  --accent-red-dim: rgba(239,68,68,0.12);
  --accent-green: #10b981;
  --accent-green-dim: rgba(16,185,129,0.12);
  --accent-cyan: #0891b2;
  --accent-teal: #0891b2;
  --wm-color: #0ea5e9;
  --ncr-color: #d97706;
  --pn-color: #ef4444;
  --shadow: 0 2px 16px rgba(15,37,64,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-primary); color:var(--text-primary); font-family:'Noto Sans TC',sans-serif; font-size:14px; min-height:100vh; }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-primary); }
::-webkit-scrollbar-thumb { background:#b0c4d8; border-radius:3px; }

/* ── LAYOUT ── */
.app-shell { display:flex; flex-direction:column; min-height:100vh; }
.topbar {
  background:linear-gradient(135deg, #0c1f3d 0%, #1e3a5f 50%, #163360 100%);
  border-bottom:1px solid var(--border);
  padding:0 24px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100; min-height:60px;
}
.topbar-icon {
  width:36px; height:36px; border-radius:8px;
  background:linear-gradient(135deg, #38bdf8, #0369a1);
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  box-shadow:0 0 16px rgba(14,165,233,0.4);
}
.topbar-title { font-size:15px; font-weight:700; line-height:1.3; color:#e8f4fd; }
.topbar-sub { font-size:11px; color:#7ab0d4; font-family:'JetBrains Mono',monospace; }
.topbar-divider { width:1px; height:32px; background:rgba(255,255,255,0.15); flex-shrink:0; }
.topbar-project { flex:1; min-width:0; }
.topbar-project-name { font-size:12px; color:#7dd3fc; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.topbar-project-client { font-size:11px; color:#6a9ec0; }
.sync-status { display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0; }
.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--text-muted); flex-shrink:0; }
.sync-dot.ok { background:var(--accent-green); box-shadow:0 0 8px rgba(16,185,129,0.5); animation:pulse 2s infinite; }
.sync-dot.busy { background:var(--accent-orange); animation:blink .5s infinite; }
.sync-dot.error { background:var(--accent-red); }
.sync-text { font-size:11px; color:#6a9ec0; font-family:'JetBrains Mono',monospace; white-space:nowrap; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── NAV ── */
.nav { display:flex; gap:2px; padding:0 24px; background:#ffffff; border-bottom:2px solid var(--border); overflow-x:auto; }
.nav-btn {
  padding:12px 20px; font-size:13px; font-weight:600; cursor:pointer;
  border:none; background:transparent; color:var(--text-muted);
  border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.nav-btn:hover { color:var(--text-primary); background:rgba(255,255,255,.03); }
.nav-btn.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }
.nav-badge { background:var(--accent-red); color:#fff; font-size:10px; font-weight:700; border-radius:10px; padding:1px 6px; min-width:18px; text-align:center; }

.content { flex:1; padding:24px; max-width:1600px; margin:0 auto; width:100%; }

/* ── SETUP OVERLAY ── */
.setup-overlay {
  position:fixed; inset:0; background:#eef2f7; z-index:500;
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.setup-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:14px;
  padding:40px; width:100%; max-width:560px; box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.setup-logo { font-size:48px; text-align:center; margin-bottom:16px; }
.setup-title { font-size:20px; font-weight:900; text-align:center; color:var(--text-primary); margin-bottom:6px; }
.setup-sub { font-size:13px; color:var(--text-muted); text-align:center; margin-bottom:32px; }
.setup-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-bottom:8px; }
.setup-input {
  width:100%; background:var(--bg-input); border:1px solid var(--border);
  color:var(--text-primary); border-radius:var(--radius-sm); padding:12px 14px;
  font-size:13px; font-family:'JetBrains Mono',monospace; margin-bottom:16px;
}
.setup-input:focus { outline:none; border-color:var(--border-focus); }
.setup-steps { background:var(--bg-primary); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; font-size:12px; color:var(--text-secondary); line-height:1.9; margin-bottom:24px; }
.setup-steps ol { padding-left:18px; }
.setup-steps li { margin-bottom:2px; }
.setup-steps code { background:var(--bg-card); padding:1px 5px; border-radius:3px; font-size:11px; color:var(--accent-cyan); font-family:'JetBrains Mono',monospace; }

/* ── GLOBAL LOADING ── */
.g-loading {
  position:fixed; inset:0; background:rgba(15,37,64,.8); z-index:400;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  backdrop-filter:blur(4px);
}
.g-loading-spinner {
  width:44px; height:44px; border:3px solid var(--border);
  border-top-color:var(--accent-blue); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.g-loading-text { font-size:14px; color:var(--text-secondary); }

/* ── KPI ── */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.kpi-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; position:relative; overflow:hidden; transition:all .25s; }
.kpi-card:hover { border-color:rgba(14,165,233,.4); transform:translateY(-2px); box-shadow:var(--shadow); }
.kpi-stripe { position:absolute; top:0; left:0; right:0; height:3px; border-radius:2px 2px 0 0; }
.kpi-label { font-size:13px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; font-weight:600; }
.kpi-value { font-family:'JetBrains Mono',monospace; font-size:36px; font-weight:900; line-height:1; }
.kpi-sub { font-size:12px; color:var(--text-secondary); margin-top:6px; }

/* ── CHARTS ── */
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
@media(max-width:900px){.chart-grid{grid-template-columns:1fr;} .dash-two-col{grid-template-columns:1fr !important;}}
.chart-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.chart-title { font-size:13px; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.5px; margin-bottom:16px; }
.chart-wrap { position:relative; height:220px; }

/* ── ITEM DASH ── */
.item-dash { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:12px; margin-bottom:24px; }
.item-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; position:relative; overflow:hidden; transition:all .25s; }
.item-card:hover { transform:translateY(-2px); box-shadow:var(--shadow); border-color:rgba(14,165,233,.3); }
.item-card-bar { position:absolute; top:0; left:0; right:0; height:3px; border-radius:2px 2px 0 0; }
.item-card-id { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; background:rgba(14,165,233,.1); color:var(--accent-blue); display:inline-block; margin-bottom:6px; }
.item-card-name { font-size:12px; font-weight:700; color:var(--text-primary); margin-bottom:12px; }
.item-card-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.item-stat { text-align:center; }
.item-stat-val { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:900; line-height:1; }
.item-stat-label { font-size:10px; color:var(--text-muted); margin-top:3px; }
.item-close-bar { margin-top:10px; background:rgba(255,255,255,.06); border-radius:4px; height:5px; overflow:hidden; }
.item-close-fill { height:100%; border-radius:4px; transition:width .6s ease; }

/* ── FILTER BAR ── */
.filter-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:20px; }
.filter-group { display:flex; align-items:center; gap:8px; }
.filter-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
.filter-bar select, .filter-bar input[type=text] { background:var(--bg-input); border:1px solid var(--border); color:var(--text-primary); border-radius:var(--radius-sm); padding:6px 10px; font-size:12px; font-family:inherit; min-width:100px; }
.filter-bar select:focus, .filter-bar input:focus { outline:none; border-color:var(--border-focus); }
.filter-spacer { flex:1; }

/* ── BUTTONS ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-sm); font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; border:none; transition:all .2s; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--accent-blue); color:#fff; }
.btn-primary:hover:not(:disabled) { background:#38bdf8; transform:translateY(-1px); }
.btn-secondary { background:var(--bg-input); border:1px solid var(--border); color:var(--text-secondary); }
.btn-secondary:hover:not(:disabled) { border-color:var(--accent-blue); color:var(--accent-blue); }
.btn-danger { background:var(--accent-red-dim); border:1px solid rgba(239,68,68,.3); color:var(--accent-red); }
.btn-danger:hover:not(:disabled) { background:var(--accent-red); color:#fff; }
.btn-sm { padding:5px 10px; font-size:11px; }
.btn-icon { width:32px; height:32px; padding:0; display:inline-flex; align-items:center; justify-content:center; }

/* ── TABLE ── */
.table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.table-head { display:grid; padding:12px 16px; background:#e4ecf4; border-bottom:2px solid var(--border); }
.table-head-cell { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-weight:700; display:flex; align-items:center; gap:4px; cursor:pointer; user-select:none; }
.table-head-cell:hover { color:var(--text-primary); }
.sort-icon { font-size:9px; opacity:.6; }
.sort-icon.active { opacity:1; color:var(--accent-blue); }
.table-row { display:grid; padding:12px 16px; border-bottom:1px solid rgba(30,48,80,.5); transition:background .15s; align-items:center; }
.table-row:last-child { border-bottom:none; }
.table-row:hover { background:var(--bg-card-hover); }
.table-cell { font-size:12px; color:var(--text-primary); overflow:hidden; word-break:break-word; white-space:pre-wrap; }
.mobile-only { display:none; }
.mobile-card { display:none; }
.desktop-only { display:block; }
.t-cols { grid-template-columns: 70px 110px 90px 80px 80px 70px 90px 1fr 110px 90px 90px 70px 90px; }

/* ── BADGES ── */
.badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.badge-wm { background:rgba(14,165,233,.1); color:var(--wm-color); border:1px solid rgba(14,165,233,.35); }
.badge-ncr { background:rgba(217,119,6,.1); color:var(--ncr-color); border:1px solid rgba(217,119,6,.35); }
.badge-pn { background:rgba(239,68,68,.15); color:var(--pn-color); border:1px solid rgba(239,68,68,.3); }
.badge-open { background:rgba(239,68,68,.12); color:#fca5a5; border:1px solid rgba(239,68,68,.25); }
.badge-closed { background:rgba(16,185,129,.12); color:#6ee7b7; border:1px solid rgba(16,185,129,.25); }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(--bg-secondary); border:1px solid var(--border); border-radius:14px; width:100%; max-width:720px; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,.6); }
.modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.modal-title { font-size:16px; font-weight:800; }
.modal-close { width:32px; height:32px; border-radius:var(--radius-sm); background:var(--bg-input); border:1px solid var(--border); color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
.modal-close:hover { color:var(--accent-red); border-color:var(--accent-red); }
.modal-body { padding:24px; overflow-y:auto; flex:1; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; flex-shrink:0; }

/* ── FORM ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:6px; }
.form-group.full { grid-column:1/-1; }
.form-group label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-weight:700; }
.form-group input, .form-group select, .form-group textarea { background:var(--bg-input); border:1px solid var(--border); color:var(--text-primary); border-radius:var(--radius-sm); padding:9px 12px; font-size:13px; font-family:inherit; transition:border-color .2s; }

.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--border-focus); }
.form-group textarea { resize:vertical; min-height:70px; }
.form-section-title { grid-column:1/-1; font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; padding-top:4px; display:flex; align-items:center; gap:8px; }
.form-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── SETTINGS ── */
.settings-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
.settings-title { font-size:14px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.settings-row { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.settings-row label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; font-weight:700; }
.settings-row input, .settings-row textarea { background:var(--bg-input); border:1px solid var(--border); color:var(--text-primary); border-radius:var(--radius-sm); padding:10px 14px; font-size:12px; font-family:'JetBrains Mono',monospace; }
.settings-row input:focus, .settings-row textarea:focus { outline:none; border-color:var(--border-focus); }

/* ── TOAST ── */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; font-size:13px; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px; animation:slideUp .3s ease; max-width:340px; }
.toast-item.success { border-color:rgba(16,185,129,.4); }
.toast-item.error { border-color:rgba(239,68,68,.4); }
.toast-item.info { border-color:rgba(14,165,233,.3); }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* ── MISC ── */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:18px; font-weight:900; }
.page-sub { font-size:12px; color:var(--text-muted); margin-top:3px; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:.4; }
.empty-text { font-size:14px; }
.error-banner { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:var(--radius-sm); padding:12px 16px; font-size:13px; color:#fca5a5; margin-bottom:20px; display:flex; align-items:center; gap:10px; }

@media(max-width:640px){
  /* Layout */
  .content{padding:12px;}
  .app-shell{font-size:13px;}

  /* Topbar */
  .topbar{padding:0 12px; gap:8px; min-height:52px;}
  .topbar-title{font-size:13px;}
  .topbar-sub{display:none;}
  .topbar-project-name{font-size:11px;}
  .topbar-project-client{display:none;}
  .topbar-divider{display:none;}
  .sync-text{display:none;}

  /* Nav */
  .nav{padding:0 8px; gap:0;}
  .nav-btn{padding:10px 12px; font-size:12px;}

  /* KPI grid - 2 columns on mobile */
  .kpi-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
  .kpi-value{font-size:26px;}
  .kpi-label{font-size:11px;}
  .kpi-card{padding:14px;}

  /* Charts */
  .chart-grid{grid-template-columns:1fr;}
  .dash-two-col{grid-template-columns:1fr !important;}
  .chart-wrap{height:180px;}

  /* Item cards */
  .item-dash{grid-template-columns:repeat(2,1fr);}

  /* Filter bar */
  .filter-bar{padding:12px; gap:8px;}
  .filter-bar select,.filter-bar input[type=text]{min-width:80px; font-size:11px; padding:5px 8px;}
  .filter-label{display:none;}

  /* Table → Card layout on mobile */
  .form-grid{grid-template-columns:1fr;}
  .t-cols{display:block !important; grid-template-columns:none !important;}
  .table-cell.hm{display:block !important;}
  .table-head{display:none !important;}
  .table-row{display:block !important; padding:0 !important; border-bottom:2px solid var(--border) !important; margin-bottom:8px !important; border-radius:var(--radius) !important; overflow:hidden;}
  .mobile-only{display:block !important;}
  .mobile-card{display:flex !important;}
  .desktop-only{display:none !important;}

  /* Dashboard charts - each one full width */
  .kpi-grid{grid-template-columns:repeat(2,1fr); gap:8px;}
  .dash-two-col{grid-template-columns:1fr !important;}
  .chart-grid{grid-template-columns:1fr !important;}

  /* Page header */
  .page-header{flex-direction:column; align-items:flex-start; gap:10px;}
  .page-title{font-size:15px;}

  /* Modal */
  .modal{max-height:95vh; border-radius:10px 10px 0 0; position:fixed; bottom:0; left:0; right:0; max-width:100%;}
  .modal-body{padding:16px;}
  .modal-header{padding:14px 16px;}

  /* Buttons */
  .btn{padding:7px 12px; font-size:12px;}
  .btn-icon{width:28px; height:28px;}

  /* Settings */
  .settings-section{padding:16px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── 專案常數 ─────────────────────────────────────────────────
const PROJECT = {
  name: '通霄電廠二期更新改建計畫海底輸氣管線統包工程',
  client: '台灣電力公司北部施工處',
  shortName: 'TPC 海管工程',

// ─── XHR 工具（避免 mobile Safari fetch redirect 問題）──────────
function xhrGet(url) {
  return new Promise((res, rej) => {
    const x = new XMLHttpRequest();
    x.open('GET', url, true);
    x.timeout = 20000;
    x.onload = () => {
      if (x.status >= 200 && x.status < 300) {
        try { res(JSON.parse(x.responseText)); }
        catch(e) { rej(new Error('JSON 解析失敗')); }
      } else { rej(new Error('HTTP ' + x.status)); }
    };
    x.onerror = () => rej(new Error('網路錯誤'));
    x.ontimeout = () => rej(new Error('請求逾時'));
    x.send();
  });
}
function xhrPost(url, data) {
  return new Promise((res, rej) => {
    const x = new XMLHttpRequest();
    x.open('POST', url, true);
    x.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    x.timeout = 30000;
    x.onload = () => {
      if (x.status >= 200 && x.status < 300) {
        try { res(JSON.parse(x.responseText)); }
        catch(e) { rej(new Error('JSON 解析失敗')); }
      } else { rej(new Error('HTTP ' + x.status)); }
    };
    x.onerror = () => rej(new Error('網路錯誤'));
    x.ontimeout = () => rej(new Error('請求逾時（30s）'));
    x.send(JSON.stringify(data));
  });
}

// ─── 工具函數 ────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? d.replace(/-/g, '/') : '—';
const genId = () => Date.now() + Math.floor(Math.random()*9999);

function getNextNum(records, type) {
  const prefix = { WM:'WM', NCR:'NCR', PN:'PN' }[type] || type;
  const nums = records.filter(r => r.type === type).map(r => {
    const m = String(r.number||'').match(/(\d+)$/);
    return m ? parseInt(m[1]) : 0;
  });
  const next = nums.length ? Math.max(...nums) + 1 : 1;
  return `${prefix}-${String(next).padStart(3,'0')}`;
}

// ─── DRIVE SECTION ────────────────────────────────────────────
function DriveSection({ form, setForm, gasUrl }) {
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);
  const folderName = `${form.date || '日期'} ${form.number || '編號'}`;

  const getOrCreate = async () => {
    if (!gasUrl) { alert('未設定 GAS 網址'); return null; }
    setBusy(true);
    try {
      const res = await xhrPost(gasUrl, {
        action: 'getFolderUrl',
        type: form.type,
        date: form.date,
        number: form.number,
      });
      if (!res.ok) throw new Error(res.error || '無法取得資料夾');
      setForm(f => ({ ...f, driveFolderUrl: res.url, driveFolderId: res.folderId }));
      return res;
    } catch(e) { alert('Drive 錯誤：' + e.message); return null; }
    finally { setBusy(false); }
  };

  const openFolder = async () => {
    if (form.driveFolderUrl) { window.open(form.driveFolderUrl, '_blank'); return; }
    // 先開空視窗（必須在 async await 之前，否則 iOS 會擋 popup）
    const win = window.open('', '_blank');
    const res = await getOrCreate();
    if (res && win) { win.location.href = res.url; }
    else if (win) { win.close(); }
  };

  const handleFileSelect = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setBusy(true);
    try {
      let folderId = form.driveFolderId;
      if (!folderId) {
        const res = await getOrCreate();
        if (!res) return;
        folderId = res.folderId;
      }
      for (const file of files) {
        const dataUrl = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const up = await xhrPost(gasUrl, { action:'uploadFile', folderId, fileName: file.name, dataUrl });
        if (!up.ok) throw new Error(up.error || '上傳失敗：' + file.name);
      }
      alert(`✅ 已上傳 ${files.length} 個檔案至 Drive`);
    } catch(e) { alert('上傳失敗：' + e.message); }
    finally { setBusy(false); if(e.target) e.target.value = ''; }
  };

  return (
    <div className="form-group full">
      <label>Drive 附件資料夾</label>
      <div style={{background:'var(--bg-primary)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 14px'}}>
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontFamily:'JetBrains Mono,monospace'}}>📁 {folderName}</span>
          {form.driveFolderUrl
            ? <span style={{color:'var(--accent-green)',fontSize:11,fontWeight:700}}>● 已建立</span>
            : <span style={{color:'var(--text-muted)',fontSize:11}}>● 尚未建立</span>
          }
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button type="button" className="btn btn-secondary btn-sm" disabled={busy}
            onClick={async()=>{ const res = await getOrCreate(); if(res) alert(`✅ 資料夾已建立：${res.name}`); }}>
            {busy ? '⏳ 處理中...' : '📁 建立資料夾'}
          </button>
          <button type="button" className="btn btn-secondary btn-sm" disabled={busy}
            onClick={() => fileRef.current && fileRef.current.click()}>
            {busy ? '⏳ 處理中...' : '⬆️ 上傳檔案至資料夾'}
          </button>
          <button type="button" className="btn btn-secondary btn-sm" disabled={busy} onClick={openFolder}>
            📂 開啟資料夾
          </button>
        </div>
        <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={handleFileSelect} />
      </div>
    </div>
  );
}

// ─── DONUT CHART ──────────────────────────────────────────────
function DonutChart({ data, title }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:'doughnut',
      data:{ labels:data.map(d=>d.label), datasets:[{ data:data.map(d=>d.value), backgroundColor:data.map(d=>d.color), borderWidth:0, hoverOffset:4 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{ position:window.innerWidth<=640?'bottom':'right', labels:{ color:'#7a9bbf', font:{size:11}, padding:8, boxWidth:10 } } } }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [data]);
  return <div className="chart-card"><div className="chart-title">{title}</div><div className="chart-wrap"><canvas ref={ref}></canvas></div></div>;
}

// ─── PRESENTATION PIE CHART（簡報用缺失分類圓餅圖）────────────
function ItemPieChart({ records, itemOptions, onFilterClick }) {
  const ref = useRef(null);
  const chartRef = useRef(null);

  const COLORS = [
    '#3b82f6','#f59e0b','#10b981','#8b5cf6',
    '#ef4444','#22d3ee','#f97316','#ec4899',
  ];

  const itemMap = {};
  records.forEach(r => {
    const defs = (r.defects && r.defects.length>0) ? r.defects : [{item: r.item||1}];
    defs.forEach(d => {
      const k = String(d.item || 1);
      itemMap[k] = (itemMap[k] || 0) + 1;
    });
  });
  const total = records.reduce((s,r)=>s+((r.defects&&r.defects.length>0)?r.defects.length:1),0);
  const data = Object.entries(itemMap)
    .sort((a,b) => b[1] - a[1])
    .map(([k, v], i) => ({
      key: k,
      label: itemOptions[k] || `項目${k}`,
      value: v,
      pct: total ? Math.round(v / total * 100) : 0,
      color: COLORS[i % COLORS.length],
    }));

  useEffect(() => {
    if (!ref.current || data.length === 0) return;
    if (chartRef.current) chartRef.current.destroy();
    // 自訂 plugin：在每個 slice 上畫名稱 + 百分比
    const labelPlugin = {
      id: 'sliceLabels',
      afterDraw(chart) {
        const { ctx, data: cd } = chart;
        const ds = chart.getDatasetMeta(0);
        ds.data.forEach((arc, i) => {
          const pct = Math.round(cd.datasets[0].data[i] / total * 100);
          if (pct < 5) return; // 太小不顯示
          const { x, y, startAngle, endAngle, outerRadius, innerRadius } = arc.getProps(['x','y','startAngle','endAngle','outerRadius','innerRadius']);
          const mid = (startAngle + endAngle) / 2;
          const r = (outerRadius + (innerRadius || 0)) / 2 + outerRadius * 0.18;
          const lx = x + Math.cos(mid) * r;
          const ly = y + Math.sin(mid) * r;
          const label = cd.labels[i];
          const shortLabel = label.length > 6 ? label.slice(0,6) : label;
          ctx.save();
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = 'rgba(0,0,0,0.4)';
          ctx.shadowBlur = 3;
          ctx.font = 'bold 11px Noto Sans TC, sans-serif';
          ctx.fillText(shortLabel, lx, ly - 7);
          ctx.font = 'bold 12px JetBrains Mono, monospace';
          ctx.fillText(pct + '%', lx, ly + 7);
          ctx.restore();
        });
      }
    };

    chartRef.current = new Chart(ref.current, {
      type: 'pie',
      plugins: [labelPlugin],
      data: {
        labels: data.map(d => d.label),
        datasets: [{
          data: data.map(d => d.value),
          backgroundColor: data.map(d => d.color),
          borderColor: '#ffffff',
          borderWidth: 3,
          hoverOffset: 10,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}：${ctx.parsed} 件 (${Math.round(ctx.parsed/total*100)}%)`
            },
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#1e293b',
            bodyColor: '#334155',
            borderColor: '#e2e8f0',
            borderWidth: 1,
            padding: 10,
            titleFont: { size: 12, weight: 'bold' },
            bodyFont: { size: 11 },
          }
        },
        animation: { animateRotate: true, duration: 800 }
      }
    });
    return () => chartRef.current && chartRef.current.destroy();
  }, [records.length, JSON.stringify(itemOptions)]);

  if (data.length === 0) return null;

  return (
    <div style={{
      background:'#ffffff', borderRadius:16, padding:'28px 32px',

        </div>
      </div>

      {/* 圖例：兩欄 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 12px'}}>

}

function DashboardTab({ records, itemOptions, onFilterClick }) {
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [quickPeriod, setQuickPeriod] = useState('all');

  // 快速週期計算
  const applyQuick = (period) => {
    const now = new Date();
    const fmt = d => d.toISOString().slice(0,10);
    setQuickPeriod(period);
    if (period === 'all') { setDateFrom(''); setDateTo(''); return; }
    if (period === 'thisweek') {
      const dw = now.getDay(); const diff = dw===0?-6:1-dw;
      const mon = new Date(now); mon.setDate(now.getDate()+diff);
      const sun = new Date(mon); sun.setDate(mon.getDate()+6);
      setDateFrom(fmt(mon)); setDateTo(fmt(sun)); return;
    }
    if (period === 'lastweek') {
      const dw = now.getDay(); const diff = dw===0?-6:1-dw;
      const mon = new Date(now); mon.setDate(now.getDate()+diff-7);
      const sun = new Date(mon); sun.setDate(mon.getDate()+6);
      setDateFrom(fmt(mon)); setDateTo(fmt(sun)); return;
    }
    if (period === 'thismonth') {
      setDateFrom(fmt(new Date(now.getFullYear(), now.getMonth(), 1)));
      setDateTo(fmt(new Date(now.getFullYear(), now.getMonth()+1, 0))); return;
    }
    if (period === 'lastmonth') {
      setDateFrom(fmt(new Date(now.getFullYear(), now.getMonth()-1, 1)));
      setDateTo(fmt(new Date(now.getFullYear(), now.getMonth(), 0))); return;
    }
    if (period === 'last30') {
      const d = new Date(now); d.setDate(now.getDate()-30);
      setDateFrom(fmt(d)); setDateTo(fmt(now)); return;
    }
    if (period === 'last90') {
      const d = new Date(now); d.setDate(now.getDate()-90);
      setDateFrom(fmt(d)); setDateTo(fmt(now)); return;
    }
  };

  // 篩選後的紀錄
  const filteredRecs = records.filter(r =>
    (!dateFrom || r.date >= dateFrom) &&
    (!dateTo   || r.date <= dateTo)
  );
  const useFiltered = dateFrom || dateTo;
  const activeRecs = useFiltered ? filteredRecs : records;

  const total = activeRecs.length;
  const open = activeRecs.filter(r=>r.status==='Open').length;
  const closed = activeRecs.filter(r=>r.status==='Closed').length;
  const totalDefects = activeRecs.reduce((s,r)=>s+((r.defects&&r.defects.length>0)?r.defects.length:1),0);
  const closeRate = totalDefects ? Math.round(activeRecs.filter(r=>r.status==='Closed').reduce((s,r)=>s+((r.defects&&r.defects.length>0)?r.defects.length:1),0)/totalDefects*100) : 0;
  const pnTotal = activeRecs.filter(r=>r.type==='PN').reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const todayStr = today();
  const in3days = new Date(); in3days.setDate(in3days.getDate()+3);
  const in3Str = in3days.toISOString().slice(0,10);
  const in7days = new Date(); in7days.setDate(in7days.getDate()+7);
  const in7Str = in7days.toISOString().slice(0,10);
  // 本週：週一～週日（用本地時間避免 UTC+8 時差問題）
  const nowD = new Date();
  const localFmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const dow = nowD.getDay(); // 0=日,1=一...6=六
  const diffMon = dow === 0 ? -6 : 1 - dow;
  const weekMon = new Date(nowD); weekMon.setDate(nowD.getDate() + diffMon);
  const weekSun = new Date(weekMon); weekSun.setDate(weekMon.getDate() + 6);
  const weekMonStr = localFmt(weekMon);
  const weekSunStr = localFmt(weekSun);
  const thisWeekRecs = records.filter(r => r.date && r.date >= weekMonStr && r.date <= weekSunStr);
  const overdueRecs  = records.filter(r=>r.status==='Open' && r.deadline && r.deadline!=='-' && r.deadline < todayStr);
  const near3Recs    = records.filter(r=>r.status==='Open' && r.deadline && r.deadline!=='-' && r.deadline >= todayStr && r.deadline <= in3Str);
  const near7Recs    = records.filter(r=>r.status==='Open' && r.deadline && r.deadline!=='-' && r.deadline >= todayStr && r.deadline <= in7Str);
  const nearDueRecs  = near7Recs;

  return (

        <span style={{fontSize:12,fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.5px'}}>篩選期間</span>

          {id:'lastweek', label:'上週'},
          {id:'thismonth',label:'本月'},

        ].map(p=>(

        <span style={{fontSize:12,color:'var(--text-muted)'}}>～</span>

        {useFiltered && <span style={{fontSize:12,color:'var(--accent-blue)',fontWeight:700}}>共 {filteredRecs.length} 筆</span>}
      </div>
      <div className="kpi-grid">
        {overdueRecs.length>0 && (

// ─── PHOTO SYSTEM BUTTON ──────────────────────────────────────
function PhotoBtn({ record }) {
  const [busy, setBusy] = useState(false);

  const handleClick = async () => {
    // 先開空視窗（必須在 await 前，否則 iOS Safari 會擋 popup）
    const win = window.open('', '_blank');
    if (!PHOTO_GAS_URL) {
      if (win) win.location.href = PHOTO_SYSTEM_URL + '#label=' + encodeURIComponent(record.number);
      return;
    }
    setBusy(true);
    try {
      // 1. 查詢照片系統有沒有這個 label
      const indexRes = await xhrGet(PHOTO_GAS_URL + '?action=index');
      const recs = (indexRes.ok && indexRes.data && indexRes.data.records) ? indexRes.data.records : [];
      const label = record.number;
      const exists = recs.some(r => r.label === label);

      if (!exists) {
        // 2. 沒有的話自動建立一筆
        const desc = (record.defects && record.defects.length > 0)
          ? record.defects.map(d => d.description).join('\n')
          : (record.description || '');
        const newRec = {
          id: Date.now(), label, date: record.date || '',
          beforeDesc: desc, duringDesc: '', afterDesc: '', remark: '',
        };
        await xhrPost(PHOTO_GAS_URL, { action: 'saveRecord', record: newRec, header: null });
      }
      // 3. 導向照片系統
      if (win) win.location.href = PHOTO_SYSTEM_URL + '#label=' + encodeURIComponent(record.number);
      else window.open(PHOTO_SYSTEM_URL + '#label=' + encodeURIComponent(record.number), '_blank');
    } catch(e) {
      if (win) win.close();
      alert('照片系統連線失敗：' + e.message);
    } finally { setBusy(false); }
  };

  return (
    <button className="btn btn-secondary btn-sm btn-icon" title="開啟改善照片系統" disabled={busy} onClick={handleClick}>
      {busy ? '⏳' : '📷'}
    </button>
  );
}

function RecordsTab({ records, config, onAdd, onEdit, onDelete, onRefresh, saving, gasUrl, connected, activeFilter }) {
  const { itemOptions, areaOptions, unitOptions } = config;
  const [filters, setFilters] = useState({ type:'', area:'', unit:'', status:'', item:'', search:'', _overdue:false, _neardue:false, _thisweek:false });
  const [sort, setSort] = useState({ key:'date', dir:'desc' });
  const [showModal, setShowModal] = useState(false);
  const [editRec, setEditRec] = useState(null);
  const [mode, setMode] = useState('add');
  const setF = (k,v) => setFilters(f=>({...f,[k]:v}));

  // 從儀表板點擊卡片帶入篩選
  useEffect(() => {
    if (activeFilter) {
      if (activeFilter._newrecord) {
        setMode('add'); setEditRec(null); setShowModal(true);
        return;
      }
      setFilters(f => ({
        ...f,
        type: activeFilter.type || f.type,
        status: activeFilter.status || f.status,
        item: activeFilter.item || f.item,
        _overdue: activeFilter._overdue || false,
        _neardue: activeFilter._neardue || false,
        _thisweek: activeFilter._thisweek || false,
      }));
    }
  }, [activeFilter]);

  const filtered = records.filter(r=>
    (!filters.type || r.type===filters.type) &&
    (!filters.area || r.area===filters.area) &&
    (!filters.unit || r.unit===filters.unit) &&
    (!filters.status || r.status===filters.status) &&
    (!filters.item || (r.defects&&r.defects.length>0 ? r.defects.some(d=>String(d.item)===filters.item) : String(r.item)===filters.item)) &&
    (!filters._overdue || (r.status==='Open' && r.deadline && r.deadline!=='-' && r.deadline < today())) &&
    (!filters._neardue || (r.status==='Open' && r.deadline && r.deadline!=='-' && r.deadline >= today() && r.deadline <= (()=>{const d=new Date();d.setDate(d.getDate()+7);return d.toISOString().slice(0,10);})())) &&
    (!filters._thisweek || (()=>{ const n=new Date(); const dw=n.getDay(); const diff=dw===0?-6:1-dw; const mon=new Date(n); mon.setDate(n.getDate()+diff); const sun=new Date(mon); sun.setDate(mon.getDate()+6); const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; return r.date>=fmt(mon)&&r.date<=fmt(sun); })()) &&
    (!filters.search || [r.number,r.description,r.issuer,r.refNumber,...(r.defects||[]).map(d=>d.description)].join(' ').toLowerCase().includes(filters.search.toLowerCase()))
  ).sort((a,b)=>{
    let va=a[sort.key]||'', vb=b[sort.key]||'';
    if(sort.key==='amount'){va=parseFloat(va)||0; vb=parseFloat(vb)||0;}
    return sort.dir==='asc' ? (va>vb?1:-1) : (va<vb?1:-1);
  });

  const toggleSort = k => setSort(s=>({key:k, dir:s.key===k&&s.dir==='asc'?'desc':'asc'}));
  const SortIcon = ({k}) => <span className={`sort-icon${sort.key===k?' active':''}`}>{sort.key===k?(sort.dir==='asc'?'▲':'▼'):'↕'}</span>;

  const openCnt = filtered.filter(r=>r.status==='Open').length;
  const td = today();

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">📋 紀錄管理
            {filters._overdue && <span style={{marginLeft:10,fontSize:13,background:'rgba(239,68,68,.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,.3)',borderRadius:20,padding:'2px 12px',fontWeight:600}}>⚠️ 逾期未結</span>}
            {filters._neardue && <span style={{marginLeft:10,fontSize:13,background:'rgba(245,158,11,.1)',color:'#d97706',border:'1px solid rgba(245,158,11,.3)',borderRadius:20,padding:'2px 12px',fontWeight:600}}>⏰ 即將到期</span>}
            {filters._thisweek && <span style={{marginLeft:10,fontSize:13,background:'rgba(139,92,246,.1)',color:'var(--accent-purple)',border:'1px solid rgba(139,92,246,.3)',borderRadius:20,padding:'2px 12px',fontWeight:600}}>📅 本週新增</span>}
          </div>

        </div>
        <div style={{display:'flex',gap:8}}>

        <div className="filter-group"><span className="filter-label">類型</span>

        }

      {showModal && (

// ─── MAIN APP ─────────────────────────────────────────────────
function App() {
  // ── 連線狀態 ──────────────────────────────────────────────
  const [gasUrl, setGasUrl] = useState(GAS_URL);
  const [connected, setConnected] = useState(false);

  // ── 純雲端資料（不存 localStorage）────────────────────────
  const [records, setRecords] = useState([]);
  const [config, setConfig] = useState({
    itemOptions: DEFAULT_ITEMS,
    areaOptions: DEFAULT_AREAS,
    unitOptions: DEFAULT_UNITS,
    peopleOptions: DEFAULT_PEOPLE,
  });

  // ── UI 狀態 ───────────────────────────────────────────────
  const [tab, setTab] = useState('dashboard');
  const [activeFilter, setActiveFilter] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [saving, setSaving] = useState(false);
  const [syncState, setSyncState] = useState('idle'); // idle | ok | busy | error
  const [lastSync, setLastSync] = useState('');
  const [toasts, setToasts] = useState([]);

  const toast = useCallback((msg, type='success') => {
    const id = genId();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  // ── 雲端載入 ──────────────────────────────────────────────
  const loadFromCloud = useCallback(async (url) => {
    setLoading(true); setLoadingMsg('從雲端載入資料...');
    try {
      const data = await xhrGet((url||gasUrl) + '?action=read');
      // 若雲端是空的（第一次連線），自動匯入歷史資料
      let cloudRecords = data.records || [];
      if (cloudRecords.length === 0 && SEED_RECORDS.length > 0) {
        setLoadingMsg('首次連線，正在匯入歷史資料（65筆）...');
        const seedConfig = {
          itemOptions: data.itemOptions || DEFAULT_ITEMS,
          areaOptions: data.areaOptions || DEFAULT_AREAS,
          unitOptions: data.unitOptions || DEFAULT_UNITS,
        };
        await xhrPost((url||gasUrl), {
          records: SEED_RECORDS,
          ...seedConfig,
        });
        cloudRecords = SEED_RECORDS;
      } else {
        // 舊格式轉換：item+description → defects 陣列
        cloudRecords = cloudRecords.map(r => {
          if (!r.defects || r.defects.length === 0) {
            return { ...r, defects: [{ item: r.item || 1, description: r.description || '' }] };
          }
          return r;
        });
        // 依提交日期自動修正狀態
        cloudRecords = cloudRecords.map(r => ({
          ...r,
          status: (r.submitDate && r.submitDate !== '' && r.submitDate !== '-') ? 'Closed' : 'Open'
        }));
      }
      setRecords(cloudRecords);
      setConfig({
        itemOptions: data.itemOptions || DEFAULT_ITEMS,
        areaOptions: data.areaOptions || DEFAULT_AREAS,
        unitOptions: data.unitOptions || DEFAULT_UNITS,
        peopleOptions: data.peopleOptions || DEFAULT_PEOPLE,
      });
      setLastSync(new Date().toLocaleString('zh-TW'));
      setSyncState('ok');
      setConnected(true);
    } catch(e) {
      setSyncState('error');
      toast('載入失敗：' + e.message, 'error');
      throw e;
    } finally {
      setLoading(false);
    }
  }, [gasUrl, toast]);

  // ── 雲端儲存（整包 JSON 寫入 Sheet A1）────────────────────
  const pushToCloud = useCallback(async (newRecords, newConfig) => {
    const url = gasUrl;
    if (!url) return;
    setSaving(true); setSyncState('busy');
    try {
      const payload = {
        records: newRecords,
        itemOptions: newConfig.itemOptions,
        areaOptions: newConfig.areaOptions,
        unitOptions: newConfig.unitOptions,
        peopleOptions: newConfig.peopleOptions,
      };
      const res = await xhrPost(url, payload);
      if (!res.success) throw new Error(res.error || '儲存失敗');
      setLastSync(new Date().toLocaleString('zh-TW'));
      setSyncState('ok');
    } catch(e) {
      setSyncState('error');
      toast('雲端儲存失敗：' + e.message, 'error');
      throw e;
    } finally { setSaving(false); }
  }, [gasUrl, toast]);

  // ── 初始載入（有 gasUrl 就自動連）────────────────────────
  useEffect(() => {
    if (gasUrl) {
      loadFromCloud(gasUrl).catch(() => {});
    }
  }, []); // 只執行一次

  // ── 連線回調 ──────────────────────────────────────────────
  const handleConnect = async (url) => {
    setGasUrl(url);
    await loadFromCloud(url);
  };

  // ── CRUD ──────────────────────────────────────────────────
  const addRecord = async (form) => {
    const newRecords = [...records, form];
    try {
      await pushToCloud(newRecords, config);
      setRecords(newRecords);
      toast('紀錄已新增並儲存至雲端');
    } catch {}
  };

  const editRecord = async (form) => {
    const newRecords = records.map(r => r.id===form.id ? form : r);
    try {
      await pushToCloud(newRecords, config);
      setRecords(newRecords);
      toast('紀錄已更新');
    } catch {}
  };

  const deleteRecord = async (id) => {
    const target = records.find(r => r.id === id);
    const newRecords = records.filter(r => r.id !== id);
    try {
      // 若有 Drive 資料夾，先叫 GAS 備份後刪除
      if (target && target.driveFolderId) {
        const deleteDate = new Date().toISOString().slice(0,10);
        const archiveName = `Deleted @ ${deleteDate} _ ${target.number}`;
        await xhrPost(gasUrl, {
          action: 'archiveAndDeleteFolder',
          folderId: target.driveFolderId,
          archiveName,
          type: target.type,
        });
      }
      await pushToCloud(newRecords, config);
      setRecords(newRecords);
      toast('紀錄已刪除，Drive 資料夾已封存');
    } catch(e) {
      toast('刪除失敗：' + e.message, 'error');
    }
  };

  const saveConfig = async (newConfig) => {
    try {
      await pushToCloud(records, newConfig);
      setConfig(newConfig);
      toast('設定已儲存至雲端');
    } catch {}
  };

  const handleDisconnect = () => {
    setGasUrl('');
    setConnected(false);
    setRecords([]);
    setSyncState('idle');
  };

  // ── 未連線 → 顯示設定畫面 ─────────────────────────────────
  if (!gasUrl || (!connected && !loading)) {
    return (
      <>
        <SetupScreen onConnect={handleConnect} />
        {loading && (
          <div className="g-loading">
            <div className="g-loading-spinner"></div>
            <div className="g-loading-text">{loadingMsg}</div>
          </div>
        )}
      </>
    );
  }

  const openCnt = records.filter(r=>r.status==='Open').length;

  return (
    <div className="app-shell">
      {/* Global Loading */}
      {loading && (
        <div className="g-loading">
          <div className="g-loading-spinner"></div>
          <div className="g-loading-text">{loadingMsg}</div>
        </div>
      )}

      {/* Topbar */}
      <div className="topbar">
        <div className="topbar-icon">🌊</div>
        <div>
          <div className="topbar-title">{PROJECT.shortName}</div>
          <div className="topbar-sub">EHS Improvement Order System</div>
        </div>
        <div className="topbar-divider"></div>
        <div className="topbar-project">
          <div className="topbar-project-name">{PROJECT.name}</div>
          <div className="topbar-project-client">業主：{PROJECT.client}</div>
        </div>
        <div className="sync-status">
          <div className={`sync-dot ${syncState}`}></div>
          <span className="sync-text">
            {syncState==='ok'?'已同步':syncState==='busy'?'同步中':syncState==='error'?'失敗':'—'}
          </span>
        </div>
      </div>

      {/* Nav */}
      <nav className="nav">
        {[
          {id:'dashboard', label:'📊 儀表板'},
          {id:'records', label:'📋 紀錄管理', badge: openCnt>0 ? openCnt : null},
          {id:'settings', label:'⚙️ 設定'},
        ].map(n=>(
          <button key={n.id} className={`nav-btn${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
            {n.label}
            {n.badge && <span className="nav-badge">{n.badge}</span>}
          </button>
        ))}
      </nav>

      {/* Content */}
      <div className="content">
        {tab==='dashboard' && <DashboardTab records={records} itemOptions={config.itemOptions} onFilterClick={filter=>{ if(filter._newrecord){ setTab('records'); setActiveFilter({_newrecord:true, _ts:Date.now()}); } else { setActiveFilter({...filter, _ts: Date.now()}); setTab('records'); } }} />}
        {tab==='records' && (
          <RecordsTab
            records={records} config={config} saving={saving} gasUrl={gasUrl} connected={connected}
            activeFilter={activeFilter}
            onAdd={addRecord} onEdit={editRecord} onDelete={deleteRecord}
            onRefresh={() => loadFromCloud()}
          />
        )}
        {tab==='settings' && (
          <SettingsTab
            config={config} gasUrl={gasUrl}
            onSaveConfig={saveConfig} onDisconnect={handleDisconnect}
            onRefresh={() => loadFromCloud()} syncState={syncState}
            lastSync={lastSync} saving={saving}
          />
        )}
      </div>

      <ToastContainer toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
