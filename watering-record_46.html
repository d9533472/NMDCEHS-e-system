<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營建工地每日噴灑水作業紀錄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{--bg:#f5f5f0;--card:#fff;--border:#c8c8c0;--text:#2a2a2a;--text-light:#6b6b6b;--accent:#2d5a27;--accent-light:#e8f0e6;--am:#3a6ea5;--pm:#b8651a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app-header{background:var(--accent);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .app-header h1{font-size:17px;font-weight:700;letter-spacing:1px;}
  .tabs{display:flex;gap:3px;margin-left:auto;}
  .tab-btn{padding:7px 18px;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px 6px 0 0;cursor:pointer;transition:background .2s;}
  .tab-btn.active{background:var(--card);color:var(--accent);}
  .meta-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .meta-bar label{font-size:13px;font-weight:500;color:var(--text-light);}
  .meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-family:inherit;font-size:13px;}
  .meta-bar .mg{display:flex;align-items:center;gap:5px;}
  .project-input{width:260px;}
  .start-date-picker{background:var(--accent-light);border:2px solid var(--accent)!important;border-radius:6px;padding:4px 10px;font-size:13px;font-weight:500;color:var(--accent);width:150px;}
  .loc-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;color:#fff;background:var(--am);}
  .tab-panel{display:none;padding:16px 24px;}
  .tab-panel.active{display:block;}
  .record-table{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .record-table th,.record-table td{border:1px solid var(--border);padding:6px 8px;text-align:center;vertical-align:middle;}
  .record-table th{background:#f0f0ea;font-weight:600;font-size:11px;color:var(--text-light);}
  .record-table .day-header{background:var(--accent);color:#fff;font-size:12px;}
  .record-table .am-row td:first-child{background:var(--am);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table .pm-row td:first-child{background:var(--pm);color:#fff;font-weight:600;font-size:11px;width:40px;}
  .record-table input[type="time"]{width:110px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;}
  .record-table input[type="number"]{width:65px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table input[type="text"]{width:70px;border:1px solid #ddd;border-radius:3px;padding:2px 4px;font-size:12px;font-family:inherit;text-align:center;}
  .record-table select{border:1px solid #ddd;border-radius:3px;padding:2px;font-size:11px;font-family:inherit;}
  .method-select{width:100px;}
  .photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px;}
  .photo-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .photo-card .ph-header{background:#f0f0ea;padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-light);display:flex;justify-content:space-between;align-items:center;}
  .photo-card .ph-body{padding:10px;min-height:140px;display:flex;align-items:center;justify-content:center;position:relative;}
  .photo-card .ph-body img{max-width:100%;max-height:180px;border-radius:4px;object-fit:contain;}
  .photo-card .ph-body .placeholder{color:#bbb;font-size:12px;text-align:center;cursor:pointer;}
  .photo-card input[type="file"]{display:none;}
  .photo-card .ph-desc{padding:4px 10px 8px;font-size:11px;}
  .photo-card .ph-desc input{width:100%;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:11px;font-family:inherit;}
  .photo-card .remove-photo{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}
  .photo-card:hover .remove-photo{display:flex;}
  .sig-section{margin-top:16px;background:var(--card);border-radius:8px;padding:14px;border:1px solid var(--border);}
  .sig-section h3{font-size:13px;margin-bottom:8px;color:var(--text-light);}
  .sig-row{display:flex;gap:24px;flex-wrap:wrap;}
  .sig-item{flex:1;min-width:200px;}
  .sig-item label{font-size:12px;color:var(--text-light);display:block;margin-bottom:4px;}
  .sig-item input{width:100%;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:inherit;font-size:13px;}
  .sig-upload-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .sig-preview{max-width:120px;max-height:50px;border:1px solid var(--border);border-radius:4px;object-fit:contain;background:#fafafa;}
  .sig-upload-btn{font-size:11px!important;padding:4px 10px!important;}
  .sig-remove-btn{font-size:11px!important;padding:3px 8px!important;}
  .btn{padding:8px 18px;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-sm{padding:6px 14px;font-size:12px;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1e4a1a;}
  .btn-save{background:var(--am);color:#fff;}.btn-save:hover{background:#2d5d8f;}
  .btn-pdf{background:var(--pm);color:#fff;}.btn-pdf:hover{background:#9e5515;}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}.btn-outline:hover{background:#f0f0ea;}
  .btn-danger{background:#c53030;color:#fff;}.btn-danger:hover{background:#a02020;}
  .btn-new{background:var(--am);color:#fff;}
  .btn-cloud{background:#1a73e8;color:#fff;}.btn-cloud:hover{background:#1557b0;}
  .btn-dice{background:#f0ad4e;color:#fff;border-radius:8px;font-size:13px;padding:6px 14px;display:inline-flex;align-items:center;gap:5px;}.btn-dice:hover{background:#ec971f;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .actions{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--card);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:10;}
  .hidden{display:none!important;}
  .list-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .list-toolbar input,.list-toolbar select{border:1px solid var(--border);border-radius:4px;padding:5px 10px;font-size:13px;font-family:inherit;}
  .rec-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:box-shadow .2s;}
  .rec-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
  .rec-card .rc-check{width:18px;height:18px;cursor:pointer;}
  .rec-card .rc-info{flex:1;}
  .rec-card .rc-info .rc-title{font-weight:600;font-size:14px;}
  .rec-card .rc-info .rc-sub{font-size:12px;color:var(--text-light);margin-top:2px;}
  .rec-card .rc-actions{display:flex;gap:6px;}
  .empty-list{text-align:center;padding:40px;color:var(--text-light);font-size:14px;}
  .pg-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
  .pg-btn:hover{background:var(--accent-light);}.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}.pg-btn:disabled{opacity:.4;cursor:default;}
  .pg-info{font-size:12px;color:var(--text-light);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}.toast.err{background:#c53030;}
  .newrec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .newrec-overlay.open{display:flex;}
  .newrec-box{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;}
  .newrec-box h3{margin-bottom:14px;font-size:16px;}
  .newrec-box label{font-size:13px;color:var(--text-light);display:block;margin:10px 0 4px;}
  .newrec-box select,.newrec-box input{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:14px;}
  .newrec-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
  .dup-warn{margin-top:10px;padding:8px;border-radius:6px;background:#fff3cd;color:#856404;font-size:12px;display:none;}.dup-warn.show{display:block;}
  .dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
  .dialog-overlay.open{display:flex;}
  .dialog-box{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;text-align:center;}
  .dialog-box h3{margin-bottom:8px;}.dialog-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;}.dialog-box .btn{margin:4px;}
  #previewModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;overflow-y:auto;padding:20px;}
  #previewModal.open{display:block;}
  .preview-inner{max-width:1100px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;}
  .preview-toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--accent);color:#fff;}.preview-toolbar h3{flex:1;font-size:15px;}
  .preview-body{padding:20px;overflow-x:auto;}
  #pdfOverlay{position:fixed;top:0;left:0;width:1200px;min-height:100vh;overflow:visible;z-index:-9999;opacity:0;pointer-events:none;background:#fff;}
  #pdfContent{width:287mm;margin:0 auto;}
  .pdf-page{width:100%;min-height:190mm;padding:8mm 12mm;font-family:'Noto Sans TC',sans-serif;background:#fff;page-break-inside:avoid;box-sizing:border-box;}
  .pdf-page+.pdf-page{page-break-before:always;}
  .pdf-page h2{text-align:center;font-size:20px;margin-bottom:8px;}
  .pdf-page .sub-info{text-align:center;font-size:13px;color:#555;margin-bottom:10px;}
  .pdf-page table{width:100%;border-collapse:collapse;font-size:13px;}
  .pdf-page th,.pdf-page td{border:1px solid #333;padding:8px 6px;text-align:center;}
  .pdf-page th{background:#e8e8e8;font-weight:600;}
  .pdf-page .sig-line{margin-top:14px;display:flex;justify-content:space-around;font-size:13px;align-items:flex-end;}
  .pdf-page .sig-line .sig-block{display:inline-flex;flex-direction:column;align-items:center;min-width:180px;}
  .pdf-page .sig-line .sig-block img{max-width:120px;max-height:50px;object-fit:contain;margin-bottom:2px;}
  .pdf-page .sig-line .sig-block .sig-space{width:140px;height:50px;}
  .pdf-page .sig-line .sig-block .sig-label{border-top:1px solid #333;padding-top:3px;min-width:140px;text-align:center;}
  .pdf-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
  .pdf-photo-cell{border:1px solid #ccc;border-radius:4px;overflow:hidden;}
  .pdf-photo-cell .ppc-header{background:#eee;padding:4px 8px;font-size:13px;font-weight:600;}
  .pdf-photo-cell .ppc-body{padding:8px;display:flex;align-items:center;justify-content:center;min-height:160px;}
  .pdf-photo-cell .ppc-body img{max-width:100%;max-height:200px;object-fit:contain;}
  .pdf-photo-cell .ppc-desc{padding:3px 8px 6px;font-size:11px;color:#555;}
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
  .loading-overlay.open{display:flex;}
  .loading-overlay .spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  .loading-overlay .load-msg{font-size:14px;color:var(--text);font-weight:500;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:768px){
    .app-header{padding:10px 14px;}.app-header h1{font-size:14px;}.tab-btn{padding:6px 12px;font-size:12px;}
    .meta-bar{padding:10px 14px;}.tab-panel{padding:12px 14px;}
    .photo-grid{grid-template-columns:repeat(2,1fr);}.actions{padding:10px 14px;}.record-table{font-size:11px;}
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>💧 營建工地每日噴灑水作業紀錄</h1>
  <div class="tabs">
    <button class="tab-btn" onclick="switchTab(0)">📝 灑水紀錄</button>
    <button class="tab-btn" onclick="switchTab(1)">📷 照片紀錄</button>
    <button class="tab-btn active" onclick="switchTab(2)">📋 已儲存紀錄</button>
  </div>
</div>

<div class="meta-bar" id="metaBar" style="display:none;">
  <div class="mg"><label>工程名稱</label><input type="text" id="projectName" class="project-input"></div>
  <div class="mg"><label>地點</label><span class="loc-badge" id="locBadge">—</span></div>
  <div class="mg"><label>起始日期</label><input type="date" id="startDate" class="start-date-picker" onchange="onStartDateChange()" disabled></div>
  <div class="mg"><label>～ 結束</label><span id="endDateLabel" style="font-size:13px;font-weight:500;">—</span></div>
</div>

<div class="tab-panel" id="tab0">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
    <button class="btn btn-dice" onclick="randomizeTimes()">🎲 隨機產生時間</button>
    <span style="font-size:11px;color:var(--text-light);">上午 08:00~10:50 ／ 下午 13:00~15:40，間隔 10 分鐘</span>
  </div>
  <div id="recordTableWrap"></div>
  <div class="sig-section">
    <h3>簽核欄</h3>
    <div class="sig-row">
      <div class="sig-item"><label>現場環保工程師</label><input type="text" id="sig_engineer" oninput="syncSig()">
        <div class="sig-upload-row"><img id="sigImg_engineer" class="sig-preview" style="display:none;"><button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile_engineer').click()">上傳簽名檔</button><button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm_engineer" onclick="removeSigImg('engineer')" style="display:none;">✕</button><input type="file" id="sigFile_engineer" accept="image/*" style="display:none" onchange="onSigImgSelect('engineer',event)"></div>
      </div>
      <div class="sig-item"><label>環境保護負責人</label><input type="text" id="sig_manager" oninput="syncSig()">
        <div class="sig-upload-row"><img id="sigImg_manager" class="sig-preview" style="display:none;"><button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile_manager').click()">上傳簽名檔</button><button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm_manager" onclick="removeSigImg('manager')" style="display:none;">✕</button><input type="file" id="sigFile_manager" accept="image/*" style="display:none" onchange="onSigImgSelect('manager',event)"></div>
      </div>
    </div>
  </div>
</div>

<div class="tab-panel" id="tab1">
  <h3 style="font-size:14px;margin-bottom:4px;">📷 照片紀錄 — <span id="photoLocLabel">—</span></h3>
  <p style="font-size:12px;color:var(--text-light);margin-bottom:10px;">點擊卡片上傳照片，5天各一張 + 第6格自訂</p>
  <div class="photo-grid" id="photoGrid"></div>
  <div class="sig-section" style="margin-top:14px;">
    <h3>簽核欄（與紀錄表同步）</h3>
    <div class="sig-row">
      <div class="sig-item"><label>現場環保工程師</label><input type="text" id="sig2_engineer" oninput="syncSig2()">
        <div class="sig-upload-row"><img id="sigImg2_engineer" class="sig-preview" style="display:none;"><button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile2_engineer').click()">上傳簽名檔</button><button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm2_engineer" onclick="removeSigImg2('engineer')" style="display:none;">✕</button><input type="file" id="sigFile2_engineer" accept="image/*" style="display:none" onchange="onSigImgSelect2('engineer',event)"></div>
      </div>
      <div class="sig-item"><label>環境保護負責人</label><input type="text" id="sig2_manager" oninput="syncSig2()">
        <div class="sig-upload-row"><img id="sigImg2_manager" class="sig-preview" style="display:none;"><button class="btn btn-outline btn-sm sig-upload-btn" onclick="document.getElementById('sigFile2_manager').click()">上傳簽名檔</button><button class="btn btn-danger btn-sm sig-remove-btn" id="sigRm2_manager" onclick="removeSigImg2('manager')" style="display:none;">✕</button><input type="file" id="sigFile2_manager" accept="image/*" style="display:none" onchange="onSigImgSelect2('manager',event)"></div>
      </div>
    </div>
  </div>
</div>

<div class="tab-panel active" id="tab2">
  <div class="list-toolbar">
    <button class="btn btn-new" onclick="openNewRecDialog()">➕ 新增紀錄</button>
    <button class="btn btn-outline btn-sm" onclick="refreshIndex()">🔄 重新整理</button>
    <select id="filterLoc" onchange="renderList(true)"><option value="">全部地點</option><option value="台中">台中</option><option value="通霄">通霄</option></select>
    <input type="month" id="filterFrom" onchange="renderList(true)" title="起始月份">
    <span style="font-size:13px;color:var(--text-light);">～</span>
    <input type="month" id="filterTo" onchange="renderList(true)" title="結束月份">
    <select id="sortBy" onchange="renderList(true)">
      <option value="startDate_desc">起始日期（新→舊）</option>
      <option value="startDate_asc">起始日期（舊→新）</option>
      <option value="loc">地點</option>
    </select>
  </div>
  <div id="recordsList"></div>
  <div id="paginationBar" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap;"></div>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <button class="btn btn-danger btn-sm" onclick="deleteSelected()">🗑️ 刪除勾選</button>
    <button class="btn btn-pdf btn-sm" onclick="exportSelectedPDF()">📄 匯出勾選 PDF</button>
    <div style="flex:1;"></div>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📤 匯入舊資料 JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>
</div>

<div class="actions hidden" id="actionBar">
  <button class="btn btn-new btn-sm" onclick="openNewRecDialog()">➕ 新增紀錄</button>
  <button class="btn btn-danger btn-sm" onclick="clearForm()">清除表單</button>
  <div style="flex:1;"></div>
  <button class="btn btn-save" id="btnSave" onclick="saveRecord()">💾 儲存紀錄</button>
  <button class="btn btn-outline" onclick="openPreview()" style="border-color:var(--pm);color:var(--pm);">👁️ 預覽</button>
  <button class="btn btn-pdf" onclick="exportPDF()" id="btnPdf">匯出 PDF</button>
</div>

<div class="toast" id="toast"></div>

<div class="newrec-overlay" id="newrecDialog">
  <div class="newrec-box">
    <h3>➕ 新增紀錄</h3>
    <label>地點</label>
    <select id="newrecLoc"><option value="台中">台中</option><option value="通霄">通霄</option><option value="__other">其他（自填）</option></select>
    <input type="text" id="newrecLocCustom" placeholder="輸入地點名稱" style="display:none;margin-top:6px;">
    <label>起始日期（自動跳至週一）</label>
    <input type="date" id="newrecDate" onchange="onNewrecDateChange()">
    <div class="dup-warn" id="newrecDupWarn"></div>
    <div class="newrec-actions">
      <button class="btn btn-outline btn-sm" id="newrecLoadBtn" onclick="newrecLoadExisting()" style="display:none;">帶入既有資料</button>
      <button class="btn btn-primary" onclick="newrecConfirm()">建立空白紀錄</button>
      <button class="btn btn-outline btn-sm" onclick="closeNewrecDialog()">取消</button>
    </div>
  </div>
</div>

<div class="dialog-overlay" id="postSaveDialog">
  <div class="dialog-box">
    <h3 id="postSaveTitle">✅ 儲存成功</h3>
    <p id="postSaveMsg"></p>
    <button class="btn btn-pdf" onclick="postSaveExportPdf()">匯出 PDF</button>
    <button class="btn btn-save" onclick="postSaveNewRecord()">➕ 新增紀錄</button>
    <button class="btn btn-outline btn-sm" onclick="closePostSave()" style="margin-top:10px;display:block;margin-left:auto;margin-right:auto;">關閉</button>
  </div>
</div>

<div id="pdfOverlay"><div id="pdfContent"></div></div>
<div id="previewModal">
  <div class="preview-inner">
    <div class="preview-toolbar"><h3>📄 預覽紀錄</h3><button class="btn btn-pdf btn-sm" onclick="exportPdfFromPreview()">匯出 PDF</button><button class="btn btn-outline btn-sm" style="border-color:rgba(255,255,255,.5);color:#fff;" onclick="closePreview()">✕ 關閉</button></div>
    <div class="preview-body" id="previewBody"></div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="load-msg" id="loadMsg">載入中...</div>
</div>

<script>
/* ===== Config ===== */
const DAYS=5, PHOTOS=6;
const DEFAULT_PROJECT='通霄電廠第二期更新改建計畫－海底輸氣管線統包工程';
const METHODS=['人工灑水','灑水車','灑水器自動噴灑','其他'];
const DM=1;
const PAGE_SIZE=20;
const API_URL='https://script.google.com/macros/s/AKfycbwXhNnRZWVQcu_y8kJ_tMlbEZbOmDi-M8lLiR4XN8SZDZtPd2q9LHrbt3hy1XmAOSCRVw/exec';

/* ===== State（純記憶體，不用 localStorage）===== */
let cloudIndex={};    // 雲端索引（輕量 metadata）
let currentPage=1;
let currentEditKey=null;
let isEditing=false;
let fieldSource={water:null,len:null,person:null};

/* ===== Utility ===== */
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'')+' show';setTimeout(()=>t.className='toast',3500);}
function $(id){return document.getElementById(id);}
function showLoading(msg){$('loadMsg').textContent=msg||'載入中...';$('loadingOverlay').classList.add('open');}
function hideLoading(){$('loadingOverlay').classList.remove('open');}
function getMonday(dateStr){const d=new Date(dateStr);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d.toISOString().slice(0,10);}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return `${d.getMonth()+1}/${d.getDate()}`;}
function weekday(s){return['日','一','二','三','四','五','六'][new Date(s).getDay()];}
function recKey(loc,sd){return `${loc}_${sd}`;}

/* ===== API Layer（XHR + 自動重試）===== */
function apiGet(params,retries){
  retries=retries||0;const maxR=3;
  const url=API_URL+(params?'?'+params:'');
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',url,true);
    xhr.timeout=30000;
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        try{resolve(JSON.parse(xhr.responseText));}
        catch(e){if(retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),1500*(retries+1));}else{reject(new Error('回應格式錯誤'));}}
      }else if(xhr.status===429&&retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('HTTP '+xhr.status));}
    };
    xhr.onerror=xhr.ontimeout=function(){
      if(retries<maxR){setTimeout(()=>apiGet(params,retries+1).then(resolve).catch(reject),2000*(retries+1));}
      else{reject(new Error('網路錯誤，請檢查連線'));}
    };
    xhr.send();
  });
}
function apiPost(body,retries){
  retries=retries||0;const maxR=3;
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST',API_URL,true);
    xhr.setRequestHeader('Content-Type','text/plain;charset=utf-8');
    xhr.timeout=90000;
    xhr.onload=function(){
      if(xhr.status>=200&&xhr.status<300){
        try{resolve(JSON.parse(xhr.responseText));}
        catch(e){if(retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),2000*(retries+1));}else{reject(new Error('回應格式錯誤'));}}
      }else if(xhr.status===429&&retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('HTTP '+xhr.status));}
    };
    xhr.onerror=xhr.ontimeout=function(){
      if(retries<maxR){setTimeout(()=>apiPost(body,retries+1).then(resolve).catch(reject),3000*(retries+1));}
      else{reject(new Error('網路錯誤，請檢查連線'));}
    };
    xhr.send(JSON.stringify(body));
  });
}

/* ===== Tab ===== */
function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  $('metaBar').style.display=(idx===0||idx===1)?'flex':'none';
  $('actionBar').classList.toggle('hidden',idx>1);
  if(idx===2)renderList();
}

/* ===== Build UI ===== */
function buildRecordTable(){
  let h='<table class="record-table"><thead><tr><th colspan="2">日期/時段</th><th>灑水開始時間</th><th>灑水結束時間</th><th>灑水方式</th><th>累計用水量(m³)</th><th>灑水面積(m²)</th><th>操作人員</th></tr></thead><tbody>';
  for(let d=0;d<DAYS;d++){
    const ra=`d${d}_am`,rp=`d${d}_pm`;
    h+=`<tr class="day-header"><td colspan="8" id="dayLabel_${d}">第 ${d+1} 天</td></tr>`;
    for(const [p,rid] of [['am',ra],['pm',rp]]){
      const cls=p==='am'?'am-row':'pm-row';const label=p==='am'?'上午':'下午';
      h+=`<tr class="${cls}"><td>${label}</td><td style="width:70px;" id="dayDate_${d}_${p}"></td>`;
      h+=`<td><input type="time" id="${rid}_start"></td><td><input type="time" id="${rid}_end"></td>`;
      h+=`<td><select class="method-select" id="${rid}_method">${METHODS.map((m,i)=>`<option value="${i}"${i===DM?' selected':''}>${m}</option>`).join('')}</select></td>`;
      h+=`<td><input type="number" id="${rid}_water" step="0.1" min="0" oninput="onFieldChange('${rid}_water','water')"></td>`;
      h+=`<td><input type="number" id="${rid}_len" step="0.1" min="0" oninput="onFieldChange('${rid}_len','len')"></td>`;
      h+=`<td><input type="text" id="${rid}_person" oninput="onFieldChange('${rid}_person','person')"></td></tr>`;
    }
  }
  h+='</tbody></table>';$('recordTableWrap').innerHTML=h;
}
function buildPhotoGrid(){
  let h='';for(let i=0;i<PHOTOS;i++){
    h+=`<div class="photo-card" id="pc_${i}"><div class="ph-header"><span id="pcLabel_${i}">${i<5?'第 '+(i+1)+' 天':'自訂'}</span><span style="font-size:11px;" id="pcDate_${i}"></span></div><div class="ph-body" onclick="document.getElementById('photoInput_${i}').click()"><button class="remove-photo" onclick="event.stopPropagation();removePhoto(${i})">×</button><div class="placeholder" id="phPlaceholder_${i}">點擊上傳照片</div><img id="phImg_${i}" style="display:none;"></div><div class="ph-desc"><input type="text" id="phDesc_${i}" placeholder="照片說明（選填）"></div><input type="file" id="photoInput_${i}" accept="image/*" onchange="onPhotoSelect(${i},event)"></div>`;
  }$('photoGrid').innerHTML=h;
}

/* ===== Photo ===== */
function onPhotoSelect(idx,e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{compressImage(ev.target.result,800,0.7,c=>{$(`phImg_${idx}`).src=c;$(`phImg_${idx}`).style.display='block';$(`phPlaceholder_${idx}`).style.display='none';});};r.readAsDataURL(file);}
function removePhoto(idx){$(`phImg_${idx}`).src='';$(`phImg_${idx}`).style.display='none';$(`phPlaceholder_${idx}`).style.display='block';$(`photoInput_${idx}`).value='';}
function compressImage(u,maxW,q,cb){const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',q));};img.src=u;}

/* ===== Sig ===== */
function syncSig(){$('sig2_engineer').value=$('sig_engineer').value;$('sig2_manager').value=$('sig_manager').value;for(const r of['engineer','manager']){$(`sigImg2_${r}`).src=$(`sigImg_${r}`).src;$(`sigImg2_${r}`).style.display=$(`sigImg_${r}`).style.display;$(`sigRm2_${r}`).style.display=$(`sigImg_${r}`).style.display==='none'?'none':'inline-block';}}
function syncSig2(){$('sig_engineer').value=$('sig2_engineer').value;$('sig_manager').value=$('sig2_manager').value;for(const r of['engineer','manager']){$(`sigImg_${r}`).src=$(`sigImg2_${r}`).src;$(`sigImg_${r}`).style.display=$(`sigImg2_${r}`).style.display;$(`sigRm_${r}`).style.display=$(`sigImg2_${r}`).style.display==='none'?'none':'inline-block';}}
function onSigImgSelect(role,e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{compressImage(ev.target.result,400,0.8,c=>{$(`sigImg_${role}`).src=c;$(`sigImg_${role}`).style.display='block';$(`sigRm_${role}`).style.display='inline-block';syncSig();});};r.readAsDataURL(f);}
function removeSigImg(role){$(`sigImg_${role}`).src='';$(`sigImg_${role}`).style.display='none';$(`sigRm_${role}`).style.display='none';$(`sigFile_${role}`).value='';syncSig();}
function onSigImgSelect2(role,e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{compressImage(ev.target.result,400,0.8,c=>{$(`sigImg2_${role}`).src=c;$(`sigImg2_${role}`).style.display='block';$(`sigRm2_${role}`).style.display='inline-block';syncSig2();});};r.readAsDataURL(f);}
function removeSigImg2(role){$(`sigImg2_${role}`).src='';$(`sigImg2_${role}`).style.display='none';$(`sigRm2_${role}`).style.display='none';$(`sigFile2_${role}`).value='';syncSig2();}

/* ===== Field auto-sync ===== */
function onFieldChange(srcId,field){const val=$(srcId).value;if(!fieldSource[field])fieldSource[field]=srcId;if(fieldSource[field]!==srcId)return;for(let d=0;d<DAYS;d++){for(const p of['am','pm']){const tid=`d${d}_${p}_${field}`;if(tid===srcId)continue;const el=$(tid);if(!el)continue;if(!el.dataset.manual||el.dataset.manual==='false'){el.value=val;el.dataset.autoFilled='true';}}}}
document.addEventListener('focus',e=>{if(e.target.matches&&(e.target.matches('input[type="number"]')||e.target.matches('input[type="text"]'))){e.target.addEventListener('input',ev=>{if(ev.target.dataset.autoFilled==='true'){ev.target.dataset.manual='true';ev.target.dataset.autoFilled='false';}},{once:true});}},true);

/* ===== Date ===== */
function onStartDateChange(){const sd=$('startDate').value;if(!sd)return;const m=getMonday(sd);$('startDate').value=m;$('endDateLabel').textContent=addDays(m,4);for(let d=0;d<DAYS;d++){const dt=addDays(m,d);const lbl=`${fmtDate(dt)}（${weekday(dt)}）`;$(`dayLabel_${d}`).textContent=lbl;$(`dayDate_${d}_am`).textContent=fmtDate(dt);$(`dayDate_${d}_pm`).textContent='';if(d<5){$(`pcDate_${d}`).textContent=lbl;}}$('photoLocLabel').textContent=$('locBadge').textContent;}
function randomizeTimes(){for(let d=0;d<DAYS;d++){const ah=8+Math.floor(Math.random()*3),am=Math.floor(Math.random()*6)*10;let aem=am+10,aeh=ah;if(aem>=60){aem-=60;aeh++;}$(`d${d}_am_start`).value=`${String(ah).padStart(2,'0')}:${String(am).padStart(2,'0')}`;$(`d${d}_am_end`).value=`${String(aeh).padStart(2,'0')}:${String(aem).padStart(2,'0')}`;const ph=13+Math.floor(Math.random()*3),pm=Math.floor(Math.random()*5)*10;let pem=pm+10,peh=ph;if(pem>=60){pem-=60;peh++;}$(`d${d}_pm_start`).value=`${String(ph).padStart(2,'0')}:${String(pm).padStart(2,'0')}`;$(`d${d}_pm_end`).value=`${String(peh).padStart(2,'0')}:${String(pem).padStart(2,'0')}`;}}

/* ===== Collect / Load ===== */
function collectData(){
  const data={project:$('projectName').value,location:$('locBadge').textContent,startDate:$('startDate').value,endDate:$('endDateLabel').textContent,
    sig:{engineer:$('sig_engineer').value,engineerImg:$('sigImg_engineer').style.display!=='none'?$('sigImg_engineer').src:'',manager:$('sig_manager').value,managerImg:$('sigImg_manager').style.display!=='none'?$('sigImg_manager').src:''},
    days:[],photos:[]};
  for(let d=0;d<DAYS;d++){const day={date:addDays(data.startDate,d),am:{},pm:{}};for(const p of['am','pm']){day[p]={start:$(`d${d}_${p}_start`).value,end:$(`d${d}_${p}_end`).value,method:$(`d${d}_${p}_method`).value,water:$(`d${d}_${p}_water`).value,len:$(`d${d}_${p}_len`).value,person:$(`d${d}_${p}_person`).value};}data.days.push(day);}
  for(let i=0;i<PHOTOS;i++){const img=$(`phImg_${i}`);data.photos.push({src:img.style.display!=='none'?img.src:'',desc:$(`phDesc_${i}`).value});}
  data.savedAt=new Date().toISOString();return data;
}
function loadData(data){
  $('projectName').value=data.project||DEFAULT_PROJECT;$('locBadge').textContent=data.location||'—';$('startDate').value=data.startDate||'';onStartDateChange();
  if(data.sig){$('sig_engineer').value=data.sig.engineer||'';$('sig_manager').value=data.sig.manager||'';if(data.sig.engineerImg){$('sigImg_engineer').src=data.sig.engineerImg;$('sigImg_engineer').style.display='block';$('sigRm_engineer').style.display='inline-block';}if(data.sig.managerImg){$('sigImg_manager').src=data.sig.managerImg;$('sigImg_manager').style.display='block';$('sigRm_manager').style.display='inline-block';}syncSig();}
  if(data.days){data.days.forEach((day,d)=>{if(d>=DAYS)return;for(const p of['am','pm']){if(!day[p])return;$(`d${d}_${p}_start`).value=day[p].start||'';$(`d${d}_${p}_end`).value=day[p].end||'';$(`d${d}_${p}_method`).value=day[p].method??DM;$(`d${d}_${p}_water`).value=day[p].water||'';$(`d${d}_${p}_len`).value=day[p].len||'';$(`d${d}_${p}_person`).value=day[p].person||'';}});}
  if(data.photos){data.photos.forEach((ph,i)=>{if(i>=PHOTOS)return;if(ph.src){$(`phImg_${i}`).src=ph.src;$(`phImg_${i}`).style.display='block';$(`phPlaceholder_${i}`).style.display='none';}$(`phDesc_${i}`).value=ph.desc||'';});}
  $('photoLocLabel').textContent=data.location||'—';
}

/* ===== Save（cloud-first，等驗證通過才算成功）===== */
async function saveRecord(){
  const data=collectData();
  if(!data.startDate||!data.location||data.location==='—'){toast('請先選擇地點和日期',true);return;}
  const key=recKey(data.location,data.startDate);
  const btn=$('btnSave');btn.disabled=true;btn.textContent='⏳ 上傳驗證中...';
  try{
    const result=await apiPost({action:'save',key:key,data:data});
    if(!result.success)throw new Error(result.error||'儲存失敗');
    // 更新記憶體索引
    cloudIndex[key]={location:data.location,startDate:data.startDate,endDate:data.endDate,project:data.project,savedAt:data.savedAt,fileId:result.fileId||''};
    currentEditKey=key;
    $('postSaveTitle').textContent='✅ 儲存成功';
    $('postSaveMsg').innerHTML=`${data.location} ${data.startDate} ～ ${data.endDate}<br><span style="color:#2d5a27;">✅ 已同步到雲端（驗證通過）</span>`;
    $('postSaveDialog').classList.add('open');
    toast('✅ 儲存完成，雲端驗證通過');
  }catch(err){
    $('postSaveTitle').textContent='⚠️ 儲存失敗';
    $('postSaveMsg').innerHTML=`<span style="color:#c53030;">❌ ${err.message}</span><br>請檢查網路後重試`;
    $('postSaveDialog').classList.add('open');
    toast('❌ 雲端儲存失敗：'+err.message,true);
  }finally{
    btn.disabled=false;btn.textContent='💾 儲存紀錄';
  }
}
function postSaveExportPdf(){closePostSave();exportPDF();}
function postSaveNewRecord(){closePostSave();isEditing=false;openNewRecDialog();}
function closePostSave(){$('postSaveDialog').classList.remove('open');}

/* ===== Clear ===== */
function clearForm(){if(isEditing&&!confirm('目前正在編輯，確定清除？'))return;clearFormSilent();toast('表單已清除');}
function clearFormSilent(){
  for(let d=0;d<DAYS;d++){for(const p of['am','pm']){$(`d${d}_${p}_start`).value='';$(`d${d}_${p}_end`).value='';$(`d${d}_${p}_method`).value=DM;$(`d${d}_${p}_water`).value='';$(`d${d}_${p}_len`).value='';$(`d${d}_${p}_person`).value='';const w=$(`d${d}_${p}_water`),l=$(`d${d}_${p}_len`),pe=$(`d${d}_${p}_person`);[w,l,pe].forEach(el=>{if(el){el.dataset.manual='false';el.dataset.autoFilled='false';}});}}
  for(let i=0;i<PHOTOS;i++)removePhoto(i);
  $('sig_engineer').value='';$('sig_manager').value='';for(const r of['engineer','manager'])removeSigImg(r);syncSig();
  fieldSource={water:null,len:null,person:null};currentEditKey=null;isEditing=false;
}

/* ===== New Record ===== */
function openNewRecDialog(){
  if(isEditing&&!confirm('目前正在編輯，確定要新增？'))return;
  $('newrecLoc').value='通霄';$('newrecLocCustom').style.display='none';
  $('newrecDate').value=getMonday(new Date().toISOString().slice(0,10));
  $('newrecDupWarn').classList.remove('show');$('newrecLoadBtn').style.display='none';
  $('newrecDialog').classList.add('open');onNewrecDateChange();
}
$('newrecLoc').addEventListener('change',function(){$('newrecLocCustom').style.display=this.value==='__other'?'block':'none';onNewrecDateChange();});
function getNewrecLoc(){const v=$('newrecLoc').value;return v==='__other'?($('newrecLocCustom').value.trim()||'未命名'):v;}
function onNewrecDateChange(){const sd=$('newrecDate').value;if(!sd)return;$('newrecDate').value=getMonday(sd);const loc=getNewrecLoc();const key=recKey(loc,$('newrecDate').value);if(cloudIndex[key]){$('newrecDupWarn').textContent=`⚠️ 已有「${loc} ${$('newrecDate').value}」的紀錄`;$('newrecDupWarn').classList.add('show');$('newrecLoadBtn').style.display='inline-block';}else{$('newrecDupWarn').classList.remove('show');$('newrecLoadBtn').style.display='none';}}
async function newrecLoadExisting(){const key=recKey(getNewrecLoc(),$('newrecDate').value);closeNewrecDialog();await editRecord(key);}
function newrecConfirm(){const loc=getNewrecLoc();if(!loc){toast('請輸入地點',true);return;}const sd=$('newrecDate').value;if(!sd){toast('請選擇日期',true);return;}clearFormSilent();$('locBadge').textContent=loc;$('startDate').value=sd;$('projectName').value=DEFAULT_PROJECT;onStartDateChange();randomizeTimes();currentEditKey=recKey(loc,sd);isEditing=true;closeNewrecDialog();switchTab(0);toast(`新紀錄：${loc} ${sd}`);}
function closeNewrecDialog(){$('newrecDialog').classList.remove('open');}

/* ===== Records List（從記憶體 cloudIndex 渲染）===== */
function renderList(resetPage){
  if(resetPage)currentPage=1;
  let entries=Object.entries(cloudIndex);
  const fLoc=$('filterLoc').value,fFrom=$('filterFrom').value,fTo=$('filterTo').value;
  if(fLoc)entries=entries.filter(([,v])=>v.location===fLoc);
  if(fFrom)entries=entries.filter(([,v])=>v.startDate>=fFrom);
  if(fTo)entries=entries.filter(([,v])=>v.startDate<=(fTo+'-31'));
  const sort=$('sortBy').value;
  if(sort==='startDate_desc')entries.sort((a,b)=>b[1].startDate.localeCompare(a[1].startDate));
  else if(sort==='startDate_asc')entries.sort((a,b)=>a[1].startDate.localeCompare(b[1].startDate));
  else if(sort==='loc')entries.sort((a,b)=>(a[1].location||'').localeCompare(b[1].location||''));
  const total=entries.length,totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>totalPages)currentPage=totalPages;
  if(!total){$('recordsList').innerHTML='<div class="empty-list">📭 尚無紀錄（請確認網路連線）</div>';$('paginationBar').innerHTML='';return;}
  const start=(currentPage-1)*PAGE_SIZE;
  let h='';entries.slice(start,start+PAGE_SIZE).forEach(([key,meta])=>{
    const saved=meta.savedAt?new Date(meta.savedAt).toLocaleString('zh-TW'):'';
    h+=`<div class="rec-card"><input type="checkbox" class="rc-check" data-key="${key}"><div class="rc-info"><div class="rc-title">${meta.location||'—'} ｜ ${meta.startDate} ～ ${meta.endDate||''}</div><div class="rc-sub">${meta.project||''} ・ ${saved}</div></div><div class="rc-actions"><button class="btn btn-outline btn-sm" onclick="editRecord('${key}')">☁️ 載入編輯</button></div></div>`;
  });
  $('recordsList').innerHTML=h;
  // 分頁
  if(totalPages<=1){$('paginationBar').innerHTML=`<span class="pg-info">共 ${total} 筆</span>`;return;}
  let pg=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>◀</button>`;
  let ps=Math.max(1,currentPage-3),pe=Math.min(totalPages,ps+6);if(pe-ps<6)ps=Math.max(1,pe-6);
  if(ps>1)pg+=`<button class="pg-btn" onclick="goPage(1)">1</button>`;if(ps>2)pg+=`<span class="pg-info">...</span>`;
  for(let p=ps;p<=pe;p++)pg+=`<button class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  if(pe<totalPages-1)pg+=`<span class="pg-info">...</span>`;if(pe<totalPages)pg+=`<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  pg+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>▶</button>`;
  pg+=`<span class="pg-info" style="margin-left:8px;">第 ${currentPage}/${totalPages} 頁・共 ${total} 筆</span>`;
  $('paginationBar').innerHTML=pg;
}
function goPage(p){const tp=Math.max(1,Math.ceil(Object.keys(cloudIndex).length/PAGE_SIZE));if(p<1||p>tp)return;currentPage=p;renderList();$('recordsList').scrollIntoView({behavior:'smooth',block:'start'});}

/* ===== Edit（每次從雲端拉完整資料）===== */
async function editRecord(key){
  showLoading('☁️ 載入紀錄中...');
  try{
    const result=await apiGet('action=get&key='+encodeURIComponent(key));
    if(!result.success||!result.data)throw new Error(result.error||'找不到紀錄');
    clearFormSilent();loadData(result.data);
    currentEditKey=key;isEditing=true;
    switchTab(0);toast('✅ 已從雲端載入');
  }catch(err){
    toast('❌ 載入失敗：'+err.message,true);
  }finally{hideLoading();}
}

/* ===== Delete ===== */
async function deleteSelected(){
  const checks=document.querySelectorAll('.rc-check:checked');
  if(!checks.length){toast('請先勾選要刪除的紀錄',true);return;}
  if(!confirm(`確定刪除 ${checks.length} 筆紀錄？此操作無法復原。`))return;
  const keys=[];checks.forEach(c=>keys.push(c.dataset.key));
  showLoading(`🗑️ 刪除中... ${keys.length} 筆`);
  try{
    const result=await apiPost({action:'delete',keys:keys});
    if(!result.success)throw new Error(result.error);
    keys.forEach(k=>delete cloudIndex[k]);
    renderList();toast(`✅ 已刪除 ${result.deleted||keys.length} 筆`);
  }catch(err){toast('❌ 刪除失敗：'+err.message,true);}
  finally{hideLoading();}
}

/* ===== Import（舊資料匯入，逐筆上傳到雲端）===== */
async function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      const keys=Object.keys(imported);
      if(!keys.length){toast('檔案無資料',true);return;}
      if(!confirm(`讀取到 ${keys.length} 筆紀錄，要逐筆上傳到雲端嗎？`))return;
      showLoading(`☁️ 上傳中... 0/${keys.length}`);
      let ok=0,fail=0;
      for(let i=0;i<keys.length;i++){
        $('loadMsg').textContent=`☁️ 上傳中... ${i+1}/${keys.length}`;
        try{
          const result=await apiPost({action:'save',key:keys[i],data:imported[keys[i]]});
          if(result.success){ok++;cloudIndex[keys[i]]={location:imported[keys[i]].location||'',startDate:imported[keys[i]].startDate||'',endDate:imported[keys[i]].endDate||'',project:imported[keys[i]].project||'',savedAt:imported[keys[i]].savedAt||'',fileId:result.fileId||''};}
          else fail++;
        }catch(err){fail++;}
      }
      hideLoading();renderList();
      toast(`✅ 匯入完成：${ok} 筆成功${fail?'，'+fail+' 筆失敗':''}`);
    }catch(err){hideLoading();toast('匯入失敗：'+err.message,true);}
  };
  r.readAsText(f);e.target.value='';
}

/* ===== Refresh Index ===== */
async function refreshIndex(){
  showLoading('🔄 重新整理中...');
  try{
    const result=await apiGet('action=index');
    if(!result.success)throw new Error(result.error);
    cloudIndex=result.index||{};
    renderList();toast(`🔄 已重新整理，共 ${result.total} 筆`);
  }catch(err){toast('❌ 重新整理失敗：'+err.message,true);}
  finally{hideLoading();}
}

/* ===== PDF ===== */
function buildPdfHtml(data,isFirst){
  const loc=data.location||'—',sd=data.startDate||'',ed=data.endDate||'';
  const pbClass=isFirst===false?'pdf-newpage':'';
  // Page 1: Record table
  let h=`<div class="pdf-page ${pbClass}"><h2>營建工地每日噴灑水作業紀錄表</h2><div class="sub-info">工程名稱：${data.project||''} ｜ 地點：${loc} ｜ 期間：${sd} ～ ${ed}</div><table><thead><tr><th>日期</th><th>時段</th><th>開始時間</th><th>結束時間</th><th>灑水方式</th><th>累計用水量(m³)</th><th>灑水面積(m²)</th><th>操作人員</th></tr></thead><tbody>`;
  if(data.days){data.days.forEach((day,d)=>{const dt=day.date?`${fmtDate(day.date)}(${weekday(day.date)})`:`第${d+1}天`;for(const p of['am','pm']){const r=day[p]||{};h+=`<tr><td>${p==='am'?dt:''}</td><td>${p==='am'?'上午':'下午'}</td><td>${r.start||''}</td><td>${r.end||''}</td><td>${METHODS[r.method]||METHODS[DM]}</td><td>${r.water||''}</td><td>${r.len||''}</td><td>${r.person||''}</td></tr>`;}});}
  h+='</tbody></table>';
  h+=`<div class="sig-line"><div class="sig-block">${data.sig?.engineerImg?`<img src="${data.sig.engineerImg}">`:'<div class="sig-space"></div>'}<div class="sig-label">現場環保工程師：${data.sig?.engineer||''}</div></div><div class="sig-block">${data.sig?.managerImg?`<img src="${data.sig.managerImg}">`:'<div class="sig-space"></div>'}<div class="sig-label">環境保護負責人：${data.sig?.manager||''}</div></div></div></div>`;
  // Page 2: Photos
  h+=`<div class="pdf-page pdf-newpage"><h2>營建工地噴灑水作業照片紀錄</h2><div class="sub-info">地點：${loc} ｜ 期間：${sd} ～ ${ed}</div><div class="pdf-photo-grid">`;
  if(data.photos){data.photos.forEach((ph,i)=>{const dt=i<5&&data.days&&data.days[i]?`${fmtDate(data.days[i].date)}(${weekday(data.days[i].date)})`:i===5?'自訂':'';h+=`<div class="pdf-photo-cell"><div class="ppc-header">${dt}</div><div class="ppc-body">${ph.src?`<img src="${ph.src}">`:'<span style="color:#ccc;">無照片</span>'}</div><div class="ppc-desc">${ph.desc||''}</div></div>`;});}
  h+=`</div><div class="sig-line" style="margin-top:10px;"><div class="sig-block">${data.sig?.engineerImg?`<img src="${data.sig.engineerImg}">`:'<div class="sig-space"></div>'}<div class="sig-label">現場環保工程師：${data.sig?.engineer||''}</div></div><div class="sig-block">${data.sig?.managerImg?`<img src="${data.sig.managerImg}">`:'<div class="sig-space"></div>'}<div class="sig-label">環境保護負責人：${data.sig?.manager||''}</div></div></div></div>`;
  return h;
}
const PDF_OPT={margin:0,image:{type:'jpeg',quality:0.92},html2canvas:{scale:2,useCORS:true,logging:false,scrollX:0,scrollY:0,windowWidth:1200},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},pagebreak:{mode:['css','legacy'],before:'.pdf-newpage'}};
async function exportPDF(){
  const btn=$('btnPdf');btn.disabled=true;btn.textContent='匯出中...';
  try{
    const data=collectData();
    const c=$('pdfContent');c.innerHTML=buildPdfHtml(data);
    await html2pdf().set({...PDF_OPT,filename:`灑水紀錄_${data.location||''}_${data.startDate||''}.pdf`}).from(c).save();
    toast('PDF 已匯出');
  }catch(err){toast('PDF匯出失敗：'+err.message,true);}
  $('pdfContent').innerHTML='';
  btn.disabled=false;btn.textContent='匯出 PDF';
}
function openPreview(){$('previewBody').innerHTML=buildPdfHtml(collectData());$('previewModal').classList.add('open');}
function closePreview(){$('previewModal').classList.remove('open');}
function exportPdfFromPreview(){closePreview();exportPDF();}

/* ===== 批次匯出勾選紀錄 PDF ===== */
async function exportSelectedPDF(){
  const checks=document.querySelectorAll('.rc-check:checked');
  if(!checks.length){toast('請先勾選要匯出的紀錄',true);return;}
  const keys=[];checks.forEach(c=>keys.push(c.dataset.key));
  showLoading(`📄 下載紀錄中... 0/${keys.length}`);
  // 逐筆從雲端拉完整資料
  const allData=[];
  let failed=0;
  for(let i=0;i<keys.length;i++){
    $('loadMsg').textContent=`📄 下載紀錄中... ${i+1}/${keys.length}`;
    try{
      const result=await apiGet('action=get&key='+encodeURIComponent(keys[i]));
      if(result.success&&result.data)allData.push(result.data);
      else failed++;
    }catch(e){failed++;}
  }
  hideLoading();
  if(!allData.length){toast('❌ 沒有成功下載任何紀錄',true);return;}
  if(failed)toast(`⚠️ ${failed} 筆下載失敗，其餘繼續匯出`,true);
  // 組合 PDF HTML
  $('loadMsg').textContent='📄 產生 PDF 中...';showLoading('📄 產生 PDF 中...');
  try{
    let html='';
    allData.forEach((data,i)=>{
      // 第一筆 isFirst=true（不加分頁），後面的 isFirst=false
      html+=buildPdfHtml(data,i>0?false:undefined);
    });
    const c=$('pdfContent');c.innerHTML=html;
    const first=allData[0],last=allData[allData.length-1];
    const fname=allData.length===1
      ?`灑水紀錄_${first.location||''}_${first.startDate||''}.pdf`
      :`灑水紀錄_${allData.length}筆_${first.startDate||''}_${last.startDate||''}.pdf`;
    await html2pdf().set({...PDF_OPT,filename:fname}).from(c).save();
    toast(`✅ 已匯出 ${allData.length} 筆紀錄 PDF`);
  }catch(err){toast('PDF匯出失敗：'+err.message,true);}
  $('pdfContent').innerHTML='';
  hideLoading();
}

    }
  }catch(err){

  }finally{hideLoading();}
})();
