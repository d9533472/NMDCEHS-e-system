<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMDC 通霄二期 — 查驗紀錄管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{
  --bg:#f4f6f9;--bg2:#edf0f5;--card:#ffffff;--card2:#f8f9fb;
  --border:#e2e6ed;--border2:#d0d5df;
  --fg:#1e293b;--fg2:#0f172a;--muted:#7c8ba0;--muted2:#94a3b8;
  --accent:#2563eb;--accent2:#3b82f6;--accent3:#1d4ed8;
  --green:#059669;--green2:#10b981;--greenBg:#ecfdf5;
  --amber:#d97706;--amberBg:#fffbeb;
  --red:#dc2626;--redBg:#fef2f2;
  --violet:#7c3aed;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}html,body,#root{height:100%}
body{background:var(--bg);color:var(--fg);font-family:'Plus Jakarta Sans','Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{background:#fff;color:var(--fg);border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:all .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select{cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%237c8ba0'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
button{cursor:pointer;font-size:13px;font-family:inherit;border:none;border-radius:var(--radius);padding:8px 16px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent3);box-shadow:var(--shadow)}.bp:disabled{opacity:.5;pointer-events:none}
.bg{background:#fff;color:var(--muted);border:1.5px solid var(--border)}.bg:hover{background:var(--bg2);color:var(--fg)}
.bd{background:var(--redBg);color:var(--red);border:1px solid #fecaca}.bd:hover{background:#fee2e2}
table{width:100%;border-collapse:collapse;font-size:12.5px}thead{position:sticky;top:0;z-index:2}
th{background:var(--card2);color:var(--muted);font-weight:600;font-size:10.5px;text-align:left;padding:10px 12px;white-space:nowrap;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.5px}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}tbody tr{transition:background .1s}tbody tr:hover{background:var(--bg2)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11.5px}.num{text-align:right;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;font-size:12px}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px}
.fi{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
.tw{position:fixed;bottom:24px;right:24px;z-index:9999}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:600;animation:su .3s ease;border:1px solid;margin-top:8px;box-shadow:var(--shadow-lg)}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.fl{display:block;font-size:10.5px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.pt{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .4s ease}
.ov{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center}
.ob{position:fixed;inset:0;background:rgba(15,23,42,.3);backdrop-filter:blur(4px)}
.md{position:relative;background:#fff;border-radius:var(--radius-lg);padding:28px;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:fadeIn .25s ease}
.cb{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px}
.cok{background:var(--greenBg);color:var(--green);border:1px solid #a7f3d0}
.csy{background:#eff6ff;color:var(--accent);border:1px solid #bfdbfe}
.login-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px;background:#eff6ff;color:var(--accent);border:1px solid #bfdbfe}
@media(max-width:900px){.fr{grid-template-columns:1fr}.fr3{grid-template-columns:1fr}.sidebar{display:none!important}.mnav{display:flex!important}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#7c8ba0"><div class="spinner" style="width:24px;height:24px;margin-right:12px"></div>載入雲端資料...</div></div>
<script type="text/babel">
const VER='3.1.0';
const DEFAULT_API='https://script.google.com/macros/s/AKfycbxJAuZHtubqyArcDCJetUH7Czdffo_vbystwcipZP-rqEG3Uzmv61emQ7fZp-JYM3Bffg/exec';
const{useState,useEffect,useMemo,useCallback,useRef}=React;

const mkApi=u=>({
  get:async(a,p={})=>{const url=new URL(u);url.searchParams.set('action',a);Object.entries(p).forEach(([k,v])=>url.searchParams.set(k,v));const r=await fetch(url);if(!r.ok)throw Error('HTTP '+r.status);const d=await r.json();if(d.error)throw Error(d.error);return d},
  post:async(a,d={})=>{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:a,data:d})});if(!r.ok)throw Error('HTTP '+r.status);const j=await r.json();if(j.error)throw Error(j.error);return j},
});

const fmt=n=>(n==null||isNaN(n))?'—':new Intl.NumberFormat('zh-TW').format(Math.round(n));
const fN=n=>(n==null||isNaN(n))?'—':'NT$ '+fmt(n);
const fP=n=>(n==null||isNaN(n))?'—':(n*100).toFixed(1)+'%';
const fD=d=>{if(!d)return'—';try{const x=new Date(d);return isNaN(x)?String(d).slice(0,10):x.toLocaleDateString('zh-TW')}catch{return String(d).slice(0,10)}};
const fT=d=>{if(!d)return'';try{return new Date(d).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}catch{return''}};
const td=()=>new Date().toISOString().slice(0,10);

const Dot=({r})=>{const c=r===0?'#94a3b8':r<1?'#d97706':'#059669';return<span style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,fontWeight:600}}><span style={{width:7,height:7,borderRadius:'50%',background:c}}/>{r===0?'未開始':r<1?'進行中':'已完成'}</span>};
const Cloud=({s,t})=>s==='syncing'?<span className="cb csy"><span className="spinner" style={{width:10,height:10,borderWidth:1.5}}/> 同步中</span>:<span className="cb cok">☁ 雲端 {t&&fT(t)}</span>;
const Kpi=({l,v,s,a,i})=><div className="fi" style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'18px 22px',flex:'1 1 170px',minWidth:155,borderLeft:'3.5px solid '+(a||'var(--accent)'),boxShadow:'var(--shadow)',position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:10,right:14,fontSize:28,opacity:.06}}>{i}</div><div style={{fontSize:10.5,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6}}>{l}</div><div style={{fontSize:21,fontWeight:800,color:'var(--fg2)',marginTop:6,fontFamily:"'JetBrains Mono'"}}>{v}</div>{s&&<div style={{fontSize:11,color:a||'var(--muted)',marginTop:3,fontWeight:600}}>{s}</div>}</div>;
const Mdl=({open,close,title,wide,children})=>{if(!open)return null;return<div className="ov" onClick={close}><div className="ob"/><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:wide?960:640,width:'95vw',maxHeight:'88vh',overflowY:'auto'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,paddingBottom:14,borderBottom:'1px solid var(--border)'}}><h3 style={{fontSize:17,fontWeight:800,color:'var(--fg2)'}}>{title}</h3><button onClick={close} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'var(--muted)'}}>✕</button></div>{children}</div></div>};
const CSSBar=({data,k1,k2,lk})=>{const mx=Math.max(...data.map(d=>Math.max(d[k1]||0,d[k2]||0)),1);return<div style={{display:'flex',alignItems:'flex-end',gap:5,height:180,paddingTop:10}}>{data.map((d,i)=><div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',flex:1,gap:3,minWidth:0}}><div style={{display:'flex',alignItems:'flex-end',gap:2,height:150,width:'100%'}}><div title={'預算: '+fN(d[k1])} style={{flex:1,borderRadius:'4px 4px 0 0',background:'#e2e8f0',height:Math.max((d[k1]||0)/mx*150,2)}}/><div title={'已查驗: '+fN(d[k2])} style={{flex:1,borderRadius:'4px 4px 0 0',background:'var(--accent)',height:Math.max((d[k2]||0)/mx*150,2)}}/></div><div style={{fontSize:9,color:'var(--muted)',textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{d[lk]}</div></div>)}</div>};

/* ── Form ── */
function Form({bi,ins,init,fixId,onOk,onNo,ld}){
  const ID_PREFIX='NMDC-POE-BOQ-E-';
  const initNo=init?.id?String(init.id).replace(ID_PREFIX,''):'';
  const[f,sF]=useState({budget_item_id:fixId||init?.budget_item_id||'',inspection_no:initNo,inspection_date:init?.inspection_date?String(init.inspection_date).slice(0,10):td(),submit_date:init?.submit_date?String(init.submit_date).slice(0,10):'',approve_date:init?.approve_date?String(init.approve_date).slice(0,10):'',inspected_qty:init?.inspected_qty||'',note:init?.note||''});
  const[files,sFiles]=useState([]);const fr=useRef();
  const sel=bi.find(b=>b.id===f.budget_item_id);
  const eq=sel?ins.filter(i=>i.budget_item_id===sel.id&&i.id!==init?.id).reduce((s,i)=>s+parseFloat(i.inspected_qty||0),0):0;
  const rem=sel?sel.budget_qty-eq:0;
  return<div>
    <div style={{marginBottom:14}}><label className="fl">查驗編號 *</label><div style={{display:'flex',alignItems:'center',gap:0}}><span style={{background:'var(--bg2)',border:'1.5px solid var(--border)',borderRight:'none',borderRadius:'var(--radius) 0 0 var(--radius)',padding:'9px 12px',fontSize:13,color:'var(--muted)',fontFamily:"'JetBrains Mono'",whiteSpace:'nowrap',fontWeight:600}}>{ID_PREFIX}</span><input value={f.inspection_no} onChange={e=>sF(x=>({...x,inspection_no:e.target.value}))} placeholder="001" style={{borderRadius:'0 var(--radius) var(--radius) 0',fontFamily:"'JetBrains Mono'",fontWeight:600}}/></div>{f.inspection_no&&<div style={{fontSize:11,color:'var(--accent)',marginTop:4,fontFamily:"'JetBrains Mono'"}}>完整編號: {ID_PREFIX}{f.inspection_no}</div>}</div>
    <div><label className="fl">預算項目 *</label><select value={f.budget_item_id} disabled={!!fixId} onChange={e=>sF(x=>({...x,budget_item_id:e.target.value}))} style={{marginBottom:14}}><option value="">— 請選擇 —</option>{bi.map(b=><option key={b.id} value={b.id}>{b.item_no} {b.item_name_cn}</option>)}</select></div>
    {sel&&<div style={{background:'var(--bg)',borderRadius:'var(--radius)',padding:14,marginBottom:14,border:'1px solid var(--border)'}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,fontSize:12}}><div>單位: <strong>{sel.unit}</strong></div><div>單價: <strong className="mono">{fmt(sel.unit_price)}</strong></div><div>預算數量: <strong className="mono">{fmt(sel.budget_qty)}</strong></div><div>已查驗: <span className="mono">{fmt(eq)}</span></div><div style={{color:'var(--amber)',fontWeight:700}}>剩餘: <span className="mono">{fmt(rem)}</span></div><div>預算金額: <span className="mono">{fmt(sel.budget_total)}</span></div></div></div>}
    <div className="fr3"><div><label className="fl">查驗日期 *</label><input type="date" value={f.inspection_date} onChange={e=>sF(x=>({...x,inspection_date:e.target.value}))}/></div><div><label className="fl">提送日期</label><input type="date" value={f.submit_date} onChange={e=>sF(x=>({...x,submit_date:e.target.value}))}/></div><div><label className="fl">核准日期</label><input type="date" value={f.approve_date} onChange={e=>sF(x=>({...x,approve_date:e.target.value}))}/></div></div>
    <div className="fr">
      <div><label className="fl">查驗數量 * {rem>0&&<span style={{color:'var(--amber)'}}>(max {fmt(rem)})</span>}</label><input type="number" step="any" min="0.01" value={f.inspected_qty} placeholder="0" onChange={e=>sF(x=>({...x,inspected_qty:e.target.value}))}/>{f.inspected_qty&&sel&&<div style={{fontSize:12,color:'var(--accent)',marginTop:5,fontWeight:600}}>查驗金額: {fN(parseFloat(f.inspected_qty||0)*sel.unit_price)}</div>}</div>
      <div><label className="fl">備註</label><textarea rows={3} value={f.note} placeholder="查驗說明..." style={{resize:'vertical'}} onChange={e=>sF(x=>({...x,note:e.target.value}))}/></div>
    </div>
    <div style={{marginBottom:18}}>
      <label className="fl">附件 → Google Drive</label>
      <input type="file" ref={fr} multiple onChange={e=>{Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=()=>sFiles(p=>[...p,{filename:file.name,mimeType:file.type,size:file.size,content:r.result.split(',')[1]}]);r.readAsDataURL(file)});e.target.value=''}} style={{display:'none'}} accept="image/*,.pdf,.xlsx,.xls,.doc,.docx"/>
      <button className="bg" onClick={()=>fr.current?.click()} style={{marginBottom:6}}>📎 選擇檔案</button>
      {files.map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,background:'var(--bg)',padding:'5px 10px',borderRadius:4,border:'1px solid var(--border)',marginBottom:3}}>📄 {x.filename} <span style={{color:'var(--muted)'}}>({(x.size/1024).toFixed(1)}KB)</span><button onClick={()=>sFiles(p=>p.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',marginLeft:'auto'}}>✕</button></div>)}
    </div>
    {init?.attachment_ids?.length>0&&<div style={{marginBottom:14}}><label className="fl">已上傳附件</label><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{init.attachment_ids.map((fid,i)=><a key={fid} href={'https://drive.google.com/file/d/'+fid+'/view'} target="_blank" rel="noopener" style={{fontSize:11,color:'var(--accent)',textDecoration:'none',background:'var(--bg)',padding:'4px 10px',borderRadius:4,border:'1px solid var(--border)'}}>📎 {init.attachment_names?.[i]||fid}</a>)}</div></div>}
    <div style={{display:'flex',justifyContent:'flex-end',gap:10,paddingTop:14,borderTop:'1px solid var(--border)'}}>
      <button className="bg" onClick={onNo}>取消</button>
      <button className="bp" disabled={ld} onClick={()=>{if(!f.inspection_no||!f.inspection_no.trim())return alert('請輸入查驗編號');if(!f.budget_item_id)return alert('請選擇項目');if(!f.inspection_date)return alert('請輸入查驗日期');const q=parseFloat(f.inspected_qty);if(isNaN(q)||q<=0)return alert('數量>0');if(!init&&q>rem)return alert('超過剩餘! max:'+rem);onOk({...f,inspected_qty:q,attachments:files})}}>{ld?<><span className="spinner"/> 儲存至雲端...</>:init?'☁ 儲存至雲端':'☁ 新增並儲存至雲端'}</button>
    </div>
  </div>;
}

/* ── ItemDetail ── */
function Detail({item:it,ins,onAdd,onEdit,onDel,auth}){
  const recs=ins.filter(i=>i.budget_item_id===it.id).sort((a,b)=>String(b.inspection_date).localeCompare(String(a.inspection_date)));
  return<div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:18,fontSize:12.5}}><div>類別: <strong>{it.category}</strong></div><div>單位: <strong>{it.unit}</strong></div><div>編碼: <span className="mono" style={{fontSize:11}}>{it.code}</span></div></div>
    <div style={{display:'flex',gap:12,marginBottom:18,flexWrap:'wrap'}}><Kpi l="預算數量" v={fmt(it.budget_qty)} a="var(--muted)" i="📦"/><Kpi l="已核准" v={fmt(it.inspected_qty)} s={fN(it.inspected_amt)} a="var(--green)" i="✅"/>{(it.pending_qty||0)>0&&<Kpi l="待核准" v={fmt(it.pending_qty)} s={fN(it.pending_amt)} a="#f59e0b" i="⏳"/>}<Kpi l="未查驗" v={fmt(it.remaining_qty)} s={fN(it.remaining_amt)} a="var(--amber)" i="📋"/><Kpi l="核准比例" v={fP(it.ratio)} a="var(--accent)" i="📊"/></div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><h4 style={{fontSize:14,fontWeight:700}}>歷次查驗 ({recs.length}筆)</h4>{auth&&<button className="bp" style={{fontSize:12,padding:'5px 14px'}} onClick={onAdd}>＋ 新增</button>}</div>
    {recs.length===0?<div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>尚無查驗紀錄</div>
    :<div style={{overflowX:'auto'}}><table><thead><tr><th>編號</th><th>查驗日期</th><th>提送日期</th><th>核准日期</th><th style={{textAlign:'right'}}>數量</th><th style={{textAlign:'right'}}>金額</th><th>備註</th><th>附件</th>{auth&&<th>操作</th>}</tr></thead><tbody>
      {recs.map(r=><tr key={r.id}><td className="mono" style={{color:'var(--accent)',fontSize:11}}>{r.id}</td><td style={{fontSize:12}}>{fD(r.inspection_date)}</td><td style={{fontSize:12}}>{fD(r.submit_date)}</td><td style={{fontSize:12}}>{fD(r.approve_date)}</td><td className="num">{fmt(r.inspected_qty)}</td><td className="num" style={{color:'var(--green)'}}>{fmt(r.inspected_amount)}</td><td style={{fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.note||'—'}</td>
      <td>{r.attachment_ids?.length>0?r.attachment_ids.map((fid,j)=><a key={fid} href={'https://drive.google.com/file/d/'+fid+'/view'} target="_blank" rel="noopener" style={{fontSize:10,color:'var(--accent)',marginRight:4}}>📎{j+1}</a>):'—'}</td>
      {auth&&<td><div style={{display:'flex',gap:4}}><button className="bg" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>onEdit(r)}>編輯</button><button className="bd" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>onDel(r.id)}>刪除</button></div></td>}</tr>)}
    </tbody></table></div>}
  </div>;
}

/* ═══ MAIN APP ═══ */
function App(){
  const[auth,sAuth]=useState(false);
  const[loginModal,sLM]=useState(false);
  const[loginU,sLU]=useState('');const[loginP,sLP]=useState('');const[loginErr,sLE]=useState('');
  const[data,sData]=useState(null);const[ss,sSs]=useState('idle');const[ls,sLs]=useState(null);
  const[pg,sPg]=useState('dash');const[ml,sMl]=useState(null);const[ts,sTs]=useState([]);
  const[sub,sSub]=useState(false);const[logs,sLogs]=useState(null);
  const[fC,sFC]=useState('');const[fS,sFS]=useState('');const[fD1,sFD1]=useState('');const[fD2,sFD2]=useState('');
  const api=useRef(null);

  const toast=(m,t='ok')=>{const id=Date.now();sTs(x=>[...x,{id,m,t}]);setTimeout(()=>sTs(x=>x.filter(z=>z.id!==id)),4000)};

  /* 開網頁就載入雲端資料 */
  const sync=useCallback(async()=>{
    if(!api.current)api.current=mkApi(DEFAULT_API);
    sSs('syncing');
    try{const r=await api.current.get('getSummary');sData(r);sLs(new Date().toISOString());sSs('done')}
    catch(e){sSs('error');toast('同步失敗: '+e.message,'err')}
  },[]);

  useEffect(()=>{api.current=mkApi(DEFAULT_API);sync();},[]);

  const doLogin=()=>{if(loginU==='123'&&loginP==='123'){sAuth(true);sLM(false);sLU('');sLP('');sLE('');toast('已登入，可進行新增/編輯/刪除')}else sLE('帳號或密碼錯誤')};
  const doLogout=()=>{sAuth(false);toast('已登出')};

          <td className="num" style={{fontWeight:600,color:approved?'var(--green)':'#f59e0b'}}>{fmt(i.inspected_amount)}</td>
          <td style={{fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.note||'—'}</td>
          <td>{i.attachment_ids?.length>0?i.attachment_ids.map((fid,j)=><a key={fid} href={'https://drive.google.com/file/d/'+fid+'/view'} target="_blank" rel="noopener" style={{fontSize:10,color:'var(--accent)',marginRight:4}}>📎{j+1}</a>):'—'}</td>
          {auth&&<td><div style={{display:'flex',gap:4}}><button className="bg" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>sMl({t:'edit',p:i})}>編輯</button><button className="bd" style={{fontSize:10,padding:'3px 8px'}} onClick={()=>delI(i.id)}>刪除</button></div></td>}
        </tr>})}</tbody></table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:'var(--muted)'}}>顯示 {fIn.length} 筆 · 合計: {fN(fIn.reduce((s,i)=>s+parseFloat(i.inspected_amount||0),0))}</div>
    </div>}

    {/* ═══ LOGS ═══ */}
    {pg==='log'&&<div className="fi">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}><h1 style={{fontSize:24,fontWeight:800}}>操作日誌</h1><button className="bg" onClick={ldLogs}>☁↓ 從雲端同步</button></div>
      <div style={{overflowX:'auto',background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow)'}}>
        <table><thead><tr>{['時間','操作','對象','說明','操作者'].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{!logs?<tr><td colSpan={5} style={{textAlign:'center',padding:48,color:'var(--muted)'}}><span className="spinner"/> 載入中</td></tr>
        :logs.length===0?<tr><td colSpan={5} style={{textAlign:'center',padding:48,color:'var(--muted)'}}>尚無日誌</td></tr>
        :logs.map(l=><tr key={l.id}><td style={{fontSize:11,whiteSpace:'nowrap'}}>{fD(l.timestamp)}</td><td><span className="tag" style={{background:l.action==='CREATE'?'var(--greenBg)':l.action==='DELETE'?'var(--redBg)':'#eff6ff',color:l.action==='CREATE'?'var(--green)':l.action==='DELETE'?'var(--red)':'var(--accent)'}}>{l.action}</span></td><td style={{fontSize:11}}>{l.target}</td><td style={{fontSize:12}}>{l.detail}</td><td style={{fontSize:11}}>{l.action_by}</td></tr>)}</tbody></table>
      </div>
    </div>}

    {/* ═══ SETTINGS ═══ */}
    {pg==='set'&&<div className="fi">
      <h1 style={{fontSize:24,fontWeight:800,marginBottom:18}}>系統設定</h1>
      <div style={{display:'grid',gap:18,maxWidth:640}}>
        <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h3 style={{fontSize:14,fontWeight:700}}>☁ 雲端連線</h3><Cloud s="ok" t={ls}/></div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:12,lineHeight:1.8}}>
            <strong>「☁↓ 從雲端同步」</strong> = 從 Google Sheets 讀取最新資料<br/>
            <strong>新增/編輯/刪除操作</strong> = 即時儲存至 Google Sheets（無需手動儲存）
          </div>
          <button className="bg" onClick={sync}>☁↓ 從雲端同步</button>
        </div>
        {data?.drive_folder_id&&<div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>📁 Google Drive 附件</h3><a href={'https://drive.google.com/drive/folders/'+data.drive_folder_id} target="_blank" rel="noopener" style={{color:'var(--accent)',fontSize:13}}>🔗 開啟附件資料夾</a></div>}
        <div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:24,boxShadow:'var(--shadow)'}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>系統資訊</h3>
          <div style={{fontSize:12,color:'var(--muted)',lineHeight:2.2,display:'grid',gridTemplateColumns:'100px 1fr',gap:'2px 12px'}}>
            <span>登入狀態:</span><strong style={{color:auth?'var(--green)':'var(--muted)'}}>{auth?'✅ 已登入（可編輯）':'🔒 檢視模式'}</strong>
            <span>資料:</span><strong style={{color:'var(--green)'}}>☁ Google Sheets</strong>
            <span>附件:</span><strong style={{color:'var(--green)'}}>☁ Google Drive</strong>
            <span>預算項目:</span><strong>{sm.length} 項</strong>
            <span>查驗紀錄:</span><strong>{ins.length} 筆</strong>
            <span>總預算:</span><strong>{fN(tot.totalBudget)}</strong>
            <span>版本:</span><strong>v{VER}</strong>
          </div>
        </div>
      </div>
    </div>}
    </main>

    {/* ═══ LOGIN MODAL ═══ */}
    <Mdl open={loginModal} close={()=>{sLM(false);sLE('')}} title="🔐 登入管理">
      <div style={{maxWidth:320,margin:'0 auto'}}>
        <div style={{marginBottom:14}}><label className="fl">帳號</label><input value={loginU} onChange={e=>{sLU(e.target.value);sLE('')}} placeholder="帳號" autoFocus/></div>
        <div style={{marginBottom:20}}><label className="fl">密碼</label><input type="password" value={loginP} onChange={e=>{sLP(e.target.value);sLE('')}} placeholder="密碼" onKeyDown={e=>{if(e.key==='Enter')doLogin()}}/></div>
        {loginErr&&<div style={{marginBottom:14,padding:10,background:'var(--redBg)',borderRadius:6,fontSize:12,color:'var(--red)',border:'1px solid #fecaca',textAlign:'center'}}>{loginErr}</div>}
        <button className="bp" style={{width:'100%',justifyContent:'center',padding:12}} onClick={doLogin}>登入</button>
        <div style={{textAlign:'center',marginTop:12,fontSize:11,color:'var(--muted)'}}>登入後可新增、編輯、刪除查驗紀錄</div>
      </div>
    </Mdl>

    {/* ═══ CRUD MODALS ═══ */}
    <Mdl open={ml?.t==='add'} close={()=>sMl(null)} title="新增查驗紀錄"><Form bi={sm} ins={ins} onOk={addI} onNo={()=>sMl(null)} ld={sub}/></Mdl>
    <Mdl open={ml?.t==='addfor'} close={()=>sMl(null)} title={'新增查驗 — '+(ml?.p?.item_no||'')}>{ml?.p&&<Form bi={sm} ins={ins} fixId={ml.p.id} onOk={addI} onNo={()=>sMl(null)} ld={sub}/>}</Mdl>
    <Mdl open={ml?.t==='edit'} close={()=>sMl(null)} title="編輯查驗">{ml?.p&&<Form bi={sm} ins={ins} init={ml.p} onOk={d=>updI(ml.p.id,d)} onNo={()=>sMl(null)} ld={sub}/>}</Mdl>
    <Mdl open={ml?.t==='item'} close={()=>sMl(null)} wide title={ml?.p?ml.p.item_no+' — '+ml.p.item_name_cn:''}>{ml?.p&&<Detail item={ml.p} ins={ins} auth={auth} onAdd={()=>sMl({t:'addfor',p:ml.p})} onEdit={i=>sMl({t:'edit',p:i})} onDel={delI}/>}</Mdl>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
